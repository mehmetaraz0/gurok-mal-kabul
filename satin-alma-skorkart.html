<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="ortak.js"></script>
<link rel="stylesheet" href="theme.css">
<script>
let CU = requireLogin();
if (CU) requireRole(CU, ['yonetici','satinalma','depo']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Tedarikçi Skor Kartı</title>
<meta name="theme-color" content="#1a2744">
<style>
:root{--accent:#e8a020}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.skart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.skart.bekleyen{border-left-color:var(--warning)}.skart.onaylandi{border-left-color:var(--success)}.skart.siparis{border-left-color:var(--info)}.skart.tamamlandi{border-left-color:var(--success)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='satin-alma.html'">←</button>
    <div style="flex:1"><h1>Tedarikçi Skor Kartı</h1><span class="sub" id="hsub"></span></div>
  </div>

  <div class="sc" id="tab-skorKart">
    <div class="card">
      <div class="card-title" style="justify-content:space-between">
        <span>⭐ Tedarikçi Skor Kartı</span>
        <button class="hbtn" style="width:auto;height:auto;padding:6px 10px;border-radius:8px;background:var(--gray-200);color:var(--primary);font-size:11px" onclick="_skorKartVeri=null;renderSkorKart()">🔄 Yenile</button>
      </div>
      <p style="font-size:12px;color:var(--gray-500)">Mal Kabul, Uygunsuzluk ve Sipariş verilerinden otomatik hesaplanır. <b>Skor:</b> Kalite %40 + Teslimat Hızı %40 + Fatura Eşleşme %20 → 0-100 puan.</p>
      <div class="rfields">
        <div class="field"><label>Otel</label>
          <select id="sk-otel-filtre" onchange="renderSkorKart()">
            <option value="">Tümü</option>
            <option value="810">🏨 Club</option>
            <option value="811">🏨 Resort</option>
          </select>
        </div>
        <div class="field"><label>Sırala</label>
          <select id="sk-sirala" onchange="renderSkorKart()">
            <option value="skor_desc">⭐ Skor (yüksek→düşük)</option>
            <option value="skor_asc">⭐ Skor (düşük→yüksek)</option>
            <option value="uygunsuz_desc">Uygunsuzluk oranı (yüksek→düşük)</option>
            <option value="teslimat_desc">Teslimat sayısı (çok→az)</option>
            <option value="sure_desc">Ort. teslimat süresi (uzun→kısa)</option>
            <option value="fatura_asc">Fatura eşleşme oranı (düşük→yüksek)</option>
          </select>
        </div>
      </div>
      <input type="text" id="sk-ara" placeholder="Firma ara..." oninput="renderSkorKart()" style="width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;outline:none;margin-top:4px">
    </div>
    <div id="skorKart-stats" class="rfields"></div>
    <div id="skorKart-liste"></div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal -> ortak.js

// ============================================================
// TEDARİKÇİ SKOR KARTI — Mal Kabul + Uygunsuzluk + Sipariş verilerinden
// ============================================================
let _skorKartVeri=null;
async function renderSkorKart(){
  const c=document.getElementById('skorKart-liste');
  const otelFiltre=document.getElementById('sk-otel-filtre')?.value||'';
  const sirala=document.getElementById('sk-sirala')?.value||'uygunsuz_desc';
  const ara=(document.getElementById('sk-ara')?.value||'').toLowerCase().trim();

  if(!_skorKartVeri){
    c.innerHTML='<div class="es"><div class="et">Yükleniyor...</div></div>';
    try{
      const [mkR,ugR,spR]=await Promise.all([
        fetch(SB_URL+'/rest/v1/mal_kabuller?select=id,firma_ad,tarih,otel_id,durum,ln_siparis_no,fatura_no&durum=neq.iptal',{headers:SB_HEADERS}),
        fetch(SB_URL+'/rest/v1/uygunsuzluklar?select=mk_id',{headers:SB_HEADERS}),
        fetch(SB_URL+'/rest/v1/siparisler?select=siparis_no,tarih',{headers:SB_HEADERS}),
      ]);
      const mkRows=mkR.ok?await mkR.json():[];
      const ugRows=ugR.ok?await ugR.json():[];
      const spRows=spR.ok?await spR.json():[];
      const uygunsuzMkIdSet=new Set(ugRows.map(u=>String(u.mk_id)));
      const siparisTarihMap={};
      spRows.forEach(s=>{siparisTarihMap[s.siparis_no]=s.tarih;});
      _skorKartVeri={mkRows,uygunsuzMkIdSet,siparisTarihMap};
    }catch(e){console.warn(e);c.innerHTML='<div class="es"><div class="et">Veri çekilemedi</div></div>';return;}
  }

  const {mkRows,uygunsuzMkIdSet,siparisTarihMap}=_skorKartVeri;
  const liste=otelFiltre?mkRows.filter(r=>r.otel_id===otelFiltre):mkRows;

  const firmaMap={};
  liste.forEach(r=>{
    const firma=r.firma_ad||'—';
    if(!firmaMap[firma])firmaMap[firma]={firma,teslimat:0,uygunsuz:0,faturali:0,sureToplam:0,sureSayisi:0};
    const f=firmaMap[firma];
    f.teslimat++;
    if(uygunsuzMkIdSet.has(String(r.id)))f.uygunsuz++;
    if(r.fatura_no)f.faturali++;
    if(r.ln_siparis_no){
      const ilkSiparis=r.ln_siparis_no.split(',')[0].trim();
      const spTarih=siparisTarihMap[ilkSiparis];
      if(spTarih&&r.tarih){
        const gun=(new Date(r.tarih)-new Date(spTarih))/86400000;
        if(gun>=0){f.sureToplam+=gun;f.sureSayisi++;}
      }
    }
  });

  let firmalar=Object.values(firmaMap).map(f=>{
    const uygunsuzOran=f.teslimat?f.uygunsuz/f.teslimat:0;
    const faturaOran=f.teslimat?f.faturali/f.teslimat:0;
    const ortSure=f.sureSayisi?f.sureToplam/f.sureSayisi:null;
    // ---- BİLEŞİK SKOR (0-100) ----
    // Kalite: %40 — uygunsuzluk oranı 0 → tam puan, %25+ → 0 puan (lineer)
    const kaliteP=Math.max(0,1-uygunsuzOran/0.25)*40;
    // Teslimat hızı: %40 — sipariş→kabul 2 gün ve altı tam puan, 10+ gün 0 (lineer). Veri yoksa nötr (%70'i verilir)
    const hizP=ortSure===null?28:Math.max(0,Math.min(1,(10-ortSure)/8))*40;
    // Fatura eşleşme: %20
    const faturaP=faturaOran*20;
    const skor=Math.round(kaliteP+hizP+faturaP);
    const notHarf=skor>=85?'A':skor>=70?'B':skor>=50?'C':'D';
    return{...f,uygunsuzOran,faturaOran,ortSure,skor,notHarf};
  });

  if(ara)firmalar=firmalar.filter(f=>f.firma.toLowerCase().includes(ara));

  const sorters={
    skor_desc:(a,b)=>b.skor-a.skor,
    skor_asc:(a,b)=>a.skor-b.skor,
    uygunsuz_desc:(a,b)=>b.uygunsuzOran-a.uygunsuzOran,
    teslimat_desc:(a,b)=>b.teslimat-a.teslimat,
    sure_desc:(a,b)=>(b.ortSure??-1)-(a.ortSure??-1),
    fatura_asc:(a,b)=>a.faturaOran-b.faturaOran,
  };
  firmalar.sort(sorters[sirala]||sorters.skor_desc);

  const toplamTeslimat=firmalar.reduce((t,f)=>t+f.teslimat,0);
  const ortSkor=firmalar.length?Math.round(firmalar.reduce((t,f)=>t+f.skor,0)/firmalar.length):0;
  document.getElementById('skorKart-stats').innerHTML=`
    <div class="card" style="text-align:center;flex:1"><div style="font-size:20px;font-weight:800;color:var(--primary)">${firmalar.length}</div><div style="font-size:11px;color:var(--gray-500)">Tedarikçi</div></div>
    <div class="card" style="text-align:center;flex:1"><div style="font-size:20px;font-weight:800;color:var(--primary)">${toplamTeslimat}</div><div style="font-size:11px;color:var(--gray-500)">Toplam Teslimat</div></div>
    <div class="card" style="text-align:center;flex:1"><div style="font-size:20px;font-weight:800;color:${ortSkor>=70?'var(--success)':ortSkor>=50?'var(--warning)':'var(--danger)'}">${ortSkor}</div><div style="font-size:11px;color:var(--gray-500)">Ort. Skor</div></div>`;

  if(!firmalar.length){c.innerHTML='<div class="es"><div class="et">Kayıt bulunamadı</div></div>';return;}

  const notRenk={A:'var(--success)',B:'#0284c7',C:'var(--warning)',D:'var(--danger)'};
  c.innerHTML=firmalar.map(f=>{
    const oran=f.uygunsuzOran*100;
    const renk=notRenk[f.notHarf];
    return`<div class="skart" style="border-left-color:${renk};cursor:default">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;font-weight:700;flex:1">${f.firma}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="text-align:right">
            <div style="font-size:16px;font-weight:800;color:${renk}">${f.skor}<span style="font-size:10px;color:var(--gray-400)">/100</span></div>
          </div>
          <div style="width:34px;height:34px;border-radius:8px;background:${renk};color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800">${f.notHarf}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--gray-500);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap">
        <span>📦 ${f.teslimat} teslimat</span>
        <span style="${oran>0?'color:var(--danger);font-weight:600':''}">⚠️ %${oran.toFixed(1)} uygunsuz</span>
        <span>🧾 %${(f.faturaOran*100).toFixed(0)} fatura eşleşti</span>
        ${f.ortSure!==null?`<span>⏱️ ort. ${f.ortSure.toFixed(1)} gün</span>`:'<span style="color:var(--gray-400)">⏱️ süre verisi yok</span>'}
      </div>
    </div>`;
  }).join('');
}

// ====== INIT ======
(async function(){
  if(!CU) return;
  document.getElementById('hsub').textContent=CU.ad;
  await renderSkorKart();
})();
</script>
</body>
</html>
