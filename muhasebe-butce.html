<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}

.tab-bar::-webkit-scrollbar{display:none}

.field{margin-bottom:12px}

.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}

.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-kart{background:white;border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-num{font-size:16px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--gray-500);margin-top:2px}
.udd{display:none;position:fixed;background:white;border:1.5px solid var(--primary);border-radius:8px;max-height:220px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
.ay-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ay-hucre label{font-size:10px;color:var(--gray-500);text-transform:uppercase;display:block;margin-bottom:3px}
.ay-hucre input{width:100%;padding:7px 8px;border:1.5px solid var(--gray-300);border-radius:6px;font-size:12px;outline:none;text-align:right}
.rapor-satir{padding:10px 12px;border-bottom:1px solid var(--gray-100);background:white}
.progress-bar{background:var(--gray-200);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%}
.bh-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
let butceler={},hesaplar={},yevmiyeler={};
let YETKI_HARITASI = {};
const AY_ADLARI=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const AY_ALANLARI=['ocak','subat','mart','nisan','mayis','haziran','temmuz','agustos','eylul','ekim','kasim','aralik'];

// ============================================================
// DENETİM İZİ
// ============================================================
async function auditLogYaz(action,entityType,entityId,detail){
  const log={action,entity_type:entityType,entity_id:String(entityId||''),detail:detail||'',kullanici_ad:OTURUM_KULLANICI?.ad||'Bilinmeyen'};
  try{await fetch(SB_URL+'/rest/v1/audit_log',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(log)});}catch(e){}
}

// ============================================================
// DÖNÜŞTÜRME YARDIMCILARI
// ============================================================
function butceSbdenCamele(r){
  const aylar=AY_ALANLARI.map(a=>parseFloat(r[a])||0);
  return{id:r.id,yil:r.yil,otelId:r.otel_id,hesapKodu:r.hesap_kodu,hesapAd:r.hesap_ad||'',aylar};
}
function yevSbdenCamele(r){
  return{
    id:r.id,tarih:r.tarih?new Date(r.tarih).getTime():Date.now(),otelId:r.otel_id,
    kalemler:(r.yevmiye_kalemleri||[]).map(k=>({hesapKod:k.hesap_kodu,borc:parseFloat(k.borc)||0,alacak:parseFloat(k.alacak)||0}))
  };
}

async function loadDB(){
  sLD();
  try{
    const [bR,hR,yR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/butce_kayitlari?select=*&silindi=eq.false',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/hesap_plani?select=kod,ad,yon,tip&silindi=eq.false',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/yevmiye_fisler?select=id,tarih,otel_id,yevmiye_kalemleri(hesap_kodu,borc,alacak)&silindi=eq.false',{headers:SB_HEADERS}),
    ]);
    butceler={};hesaplar={};yevmiyeler={};
    if(bR.ok){(await bR.json()).forEach(r=>{butceler[r.id]=butceSbdenCamele(r);});}
    if(hR.ok){(await hR.json()).forEach(r=>{hesaplar[r.kod]=r;});}
    if(yR.ok){(await yR.json()).forEach(r=>{yevmiyeler[r.id]=yevSbdenCamele(r);});}
  }catch(e){console.warn(e);}
  hLD();
}

async function saveButce(b){
  const satir={yil:b.yil,otel_id:b.otelId,hesap_kodu:b.hesapKodu,hesap_ad:b.hesapAd||null};
  AY_ALANLARI.forEach((ad,i)=>{satir[ad]=b.aylar?.[i]||0;});
  try{
    const r=await fetch(SB_URL+'/rest/v1/butce_kayitlari?on_conflict=yil,otel_id,hesap_kodu',{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify(satir)
    });
    const d=await r.json();
    if(d&&d[0])b.id=d[0].id;
  }catch(e){console.warn(e);}
}

// ====== BÜTÇE — EXCEL TOPLU DÜZENLEME (ortak-excel.js) ======
// Bileşik doğal anahtar (yil+otelId+hesapKodu). 12 aylık sütun AY_ALANLARI
// ile birebir aynı alan adları — hem okuma hem yazma için ekstra eşleme
// katmanı gerekmiyor. hesapAd spec'te YOK, yazma anında hesaplar[hesapKodu]
// map'inden otomatik dolduruluyor (kullanıcı yanlış/eski ad yazıp
// tutarsızlık yaratmasın). Ay sütunlarında pozitifOlmali YOK — 0 TL bütçe
// (o ay hiç ayrılmamış) geçerli, sadece negatif reddedilir.
const butceExcelSpec = [
  {alan:'yil', baslik:'Yıl', tip:'number', zorunlu:true, pozitifOlmali:true, genislik:8},
  {alan:'otelId', baslik:'Otel', tip:'text', zorunlu:true, genislik:8, izinliDegerler:['810','811']},
  {alan:'hesapKodu', baslik:'Hesap Kodu', tip:'text', zorunlu:true, genislik:14},
  ...AY_ALANLARI.map((alan,i)=>({alan, baslik:AY_ADLARI[i], tip:'number', genislik:10}))
];

function _butceMevcutKayitlar(){
  return Object.values(butceler).map(b=>{
    const obj={yil:b.yil, otelId:b.otelId, hesapKodu:b.hesapKodu};
    AY_ALANLARI.forEach((alan,i)=>{obj[alan]=b.aylar?.[i]||0;});
    return obj;
  });
}

async function butceExcelAktar(){
  const veriler=_butceMevcutKayitlar().sort((a,b)=>b.yil-a.yil||a.hesapKodu.localeCompare(b.hesapKodu));
  await excelSablonIndir(butceExcelSpec, veriler, 'butce-'+new Date().toISOString().split('T')[0]+'.xlsx');
}

async function butceExcelYukle(event){
  const file=event.target.files[0];if(!file)return;event.target.value='';
  sLD();
  try{
    const satirlar=await excelDosyaOku(file);
    hLD();
    const fkSet=new Set(Object.keys(hesaplar));
    const siniflandirma=excelSatirlariSiniflandir(butceExcelSpec, satirlar, _butceMevcutKayitlar(), {dogalAnahtarKombinasyonu:['yil','otelId','hesapKodu'], fkAlan:'hesapKodu', fkSet});
    excelOnizlemeGoster(siniflandirma,{
      spec:butceExcelSpec,
      dosyaAdiOnek:'butce',
      onUygula:(mod,satirlarYaz)=>butceExcelUygula(mod,satirlarYaz)
    });
  }catch(err){
    hLD();
    toast('❌ Dosya okunamadı: '+err.message);
  }
}

async function butceExcelUygula(mod,yazilacaklar){
  if(!yazilacaklar.length){toast('ℹ️ Yazılacak satır yok');return;}
  const satirlar=yazilacaklar.map(s=>{
    const satir={
      yil:s.alanlar.yil, otel_id:s.alanlar.otelId, hesap_kodu:s.alanlar.hesapKodu,
      hesap_ad:hesaplar[s.alanlar.hesapKodu]?.ad||null
    };
    AY_ALANLARI.forEach(alan=>{satir[alan]=s.alanlar[alan]||0;});
    return satir;
  });
  sLD();
  const sonuc=await excelTopluYaz('butce_kayitlari', satirlar, {onConflict:'yil,otel_id,hesap_kodu'});
  await loadDB();
  await excelImportGecmisiYaz({
    tabloAdi:'butce_kayitlari', ilgiliId:null, dosyaAdi:'butce.xlsx',
    kullaniciAd:(typeof OTURUM_KULLANICI!=='undefined'&&OTURUM_KULLANICI?.ad)||'', mod, toplamSatir:yazilacaklar.length,
    yeniSayisi:yazilacaklar.filter(s=>s.sinif==='yeni').length,
    guncellemeSayisi:yazilacaklar.filter(s=>s.sinif==='guncelleme').length,
    hataSayisi:0, atlananSayisi:0
  }, yazilacaklar);
  hLD();
  toast(sonuc.hataliGrup?'⚠️ Bazı satırlar yazılamadı':'✅ Bütçe güncellendi ('+sonuc.toplamYazilan+' satır)');
  renderButceListesi();
}

// ============================================================
// GERÇEKLEŞEN HESAPLAMA (Yevmiye'den)
// ============================================================
function hesapBul(kod){return Object.values(hesaplar).find(h=>h&&h.kod===kod);}

function gerceklesenTutar(hesapKod,yil,ay,otelId){
  const hesap=hesapBul(hesapKod);
  const yon=hesap?.yon||'Borç'; // hesabın normal çalışma yönü — o yöndeki tutar "gerçekleşen" sayılır
  let toplam=0;
  Object.values(yevmiyeler).filter(Boolean).forEach(y=>{
    const tarih=new Date(y.tarih);
    if(tarih.getFullYear()!==yil||(tarih.getMonth()+1)!==ay)return;
    if(otelId&&y.otelId!==otelId)return;
    (y.kalemler||[]).forEach(k=>{
      if(k.hesapKod!==hesapKod)return;
      toplam+=yon==='Alacak'?(parseFloat(k.alacak)||0):(parseFloat(k.borc)||0);
    });
  });
  return toplam;
}

// ============================================================
// RENDER — BÜTÇE/GERÇEKLEŞEN RAPORU
// ============================================================
function renderRapor(){
  const yil=parseInt(document.getElementById('rp-yil').value);
  const ay=parseInt(document.getElementById('rp-ay').value);
  const otelFiltre=document.getElementById('rp-otel').value;
  if(!yil)return;

  let kayitlar=Object.values(butceler).filter(b=>b&&b.yil===yil);
  if(otelFiltre)kayitlar=kayitlar.filter(b=>b.otelId===otelFiltre);

  // Aynı hesap birden fazla otelde bütçelenmiş olabilir (Tümü seçiliyse) — hesap koduna göre grupla
  const gruplar={};
  kayitlar.forEach(b=>{
    if(!gruplar[b.hesapKodu])gruplar[b.hesapKodu]={hesapKodu:b.hesapKodu,hesapAd:b.hesapAd,butce:0};
    gruplar[b.hesapKodu].butce+=parseFloat(b.aylar?.[ay-1])||0;
  });

  const satirlar=Object.values(gruplar).map(g=>{
    const gerc=otelFiltre?gerceklesenTutar(g.hesapKodu,yil,ay,otelFiltre):(gerceklesenTutar(g.hesapKodu,yil,ay,'810')+gerceklesenTutar(g.hesapKodu,yil,ay,'811'));
    const fark=g.butce-gerc;
    const farkYuzde=g.butce>0?(fark/g.butce*100):(gerc>0?-100:0);
    return{...g,gerc,fark,farkYuzde};
  }).sort((a,b)=>b.butce-a.butce);

  const toplamButce=satirlar.reduce((t,s)=>t+s.butce,0);
  const toplamGerc=satirlar.reduce((t,s)=>t+s.gerc,0);
  document.getElementById('rp-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num">${fmt(toplamButce)}</div><div class="stat-lbl">Toplam Bütçe</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--info)">${fmt(toplamGerc)}</div><div class="stat-lbl">Gerçekleşen</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:${toplamButce-toplamGerc>=0?'var(--success)':'var(--danger)'}">${fmt(Math.abs(toplamButce-toplamGerc))}</div><div class="stat-lbl">${toplamButce-toplamGerc>=0?'Altında':'Üstünde'}</div></div>`;

  const c=document.getElementById('rapor-liste');
  if(!satirlar.length){c.innerHTML='<div class="es"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 5h13l1.5 7v6a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-6z"/></svg></div><div class="et">Bu yıl için bütçe girişi yok</div></div>';return;}

  c.innerHTML=satirlar.map(s=>{
    const oran=s.butce>0?Math.min(150,(s.gerc/s.butce*100)):(s.gerc>0?150:0);
    const asimVar=s.gerc>s.butce&&s.butce>0;
    return`<div class="rapor-satir" style="border-radius:8px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <span style="font-size:13px;font-weight:700">${s.hesapKodu} — ${s.hesapAd||''}</span>
        <span class="chip ${asimVar?'chip-red':'chip-green'}">${asimVar?'Aşım':'Normal'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray-600)">
        <span>Bütçe: <b>${fmt(s.butce)} ₺</b></span>
        <span>Gerçekleşen: <b style="color:${asimVar?'var(--danger)':'var(--primary)'}">${fmt(s.gerc)} ₺</b></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,oran)}%;background:${asimVar?'var(--danger)':'var(--success)'}"></div></div>
      <div style="font-size:11px;color:${s.fark>=0?'var(--success)':'var(--danger)'};margin-top:4px;text-align:right">${s.fark>=0?'Bütçenin altında':'Bütçeyi aştı'}: ${fmt(Math.abs(s.fark))} ₺ (%${Math.abs(s.farkYuzde).toFixed(0)})</div>
    </div>`;
  }).join('');
}

// ============================================================
// RENDER — BÜTÇE GİRİŞLERİ LİSTESİ
// ============================================================
function renderButceListesi(){
  const liste=Object.values(butceler).sort((a,b)=>b.yil-a.yil||a.hesapKodu.localeCompare(b.hesapKodu));
  const c=document.getElementById('butce-liste');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 5h13l1.5 7v6a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-6z"/></svg></div><div class="et">Henüz bütçe girişi yok</div></div>';return;}
  c.innerHTML=liste.map(b=>{
    const toplamYillik=(b.aylar||[]).reduce((t,v)=>t+(parseFloat(v)||0),0);
    return`<div class="bh-kart" onclick="openDuzenleButce('${b.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700">${b.hesapKodu} — ${b.hesapAd||''}</div>
          <div style="font-size:11px;color:var(--gray-500)">${b.yil} • <span class="chip ${b.otelId==='811'?'chip-blue':'chip-orange'}">${OTEL_KISA[b.otelId]||b.otelId}</span></div>
        </div>
        <div style="font-size:14px;font-weight:800;color:var(--primary)">${fmt(toplamYillik)} ₺</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// YENİ / DÜZENLE
// ============================================================
function ayHucreleriOlustur(degerler){
  document.getElementById('b-aylar').innerHTML=AY_ADLARI.map((ad,i)=>`
    <div class="ay-hucre">
      <label>${ad}</label>
      <input type="number" id="b-ay-${i}" value="${degerler?.[i]||''}" placeholder="0.00" min="0" step="0.01">
    </div>`).join('');
}

function openYeniButce(){
  document.getElementById('mButceTitle').innerHTML='➕ Bütçe Kalemi <button onclick="kModal()" style="margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)">✕</button>';
  document.getElementById('b-id').value='';
  document.getElementById('b-yil').value=new Date().getFullYear();
  document.getElementById('b-otel').value='810';
  document.getElementById('b-hesap-inp').value='';
  document.getElementById('b-hesap-kod').value='';
  document.getElementById('b-sil-btn').style.display='none';
  ayHucreleriOlustur([]);
  aModal();
}

function openDuzenleButce(id){
  const b=butceler[id];if(!b)return;
  document.getElementById('mButceTitle').innerHTML='✏️ Bütçe Düzenle <button onclick="kModal()" style="margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)">✕</button>';
  document.getElementById('b-id').value=id;
  document.getElementById('b-yil').value=b.yil;
  document.getElementById('b-otel').value=b.otelId;
  document.getElementById('b-hesap-inp').value=b.hesapKodu+' — '+(b.hesapAd||'');
  document.getElementById('b-hesap-kod').value=b.hesapKodu;
  document.getElementById('b-sil-btn').style.display=['kayit','tam'].includes(YETKI_HARITASI['butce_yonetimi'])?'flex':'none';
  ayHucreleriOlustur(b.aylar||[]);
  aModal();
}

async function butceKaydet(){
  const yil=parseInt(document.getElementById('b-yil').value);
  const otelId=document.getElementById('b-otel').value;
  const hesapKod=document.getElementById('b-hesap-kod').value;
  if(!yil||!otelId||!hesapKod){toast('⚠️ Yıl, otel ve hesap seçimi zorunlu');return;}
  const hesap=hesapBul(hesapKod);
  const aylar=AY_ADLARI.map((_,i)=>parseFloat(document.getElementById('b-ay-'+i).value)||0);

  const editId=document.getElementById('b-id').value;
  const butce={id:editId||null,yil,otelId,hesapKodu:hesapKod,hesapAd:hesap?.ad||'',aylar};
  sLD();
  await saveButce(butce); // yıl+otel+hesap kombinasyonu zaten benzersiz, üzerine yazma/ekleme otomatik
  const id=butce.id;
  butceler[id]=butce;
  await auditLogYaz(editId?'update':'create','butce',id,`Bütçe ${editId?'güncellendi':'oluşturuldu'}: ${hesapKod} — ${yil} [${OTEL_KISA[otelId]}]`);
  hLD();
  kModal();
  renderButceListesi();
  toast('✅ Bütçe kaydedildi');
}

async function butceSil(){
  const id=document.getElementById('b-id').value;
  if(!confirm('Bu bütçe kaydı silinsin mi?'))return;
  sLD();
  delete butceler[id];
  try{await fetch(SB_URL+'/rest/v1/butce_kayitlari?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({silindi:true})});}catch(e){console.warn(e);}
  hLD();
  kModal();
  renderButceListesi();
  toast('🗑️ Silindi');
}

// ============================================================
// HESAP DROPDOWN
// ============================================================
function filterHesapDD(val){
  const dd=document.getElementById('b-hesap-dd');
  if(!val||val.length<1){dd.style.display='none';return;}
  const res=Object.values(hesaplar).filter(h=>h&&(h.tip==='Gelir Tablosu'||h.tip==='Maliyet')&&(h.kod.includes(val)||h.ad?.toLowerCase().includes(val.toLowerCase()))).slice(0,15);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(h=>`<div class="uddi" data-kod="${h.kod}" data-ad="${(h.ad||'').replace(/"/g,'&quot;')}">${h.kod} — ${h.ad}</div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      document.getElementById('b-hesap-inp').value=this.dataset.kod+' — '+this.dataset.ad;
      document.getElementById('b-hesap-kod').value=this.dataset.kod;
      dd.style.display='none';
    });
  });
  const inp=document.getElementById('b-hesap-inp');
  const rect=inp.getBoundingClientRect();
  dd.style.left=rect.left+'px';dd.style.top=rect.bottom+'px';dd.style.width=rect.width+'px';
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  const dd=document.getElementById('b-hesap-dd');
  const inp=document.getElementById('b-hesap-inp');
  if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';
});

// ============================================================
// TAB & YARDIMCI
// ============================================================
function gTab(tab,el){
  document.querySelectorAll('.sc').forEach(s=>s.style.display='none');
  document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  el.classList.add('active');
  if(tab==='rapor')renderRapor();
  if(tab==='girisler')renderButceListesi();
}
function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function aModal(){document.getElementById('mButce').style.display='flex';}
function kModal(){document.getElementById('mButce').style.display='none';}
document.getElementById('mButce').addEventListener('click',e=>{if(e.target.id==='mButce')kModal();});
// sLD/hLD/toast -> ortak.js

// INIT
// ============================================================
(async function(){
  await loadDB();
  document.getElementById('rp-yil').value=new Date().getFullYear();
  document.getElementById('rp-ay').value=new Date().getMonth()+1;

  YETKI_HARITASI = await kullaniciYetkileriGetir();

  document.getElementById('butce-excel-yukle-btn').disabled = !['kayit','tam'].includes(YETKI_HARITASI['butce_yonetimi']);
})();
</script>
