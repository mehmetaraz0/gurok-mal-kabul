<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.tab-bar{background:white;display:flex;border-bottom:2px solid var(--gray-200);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tabbtn{padding:12px 16px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;flex-shrink:0}
.tabbtn.active{color:var(--primary);border-bottom-color:var(--primary)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-blue{background:#dbeafe;color:#1e40af}.chip-green{background:#d4edda;color:#155724}.chip-red{background:#fde8e8;color:#9b1c1c}.chip-yellow{background:#fff3cd;color:#856404}.chip-gray{background:var(--gray-200);color:var(--gray-700)}.chip-orange{background:#fed7aa;color:#92400e}.chip-purple{background:#ede9fe;color:#5b21b6}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.search-bar{position:relative;margin-bottom:10px}
.search-bar input{width:100%;padding:10px 40px 10px 14px;border:1.5px solid var(--gray-300);border-radius:24px;font-size:14px;outline:none;background:white}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gray-500)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-kart{background:white;border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-num{font-size:17px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--gray-500);margin-top:2px}
.cs-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.cs-kart.portfoyde{border-left-color:var(--info)}
.cs-kart.tahsilde{border-left-color:var(--warning)}
.cs-kart.tamamlandi{border-left-color:var(--success)}
.cs-kart.karsiliksiz{border-left-color:var(--danger)}
.udd{display:none;position:fixed;background:white;border:1.5px solid var(--primary);border-radius:8px;max-height:200px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
let kayitlar={},cariler={};
let alinanFilter='tumu',verilenFilter='tumu';
let YETKI_HARITASI = {};

const OTEL_ISIMLERI={'810':'Ali Bey Club Manavgat','811':'Ali Bey Resort Sorgun'};
const OTEL_KISA={'810':'Club','811':'Resort'};

// ============================================================
// DENETİM İZİ
// ============================================================
async function auditLogYaz(action,entityType,entityId,detail){
  const log={
    action,entity_type:entityType,entity_id:String(entityId||''),detail:detail||'',
    kullanici_ad:OTURUM_KULLANICI?.ad||'Bilinmeyen'
  };
  try{await fetch(SB_URL+'/rest/v1/audit_log',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(log)});}
  catch(e){console.warn('Audit log kaydedilemedi:',e);}
}

// ============================================================
// FIREBASE
// ============================================================
function kayitSbdenCamele(r){
  return{
    id:r.id,tur:r.tur,yon:r.yon,cariId:r.cari_id,cariAd:r.cari_ad,no:r.no||'',
    banka:r.banka||'',duzenleme:r.duzenleme_tarihi||'',vade:r.vade_tarihi,
    tutar:parseFloat(r.tutar)||0,otelId:r.otel_id,durum:r.durum,not:r.not_alani||''
  };
}
function cariSbdenCamele(r){
  return{id:r.id,kod:r.kod,ad:r.ad,tip:r.tip};
}

async function loadDB(){
  sLD();
  try{
    const [kR,cR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/cek_senetler?select=*&silindi=eq.false',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/cariler?select=id,kod,ad,tip&silindi=eq.false',{headers:SB_HEADERS}),
    ]);
    kayitlar={};cariler={};
    if(kR.ok){(await kR.json()).forEach(r=>{kayitlar[r.id]=kayitSbdenCamele(r);});}
    if(cR.ok){(await cR.json()).forEach(r=>{cariler[r.id]=cariSbdenCamele(r);});}
  }catch(e){console.warn(e);}
  hLD();
}

async function saveKayit(k){
  const satir={
    tur:k.tur,yon:k.yon,cari_id:k.cariId||null,cari_ad:k.cariAd,no:k.no||null,
    banka:k.banka||null,duzenleme_tarihi:k.duzenleme||null,vade_tarihi:k.vade,
    tutar:k.tutar,otel_id:k.otelId||'810',durum:k.durum||'portfoyde',not_alani:k.not||null
  };
  try{
    if(k.id){
      await fetch(SB_URL+'/rest/v1/cek_senetler?id=eq.'+k.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify(satir)});
    }else{
      const r=await fetch(SB_URL+'/rest/v1/cek_senetler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(satir)});
      const d=await r.json();
      if(d&&d[0])k.id=d[0].id;
    }
  }catch(e){console.warn(e);}
}

// ============================================================
// EXCEL TOPLU DÜZENLEME
// ============================================================
const cekSenetExcelSpec=[
  {alan:'tur', baslik:'Tür', tip:'text', zorunlu:true, genislik:10, izinliDegerler:['cek','senet']},
  {alan:'yon', baslik:'Yön', tip:'text', zorunlu:true, genislik:10, izinliDegerler:['alinan','verilen']},
  {alan:'cariAd', baslik:'Cari Adı', tip:'text', zorunlu:true, genislik:24},
  {alan:'no', baslik:'No', tip:'text', genislik:14},
  {alan:'banka', baslik:'Banka', tip:'text', genislik:16},
  {alan:'duzenleme', baslik:'Düzenleme Tarihi', tip:'text', genislik:14},
  {alan:'vade', baslik:'Vade Tarihi', tip:'text', zorunlu:true, genislik:14},
  {alan:'tutar', baslik:'Tutar', tip:'number', zorunlu:true, pozitifOlmali:true, genislik:12},
  {alan:'otelId', baslik:'Otel', tip:'text', genislik:8, izinliDegerler:['810','811']},
  {alan:'durum', baslik:'Durum', tip:'text', genislik:12, izinliDegerler:['portfoyde','tahsilde','tamamlandi','karsiliksiz']},
  {alan:'not', baslik:'Not', tip:'text', genislik:20}
];
async function cekSenetExcelAktar(){
  const veriler=Object.values(kayitlar).filter(Boolean);
  await excelSablonIndir(cekSenetExcelSpec, veriler, 'cek-senetler-'+new Date().toISOString().split('T')[0]+'.xlsx');
}
async function cekSenetExcelYukle(event){
  const file=event.target.files[0];if(!file)return;event.target.value='';
  sLD();
  try{
    const satirlar=await excelDosyaOku(file);
    hLD();
    const mevcutKayitlar=Object.values(kayitlar).filter(Boolean);
    const siniflandirma=excelSatirlariSiniflandir(cekSenetExcelSpec, satirlar, mevcutKayitlar, {dogalAnahtarKombinasyonu:['no','banka','yon']});
    excelOnizlemeGoster(siniflandirma,{ spec:cekSenetExcelSpec, dosyaAdiOnek:'cek-senetler', onUygula:(mod,satirlarYaz)=>cekSenetExcelUygula(mod,satirlarYaz) });
  }catch(err){ hLD(); toast('❌ Dosya okunamadı: '+err.message); }
}
async function cekSenetExcelUygula(mod,yazilacaklar){
  if(!yazilacaklar.length){toast('ℹ️ Yazılacak satır yok');return;}
  sLD();
  // cariAd -> cari_id çözümlemesi, kayitKaydet()'teki auto-create deseniyle aynı
  const cariMap={};
  Object.values(cariler).forEach(c=>{ if(c&&c.ad) cariMap[c.ad.trim().toLowerCase()]=c.id; });
  const satirlar=[];
  for(let i=0;i<yazilacaklar.length;i++){
    const s=yazilacaklar[i];
    const cariAd=s.alanlar.cariAd;
    const anahtar=cariAd.trim().toLowerCase();
    let cariId=cariMap[anahtar];
    if(!cariId){
      const yeniCariSatir={kod:'CARI_'+Date.now()+'_'+i, ad:cariAd, tip:s.alanlar.yon==='alinan'?'musteri':'tedarikci'};
      try{
        const r=await fetch(SB_URL+'/rest/v1/cariler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(yeniCariSatir)});
        const d=await r.json();
        if(d&&d[0]){ cariId=d[0].id; cariler[cariId]={id:cariId,kod:yeniCariSatir.kod,ad:cariAd,tip:yeniCariSatir.tip}; cariMap[anahtar]=cariId; }
      }catch(e){console.warn('Cari otomatik oluşturulamadı:',e);}
    }
    const eski=s.eskiDeger;
    satirlar.push({
      tur:s.alanlar.tur, yon:s.alanlar.yon, cari_id:cariId||null, cari_ad:cariAd,
      no:s.alanlar.no||null, banka:s.alanlar.banka||null,
      duzenleme_tarihi:s.alanlar.duzenleme||null, vade_tarihi:s.alanlar.vade,
      tutar:s.alanlar.tutar, otel_id:s.alanlar.otelId||'810',
      durum:s.alanlar.durum||eski?.durum||'portfoyde', not_alani:s.alanlar.not||null
    });
  }
  const sonuc=await excelTopluYaz('cek_senetler', satirlar, {onConflict:'no,banka,yon'});
  await loadDB();
  await excelImportGecmisiYaz({ tabloAdi:'cek_senetler', ilgiliId:null, dosyaAdi:'cek-senetler.xlsx',
    kullaniciAd:OTURUM_KULLANICI?.ad||'', mod, toplamSatir:yazilacaklar.length,
    yeniSayisi:yazilacaklar.filter(s=>s.sinif==='yeni').length,
    guncellemeSayisi:yazilacaklar.filter(s=>s.sinif==='guncelleme').length,
    hataSayisi:0, atlananSayisi:0
  }, yazilacaklar);
  hLD();
  toast(sonuc.hataliGrup?'⚠️ Bazı satırlar yazılamadı':'✅ Çek/Senet kayıtları güncellendi ('+sonuc.toplamYazilan+' satır)');
  renderListe('alinan'); renderListe('verilen');
}

// ============================================================
// OTOMATİK YEVMİYE FİŞİ (durum tamamlandığında)
// ============================================================
async function yeniFisNo(){
  const yil=new Date().getFullYear();
  try{
    const r=await fetch(SB_URL+`/rest/v1/yevmiye_fisler?no=like.YEV-${yil}-*&select=no&order=no.desc&limit=1`,{headers:SB_HEADERS});
    let n=0;
    if(r.ok){
      const d=await r.json();
      if(d&&d.length){
        const m=d[0].no.match(new RegExp('^YEV-'+yil+'-(\\d+)$'));
        if(m)n=parseInt(m[1]);
      }
    }
    n++;
    return `YEV-${yil}-${String(n).padStart(5,'0')}`;
  }catch(e){}
  return `YEV-${yil}-${Date.now()}`;
}

async function yevmiyeFisiPostla(fisId,yevKalemler,tip,belge,aciklama,tarihMs,otelId){
  const topBorc=yevKalemler.reduce((t,k)=>t+(k.borc||0),0);
  const topAlacak=yevKalemler.reduce((t,k)=>t+(k.alacak||0),0);
  let mevcutId=null,no=null;
  try{
    const r=await fetch(SB_URL+`/rest/v1/yevmiye_fisler?tip=eq.${encodeURIComponent(tip)}&belge_no=eq.${encodeURIComponent(belge)}&select=id,no&silindi=eq.false`,{headers:SB_HEADERS});
    if(r.ok){const d=await r.json();if(d&&d.length){mevcutId=d[0].id;no=d[0].no;}}
  }catch(e){}
  if(!no)no=await yeniFisNo();

  const yevSatir={
    no,tarih:new Date(tarihMs).toISOString().split('T')[0],tip,belge_no:belge,aciklama,
    otel_id:otelId||'810',toplam_borc:round2(topBorc),toplam_alacak:round2(topAlacak),
    onaylandi:true,otomatik:true
  };
  try{
    let fisUuid=mevcutId;
    if(mevcutId){
      await fetch(SB_URL+'/rest/v1/yevmiye_fisler?id=eq.'+mevcutId,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify(yevSatir)});
      await fetch(SB_URL+'/rest/v1/yevmiye_kalemleri?fis_id=eq.'+mevcutId,{method:'DELETE',headers:SB_HEADERS});
    }else{
      const r=await fetch(SB_URL+'/rest/v1/yevmiye_fisler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(yevSatir)});
      const d=await r.json();
      fisUuid=d[0].id;
    }
    const kalemSatirlar=yevKalemler.map(k=>({
      fis_id:fisUuid,hesap_kodu:k.hesapKod,masraf_merkezi:k.masrafMerkezi||null,
      aciklama:k.aciklama||null,borc:k.borc||0,alacak:k.alacak||0
    }));
    const rCK=await fetch(SB_URL+'/rest/v1/yevmiye_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
    if(!rCK.ok){
      console.error('yevmiye_kalemleri reinsert hatası:',await rCK.text());
      alert('⚠️ DİKKAT: Muhasebe fişi başlığı oluştu ama satır kalemleri yazılamadı — bu fiş EKSİK/DENGESİZ olabilir. Lütfen işlemi tekrarlayın veya muhasebe kayıtlarını kontrol edin.');
    }
    await auditLogYaz('create','yevmiye',fisUuid,`Otomatik yevmiye fişi: ${no} — ${aciklama} (${fmt(topBorc)} ₺)`);
  }catch(e){console.warn('Yevmiye fişi oluşturulamadı:',e);}
}

function renderListe(yon){
  const filter=yon==='alinan'?alinanFilter:verilenFilter;
  let liste=Object.values(kayitlar).filter(k=>k&&k.yon===yon);
  if(filter!=='tumu')liste=liste.filter(k=>k.durum===filter);
  liste.sort((a,b)=>new Date(a.vade)-new Date(b.vade));

  const toplamPortfoy=liste.filter(k=>k.durum==='portfoyde').reduce((t,k)=>t+(parseFloat(k.tutar)||0),0);
  const toplamTahsilde=liste.filter(k=>k.durum==='tahsilde').reduce((t,k)=>t+(parseFloat(k.tutar)||0),0);
  const toplamTamamlandi=liste.filter(k=>k.durum==='tamamlandi').reduce((t,k)=>t+(parseFloat(k.tutar)||0),0);

  document.getElementById(yon+'-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num" style="color:var(--info)">${fmt(toplamPortfoy)}</div><div class="stat-lbl">${yon==='alinan'?'💼 Portföyde':'💼 Elde'}</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--warning)">${fmt(toplamTahsilde)}</div><div class="stat-lbl">${yon==='alinan'?'⏳ Tahsilde':'⏳ Verildi'}</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${fmt(toplamTamamlandi)}</div><div class="stat-lbl">${yon==='alinan'?'✅ Tahsil':'✅ Ödendi'}</div></div>`;

  const c=document.getElementById(yon+'-liste');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">📄</div><div class="et">Kayıt bulunamadı</div></div>';return;}

  const durumChip={
    portfoyde:`<span class="chip chip-blue">💼 ${yon==='alinan'?'Portföyde':'Elde'}</span>`,
    tahsilde:`<span class="chip chip-yellow">⏳ ${yon==='alinan'?'Tahsilde':'Verildi'}</span>`,
    tamamlandi:`<span class="chip chip-green">✅ ${yon==='alinan'?'Tahsil Edildi':'Ödendi'}</span>`,
    karsiliksiz:'<span class="chip chip-red">❌ Karşılıksız</span>'
  };

  c.innerHTML=liste.map(k=>{
    const vadeGecti=k.vade&&k.vade<bugunYerelStr()&&(k.durum==='portfoyde'||k.durum==='tahsilde');
    return`<div class="cs-kart ${k.durum}" onclick="openDetay('${k.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div>
          <div style="font-size:13px;font-weight:700">${escapeHtml(k.cariAd)}</div>
          <div style="font-size:11px;color:var(--gray-500)">${k.tur==='cek'?'📄 Çek':'📝 Senet'}${k.no?' • '+k.no:''}${k.banka?' • '+k.banka:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:800;color:var(--primary)">${fmt(k.tutar)} ₺</div>
          <div style="font-size:10px;color:${vadeGecti?'var(--danger)':'var(--gray-400)'}">${vadeGecti?'⚠️ Vade geçti: ':'Vade: '}${k.vade}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${durumChip[k.durum]||''}
        ${k.otelId?`<span class="chip ${k.otelId==='811'?'chip-blue':'chip-orange'}">🏨 ${OTEL_KISA[k.otelId]||k.otelId}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function filterKayit(yon,f,el){
  if(yon==='alinan')alinanFilter=f;else verilenFilter=f;
  document.querySelectorAll('#tab-'+yon+' .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderListe(yon);
}

function renderVadeTakvimi(){
  const liste=Object.values(kayitlar).filter(k=>k&&(k.durum==='portfoyde'||k.durum==='tahsilde')).sort((a,b)=>new Date(a.vade)-new Date(b.vade));
  const c=document.getElementById('vade-liste');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">📅</div><div class="et">Açık vade yok</div></div>';return;}
  c.innerHTML=liste.map(k=>{
    const gun=Math.floor((new Date(k.vade+'T00:00:00')-new Date(bugunYerelStr()+'T00:00:00'))/86400000);
    const renk=gun<0?'var(--danger)':gun<=7?'var(--warning)':'var(--gray-500)';
    return`<div class="cs-kart ${k.durum}" onclick="openDetay('${k.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700">${escapeHtml(k.cariAd)}</div>
          <div style="font-size:11px;color:var(--gray-500)">${k.yon==='alinan'?'📥 Alınan':'📤 Verilen'} ${k.tur==='cek'?'Çek':'Senet'}${k.no?' • '+k.no:''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:14px;font-weight:800">${fmt(k.tutar)} ₺</div>
          <div style="font-size:11px;font-weight:600;color:${renk}">${gun<0?Math.abs(gun)+' gün geçti':gun===0?'Bugün':gun+' gün kaldı'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function kayitKaydet(){
  const cariAd=document.getElementById('k-cari-inp').value.trim();
  const vade=document.getElementById('k-vade').value;
  const tutar=parseFloat(document.getElementById('k-tutar').value);
  if(!cariAd||!vade||!tutar||tutar<=0){toast('⚠️ Cari, vade ve tutar zorunlu');return;}

  let cariId=document.getElementById('k-cari-id').value;
  const yon=document.getElementById('k-yon').value;
  if(!cariId){
    const eslesen=Object.values(cariler).find(c=>c&&c.ad&&c.ad.trim().toLowerCase()===cariAd.toLowerCase());
    if(eslesen){cariId=eslesen.id;}
    else{
      const yeniCariSatir={kod:'CARI_'+Date.now(),ad:cariAd,tip:yon==='alinan'?'musteri':'tedarikci'};
      const r=await fetch(SB_URL+'/rest/v1/cariler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(yeniCariSatir)});
      const d=await r.json();
      cariId=d[0].id;
      cariler[cariId]={id:cariId,kod:yeniCariSatir.kod,ad:cariAd,tip:yeniCariSatir.tip};
      toast(`ℹ️ Yeni cari otomatik oluşturuldu: ${cariAd}`,3000);
    }
  }

  const editId=document.getElementById('k-id').value;
  const kayit={
    id:editId||null,tur:document.getElementById('k-tur').value,yon,
    cariId,cariAd,
    no:document.getElementById('k-no').value||'',
    banka:document.getElementById('k-banka').value||'',
    duzenleme:document.getElementById('k-duzenleme').value||'',
    vade,tutar,
    otelId:document.getElementById('k-otel').value||'810',
    not:document.getElementById('k-not').value||'',
    durum:editId?kayitlar[editId]?.durum:'portfoyde'
  };
  sLD();
  const yeniKayit=!editId;
  await saveKayit(kayit); // yeni kayıtta kayit.id burada gerçek UUID ile doldurulur
  const id=kayit.id;
  kayitlar[id]=kayit;
  await auditLogYaz(yeniKayit?'create':'update','cekSenet',id,`${kayit.tur==='cek'?'Çek':'Senet'} ${yeniKayit?'eklendi':'güncellendi'}: ${cariAd} — ${fmt(tutar)} ₺ [${OTEL_KISA[kayit.otelId]}]`);
  hLD();
  kModal('mKayit');
  renderListe(yon);
  toast(`✅ Kaydedildi — ${fmt(tutar)} ₺`);
}

async function kayitSil(){
  const id=document.getElementById('k-id').value;
  const k=kayitlar[id];if(!k)return;
  if(!confirm(`${k.cariAd} — ${fmt(k.tutar)} ₺ kaydı silinsin mi?`))return;
  sLD();
  delete kayitlar[id];
  try{await fetch(SB_URL+'/rest/v1/cek_senetler?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({silindi:true})});}catch(e){console.warn(e);}
  await auditLogYaz('delete','cekSenet',id,`Silindi: ${k.cariAd} — ${fmt(k.tutar)} ₺`);
  hLD();
  kModal('mKayit');
  renderListe(k.yon);
  toast('🗑️ Silindi');
}

      ${(k.durum==='portfoyde'||k.durum==='tahsilde')?`<button class="btn btn-success btn-sm" onclick="durumDegistir('${id}','tamamlandi')">✅ ${alinan?'Tahsil Edildi':'Ödendi'}</button>`:''}
      ${(k.durum==='portfoyde'||k.durum==='tahsilde')?`<button class="btn btn-danger btn-sm" onclick="durumDegistir('${id}','karsiliksiz')">❌ Karşılıksız</button>`:''}

async function durumDegistir(id,yeniDurum){
  const k=kayitlar[id];if(!k)return;
  const alinan=k.yon==='alinan';
  if(yeniDurum==='karsiliksiz'&&!confirm(`${k.cariAd} — ${fmt(k.tutar)} ₺ karşılıksız/protesto olarak işaretlensin mi?`))return;

  sLD();
  k.durum=yeniDurum;
  k.guncellemeTarih=Date.now();
  await saveKayit(k);
  await auditLogYaz('update','cekSenet',id,`Durum değişti: ${k.cariAd} — ${fmt(k.tutar)} ₺ → ${yeniDurum}`);

  // Tamamlandığında otomatik yevmiye fişi — kasa/banka ile hesap kapatma
  if(yeniDurum==='tamamlandi'){
    const cekMi=k.tur==='cek';
    let yevKalemler;
    if(alinan){
      // Alınan çek/senet tahsil edildi: Banka/Kasa Borç, Alınan Çek/Senet Alacak
      yevKalemler=[
        {hesapKod:cekMi?'102':'100',aciklama:(cekMi?'Çek tahsilatı: ':'Senet tahsilatı: ')+k.cariAd,borc:round2(k.tutar),alacak:0},
        {hesapKod:cekMi?'101':'121',aciklama:'Tahsil edilen: '+k.cariAd+(k.no?' — '+k.no:''),borc:0,alacak:round2(k.tutar)}
      ];
    }else{
      // Verilen çek/senet ödendi: Verilen Çek/Senet Borç, Banka/Kasa Alacak
      yevKalemler=[
        {hesapKod:cekMi?'103':'321',aciklama:'Ödenen: '+k.cariAd+(k.no?' — '+k.no:''),borc:round2(k.tutar),alacak:0},
        {hesapKod:cekMi?'102':'100',aciklama:(cekMi?'Çek ödemesi: ':'Senet ödemesi: ')+k.cariAd,borc:0,alacak:round2(k.tutar)}
      ];
    }
    await yevmiyeFisiPostla('YEV_CS_'+id,yevKalemler,'cek_senet',k.no||id,`${cekMi?'Çek':'Senet'} ${alinan?'tahsilatı':'ödemesi'}: ${k.cariAd}`,Date.now(),k.otelId);
  }

  hLD();
  kModal('mDetay');
  renderListe(k.yon);
  renderVadeTakvimi();
  toast('✅ Durum güncellendi');
}

function filterCariDD(val){
  const dd=document.getElementById('k-cari-dd');
  if(!val||val.length<2){dd.style.display='none';return;}
  const yon=document.getElementById('k-yon').value;
  const res=Object.values(cariler).filter(c=>c&&(yon==='alinan'?(c.tip==='musteri'||c.tip==='her_ikisi'):(c.tip==='tedarikci'||c.tip==='her_ikisi'))&&c.ad.toLowerCase().includes(val.toLowerCase())).slice(0,15);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(c=>`<div class="uddi" data-id="${c.id}" data-ad="${c.ad.replace(/"/g,'&quot;')}">${c.ad}</div>`).join('');
  dd.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      document.getElementById('k-cari-inp').value=this.dataset.ad;
      document.getElementById('k-cari-id').value=this.dataset.id;
      dd.style.display='none';
    });
  });
  const inp=document.getElementById('k-cari-inp');
  const rect=inp.getBoundingClientRect();
  dd.style.left=rect.left+'px';
  dd.style.top=rect.bottom+'px';
  dd.style.width=rect.width+'px';
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  const dd=document.getElementById('k-cari-dd');
  const inp=document.getElementById('k-cari-inp');
  if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';
});

// TAB & YARDIMCI
// ============================================================
function gTab(tab,el){
  document.querySelectorAll('.sc').forEach(s=>s.style.display='none');
  document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  el.classList.add('active');
  if(tab==='alinan')renderListe('alinan');
  if(tab==='verilen')renderListe('verilen');
  if(tab==='vade')renderVadeTakvimi();
}
function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}
// Yerel takvim gününe göre bugünün tarihi — new Date() ile doğrudan karşılaştırma UTC+3'te
// gece 00:00-03:00 arası vadesi bugün olan bir kaydı bir gün erken "geçti" gösteriyordu.
function bugunYerelStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal -> ortak.js
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
