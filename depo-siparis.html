<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.bnav{background:white;display:flex;border-top:1px solid var(--gray-200);flex-shrink:0}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;gap:3px;position:relative;min-height:56px}
.nbtn .ni{width:20px;height:20px;display:flex}.nbtn .ni svg{width:20px;height:20px}.nbtn .nl{font-size:10px;color:var(--gray-500);font-weight:500}
.nbtn.active .nl{color:var(--primary);font-weight:700}
.nbtn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.nbadge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--danger);color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;display:none}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none;}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-warn{background:#fff3cd;color:#856404}.chip-ok{background:#d4edda;color:#155724}.chip-err{background:#fde8e8;color:#9b1c1c}.chip-info{background:#d1ecf1;color:#0c5460}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.skart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.skart.bekleyen{border-left-color:var(--warning)}.skart.onaylandi{border-left-color:var(--success)}.skart.reddedildi{border-left-color:var(--danger)}
.usatir{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.udd{display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
.omiktar{width:80px;padding:6px 8px;border:1.5px solid var(--primary);border-radius:6px;font-size:13px;font-weight:600;text-align:center}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

</div></div>

</div></div>

function depoTipiFromId(depoId){const i=(depoId||'').indexOf('_');return i>=0?depoId.slice(i+1):depoId;}
function otelFromDepoId(depoId){const i=(depoId||'').indexOf('_');return i>=0?depoId.slice(0,i):'810';}
function merkeziDepoKodu(otelId){return otelId==='811'?'300':'100';}
// otelFromDepoId (yukarıda) sadece BİRLEŞİK id'lerde (810_CMM201) çalışır — DB.stok'un kendi
// iç anahtarları için. CU.depoId / s.departmanId gibi ÇIPLAK kodlar (CMM201, RMM201, 100, 300)
// için harf ön ekine bakan bu ayrı, güvenilir fonksiyon kullanılmalı.
function otelFromBareKod(kod){
  if(!kod)return '810';
  if(kod==='100'||kod==='200')return '810';
  if(kod==='300'||kod==='400')return '811';
  if(kod.startsWith('R'))return '811';
  return '810';
}

function depolarForOtel(otelId){ return otelId==='810'?DEPOLAR_810:DEPOLAR_811; }
function depolarObjForOtel(otelId){
  const obj={};
  depolarForOtel(otelId).forEach(d=>obj[d.id]=d.ikon+' '+d.id+' — '+d.ad);
  return obj;
}
function DEPOLAR_lookup(did){
  if(!did)return '—';
  const tumDepolar=[...DEPOLAR_810,...DEPOLAR_811];
  const d=tumDepolar.find(x=>x.id===did);
  return d?(d.ikon+' '+d.id+' — '+d.ad):did;
}
// Bir sipariş kaydının departman adını, saklanan departmanId'den (kod) güvenilir şekilde üretir.
// Eski kayıtlarda departmanId olmayabilir — o zaman kaydedilmiş metne (departman/firma) düşer.
function sipDepartmanGoster(s){
  if(s?.departmanId){
    const l=DEPOLAR_lookup(s.departmanId);
    if(l && l!==s.departmanId)return l;
  }
  return s?.departman||s?.firma||'—';
}
function buildDeptSelector(){
  const sel=document.getElementById('yDept');

  sel.innerHTML=depolarForOtel(aktifOtelId).map(d=>`<option value="${d.id}">${d.ikon} ${d.id} — ${d.ad}</option>`).join('');
}
function onOtelChange(otelId){
  aktifOtelId=otelId;
  buildDeptSelector();

function talepSbdenCamele(r){
  return{
    id:r.id,tarih:r.tarih,olusturmaTarih:r.olusturma_tarihi?new Date(r.olusturma_tarihi).getTime():Date.now(),
    otelId:r.otel_id,departman:r.departman_ad,departmanId:r.departman_id,
    personel:r.personel_ad,personelRol:r.personel_rol,not:r.not_alani,durum:r.durum,
    onaylayanAd:r.onaylayan_ad,onayTarih:r.onay_tarihi?new Date(r.onay_tarihi).getTime():null,
    redNot:r.red_notu,
    urunler:(r.ic_talep_kalemleri||[]).map(k=>({
      id:k.id,kod:k.urun_kodu||'',ad:k.urun_adi,miktar:parseFloat(k.talep_miktar)||0,
      talepMiktar:parseFloat(k.talep_miktar)||0,
      onaylananMiktar:k.onaylanan_miktar!==null?parseFloat(k.onaylanan_miktar):undefined,
      birim:k.birim,not:k.not_alani||''
    }))
  };
}

async function loadDB(){
  sLD();
  try{
    const [tR,kR,stR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/ic_talepler?select=*,ic_talep_kalemleri(*)&order=olusturma_tarihi.desc',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/kullanicilar?select=*&aktif=eq.true',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/stok?select=*',{headers:SB_HEADERS}),
    ]);
    DB.siparisler={};
    if(tR.ok)(await tR.json()).forEach(r=>{DB.siparisler[r.id]=talepSbdenCamele(r);});
    if(kR.ok){const d=await kR.json();if(Array.isArray(d)&&d.length)DB.kullanicilar=d.map(u=>({...u,rol:u.rol==='personel'?'depo':u.rol,depoId:u.depo_id||u.depoId||null,otelId:u.otel_id||u.otelId||null}));}
    const katalogMap={};
    if(typeof URUN_DB!=='undefined')URUN_DB.forEach(u=>{katalogMap[u.kod]={ad:u.ad,birim:u.birim};});
    DB.stok={};
    if(stR.ok)(await stR.json()).forEach(r=>{
      if(!DB.stok[r.depo_kodu])DB.stok[r.depo_kodu]={};
      const kat=katalogMap[r.urun_kodu]||{};
      DB.stok[r.depo_kodu][r.urun_kodu]={lnKod:r.urun_kodu,miktar:parseFloat(r.miktar)||0,urunAd:kat.ad||r.urun_kodu,birim:kat.birim||''};
    });
  }catch(e){console.warn(e);}
  hLD();
  if(typeof URUN_DB!=='undefined')DB.urunler=URUN_DB;
}

async function saveSipYeni(s){
  try{
    const r=await fetch(SB_URL+'/rest/v1/ic_talepler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify({
      otel_id:s.otelId,departman_id:s.departmanId,departman_ad:s.departman,
      personel_ad:s.personel,personel_rol:s.personelRol,not_alani:s.not,durum:s.durum,tarih:s.tarih
    })});
    if(!r.ok){console.error('İç talep oluşturma hatası:',await r.text());return null;}
    const d=await r.json();
    const talepId=d[0].id;

    await fetch(SB_URL+'/rest/v1/ic_talep_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemler)});

  }catch(e){console.warn(e);return null;}

// ====== STOK İŞLEMLERİ (stok-takip.html ile aynı desen) ======
function ensureDepoStok(depoId){if(!DB.stok[depoId])DB.stok[depoId]={};}
function transfer(kaynakDepoId,hedefDepoId,lnKod,urunAd,miktar,birim,not){
  ensureDepoStok(kaynakDepoId);
  const ks=DB.stok[kaynakDepoId];
  if(!ks[lnKod])ks[lnKod]={lnKod,miktar:0};
  ks[lnKod].miktar=Math.max(0,(parseFloat(ks[lnKod].miktar)||0)-parseFloat(miktar));
  ensureDepoStok(hedefDepoId);
  const hs=DB.stok[hedefDepoId];
  if(!hs[lnKod])hs[lnKod]={lnKod,miktar:0};
  hs[lnKod].miktar=(parseFloat(hs[lnKod].miktar)||0)+parseFloat(miktar);
  return{
    id:Date.now()+'_'+Math.random().toString(36).slice(2,5),tip:'transfer',
    kaynakDepoId,kaynakDepoAd:DEPOLAR_lookup(depoTipiFromId(kaynakDepoId)),
    hedefDepoId,hedefDepoAd:DEPOLAR_lookup(depoTipiFromId(hedefDepoId)),
    lnKod,urunAd,miktar:parseFloat(miktar),birim,tarih:Date.now(),not:not||'',personel:CU?.ad||'—'
  };
}

function gTab(t){
  const map={ver:'tVer',taleplerim:'tTaleplerim',gelen:'tGelen',bugun:'tBugun'};
  Object.values(map).forEach(id=>{const el=document.getElementById(id);if(el){el.style.display='none';el.style.flexDirection='';}});
  const el=document.getElementById(map[t]);
  if(el){el.style.display='block';}
  ['ver','tal','gel','bug'].forEach(id=>{const n=document.getElementById('nb-'+id);if(n)n.classList.remove('active');});
  const nbmap={ver:'nb-ver',taleplerim:'nb-tal',gelen:'nb-gel',bugun:'nb-bug'};
  const nb=document.getElementById(nbmap[t]);
  if(nb)nb.classList.add('active');
  if(t==='taleplerim')rTaleplerim();
  if(t==='gelen')rGelen();
  if(t==='bugun')rBugun();
}

function delUS(i){US.splice(i,1);rUS();}

function fUS(i,val){
  US[i].ad=val;
  const dd=document.getElementById('udd'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const otelId=(CU&&CU.otelId)||aktifOtelId||'810';
  const merkeziDepoId=tamDepoId(otelId,merkeziDepoKodu(otelId));
  const stokItems=Object.values(DB.stok[merkeziDepoId]||{}).filter(s=>s.urunAd?.toLowerCase().includes(val.toLowerCase())||s.lnKod?.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  const stokKodlar=new Set(stokItems.map(s=>s.lnKod));
  let genel=[];
  const urunDB=DB.urunler.length>0?DB.urunler:(window.URUN_DB||[]);
  genel=urunDB.filter(u=>!stokKodlar.has(u.kod)&&(u.ad?.toLowerCase().includes(val.toLowerCase())||u.kod?.toLowerCase().includes(val.toLowerCase()))).slice(0,10);
  const sonuc=[
    ...stokItems.map(s=>({kod:s.lnKod,ad:s.urunAd,birim:s.birim,stok:s.miktar,v:true})),
    ...genel.map(u=>({kod:u.kod,ad:u.ad,birim:u.birim,stok:0,v:false}))
  ];
  if(!sonuc.length){dd.style.display='none';return;}
  dd.innerHTML=sonuc.map(s=>`<div class="uddi" data-i="${i}" data-kod="${s.kod}" data-ad="${(s.ad||'').replace(/"/g,'&quot;')}" data-birim="${s.birim||'KG'}">
    ${s.ad} <span style="font-size:10px;color:${s.v?'var(--success)':'var(--gray-400)'}">${s.v?'Stok: '+s.stok+' '+s.birim:'—'}</span>
  </div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=parseInt(this.dataset.i);
      US[idx]={...US[idx],ad:this.dataset.ad,kod:this.dataset.kod,birim:this.dataset.birim};
      dd.style.display='none';
      // Sadece başlık ve birim alanını güncelle — tüm render yerine
      const adInp=document.getElementById('ua'+idx);
      if(adInp)adInp.value=this.dataset.ad;
      const birimSel=document.getElementById('ub'+idx);
      if(birimSel)birimSel.value=this.dataset.birim||'KG';
      // Satır başlığını güncelle
      const baslik=document.querySelector('#usatirlar .usatir:nth-child('+(idx+1)+') div[style*="font-weight:600"]');
      if(baslik)baslik.textContent=this.dataset.ad;
    });
  });
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  US.forEach((_,i)=>{const dd=document.getElementById('udd'+i);const inp=document.getElementById('ua'+i);if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';});
});

// ====== TALEP GÖNDER ======
async function gondер(){
  if(!CU)return;
  // KİLİT: Kullanıcının kendi depo_id'si yoksa talep açamaz — "kişi kendi depo hariç
  // depoya talep açmamalı" kuralının temeli budur. Rol adını depo kodu gibi kullanmak
  // (eski davranış) gerçek olmayan bir depo yaratıp kayba yol açıyordu.
  if(!CU.depoId){
    toast('⚠️ Hesabınıza bir depo atanmamış. Yöneticinizle iletişime geçin.');
    return;
  }
  if(!US.length){toast('⚠️ En az bir ürün ekleyin');return;}
  if(US.find(u=>!u.ad)){toast('⚠️ Tüm ürün adlarını doldurun');return;}
  if(US.find(u=>!u.miktar||parseFloat(u.miktar)<=0)){toast('⚠️ Miktar girin');return;}
  const tarih=document.getElementById('vTarih')?.value||new Date().toISOString().split('T')[0];
  const not=document.getElementById('vNot')?.value||'';
  const dept=CU.departman||RADLAR[CU.rol]||CU.rol;
  const deptId=CU.depoId;
  const otelId=CU.otelId||otelFromBareKod(deptId)||'810';
  const sip={
    id:'TEMP_'+Date.now(),tarih,olusturmaTarih:Date.now(),otelId,
    departman:dept,departmanId:deptId,
    personel:CU.ad,personelRol:CU.rol,
    urunler:US.map(u=>({ad:u.ad,kod:u.kod||'',miktar:parseFloat(u.miktar),talepMiktar:parseFloat(u.miktar),birim:u.birim,not:u.not||''})),
    not,durum:'bekleyen'
  };
  sLD();
  const gercekId=await saveSipYeni(sip);
  hLD();
  if(!gercekId){toast('⚠️ Talep kaydedilemedi');return;}
  sip.id=gercekId;
  DB.siparisler[gercekId]=sip;
  US=[];
  const vc=document.getElementById('usatirlar');if(vc)vc.innerHTML='';
  if(document.getElementById('vNot'))document.getElementById('vNot').value='';
  addUS();
  toast('✅ Talep gönderildi!');
  rTaleplerim();
}

      </div>`:`

// ============================================================
// KOLİ QR OKUTMA (İç Talep hazırlama) — okutulan her koli:
// 1) Talepteki aynı ürün satırının "Onaylanan" miktarına EKLENİR (birikir)
// 2) Onayda koli hedef depoya devredilir (depo_kodu güncellenir, tekrar okutulabilir)
// ============================================================
let _onayKolileri=[];
let _depoQrScanner=null;
let _onayAktifSipId=null;

function depoQrBaslat(sipId){
  const kutu=document.getElementById('depo-qr-okuyucu');
  if(_depoQrScanner){depoQrDurdur();return;}
  const basla=()=>{
    kutu.style.display='block';
    _depoQrScanner=new Html5Qrcode('depo-qr-okuyucu');
    _depoQrScanner.start(
      {facingMode:'environment'},
      {fps:10,qrbox:{width:220,height:220}},
      async(text)=>{await depoQrOkundu(text,sipId);},
      ()=>{}
    ).catch(e=>{toast('⚠️ Kamera açılamadı: '+e);kutu.style.display='none';_depoQrScanner=null;});
  };
  if(typeof Html5Qrcode==='undefined'){
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js';
    sc.onload=basla;
    sc.onerror=()=>toast('⚠️ QR kütüphanesi yüklenemedi (internet?)');
    document.head.appendChild(sc);
  }else basla();
}
function depoQrDurdur(){
  if(_depoQrScanner){_depoQrScanner.stop().catch(()=>{});_depoQrScanner=null;}
  const kutu=document.getElementById('depo-qr-okuyucu');
  if(kutu)kutu.style.display='none';
}

let _sonOkumaZamani=0;
// koli: okutulan koli nesnesi ({id,urun_kodu,depo_kodu,skt_tarihi,...}).
// Döner: aynı üründen/depodan, hâlâ depoda olan ve okutulandan daha eski
// SKT'li bir koli varsa {koli_no,skt_tarihi}, yoksa null.
async function fefoKontrolEt(koli){
  if(!koli.skt_tarihi)return null;
  try{
    const r=await fetch(SB_URL+'/rest/v1/koli_etiketleri?urun_kodu=eq.'+encodeURIComponent(koli.urun_kodu)+'&depo_kodu=eq.'+encodeURIComponent(koli.depo_kodu)+'&durum=eq.depoda&skt_tarihi=not.is.null&id=neq.'+koli.id+'&select=koli_no,skt_tarihi&order=skt_tarihi.asc&limit=1',{headers:SB_HEADERS});
    if(!r.ok)return null;
    const rows=await r.json();
    if(!rows.length)return null;
    const enEski=rows[0];
    if(new Date(enEski.skt_tarihi)<new Date(koli.skt_tarihi))return enEski;
    return null;
  }catch(e){return null;}
}
async function depoQrOkundu(text,sipId){
  if(!text.startsWith('KOLI:'))return;
  // Aynı kodun art arda tekrar tetiklenmesini engelle (kamera saniyede 10 kare okur)
  if(Date.now()-_sonOkumaZamani<1500)return;
  _sonOkumaZamani=Date.now();

  const koliId=text.slice(5).trim();
  if(_onayKolileri.some(k=>k.id===koliId)){toast('⚠️ Bu koli bu talepte zaten okutuldu');return;}

  let koli=null;
  try{
    const r=await fetch(SB_URL+'/rest/v1/koli_etiketleri?id=eq.'+encodeURIComponent(koliId),{headers:SB_HEADERS});
    if(r.ok){const rows=await r.json();koli=rows[0]||null;}
  }catch(e){}
  if(!koli){toast('❌ Koli bulunamadı — etiket geçersiz');return;}
  if(koli.durum!=='depoda'){toast(`⚠️ Bu koli kullanılamaz (durum: ${koli.durum})`);return;}

  const eskiKoli=await fefoKontrolEt(koli);
  if(eskiKoli){
    const devam=confirm(`⚠️ FEFO Uyarısı: Bu üründen daha eski SKT'li bir koli var (Koli No: ${eskiKoli.koli_no||'?'}, SKT: ${new Date(eskiKoli.skt_tarihi).toLocaleDateString('tr-TR')}).\n\nÖnce o koli çıkarılmalı. Yine de bu koliyle devam etmek istiyor musunuz?`);
    if(!devam)return;
  }

  const s=DB.siparisler[sipId];if(!s)return;
  const urunler=s.urunler||s.kalemler||[];
  const idx=urunler.findIndex(u=>u.kod===koli.urun_kodu);
  if(idx<0){toast(`⚠️ ${koli.urun_adi} bu talepte YOK — yanlış koli olabilir`);return;}

  _onayKolileri.push({id:koli.id,urunKodu:koli.urun_kodu,urunAdi:koli.urun_adi,miktar:parseFloat(koli.miktar)||0,birim:koli.birim,koliNo:koli.koli_no,skt:koli.skt_tarihi});

  // Onaylanan miktarı okutulan kolilerden yeniden hesapla (birikir)
  const inp=document.getElementById('om'+idx);
  if(inp){
    const okutulanToplam=_onayKolileri.filter(k=>k.urunKodu===koli.urun_kodu).reduce((t,k)=>t+k.miktar,0);
    inp.value=Math.round(okutulanToplam*100)/100;
    inp.style.background='#d4edda';
  }
  depoQrListeRender();
  toast(`✅ ${koli.urun_adi} — ${parseFloat(koli.miktar).toFixed(2)} ${koli.birim} eklendi`);
}

function depoQrListeRender(){
  const c=document.getElementById('depo-qr-liste');if(!c)return;
  if(!_onayKolileri.length){c.innerHTML='';return;}
  c.innerHTML=`<div style="background:#f0fdf4;border:1px solid var(--success);border-radius:8px;padding:8px 10px;margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:#155724;margin-bottom:4px">📦 Okutulan koliler (${_onayKolileri.length})</div>
    ${_onayKolileri.map((k,i)=>`<div style="font-size:11px;color:#155724;display:flex;justify-content:space-between;align-items:center;padding:2px 0">
      <span>${k.urunAdi} — Koli ${k.koliNo||'?'} — <b>${k.miktar.toFixed(2)} ${k.birim}</b></span>
      <button onclick="depoKoliCikar(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px">✕</button>
    </div>`).join('')}
  </div>`;
}
function depoKoliCikar(i){
  const cikan=_onayKolileri.splice(i,1)[0];
  if(cikan&&_onayAktifSipId){
    const s=DB.siparisler[_onayAktifSipId];
    const urunler=s?(s.urunler||s.kalemler||[]):[];
    const idx=urunler.findIndex(u=>u.kod===cikan.urunKodu);
    if(idx>=0){
      const inp=document.getElementById('om'+idx);
      if(inp){
        const kalanToplam=_onayKolileri.filter(k=>k.urunKodu===cikan.urunKodu).reduce((t,k)=>t+k.miktar,0);
        inp.value=Math.round(kalanToplam*100)/100;
        if(kalanToplam===0)inp.style.background='';
      }
    }
  }
  depoQrListeRender();
}

async function onayla(id){
  const s=DB.siparisler[id];if(!s)return;

  // ENGEL 1: Zaten onaylanmış
  if(s.durum==='onaylandi'){toast('⚠️ Bu talep zaten onaylandı');return;}

  const otelId=s.otelId||otelFromBareKod(s.departmanId)||'810';
  const merkeziDepoId=tamDepoId(otelId,merkeziDepoKodu(otelId));
  const hedefDepoId=tamDepoId(otelId,s.departmanId);

  // Onaylanan miktarları al
  const urunler=s.urunler||s.kalemler||[];
  urunler.forEach((u,i)=>{
    u.onaylananMiktar=parseFloat(document.getElementById('om'+i)?.value||u.miktar)||0;
    u.miktar=u.onaylananMiktar;
  });

  // ENGEL 2: LN kodu boş olan ürünler
  const kodsuz=urunler.filter(u=>u.onaylananMiktar>0&&!u.kod);
  if(kodsuz.length>0){
    toast('⚠️ '+kodsuz[0].ad+' — LN kodu eksik, stok takibi yapılamaz');
    return;
  }

  // Kontrolden hemen önce merkezi depo stoğunu CANLI tazele — sayfa uzun süre açık kalmış,
  // başka bir sekmede/kişide stok değişmiş olabilir. Önbellekteki (DB.stok) eski veriye güvenme.
  sLD();
  try{
    const kodlar=[...new Set(urunler.filter(u=>u.kod&&u.onaylananMiktar>0).map(u=>u.kod))];
    if(kodlar.length){
      const filtre=kodlar.map(k=>`"${k}"`).join(',');
      const rTaze=await fetch(SB_URL+`/rest/v1/stok?depo_kodu=eq.${encodeURIComponent(merkeziDepoId)}&urun_kodu=in.(${filtre})&select=urun_kodu,miktar`,{headers:SB_HEADERS});
      if(rTaze.ok){
        if(!DB.stok[merkeziDepoId])DB.stok[merkeziDepoId]={};
        (await rTaze.json()).forEach(row=>{
          if(!DB.stok[merkeziDepoId][row.urun_kodu])DB.stok[merkeziDepoId][row.urun_kodu]={lnKod:row.urun_kodu};
          DB.stok[merkeziDepoId][row.urun_kodu].miktar=parseFloat(row.miktar)||0;
        });
      }
    }
  }catch(e){console.warn('Canlı stok tazeleme başarısız, önbellekteki veriyle devam:',e);}
  hLD();

  // ENGEL 3: Merkezi depoda (gerçek 100/300 İşletme Depo) stok yetersiz kontrolü
  const yetersiz=urunler.filter(u=>{
    if(!u.kod||u.onaylananMiktar<=0)return false;
    const mevcutStok=parseFloat((DB.stok[merkeziDepoId]?.[u.kod]||{}).miktar||0);
    return u.onaylananMiktar>mevcutStok;
  });
  if(yetersiz.length>0){
    const u=yetersiz[0];
    const stok=parseFloat((DB.stok[merkeziDepoId]?.[u.kod]||{}).miktar||0);
    toast(`⚠️ ${u.ad} — Merkezi depoda stok yetersiz! Mevcut: ${stok} ${u.birim}, İstenen: ${u.onaylananMiktar} ${u.birim}`);
    return;
  }

  sLD();
  // Gerçek transfer: Merkezi İşletme Depo (100 Club / 300 Resort) → talep eden departmanın kendi deposu.
  // Eskiden burada sahte "ANA_DEPO" kullanılıyordu, gerçek stok sistemine hiç bağlı değildi.
  const harlar=[];
  urunler.forEach(u=>{
    if(!u.kod||u.onaylananMiktar<=0)return;
    const h=transfer(merkeziDepoId,hedefDepoId,u.kod,u.ad,u.onaylananMiktar,u.birim,`İç Talep #${id}`);
    h.siparisId=id;
    harlar.push(h);
  });

  // Atomik transfer (rpc/stok_transfer) — her ürün için düş+ekle tek transaction'da.
  // Eski whole-depot saveStok'u tam-tablo clobber riski taşıyordu; kaldırıldı.
  const hatalar=[];
  for(const h of harlar){
    try{
      const rT=await fetch(SB_URL+'/rest/v1/rpc/stok_transfer',{
        method:'POST',headers:SB_HEADERS,
        body:JSON.stringify({p_urun_kodu:h.lnKod,p_kaynak_depo:h.kaynakDepoId,p_hedef_depo:h.hedefDepoId,p_hedef_otel:otelFromDepoId(h.hedefDepoId),p_miktar:h.miktar})
      });
      if(!rT.ok){
        const hataMetni=await rT.text();
        console.error('stok_transfer RPC hatası',hataMetni);
        hatalar.push(`${h.urunAd||h.lnKod}: ${hataMetni}`);
        continue; // transfer olmadıysa hareket kaydı da atma, tutarsız olur
      }
      await saveHar(h);
    }catch(e){console.error('stok_transfer RPC hatası',e);hatalar.push(`${h.urunAd||h.lnKod}: ${e.message||e}`);}
  }

  // Onay kararı zaten verildi (kalite/miktar kontrolleri yukarıda geçti) — RPC hatası olsa
  // bile talebi 'bekleyen'de bırakmak, kısmen transfer olmuş ürünleri limbo'da bırakır.
  // mal-kabul-v2.html stokaIsle() ile aynı yaklaşım: onayı tamamla, hatayı görünür şekilde bildir.
  s.durum='onaylandi';s.onaylayanAd=CU.ad;s.onayTarih=Date.now();
  await saveSipDurum(s);
  if(hatalar.length){
    alert('⚠️ Onay tamamlandı ama bazı ürünlerde stok transferi başarısız oldu:\n\n'+hatalar.join('\n\n')+'\n\nBu ürünlerin stoğunu Supabase\'de elle kontrol et.');
  }

  // Okutulan kolileri hedef depoya devret — koli fiziken taşındı,
  // etiketi hedef noktada (tüketim çıkışında) tekrar okutulabilir.
  if(_onayKolileri.length){
    for(const k of _onayKolileri){
      try{
        await fetch(SB_URL+'/rest/v1/koli_etiketleri?id=eq.'+k.id,{
          method:'PATCH',headers:SB_HEADERS,
          body:JSON.stringify({depo_kodu:hedefDepoId})
        });
      }catch(e){}
    }
    s.okutulanKoliler=_onayKolileri.map(k=>k.id);
    _onayKolileri=[];
  }
  depoQrDurdur();
  hLD();toast('✅ Onaylandı, stok transferi yapıldı');rGelen();rBugun();
}

async function onayOzetGoster(id, tip){
  const s=DB.siparisler[id];if(!s)return;
  _onayId=id;
  const urunler=s.urunler||s.kalemler||[];
  const otelId=s.otelId||otelFromBareKod(s.departmanId)||'810';
  const merkeziDepoId=tamDepoId(otelId,merkeziDepoKodu(otelId));

  // Onaylanan miktarları topla
  const onaylananlar=urunler.map((u,i)=>({
    ...u,
    onaylananMiktar: parseFloat(document.getElementById('om'+i)?.value||u.miktar)||0
  }));

  // Ekranı önce mevcut (belki bayat) veriyle göster, sonra canlı stokla güncelle —
  // kullanıcı beklemeden ekranı görsün, ama karar canlı veriye göre verilsin.
  let icerik='';
  if(tip==='onayla'){
    // Merkezi depo stoğunu CANLI çek — DB.stok önbelleği bayat olabilir
    sLD();
    try{
      const kodlar=[...new Set(onaylananlar.filter(u=>u.kod).map(u=>u.kod))];
      if(kodlar.length){
        const filtre=kodlar.map(k=>`"${k}"`).join(',');
        const rTaze=await fetch(SB_URL+`/rest/v1/stok?depo_kodu=eq.${encodeURIComponent(merkeziDepoId)}&urun_kodu=in.(${filtre})&select=urun_kodu,miktar`,{headers:SB_HEADERS});
        if(rTaze.ok){
          if(!DB.stok[merkeziDepoId])DB.stok[merkeziDepoId]={};
          (await rTaze.json()).forEach(row=>{
            if(!DB.stok[merkeziDepoId][row.urun_kodu])DB.stok[merkeziDepoId][row.urun_kodu]={lnKod:row.urun_kodu};
            DB.stok[merkeziDepoId][row.urun_kodu].miktar=parseFloat(row.miktar)||0;
          });
        }
      }
    }catch(e){console.warn('Canlı stok tazeleme başarısız:',e);}
    hLD();

    const dept=sipDepartmanGoster(s);
    // DÜZELTME: stok artık doğru yoldan (merkeziDepoId → kod) okunuyor — önceden DB.stok[u.kod]
    // diye YANLIŞ aranıyordu, bu yüzden her zaman 0 dönüyor ve buton hep kilitli kalıyordu.
    const stokYetersiz=onaylananlar.some(u=>u.kod&&u.onaylananMiktar>parseFloat((DB.stok[merkeziDepoId]?.[u.kod]||{}).miktar||0));
    icerik=`
      <div style="background:#d4edda;border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;color:#155724;margin-bottom:4px;">✅ Onaylanacak Transfer</div>
        <div style="font-size:12px;color:#155724;">Ana Depo → ${dept}</div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;">Gönderilecek Ürünler:</div>
      ${onaylananlar.map(u=>{
        const stok=parseFloat((DB.stok[merkeziDepoId]?.[u.kod]||{}).miktar||0);
        const yeterli=!u.kod||stok>=u.onaylananMiktar;
        return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:${yeterli?'var(--gray-100)':'#fff8f8'};border-radius:6px;margin-bottom:4px;border-left:3px solid ${yeterli?'var(--success)':'var(--danger)'}">
          <div>
            <div style="font-size:13px;font-weight:600">${u.ad||u.urunAd||'—'}</div>
            <div style="font-size:11px;color:var(--gray-500)">${u.kod?'Stok: '+stok+' '+u.birim:'⚠️ LN kodu yok'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:15px;font-weight:800;color:${yeterli?'var(--success)':'var(--danger)'}">${u.onaylananMiktar} ${u.birim}</div>
            ${!yeterli&&u.kod?'<div style="font-size:10px;color:var(--danger)">⚠️ Yetersiz</div>':''}
          </div>
        </div>`;
      }).join('')}
      ${stokYetersiz?'<div style="background:#fde8e8;border-radius:6px;padding:8px;margin-top:8px;font-size:12px;color:var(--danger)">⚠️ Stok yetersiz ürünler var. Geri dönüp miktarları azaltın.</div>':''}
      <div class="brow" style="margin-top:14px">
        <button class="btn btn-gray" onclick="kModal('mOzet')">← Geri</button>
        <button class="btn btn-success" id="btnOnay" ${stokYetersiz?'disabled style="opacity:0.5;cursor:not-allowed"':''} onclick="evetOnayla()">✅ Evet, Onayla</button>
      </div>`;
  } else {
    icerik=`
      <div style="background:#fde8e8;border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;color:#9b1c1c;">❌ Talep Reddedilecek</div>
        <div style="font-size:12px;color:#9b1c1c;margin-top:4px;">${sipDepartmanGoster(s)} • ${s.personel}</div>
      </div>
      <div class="field"><label>Red Nedeni</label><input type="text" id="rednot2" placeholder="Neden reddedildi?"></div>
      <div class="brow">
        <button class="btn btn-gray" onclick="kModal('mOzet')">← Geri</button>
        <button class="btn btn-danger" onclick="document.getElementById('rednot').value=document.getElementById('rednot2')?.value||'';kModal('mOzet');reddet('${id}')">❌ Evet, Reddet</button>
      </div>`;
  }

  document.getElementById('mOzetIc').innerHTML=icerik;
  aModal('mOzet');
}

  const tarih=s.tarih||new Date().toLocaleDateString('tr-TR');
  const dept=sipDepartmanGoster(s);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Depo Transfer Formu</title>
  <style>
    @page{size:A4;margin:15mm}
    body{font-family:Arial,sans-serif;font-size:11px;color:#000}
    h2{text-align:center;font-size:15px;margin:0 0 4px}
    .sub{text-align:center;font-size:11px;color:#555;margin-bottom:16px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;border:1px solid #ccc;padding:10px}
    .info-item label{font-size:10px;font-weight:bold;color:#555;display:block}
    .info-item span{font-size:12px;font-weight:bold}
    table{width:100%;border-collapse:collapse;margin-bottom:16px}
    th{background:#1a2744;color:white;padding:7px;text-align:left;font-size:11px}
    td{padding:7px;border-bottom:1px solid #eee;font-size:11px}
    tr:nth-child(even) td{background:#f9f9f9}
    .imza-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px}
    .imza-box{border-top:none;border-bottom:1px solid #000;padding-bottom:4px}
    .imza-title{font-size:11px;font-weight:bold;margin-top:6px}
    .footer{text-align:center;font-size:9px;color:#aaa;margin-top:20px;border-top:1px solid #eee;padding-top:8px}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>
  <h2>Gürok Turizm Grubu</h2>
  <div class="sub">Depo Transfer / Talep Formu</div>
  <div class="info-grid">
    <div class="info-item"><label>Form No</label><span>${id}</span></div>
    <div class="info-item"><label>Tarih</label><span>${tarih}</span></div>
    <div class="info-item"><label>Talep Eden</label><span>${dept}</span></div>
    <div class="info-item"><label>Kaynak Depo</label><span>Ana Depo</span></div>
  </div>
  <table>
    <thead><tr><th>#</th><th>Ürün Adı</th><th>LN Kodu</th><th>Talep</th><th>Onaylanan</th><th>Birim</th><th>Not</th></tr></thead>
    <tbody>${urunler.map((u,i)=>`<tr>
      <td>${i+1}</td><td><b>${u.ad||u.urunAd||'—'}</b></td>
      <td style="font-family:monospace;font-size:10px">${u.kod||'—'}</td>
      <td style="text-align:center">${u.talepMiktar||u.miktar||0}</td>
      <td style="text-align:center;font-weight:bold">${u.onaylananMiktar!==undefined?u.onaylananMiktar:u.miktar||0}</td>
      <td style="text-align:center">${u.birim||'KG'}</td>
      <td style="font-size:10px;color:#555">${u.not||''}</td>
    </tr>`).join('')}</tbody>
  </table>
  ${s.not?`<div style="background:#f9f9f9;border:1px solid #eee;padding:8px;margin-bottom:12px"><b>Not:</b> ${s.not}</div>`:''}
  <div class="imza-grid">
    <div class="imza-box">
      <div class="imza-title">TESLİM EDEN</div>
    </div>
    <div class="imza-box">
      <div class="imza-title">TESLİM ALAN</div>
    </div>
  </div>
  <div class="footer">Gürok Turizm Grubu — Depo Yönetim Sistemi • ${new Date().toLocaleString('tr-TR')}</div>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`;
  const w=window.open('','_blank','width=800,height=1100');
  if(w){w.document.write(html);w.document.close();}
  else toast('⚠️ Popup engellendi, tarayıcı iznini kontrol edin');
}
