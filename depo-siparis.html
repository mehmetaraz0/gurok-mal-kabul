<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Depo Siparişleri</title>
<meta name="theme-color" content="#1a2744">
<style>
:root{--primary:#1a2744;--primary-light:#2d4080;--success:#27ae60;--warning:#f39c12;--danger:#e74c3c;--info:#0284c7;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;--gray-400:#ced4da;--gray-500:#adb5bd;--gray-600:#6c757d;--gray-700:#495057;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,0.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.bnav{background:white;display:flex;border-top:1px solid var(--gray-200);flex-shrink:0}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;gap:3px;position:relative;min-height:56px}
.nbtn .ni{font-size:20px}.nbtn .nl{font-size:10px;color:var(--gray-500);font-weight:500}
.nbtn.active .nl{color:var(--primary);font-weight:700}
.nbtn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.nbadge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--danger);color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;display:none}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none;}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-warn{background:#fff3cd;color:#856404}.chip-ok{background:#d4edda;color:#155724}.chip-err{background:#fde8e8;color:#9b1c1c}.chip-info{background:#d1ecf1;color:#0c5460}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.skart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.skart.bekleyen{border-left-color:var(--warning)}.skart.onaylandi{border-left-color:var(--success)}.skart.reddedildi{border-left-color:var(--danger)}
.usatir{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.udd{display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
.omiktar{width:80px;padding:6px 8px;border:1.5px solid var(--primary);border-radius:6px;font-size:13px;font-weight:600;text-align:center}
#login{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999}
#login.gizle{display:none}
.lbox{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;margin:20px}
.pdots{display:flex;justify-content:center;gap:10px;margin:12px 0 6px}
.pdot{width:16px;height:16px;border-radius:50%;border:2px solid var(--gray-400);transition:all .15s}
.pdot.f{background:var(--primary);border-color:var(--primary)}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pbtn{height:52px;border:none;border-radius:var(--radius-sm);font-size:20px;font-weight:600;cursor:pointer;background:var(--gray-100);color:var(--primary)}
.pbtn:active{background:var(--gray-300);transform:scale(.95)}.pbtn.e{background:transparent;cursor:default}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  </div>
</div>

<div id="app">

  <button class="btn btn-primary btn-block" onclick="depoYeniSiparis()">Devam →</button>
</div></div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

// ====== PIN ======
function pi(d){
  if(pv.length>=6)return;
  pv+=d;dots();
  const all=[...DB.kullanicilar,...TUSERS];
  const m=all.filter(u=>String(u.pin).startsWith(pv));
  document.getElementById('pshow').textContent=m.length===1&&pv.length>=3?(RIKSON[m[0].rol]||'👤')+' '+m[0].ad:'';
  document.getElementById('perr').textContent='';
  if(pv.length===6)setTimeout(checkPin,200);
}
function pd(){pv=pv.slice(0,-1);dots();if(!pv)document.getElementById('pshow').textContent='';}
function dots(){for(let i=0;i<6;i++)document.getElementById('d'+i).classList.toggle('f',i<pv.length);}
function checkPin(){
  const all=[...DB.kullanicilar,...TUSERS];
  const user=all.find(u=>String(u.pin)===String(pv));
  if(!user){
    document.getElementById('perr').textContent='❌ Hatalı PIN';
    setTimeout(()=>document.getElementById('perr').textContent='',2000);
    pv='';dots();document.getElementById('pshow').textContent='';return;
  }
  CU=user;
  sessionStorage.setItem('gurok_siparis_session',JSON.stringify({user,expiry:Date.now()+30*60*1000}));
  document.getElementById('login').classList.add('gizle');
  basla();
}

// ====== SESSION ======
function getSession(){
  for(const k of['gurok_portal_session','gurok_siparis_session']){
    const s=sessionStorage.getItem(k);
    if(!s)continue;
    try{
      const{user,expiry}=JSON.parse(s);
      if(Date.now()>=expiry)continue;
      const all=[...DB.kullanicilar,...TUSERS];
      const tam=all.find(u=>u.id===user.id||String(u.pin)===String(user.pin))||user;
      return{...user,...tam,rol:(tam.rol||user.rol||'depo')==='personel'?'depo':(tam.rol||user.rol||'depo')};
    }catch(e){}
  }
  return null;
}

// ====== FIREBASE ======
async function loadDB(){
  sLD();
  try{
    const [sR,kR,stR]=await Promise.all([
      fetch(FB+'/siparisler.json'),
      fetch(FB+'/kullanicilar.json'),
      fetch(FB+'/stok/ANA_DEPO.json'),
    ]);
    if(sR.ok){const d=await sR.json();if(d){if(typeof d==='object'&&!Array.isArray(d))DB.siparisler=d;else if(Array.isArray(d))d.filter(Boolean).forEach(s=>{if(s&&s.id)DB.siparisler[s.id]=s;});}}
    if(kR.ok){const d=await kR.json();if(Array.isArray(d)&&d.length)DB.kullanicilar=d.map(u=>({...u,rol:u.rol==='personel'?'depo':u.rol}));}
    if(stR.ok){const d=await stR.json();if(d)DB.stok=d;}
  }catch(e){console.warn(e);}
  hLD();
  // Ürün listesi arka planda Firebase'den dene
  try{
    const uR=await fetch(FB+'/urunListesi.json');
    if(uR.ok){const d=await uR.json();if(Array.isArray(d)&&d.length){DB.urunler=d;return;}}
  }catch(e){}
  // Gömülü listeye düş
  if(typeof URUN_DB!=='undefined')DB.urunler=URUN_DB;
}

async function saveStok(did,stok){try{await fetch(FB+'/stok/'+did+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(stok)});}catch(e){}}

  const bnav=document.getElementById('bnav');

  if(rol==='mutfak'||rol==='bar'){
    bnav.innerHTML=`
      <button class="nbtn active" id="nb-ver" onclick="gTab('ver')"><span class="ni">📤</span><span class="nl">Talep Ver</span></button>
      <button class="nbtn" id="nb-tal" onclick="gTab('taleplerim')"><span class="ni">📋</span><span class="nl">Taleplerim</span><span class="nbadge" id="tbadge"></span></button>`;
    // Talep Ver alanını doldur
    const dept=CU.departman||RADLAR[rol]||rol;
    document.getElementById('tVer').innerHTML=`
      <div class="card">
        <div class="card-title">📤 Malzeme Talebi</div>
        <div class="field"><label>Departman</label><input id="vDept" value="${dept}" readonly style="background:var(--gray-100)"></div>
        <div class="field"><label>Tarih</label><input type="date" id="vTarih" value="${new Date().toISOString().split('T')[0]}"></div>
        <div class="field"><label>Not</label><input type="text" id="vNot" placeholder="Opsiyonel..."></div>
      </div>
      <div class="card">
        <div class="card-title">📦 Ürünler <button class="btn btn-sm" style="margin-left:auto;background:var(--warning);color:var(--primary);padding:4px 10px;min-height:28px" onclick="addUS()">+ Ekle</button></div>
        <div id="usatirlar"></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="gondер()" style="margin-bottom:16px">📤 Talep Gönder</button>`;
    US=[];addUS();
    gTab('ver');
  } else {
    document.getElementById('hbtnYeni').style.display='flex';
    document.getElementById('yTarih').value=new Date().toISOString().split('T')[0];
    bnav.innerHTML=`
      <button class="nbtn active" id="nb-gel" onclick="gTab('gelen')"><span class="ni">📥</span><span class="nl">Gelen Talepler</span><span class="nbadge" id="gbadge"></span></button>
      <button class="nbtn" id="nb-bug" onclick="gTab('bugun')"><span class="ni">📦</span><span class="nl">Bugün Teslim</span></button>`;
    gTab('gelen');
  }
}

function gTab(t){
  const map={ver:'tVer',taleplerim:'tTaleplerim',gelen:'tGelen',bugun:'tBugun'};
  Object.values(map).forEach(id=>{const el=document.getElementById(id);if(el){el.style.display='none';el.style.flexDirection='';}});
  const el=document.getElementById(map[t]);
  if(el){el.style.display='block';}
  ['ver','tal','gel','bug'].forEach(id=>{const n=document.getElementById('nb-'+id);if(n)n.classList.remove('active');});
  const nbmap={ver:'nb-ver',taleplerim:'nb-tal',gelen:'nb-gel',bugun:'nb-bug'};
  const nb=document.getElementById(nbmap[t]);
  if(nb)nb.classList.add('active');
  if(t==='taleplerim')rTaleplerim();
  if(t==='gelen')rGelen();
  if(t==='bugun')rBugun();
}

// ====== ÜRÜN SATIRLARI ======
function addUS(data){
  US.push({ad:'',kod:'',miktar:'',birim:'KG',not:'',...(data||{})});
  rUS();
}
function rUS(){
  const c=document.getElementById('usatirlar');if(!c)return;
  c.innerHTML=US.map((u,i)=>`
    <div class="usatir">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="background:var(--primary);color:white;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
        <div style="font-size:13px;font-weight:600;flex:1">${u.ad||'Ürün '+(i+1)}</div>
        <button onclick="delUS(${i})" style="background:none;border:none;color:var(--gray-400);font-size:16px;cursor:pointer">✕</button>
      </div>
      <div style="position:relative;margin-bottom:8px">
        <input type="text" id="ua${i}" value="${u.ad}" placeholder="2+ harf yazın..." autocomplete="off"
          oninput="fUS(${i},this.value)"
          style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none">
        <div id="udd${i}" class="udd"></div>
      </div>
      <div class="rfields">
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">MİKTAR *</label>
          <input type="number" id="um${i}" value="${u.miktar}" placeholder="0" min="0" step="0.01"
            oninput="US[${i}].miktar=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">BİRİM</label>
          <select id="ub${i}" onchange="US[${i}].birim=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none;-webkit-appearance:none">
            ${['KG','AD','KOL','LT','PKT','TRB','TNK','BOT','GR','ML'].map(b=>`<option${u.birim===b?' selected':''}>${b}</option>`).join('')}
          </select></div>
      </div>
      <input type="text" value="${u.not||''}" placeholder="Not (opsiyonel)"
        oninput="US[${i}].not=this.value"
        style="width:100%;padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:12px;margin-top:6px;outline:none">
    </div>`).join('');
}
function delUS(i){US.splice(i,1);rUS();}

function fUS(i,val){
  US[i].ad=val;
  const dd=document.getElementById('udd'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const stokItems=Object.values(DB.stok).filter(s=>s.urunAd?.toLowerCase().includes(val.toLowerCase())||s.lnKod?.toLowerCase().includes(val.toLowerCase())).slice(0,8);
  const stokKodlar=new Set(stokItems.map(s=>s.lnKod));
  let genel=[];
  const urunDB=DB.urunler.length>0?DB.urunler:(window.URUN_DB||[]);
  genel=urunDB.filter(u=>!stokKodlar.has(u.kod)&&(u.ad?.toLowerCase().includes(val.toLowerCase())||u.kod?.toLowerCase().includes(val.toLowerCase()))).slice(0,10);
  const sonuc=[
    ...stokItems.map(s=>({kod:s.lnKod,ad:s.urunAd,birim:s.birim,stok:s.miktar,v:true})),
    ...genel.map(u=>({kod:u.kod,ad:u.ad,birim:u.birim,stok:0,v:false}))
  ];
  if(!sonuc.length){dd.style.display='none';return;}
  dd.innerHTML=sonuc.map(s=>`<div class="uddi" data-i="${i}" data-kod="${s.kod}" data-ad="${(s.ad||'').replace(/"/g,'&quot;')}" data-birim="${s.birim||'KG'}">
    ${s.ad} <span style="font-size:10px;color:${s.v?'var(--success)':'var(--gray-400)'}">${s.v?'Stok: '+s.stok+' '+s.birim:'—'}</span>
  </div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=parseInt(this.dataset.i);
      US[idx]={...US[idx],ad:this.dataset.ad,kod:this.dataset.kod,birim:this.dataset.birim};
      dd.style.display='none';
      // Sadece başlık ve birim alanını güncelle — tüm render yerine
      const adInp=document.getElementById('ua'+idx);
      if(adInp)adInp.value=this.dataset.ad;
      const birimSel=document.getElementById('ub'+idx);
      if(birimSel)birimSel.value=this.dataset.birim||'KG';
      // Satır başlığını güncelle
      const baslik=document.querySelector('#usatirlar .usatir:nth-child('+(idx+1)+') div[style*="font-weight:600"]');
      if(baslik)baslik.textContent=this.dataset.ad;
    });
  });
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  US.forEach((_,i)=>{const dd=document.getElementById('udd'+i);const inp=document.getElementById('ua'+i);if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';});
});

// ====== TALEP GÖNDER ======
async function gondер(){
  if(!CU)return;
  if(!US.length){toast('⚠️ En az bir ürün ekleyin');return;}
  if(US.find(u=>!u.ad)){toast('⚠️ Tüm ürün adlarını doldurun');return;}
  if(US.find(u=>!u.miktar||parseFloat(u.miktar)<=0)){toast('⚠️ Miktar girin');return;}

    departman:dept,departmanId:deptId,
    personel:CU.ad,personelRol:CU.rol,

    not,durum:'bekleyen'
  };
  sLD();DB.siparisler[sip.id]=sip;await saveSip(sip);hLD();

  if(document.getElementById('vNot'))document.getElementById('vNot').value='';

async function onayla(id){
  const s=DB.siparisler[id];if(!s)return;

  // ENGEL 1: Zaten onaylanmış
  if(s.durum==='onaylandi'){toast('⚠️ Bu talep zaten onaylandı');return;}

  // Onaylanan miktarları al
  const urunler=s.urunler||s.kalemler||[];
  urunler.forEach((u,i)=>{
    u.onaylananMiktar=parseFloat(document.getElementById('om'+i)?.value||u.miktar)||0;
    u.miktar=u.onaylananMiktar;
  });

  // ENGEL 2: LN kodu boş olan ürünler
  const kodsuz=urunler.filter(u=>u.onaylananMiktar>0&&!u.kod);
  if(kodsuz.length>0){
    toast('⚠️ '+kodsuz[0].ad+' — LN kodu eksik, stok takibi yapılamaz');
    return;
  }

  // ENGEL 3: Stok yetersiz kontrolü
  const yetersiz=urunler.filter(u=>{
    if(!u.kod||u.onaylananMiktar<=0)return false;
    const mevcutStok=parseFloat((DB.stok[u.kod]||{}).miktar||0);
    return u.onaylananMiktar>mevcutStok;
  });
  if(yetersiz.length>0){
    const u=yetersiz[0];
    const stok=parseFloat((DB.stok[u.kod]||{}).miktar||0);
    toast(`⚠️ ${u.ad} — Stok yetersiz! Mevcut: ${stok} ${u.birim}, İstenen: ${u.onaylananMiktar} ${u.birim}`);
    return;
  }

  sLD();
  let hStok={};
  try{const r=await fetch(FB+'/stok/'+s.departmanId+'.json');if(r.ok){const d=await r.json();if(d)hStok=d;}}catch(e){}
  const harlar=[];
  urunler.forEach(u=>{
    if(!u.kod||u.onaylananMiktar<=0)return;
    // Ana depodan düş
    if(DB.stok[u.kod]){
      DB.stok[u.kod].miktar=Math.max(0,(parseFloat(DB.stok[u.kod].miktar)||0)-u.onaylananMiktar);
      DB.stok[u.kod].sonGuncelleme=Date.now();
    }
    // Hedef depoya ekle
    if(!hStok[u.kod])hStok[u.kod]={lnKod:u.kod,urunAd:u.ad,miktar:0,birim:u.birim,sonGuncelleme:Date.now()};
    hStok[u.kod].miktar=(parseFloat(hStok[u.kod].miktar)||0)+u.onaylananMiktar;
    hStok[u.kod].sonGuncelleme=Date.now();
    harlar.push({
      id:'HAR_'+Date.now()+'_'+Math.random().toString(36).slice(2,4),
      tip:'transfer',kaynakDepoId:'ANA_DEPO',kaynakDepoAd:'Ana Depo',
      hedefDepoId:s.departmanId,hedefDepoAd:s.departman,
      lnKod:u.kod,urunAd:u.ad,miktar:u.onaylananMiktar,birim:u.birim,
      tarih:Date.now(),personel:CU.ad,siparisId:id
    });
  });

  s.durum='onaylandi';s.onaylayanAd=CU.ad;s.onayTarih=Date.now();
  // Talebi kilitle — tekrar işlenemez
  s.kilitli=true;

  await saveStok('ANA_DEPO',DB.stok);
  await saveStok(s.departmanId,hStok);
  for(const h of harlar)await saveHar(h);
  await saveSip(s);
  hLD();toast('✅ Onaylandı, stok transferi yapıldı');rGelen();rBugun();
}

      <td style="font-size:10px;color:#555">${u.not||''}</td>
    </tr>`).join('')}</tbody>
  </table>
  ${s.not?`<div style="background:#f9f9f9;border:1px solid #eee;padding:8px;margin-bottom:12px"><b>Not:</b> ${s.not}</div>`:''}
  <div class="imza-grid">

  </body></html>`;
  const w=window.open('','_blank','width=800,height=1100');
  if(w){w.document.write(html);w.document.close();}
  else toast('⚠️ Popup engellendi, tarayıcı iznini kontrol edin');
}

let _onayId = null;
function evetOnayla(){
  if(!_onayId)return;
  kModal('mOzet');
  onayla(_onayId);
}

function aModal(id){document.getElementById(id).classList.add('open');}
function kModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
function toast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function sLD(){document.getElementById('ld').classList.add('show');}
function hLD(){document.getElementById('ld').classList.remove('show');}
