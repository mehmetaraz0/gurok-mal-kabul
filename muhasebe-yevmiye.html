<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.tab-bar{background:white;display:flex;border-bottom:2px solid var(--gray-200);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tabbtn{padding:12px 16px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;flex-shrink:0}

.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-green{background:#d4edda;color:#155724}.chip-yellow{background:#fff3cd;color:#856404}.chip-gray{background:var(--gray-200);color:var(--gray-700)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.yev-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}

.udd{display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:180px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:8px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:12px}
.uddi:active{background:var(--gray-100)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}

.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script>
let yevmiyeler={},hesapPlani={};
let YETKI_HARITASI = {};
let yevKalemler=[];
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js

// ============================================================
// DÖNEM KONTROLÜ & DENETİM İZİ (paylaşılan mantık)
// ============================================================
async function donemAcikMi(tarihMs){
  try{
    const r=await fetch(SB_URL+'/rest/v1/mali_donemler?select=*',{headers:SB_HEADERS});
    if(!r.ok)return{acik:true};
    const donemler=await r.json();
    if(!donemler||!donemler.length)return{acik:true};
    for(const don of donemler){
      const bas=new Date(don.baslangic).getTime();
      const bit=new Date(don.bitis+'T23:59:59').getTime();
      if(tarihMs>=bas&&tarihMs<=bit)return{acik:don.durum!=='kapali',donem:don};
    }
    return{acik:true};
  }catch(e){return{acik:true};}
}

async function auditLogYaz(action,entityType,entityId,detail){
  const log={
    action,entity_type:entityType,entity_id:String(entityId||''),detail:detail||'',
    kullanici_ad:OTURUM_KULLANICI?.ad||'Bilinmeyen'
  };
  try{await fetch(SB_URL+'/rest/v1/audit_log',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(log)});}
  catch(e){console.warn('Audit log kaydedilemedi:',e);}
}

function yevSbdenCamele(r){
  return{
    id:r.id,no:r.no,tarih:r.tarih?new Date(r.tarih).getTime():Date.now(),
    tarihStr:r.tarih,tip:r.tip,belge:r.belge_no||'',aciklama:r.aciklama||'',
    otelId:r.otel_id,toplamBorc:parseFloat(r.toplam_borc)||0,toplamAlacak:parseFloat(r.toplam_alacak)||0,
    onaylandi:!!r.onaylandi,otomatik:!!r.otomatik,
    kalemler:(r.yevmiye_kalemleri||[]).map(k=>({
      hesapKod:k.hesap_kodu,hesapAd:'',masrafMerkezi:k.masraf_merkezi||'',
      aciklama:k.aciklama||'',borc:parseFloat(k.borc)||0,alacak:parseFloat(k.alacak)||0
    }))
  };
}

async function loadDB(){
  sLD();
  try{
    const [yR,hR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/yevmiye_fisler?select=*,yevmiye_kalemleri(*)',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/hesap_plani?select=kod,ad',{headers:SB_HEADERS}),
    ]);
    yevmiyeler={};hesapPlani={};
    if(yR.ok){(await yR.json()).forEach(r=>{yevmiyeler[r.id]=yevSbdenCamele(r);});}
    if(hR.ok){(await hR.json()).forEach(r=>{hesapPlani[r.kod.replace(/\./g,'_')]={kod:r.kod,ad:r.ad};});}
  }catch(e){console.warn(e);}
  hLD();
}

// y: camelCase yevmiye fişi. Yeni ise (id yoksa) POST ile ekler, gerçek UUID'yi y.id'ye yazar.
async function saveYevmiye(y){
  const satir={
    no:y.no,tarih:y.tarihStr||new Date(y.tarih).toISOString().split('T')[0],
    tip:y.tip,belge_no:y.belge||null,aciklama:y.aciklama||null,otel_id:y.otelId||'810',
    toplam_borc:y.toplamBorc,toplam_alacak:y.toplamAlacak,
    onaylandi:y.onaylandi!==false,otomatik:!!y.otomatik
  };
  try{
    let fisUuid=y.id;
    if(y.id){
      await fetch(SB_URL+'/rest/v1/yevmiye_fisler?id=eq.'+y.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify(satir)});
      await fetch(SB_URL+'/rest/v1/yevmiye_kalemleri?fis_id=eq.'+y.id,{method:'DELETE',headers:SB_HEADERS});
    }else{
      const r=await fetch(SB_URL+'/rest/v1/yevmiye_fisler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(satir)});
      const d=await r.json();
      fisUuid=d[0].id;
      y.id=fisUuid;
    }
    if(y.kalemler&&y.kalemler.length){
      const kalemSatirlar=y.kalemler.map(k=>({
        fis_id:fisUuid,hesap_kodu:k.hesapKod,masraf_merkezi:k.masrafMerkezi||null,
        aciklama:k.aciklama||null,borc:k.borc||0,alacak:k.alacak||0
      }));
      const rK=await fetch(SB_URL+'/rest/v1/yevmiye_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
      if(!rK.ok){
        console.error('yevmiye_kalemleri reinsert hatası:',await rK.text());
        alert('⚠️ DİKKAT: Fiş başlığı güncellendi ama satır kalemleri yazılamadı — bu fiş şu an EKSİK/DENGESİZ olabilir. Lütfen fişi tekrar açıp yeniden kaydedin veya bir yetkiliyle iletişime geçin.');
        return false;
      }
    }
    return true;
  }catch(e){console.warn(e);return false;}
}

// ============================================================
// FİŞ NO ÜRET
// ============================================================
async function yeniFisNo(){
  const yil=new Date().getFullYear();
  try{
    const r=await fetch(SB_URL+`/rest/v1/yevmiye_fisler?no=like.YEV-${yil}-*&select=no&order=no.desc&limit=1`,{headers:SB_HEADERS});
    let n=0;
    if(r.ok){
      const d=await r.json();
      if(d&&d.length){
        const m=d[0].no.match(new RegExp('^YEV-'+yil+'-(\\d+)$'));
        if(m)n=parseInt(m[1]);
      }
    }
    n++;
    return `YEV-${yil}-${String(n).padStart(5,'0')}`;
  }catch(e){}
  return `YEV-${yil}-${Date.now()}`;
}

// ============================================================
// RENDER YEVMİYE
// ============================================================
function renderYevmiye(){
  const bas=document.getElementById('yev-bas').value;
  const bit=document.getElementById('yev-bit').value;
  const basTs=bas?new Date(bas).getTime():0;
  const bitTs=bit?new Date(bit+'T23:59:59').getTime():Date.now()+86400000;

  let liste=Object.values(yevmiyeler).filter(y=>y&&y.tarih>=basTs&&y.tarih<=bitTs)
    .sort((a,b)=>b.tarih-a.tarih);

  const c=document.getElementById('yevmiye-liste');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">📒</div><div class="et">Yevmiye kaydı bulunamadı</div></div>';return;}

  // Gün bazlı grupla
  const gruplar={};
  liste.forEach(y=>{const g=new Date(y.tarih).toLocaleDateString('tr-TR');if(!gruplar[g])gruplar[g]=[];gruplar[g].push(y);});

  c.innerHTML=Object.entries(gruplar).map(([gun,liste])=>`
    <div style="font-size:11px;font-weight:600;color:var(--gray-500);margin:8px 0 4px;text-transform:uppercase">${gun}</div>
    ${liste.map(y=>`
      <div class="yev-kart ${y.onaylandi?'onaylandi':'taslak'}" onclick="openYevmiyeDetay('${y.id}')">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div>
            <div style="font-size:13px;font-weight:700">${y.no} <span style="font-size:11px;color:var(--gray-500)">• ${y.tip}</span></div>
            <div style="font-size:12px;color:var(--gray-600)">${escapeHtml(y.aciklama)||'—'}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:800;color:var(--danger)">${fmt(y.toplamBorc)} ₺</div>
            <div style="font-size:10px;color:var(--gray-400)">${y.onaylandi?'✅ Onaylı':'📝 Taslak'}</div>
          </div>
        </div>

function hesaplaDenge(){

}

function filterHesapDD(val,ddId,kodFieldId,kalemIdx){
  const dd=document.getElementById(ddId);
  if(!val||val.length<1){if(dd)dd.style.display='none';return;}
  const res=Object.values(hesapPlani).filter(h=>h&&(h.kod?.includes(val)||h.ad?.toLowerCase().includes(val.toLowerCase()))).slice(0,12);
  if(!res.length){if(dd)dd.style.display='none';return;}
  dd.innerHTML=res.map(h=>`<div class="uddi" data-kod="${h.kod}" data-ad="${(h.ad||'').replace(/"/g,'&quot;')}" data-idx="${kalemIdx!==undefined?kalemIdx:''}">
    <span style="font-family:monospace;font-weight:700">${h.kod}</span> ${h.ad}
  </div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=this.dataset.idx;
      if(idx!==''){
        yevKalemler[idx].hesapKod=this.dataset.kod;
        yevKalemler[idx].hesapAd=this.dataset.ad;
        const inp=document.getElementById('yk-hesap-'+idx);
        if(inp)inp.value=this.dataset.kod;
        // Hesap adını açıklama olarak otomatik doldur
        const acikInp=document.getElementById('yk-acik-'+idx);
        if(acikInp&&!acikInp.value)acikInp.value=this.dataset.ad;
      }else if(kodFieldId){
        document.getElementById(kodFieldId).value=this.dataset.kod;
        const inp=document.getElementById(ddId.replace('-dd','-inp'));
        if(inp)inp.value=this.dataset.kod+' — '+this.dataset.ad;
        renderKebir();
      }
      dd.style.display='none';
    });
  });
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  document.querySelectorAll('.udd').forEach(dd=>{if(!dd.contains(e.target))dd.style.display='none';});
});

// round2 -> ortak.js
let _yevmiyeKaydediliyor=false;
async function yevmiyeKaydet(onayla){
  if(_yevmiyeKaydediliyor){toast('⏳ İşleniyor, bekleyin...');return;}
  const tarihStr=document.getElementById('y-tarih').value;
  if(!tarihStr){toast('⚠️ Tarih girin');return;}
  const doluKalemler=yevKalemler.filter(k=>k.hesapKod&&(k.borc>0||k.alacak>0));
  if(doluKalemler.length<2){toast('⚠️ En az 2 kalem gerekli');return;}
  const topBorc=round2(doluKalemler.reduce((t,k)=>t+(k.borc||0),0));
  const topAlacak=round2(doluKalemler.reduce((t,k)=>t+(k.alacak||0),0));
  if(onayla&&Math.abs(topBorc-topAlacak)>0.01){toast('⚠️ Borç-Alacak dengesi sağlanamadan onaylanamaz');return;}

  // Dönem kontrolü — kapalı döneme onaylı kayıt girilemez
  if(onayla){
    const donemDurum=await donemAcikMi(new Date(tarihStr).getTime());
    if(!donemDurum.acik){
      toast(`⚠️ ${donemDurum.donem?.ad||'Bu'} dönem kapalı — kayıt yapılamaz`);
      return;
    }
  }

  const editId=document.getElementById('y-id').value;
  const yev={
    id:editId||null,no:document.getElementById('y-no').value||await yeniFisNo(),
    tarih:new Date(tarihStr).getTime(),
    tarihStr,
    tip:document.getElementById('y-tip').value,
    belge:document.getElementById('y-belge').value||'',
    aciklama:document.getElementById('y-aciklama').value||'',
    kalemler:doluKalemler,
    otelId:document.getElementById('y-otel').value||'810',
    toplamBorc:topBorc,toplamAlacak:topAlacak,
    onaylandi:onayla
  };
  _yevmiyeKaydediliyor=true;
  sLD();
  try{
    await saveYevmiye(yev); // yeni kayıtta yev.id burada gerçek UUID ile doldurulur
    const id=yev.id;
    yevmiyeler[id]=yev;
    await auditLogYaz(onayla?'approve':'create','yevmiye',id,`Yevmiye fişi ${onayla?'onaylandı':'taslak kaydedildi'}: ${yev.no} (Tutar: ${fmt(topBorc)} ₺)`);
    hLD();
    kModal('mYevmiye');renderYevmiye();
    toast(onayla?`✅ ${yev.no} onaylandı`:`📝 ${yev.no} taslak kaydedildi`);
  }finally{
    _yevmiyeKaydediliyor=false;
  }
}

async function yevmiyeSil(){
  const id=document.getElementById('y-id').value;
  if(!id)return;
  if(!confirm('Yevmiye kaydı silinsin mi?'))return;
  sLD();delete yevmiyeler[id];
  try{await fetch(SB_URL+'/rest/v1/yevmiye_fisler?id=eq.'+id,{method:'DELETE',headers:SB_HEADERS});}catch(e){console.warn(e);}
  hLD();kModal('mYevmiye');renderYevmiye();toast('🗑️ Silindi');
}

function renderKebir(){
  const kod=document.getElementById('kebir-hesap-kod').value||document.getElementById('kebir-hesap-inp').value;
  if(!kod){document.getElementById('kebir-sonuc').innerHTML='';return;}
  const bas=document.getElementById('kebir-bas').value;
  const bit=document.getElementById('kebir-bit').value;
  const basTs=bas?new Date(bas).getTime():0;
  const bitTs=bit?new Date(bit+'T23:59:59').getTime():Date.now()+86400000;

  // Bu hesabı içeren yevmiye kayıtlarını bul
  const satirlar=[];
  Object.values(yevmiyeler).filter(y=>y&&y.onaylandi&&y.tarih>=basTs&&y.tarih<=bitTs)
    .sort((a,b)=>a.tarih-b.tarih)
    .forEach(y=>{
      (y.kalemler||[]).filter(k=>k.hesapKod===kod||k.hesapKod?.startsWith(kod)).forEach(k=>{
        satirlar.push({...k,yevNo:y.no,tarih:y.tarih,aciklamaYev:y.aciklama});
      });
    });

  if(!satirlar.length){document.getElementById('kebir-sonuc').innerHTML='<div class="es"><div class="ei">📗</div><div class="et">Bu hesapta hareket yok</div></div>';return;}

  let topBorc=0,topAlacak=0,bakiye=0;
  const hesap=Object.values(hesapPlani).find(h=>h.kod===kod);

  document.getElementById('kebir-sonuc').innerHTML=`
    <div class="card">
      <div class="card-title">${kod} — ${hesap?.ad||kod}</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="background:var(--gray-100)">
          <th style="text-align:left;padding:6px">Tarih</th>
          <th style="text-align:left;padding:6px">Fiş</th>
          <th style="text-align:left;padding:6px">Açıklama</th>
          <th style="text-align:right;padding:6px;color:var(--danger)">Borç</th>
          <th style="text-align:right;padding:6px;color:var(--success)">Alacak</th>
          <th style="text-align:right;padding:6px">Bakiye</th>
        </tr>
        ${satirlar.map(s=>{
          topBorc+=s.borc||0;topAlacak+=s.alacak||0;
          bakiye+=(s.borc||0)-(s.alacak||0);
          return`<tr style="border-bottom:1px solid var(--gray-100)">
            <td style="padding:6px">${new Date(s.tarih).toLocaleDateString('tr-TR')}</td>
            <td style="padding:6px;font-family:monospace;font-size:11px">${s.yevNo}</td>
            <td style="padding:6px">${s.aciklamaYev||s.aciklama||'—'}</td>
            <td style="padding:6px;text-align:right;color:var(--danger)">${s.borc>0?fmt(s.borc)+'₺':''}</td>
            <td style="padding:6px;text-align:right;color:var(--success)">${s.alacak>0?fmt(s.alacak)+'₺':''}</td>
            <td style="padding:6px;text-align:right;font-weight:700;color:${bakiye>=0?'var(--danger)':'var(--success)'}">${fmt(Math.abs(bakiye))}₺</td>
          </tr>`;
        }).join('')}
        <tr style="background:var(--gray-100);font-weight:700">
          <td colspan="3" style="padding:6px">TOPLAM</td>
          <td style="padding:6px;text-align:right;color:var(--danger)">${fmt(topBorc)}₺</td>
          <td style="padding:6px;text-align:right;color:var(--success)">${fmt(topAlacak)}₺</td>
          <td style="padding:6px;text-align:right">${fmt(Math.abs(topBorc-topAlacak))}₺</td>
        </tr>
      </table>
    </div>`;
}

function renderMizan(){
  const bas=document.getElementById('mizan-bas').value;
  const bit=document.getElementById('mizan-bit').value;
  const basTs=bas?new Date(bas).getTime():0;
  const bitTs=bit?new Date(bit+'T23:59:59').getTime():Date.now()+86400000;
  const gizleSifir=document.getElementById('mizan-sifir').checked;

  // Hesap bazlı topla
  const hesapToplam={};
  Object.values(yevmiyeler).filter(y=>y&&y.onaylandi&&y.tarih>=basTs&&y.tarih<=bitTs).forEach(y=>{
    (y.kalemler||[]).forEach(k=>{
      if(!k.hesapKod)return;
      if(!hesapToplam[k.hesapKod])hesapToplam[k.hesapKod]={kod:k.hesapKod,ad:k.hesapAd||'',borc:0,alacak:0};
      hesapToplam[k.hesapKod].borc+=(k.borc||0);
      hesapToplam[k.hesapKod].alacak+=(k.alacak||0);
    });
  });

  // Hesap planından adları doldur
  Object.values(hesapToplam).forEach(h=>{
    const hp=hesapPlani[h.kod.replace(/\./g,'_')];
    if(hp)h.ad=hp.ad;
  });

  let satirlar=Object.values(hesapToplam).sort((a,b)=>a.kod.localeCompare(b.kod,'tr',{numeric:true}));
  if(gizleSifir)satirlar=satirlar.filter(h=>Math.abs(h.borc-h.alacak)>0.01);

  const topBorc=satirlar.reduce((t,h)=>t+h.borc,0);
  const topAlacak=satirlar.reduce((t,h)=>t+h.alacak,0);

  if(!satirlar.length){document.getElementById('mizan-tablo').innerHTML='<div class="es"><div class="ei">📊</div><div class="et">Bu dönemde onaylı kayıt yok</div></div>';return;}

  document.getElementById('mizan-tablo').innerHTML=`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:10px 12px;background:var(--primary);color:white;font-size:12px;font-weight:700;display:grid;grid-template-columns:80px 1fr 90px 90px 90px">
        <span>HESAP</span><span>AD</span>
        <span style="text-align:right;color:#fca5a5">BORÇ</span>
        <span style="text-align:right;color:#86efac">ALACAK</span>
        <span style="text-align:right">BAKİYE</span>
      </div>
      ${satirlar.map(h=>{
        const bak=h.borc-h.alacak;
        return`<div style="display:grid;grid-template-columns:80px 1fr 90px 90px 90px;padding:7px 12px;border-bottom:1px solid var(--gray-100);font-size:12px">
          <span style="font-family:monospace;font-weight:700">${h.kod}</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.ad}</span>
          <span style="text-align:right;color:var(--danger)">${fmt(h.borc)}</span>
          <span style="text-align:right;color:var(--success)">${fmt(h.alacak)}</span>
          <span style="text-align:right;font-weight:700;color:${bak>=0?'var(--danger)':'var(--success)'}">${fmt(Math.abs(bak))}</span>
        </div>`;
      }).join('')}
      <div style="display:grid;grid-template-columns:80px 1fr 90px 90px 90px;padding:8px 12px;background:var(--gray-100);font-weight:700;font-size:12px">
        <span colspan="2">TOPLAM</span><span></span>
        <span style="text-align:right;color:var(--danger)">${fmt(topBorc)}</span>
        <span style="text-align:right;color:var(--success)">${fmt(topAlacak)}</span>
        <span style="text-align:right;color:${Math.abs(topBorc-topAlacak)<0.01?'var(--success)':'var(--danger)'}">${fmt(Math.abs(topBorc-topAlacak))}</span>
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:${Math.abs(topBorc-topAlacak)<0.01?'var(--success)':'var(--danger)'};margin-top:8px;font-weight:700">
      ${Math.abs(topBorc-topAlacak)<0.01?'✅ Mizan Dengeli':'⚠️ Mizan Dengesiz — Fark: '+fmt(Math.abs(topBorc-topAlacak))+' ₺'}
    </div>`;
}

// ============================================================
// MASRAF MERKEZİ RAPORU
// ============================================================
function renderMasrafMerkezi(){
  const bas=document.getElementById('mm-bas').value;
  const bit=document.getElementById('mm-bit').value;
  const otelFiltre=document.getElementById('mm-otel').value;
  const basTs=bas?new Date(bas).getTime():0;
  const bitTs=bit?new Date(bit+'T23:59:59').getTime():Date.now()+86400000;

  const dagitim={}; // masrafMerkezi kodu -> {ad, borc, alacak, net}
  let genelToplam=0;

  Object.values(yevmiyeler).filter(Boolean).forEach(y=>{
    if(y.tarih<basTs||y.tarih>bitTs)return;
    if(otelFiltre&&y.otelId!==otelFiltre)return;
    (y.kalemler||[]).forEach(k=>{
      if(!k.masrafMerkezi)return; // sadece işaretlenmiş satırlar
      const mm=MASRAF_MERKEZLERI.find(m=>m.kod===k.masrafMerkezi);
      const ad=mm?mm.ad:k.masrafMerkezi;
      if(!dagitim[k.masrafMerkezi])dagitim[k.masrafMerkezi]={ad,borc:0,alacak:0};
      dagitim[k.masrafMerkezi].borc+=parseFloat(k.borc)||0;
      dagitim[k.masrafMerkezi].alacak+=parseFloat(k.alacak)||0;
      genelToplam+=parseFloat(k.borc)||0;
    });
  });

  const satirlar=Object.entries(dagitim).sort((a,b)=>b[1].borc-a[1].borc);

  document.getElementById('mm-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num" style="color:var(--primary)">${satirlar.length}</div><div class="stat-lbl">İşaretli Departman</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--danger)">${fmt(genelToplam)} ₺</div><div class="stat-lbl">Toplam Dağıtılan Gider</div></div>`;

  const c=document.getElementById('mm-tablo');
  if(!satirlar.length){
    c.innerHTML='<div class="es"><div class="ei">🏢</div><div class="et">Bu dönemde masraf merkezi işaretlenmiş kayıt yok</div></div>';
    return;
  }

  c.innerHTML=`<div class="card" style="padding:0;overflow:hidden">
    <div style="display:grid;grid-template-columns:1fr 100px 40px;padding:8px 12px;background:var(--primary);color:white;font-size:11px;font-weight:700">
      <span>DEPARTMAN</span><span style="text-align:right">GİDER</span><span style="text-align:right">%</span>
    </div>
    ${satirlar.map(([kod,d])=>{
      const oran=genelToplam>0?(d.borc/genelToplam*100):0;
      return`<div style="padding:8px 12px;border-bottom:1px solid var(--gray-100)">
        <div style="display:grid;grid-template-columns:1fr 100px 40px;font-size:13px;align-items:center">
          <span style="font-weight:600">🏢 ${d.ad}</span>
          <span style="text-align:right;font-weight:700;color:var(--danger)">${fmt(d.borc)}</span>
          <span style="text-align:right;color:var(--gray-500);font-size:11px">%${oran.toFixed(0)}</span>
        </div>
        <div style="background:var(--gray-200);border-radius:4px;height:5px;margin-top:5px;overflow:hidden">
          <div style="background:var(--primary);height:100%;width:${oran}%"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
function gTab(tab,el){
  document.querySelectorAll('.sc').forEach(s=>s.style.display='none');
  document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  el.classList.add('active');
  if(tab==='yevmiye')renderYevmiye();
  if(tab==='kebir')renderKebir();
  if(tab==='mizan')renderMizan();
  if(tab==='masrafmerkezi'){
    if(!document.getElementById('mm-bas').value){
      const ayBasi=new Date();ayBasi.setDate(1);
      document.getElementById('mm-bas').value=ayBasi.toISOString().split('T')[0];
      document.getElementById('mm-bit').value=new Date().toISOString().split('T')[0];
    }
    renderMasrafMerkezi();
  }
}
function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}
// sLD/hLD/toast/escapeHtml/kModal/aModal -> ortak.js
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

(async function(){
  await loadDB();
  const today=new Date().toISOString().split('T')[0];
  const ayBasi=new Date();ayBasi.setDate(1);
  const ayBasiStr=ayBasi.toISOString().split('T')[0];
  document.getElementById('yev-bas').value=ayBasiStr;
  document.getElementById('yev-bit').value=today;
  document.getElementById('kebir-bas').value=ayBasiStr;
  document.getElementById('kebir-bit').value=today;
  document.getElementById('mizan-bas').value=ayBasiStr;
  document.getElementById('mizan-bit').value=today;
  renderYevmiye();
  YETKI_HARITASI = await kullaniciYetkileriGetir();
  document.getElementById('y-taslak-btn').disabled = !['kayit','tam'].includes(YETKI_HARITASI['yevmiye_fis_giris']);
  document.getElementById('y-onayla-btn').disabled = !['kayit','tam'].includes(YETKI_HARITASI['yevmiye_fis_onay']);
})();
</script>
