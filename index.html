<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok Turizm — Depo Yönetim Sistemi</title>
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root {
  --primary: #1a2744;
  --primary-light: #2d4080;
  --accent: #e8a020;
  --accent-light: #f5c060;
  --success: #27ae60;
  --warning: #f39c12;
  --danger: #e74c3c;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #6c757d;
  --gray-700: #495057;
  --white: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--primary); }

/* ===== LOGIN ===== */
#screen-login {
  min-height: 100vh;
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#screen-login.hidden { display: none; }

.login-box {
  background: white;
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo .logo-icon {
  width: 64px; height: 64px;
  background: var(--primary);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  font-size: 32px;
}
.login-logo h1 { font-size: 22px; font-weight: 800; color: var(--primary); }
.login-logo p { font-size: 13px; color: var(--gray-500); margin-top: 4px; }

.pin-label { text-align: center; font-size: 13px; color: var(--gray-600); margin-bottom: 6px; }
.pin-user-show { text-align: center; font-weight: 700; color: var(--primary); font-size: 15px; min-height: 22px; margin-bottom: 10px; }
.pin-display { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--gray-400); transition: all 0.15s; }
.pin-dot.filled { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }
.pin-error { text-align: center; font-size: 12px; color: var(--danger); min-height: 18px; margin-bottom: 8px; }
.pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 4px; }
.pin-btn {
  height: 56px; border: none; border-radius: 12px;
  font-size: 22px; font-weight: 600; cursor: pointer;
  background: var(--gray-100); color: var(--primary);
  transition: all 0.1s;
}
.pin-btn:active { background: var(--gray-300); transform: scale(0.95); }
.pin-btn.empty { background: transparent; cursor: default; }
.pin-btn.del { font-size: 18px; }

/* ===== PORTAL ===== */
#screen-portal { display: none; min-height: 100vh; flex-direction: column; }
#screen-portal.active { display: flex; }

.portal-header {
  background: var(--primary);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.portal-header-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.portal-header-sub { font-size: 11px; opacity: 0.65; display: block; margin-top: 1px; }
.portal-header-user {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}
.portal-header-user .user-name { font-size: 12px; opacity: 0.8; text-align: right; }
.portal-header-user .user-rol {
  font-size: 10px;
  background: rgba(255,255,255,0.15);
  padding: 2px 8px; border-radius: 10px;
}
.portal-header-user .logout-btn {
  background: rgba(255,255,255,0.15);
  border: none; color: white;
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.portal-header-user .logout-btn:active { background: rgba(255,255,255,0.3); }

.portal-content { flex: 1; padding: 20px; max-width: 900px; margin: 0 auto; width: 100%; }

/* Hoşgeldin */
.portal-welcome {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.portal-welcome h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.portal-welcome p { font-size: 12px; opacity: 0.75; }
.portal-welcome .date { font-size: 12px; opacity: 0.6; white-space: nowrap; }

/* Modül grid */
.modules-title {
  font-size: 11px; font-weight: 600; color: var(--gray-500);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

@media (min-width: 600px) {
  .modules-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 900px) {
  .modules-grid { grid-template-columns: repeat(4, 1fr); }
}

.module-card {
  background: white;
  border-radius: 16px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  border: 2px solid transparent;
}
.module-card:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.module-card.available:hover { border-color: var(--primary); }
.module-card.coming-soon { opacity: 0.5; cursor: default; }
.module-card.coming-soon:active { transform: none; }

.module-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.module-name { font-size: 13px; font-weight: 700; color: var(--primary); line-height: 1.3; }
.module-desc { font-size: 11px; color: var(--gray-500); line-height: 1.4; }
.module-badge {
  position: absolute; top: 10px; right: 10px;
  background: var(--danger); color: white;
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
}
.module-soon-tag {
  font-size: 10px; font-weight: 600;
  background: var(--gray-100); color: var(--gray-500);
  padding: 3px 8px; border-radius: 8px;
}

/* Renk temaları */
.icon-blue   { background: #dbeafe; }
.icon-green  { background: #d1fae5; }
.icon-orange { background: #fed7aa; }
.icon-purple { background: #ede9fe; }
.icon-red    { background: #fee2e2; }
.icon-teal   { background: #ccfbf1; }
.icon-yellow { background: #fef9c3; }
.icon-gray   { background: var(--gray-100); }

/* Alt bilgi */
.portal-footer {
  text-align: center;
  padding: 16px 20px;
  font-size: 11px;
  color: var(--gray-400);
  border-top: 1px solid var(--gray-200);
}

/* Loading */
#loading {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,39,68,0.85);
  z-index: 9999;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: white;
}
#loading.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--primary); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 9998; opacity: 0;
  transition: all 0.3s; pointer-events: none;
  white-space: nowrap; max-width: 90vw; text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🏨</div>
      <h1>Gürok</h1>
      <p>Depo Yönetim Sistemi</p>
    </div>
    <p class="pin-label">PIN kodunuzu girin</p>
    <div class="pin-user-show" id="pin-user-show"></div>
    <div class="pin-display">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
      <div class="pin-dot" id="pd4"></div>
      <div class="pin-dot" id="pd5"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>
      <button class="pin-btn" onclick="pinInput('8')">8</button>
      <button class="pin-btn" onclick="pinInput('9')">9</button>
      <button class="pin-btn empty"></button>
      <button class="pin-btn" onclick="pinInput('0')">0</button>
      <button class="pin-btn del" onclick="pinDelete()">⌫</button>
    </div>
  </div>
</div>

<!-- ===== PORTAL ===== -->
<div id="screen-portal">
  <div class="portal-header">
    <div>
      <div class="portal-header-logo">gürok</div>
      <span class="portal-header-sub">Depo Yönetim Sistemi</span>
    </div>
    <div class="portal-header-user">
      <div>
        <div class="user-name" id="header-user-name">—</div>
        <div class="user-rol" id="header-user-rol">—</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Çıkış">↩</button>
    </div>
  </div>

  <div class="portal-content">
    <!-- Hoşgeldin -->
    <div class="portal-welcome">
      <div>
        <h2 id="welcome-text">Hoş geldiniz</h2>
        <p id="welcome-sub">Gürok Turizm Grubu — Depo Operasyonları</p>
      </div>
      <div class="date" id="welcome-date"></div>
    </div>

    <!-- Modüller -->
    <div class="modules-title">Uygulamalar</div>
    <div class="modules-grid" id="modules-grid">
      <!-- JS ile doldurulur -->
    </div>
  </div>

  <div class="portal-footer">
    Gürok Turizm Grubu • Depo Yönetim Sistemi v1.0
  </div>
</div>

<div id="loading"><div class="spinner"></div><div>Yükleniyor...</div></div>
<div id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const FIREBASE_URL = 'https://gurok-mal-kabul-default-rtdb.europe-west1.firebasedatabase.app';
const SESSION_KEY  = 'gurok_portal_session';

// Modül tanımları
const MODULLER = [
  {
    id: 'malkabul',
    ad: 'Mal Kabul',
    desc: 'Teslimat girişi, onay, SKT takip',
    ikon: '📋',
    renk: 'icon-blue',
    url: 'gurok_mal_kabul.html',
    roller: ['yonetici','depo'],
    durum: 'aktif'
  },
  {
    id: 'stok',
    ad: 'Stok Takip',
    desc: 'Anlık stok, giriş/çıkış',
    ikon: '📦',
    renk: 'icon-green',
    url: 'stok-takip.html',
    roller: ['yonetici','depo'],
    durum: 'yapiyor'
  },
  {
    id: 'depo-siparis',
    ad: 'Depo Siparişleri',
    desc: 'Mutfak & departman talepleri',
    ikon: '📤',
    renk: 'icon-orange',
    url: 'depo-siparis.html',
    roller: ['yonetici','depo'],
    durum: 'yapiyor'
  },
  {
    id: 'satinalma',
    ad: 'Satın Alma',
    desc: 'Sipariş takip, LN Infor',
    ikon: '🛒',
    renk: 'icon-purple',
    url: 'gurok_mal_kabul.html#siparisler',
    roller: ['yonetici','satinalma'],
    durum: 'aktif'
  },
  {
    id: 'tuketim',
    ad: 'Günlük Tüketim',
    desc: 'Mutfak & bar tüketim raporu',
    ikon: '🍽️',
    renk: 'icon-teal',
    url: 'tuketim.html',
    roller: ['yonetici','depo','kalite'],
    durum: 'yapiyor'
  },
  {
    id: 'raporlar',
    ad: 'Raporlar',
    desc: 'Analiz, izleme, uygunsuzluk',
    ikon: '📊',
    renk: 'icon-yellow',
    url: 'gurok_mal_kabul.html#izleme',
    roller: ['yonetici','satinalma','kalite'],
    durum: 'aktif'
  },
  {
    id: 'yonetim',
    ad: 'Yönetim',
    desc: 'Kullanıcılar, ayarlar, yedek',
    ikon: '⚙️',
    renk: 'icon-gray',
    url: 'gurok_mal_kabul.html#ayarlar',
    roller: ['yonetici'],
    durum: 'aktif'
  },
  {
    id: 'bar',
    ad: 'F&B Bar',
    desc: 'Müşteri kart, sipariş takip',
    ikon: '🍹',
    renk: 'icon-red',
    url: 'bar.html',
    roller: ['yonetici'],
    durum: 'yapiyor'
  }
];

// ============================================================
// KULLANICILAR
// ============================================================
const DEFAULT_USERS = [
  { id:1, ad:'Mehmet Araz',    rol:'yonetici',  departman:'Yönetim',   pin:'123456' },
  { id:2, ad:'Depo Sorumlu',   rol:'depo',      departman:'Depo',      pin:'111111' },
  { id:3, ad:'Depo Personel',  rol:'depo',      departman:'Depo',      pin:'222222' },
  { id:4, ad:'Satinalma',      rol:'satinalma', departman:'Satınalma', pin:'333333' },
  { id:5, ad:'Kalite Kontrol', rol:'kalite',    departman:'Kalite',    pin:'444444' }
];

const ROL_IKON = { yonetici:'👔', depo:'📦', satinalma:'🛒', kalite:'🔍' };
const ROL_AD   = { yonetici:'Yönetici', depo:'Depo', satinalma:'Satınalma', kalite:'Kalite' };

let users = [...DEFAULT_USERS];
let currentUser = null;

async function loadUsers() {
  try {
    const r = await fetch(FIREBASE_URL + '/kullanicilar.json');
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data) && data.length) {
        users = data.map(u => ({
          ...u,
          rol: u.rol === 'personel' ? 'depo' : u.rol
        }));
      }
    }
  } catch(e) {}
}

// ============================================================
// PIN
// ============================================================
let pinValue = '';

function pinInput(d) {
  if (pinValue.length >= 6) return;
  pinValue += d;
  updateDots();
  // Tahmin
  const match = users.filter(u => u.pin.startsWith(pinValue));
  const el = document.getElementById('pin-user-show');
  const errEl = document.getElementById('pin-error');
  errEl.textContent = '';
  if (match.length === 1 && pinValue.length >= 3) {
    el.textContent = ROL_IKON[match[0].rol] + ' ' + match[0].ad;
  } else {
    el.textContent = '';
  }
  if (pinValue.length === 6) setTimeout(checkPin, 200);
}

function pinDelete() {
  pinValue = pinValue.slice(0,-1);
  updateDots();
  if (!pinValue) document.getElementById('pin-user-show').textContent = '';
}

function updateDots() {
  for (let i=0;i<6;i++) {
    document.getElementById('pd'+i).classList.toggle('filled', i < pinValue.length);
  }
}

function checkPin() {
  const user = users.find(u => u.pin === pinValue);
  if (!user) {
    const errEl = document.getElementById('pin-error');
    errEl.textContent = '❌ Hatalı PIN';
    setTimeout(() => errEl.textContent = '', 2000);
    pinValue = '';
    updateDots();
    document.getElementById('pin-user-show').textContent = '';
    return;
  }
  currentUser = user;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({
    user, expiry: Date.now() + 30*60*1000
  }));
  showPortal();
}

// ============================================================
// PORTAL
// ============================================================
function showPortal() {
  const u = currentUser;
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-portal').classList.add('active');

  // Header
  document.getElementById('header-user-name').textContent = u.ad;
  document.getElementById('header-user-rol').textContent = ROL_IKON[u.rol] + ' ' + ROL_AD[u.rol];

  // Hoşgeldin
  document.getElementById('welcome-text').textContent = 'Hoş geldin, ' + u.ad.split(' ')[0];
  document.getElementById('welcome-sub').textContent = ROL_AD[u.rol] + ' • ' + (u.departman||'');

  // Tarih
  const now = new Date();
  document.getElementById('welcome-date').textContent =
    now.toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Modülleri render et
  renderModuller(u.rol);
}

function renderModuller(rol) {
  const grid = document.getElementById('modules-grid');
  const gorunur = MODULLER.filter(m => m.roller.includes(rol));

  grid.innerHTML = gorunur.map(m => {
    const aktif = m.durum === 'aktif';
    return `
      <div class="module-card ${aktif ? 'available' : 'coming-soon'}"
        onclick="${aktif ? `gotoModule('${m.url}')` : 'void(0)'}">
        <div class="module-icon ${m.renk}">${m.ikon}</div>
        <div>
          <div class="module-name">${m.ad}</div>
          <div class="module-desc">${m.desc}</div>
        </div>
        ${!aktif ? '<span class="module-soon-tag">Yakında</span>' : ''}
      </div>
    `;
  }).join('');
}

function gotoModule(url) {
  // Session'ı portal'dan aktararak modüle geç
  window.location.href = url;
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  currentUser = null;
  pinValue = '';
  updateDots();
  document.getElementById('pin-user-show').textContent = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('screen-portal').classList.remove('active');
  document.getElementById('screen-login').classList.remove('hidden');
}

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ============================================================
// INIT
// ============================================================
(async function init() {
  document.getElementById('loading').classList.add('show');
  await loadUsers();
  document.getElementById('loading').classList.remove('show');

  // Session kontrolü
  const s = sessionStorage.getItem(SESSION_KEY);
  if (s) {
    try {
      const { user, expiry } = JSON.parse(s);
      if (Date.now() < expiry) {
        currentUser = user;
        showPortal();
        return;
      }
    } catch(e) {}
  }
})();
</script>
</body>
</html>
