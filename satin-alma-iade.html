<title>Gürok — İade</title>

<style>
:root{--accent:#c9a24b}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-warn{background:#fff3cd;color:#856404}.chip-ok{background:#d4edda;color:#155724}.chip-err{background:#fde8e8;color:#9b1c1c}.chip-info{background:#dfeae7;color:#2c5850}.chip-gray{background:var(--gray-200);color:var(--gray-700)}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.usatir{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.udd{display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='satin-alma.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div style="flex:1"><h1>İade</h1><span class="sub" id="hsub"></span></div>
  </div>

  <div class="sc" id="tab-iade">
    <div class="card">
      <div class="card-title">Yeni İade Siparişi</div>
      <div class="rfields" style="margin-bottom:8px">
        <div class="field"><label>Otel *</label>
          <select id="iade-otel">
            <option value="810">810 — Ali Bey Club Manavgat (C)</option>

    <div class="card">

        <button class="btn btn-sm" style="margin-left:auto;background:var(--accent);color:var(--primary);padding:4px 10px;min-height:28px" onclick="addIadeSatir()">+ Ekle</button>

      <button class="ftab" id="it-tab-bekleyen" onclick="filterIadeTakip('bekleyen',this)">Bekleyen</button>

</div>

<div class="mo" id="mIadeDetay">
  <div class="mbox" style="max-height:95vh">
    <div class="mtitle">İade Siparişi <button class="mclose" onclick="kModal('mIadeDetay')">✕</button></div>

    <div style="margin-top:14px;display:flex;gap:8px">

      <button class="btn btn-gray" onclick="iadeBelgeYazdir()">Belge Yazdır</button>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal/loadXlsxLib -> ortak.js
// FIRMA_DB/URUN_DB -> gurok_veritabani.js

let DB={firmalar:typeof FIRMA_DB!=='undefined'?FIRMA_DB:[],urunler:typeof URUN_DB!=='undefined'?URUN_DB:[]};
let YETKI_HARITASI = {};

function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function yeniSiparisNoUret(prefix){
  const p = prefix === 'R' ? 'R' : 'C';
  try{
    const r=await fetch(SB_URL+`/rest/v1/siparisler?siparis_no=like.${p}*&select=siparis_no&order=siparis_no.desc&limit=1`,{headers:SB_HEADERS});
    let maxNo=91110;
    if(r.ok){
      const d=await r.json();
      if(d&&d.length){
        const m=d[0].siparis_no.match(new RegExp('^'+p+'(\\d+)$'));
        if(m)maxNo=parseInt(m[1]);
      }
    }
    return p+String(maxNo+1).padStart(8,'0');
  }catch(e){
    return p+String(91111+Math.floor(Math.random()*1000)).padStart(8,'0');
  }
}

// ============================================================
// İADE — Depo'nun elindeki malzemeyi tedarikçiye iade siparişi olarak açar
// Aynı C/R havuzunu (yeniSiparisNoUret) kullanır, tip:'iade' ile yazar.
// ============================================================
let IADE_SATIRLAR=[];

function addIadeSatir(){
  IADE_SATIRLAR.push({ad:'',kod:'',miktar:'',birim:''});
  renderIadeSatirlar();
}

function renderIadeSatirlar(){
  const c=document.getElementById('iade-satirlar');
  if(!c)return;
  if(!IADE_SATIRLAR.length){c.innerHTML='<div style="text-align:center;color:var(--gray-400);padding:16px;font-size:13px">Kalem eklemek için + Ekle butonuna basın</div>';return;}
  c.innerHTML=IADE_SATIRLAR.map((u,i)=>`
    <div class="usatir">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="background:var(--danger);color:white;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</div>
        <div style="font-size:13px;font-weight:600;flex:1">${u.ad||'Kalem '+(i+1)}</div>
        <button onclick="IADE_SATIRLAR.splice(${i},1);renderIadeSatirlar()" style="background:none;border:none;color:var(--gray-400);font-size:16px;cursor:pointer">✕</button>
      </div>
      <div style="position:relative;margin-bottom:8px">
        <input type="text" id="ia${i}" value="${(u.ad||'').replace(/"/g,'&quot;')}" placeholder="Ürün adı veya LN kodu..."
          autocomplete="off" oninput="filterIadeUrun(${i},this.value)"
          style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none">
        <div id="iadd${i}" class="udd"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">MİKTAR</label>
          <input type="number" value="${u.miktar}" placeholder="0" oninput="IADE_SATIRLAR[${i}].miktar=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">BİRİM</label>
          <input type="text" id="ib${i}" value="${u.birim||''}" placeholder="—" oninput="IADE_SATIRLAR[${i}].birim=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none"></div>
      </div>
    </div>`).join('');
}

function filterIadeUrun(i,val){
  IADE_SATIRLAR[i].ad=val;
  const dd=document.getElementById('iadd'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const urunDB=DB.urunler||(window.URUN_DB||[]);
  const res=urunDB.filter(u=>u.ad?.toLowerCase().includes(val.toLowerCase())||u.kod?.toLowerCase().includes(val.toLowerCase())).slice(0,15);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(u=>`<div class="uddi" data-i="${i}" data-kod="${u.kod}" data-ad="${(u.ad||'').replace(/"/g,'&quot;')}" data-birim="${u.birim||''}">
    ${u.ad} <span style="font-size:10px;color:var(--gray-400)">${u.kod}</span>
  </div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=parseInt(this.dataset.i);
      IADE_SATIRLAR[idx]={...IADE_SATIRLAR[idx],ad:this.dataset.ad,kod:this.dataset.kod,birim:this.dataset.birim};
      dd.style.display='none';
      const inp=document.getElementById('ia'+idx);if(inp)inp.value=this.dataset.ad;
      const binp=document.getElementById('ib'+idx);if(binp)binp.value=this.dataset.birim||'';
    });
  });
  dd.style.display='block';
}

function filterIadeFirma(val){
  const dd=document.getElementById('iade-firma-dd');
  document.getElementById('iade-firma-id').value='';
  if(!val||val.length<2){dd.style.display='none';return;}
  const res=(DB.firmalar||[]).filter(f=>f.ad.toLowerCase().includes(val.toLowerCase())).slice(0,12);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(f=>`<div class="uddi" data-id="${f.id}" data-ad="${f.ad.replace(/"/g,'&quot;')}">${f.ad}</div>`).join('');
  dd.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      document.getElementById('iade-firma-id').value=this.dataset.id;
      const finp=document.getElementById('iade-firma-inp');
      finp.value=this.dataset.ad;finp.style.borderColor='var(--success)';finp.style.color='var(--success)';finp.style.fontWeight='600';
      dd.style.display='none';
    });
  });
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  IADE_SATIRLAR.forEach((_,i)=>{
    const dd=document.getElementById('iadd'+i);const inp=document.getElementById('ia'+i);
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';
  });
  const fdd=document.getElementById('iade-firma-dd');const finp=document.getElementById('iade-firma-inp');
  if(fdd&&finp&&!fdd.contains(e.target)&&e.target!==finp)fdd.style.display='none';
});

function iadeSifirla(){
  IADE_SATIRLAR=[];renderIadeSatirlar();
  document.getElementById('iade-firma-inp').value='';
  document.getElementById('iade-firma-id').value='';
  document.getElementById('iade-fatura-no').value='';
  document.getElementById('iade-not').value='';
}

async function iadeOlustur(){
  const otelId=document.getElementById('iade-otel').value;
  const donusSekli=document.getElementById('iade-donus-sekli').value;
  const firmaAd=document.getElementById('iade-firma-inp').value;
  const firmaId=document.getElementById('iade-firma-id').value;
  const faturaNo=document.getElementById('iade-fatura-no').value;
  const not=document.getElementById('iade-not').value;

  if(!firmaAd){toast('⚠️ Firma seçin');return;}
  const dolu=IADE_SATIRLAR.filter(u=>u.ad&&u.miktar);
  if(!dolu.length){toast('⚠️ En az bir kalem ekleyin');return;}

  sLD();
  const prefix=otelId==='811'?'R':'C';
  const siparisNo=await yeniSiparisNoUret(prefix);

  const kalemler=dolu.map(k=>({ad:k.ad,kod:k.kod||'',miktar:parseFloat(k.miktar)||0,birim:k.birim,
    gelenMiktar:0,kalanMiktar:parseFloat(k.miktar)||0}));

  try{
    await fetch(SB_URL+'/rest/v1/siparisler',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
      siparis_no:siparisNo,firma_ad:firmaAd,otel_id:otelId,tarih:new Date().toISOString().split('T')[0],
      durum:'bekleyen',tip:'iade',iade_nedeni:donusSekli,orijinal_fatura_no:faturaNo||null,
      not_alani:not||null,kaynak:'satinalma',olusturan_ad:CU.ad
    })});
    const kalemSatirlar=kalemler.map(k=>({
      siparis_no:siparisNo,urun_kodu:k.kod||null,urun_adi:k.ad,birim:k.birim,
      miktar:k.miktar,gelen_miktar:0,kalan_miktar:k.miktar
    }));
    await fetch(SB_URL+'/rest/v1/siparis_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
  }catch(e){console.warn(e);}
  hLD();

  iadeSifirla();
  toast(`✅ İade siparişi oluşturuldu — ${siparisNo}`);
  loadIadeTakip();
}

// ============================================================
// İADE TAKİP
// ============================================================
let _itFilter='tumu';
let _iadeHavuzuData={};

function siparisSbdenCamele(r){
  return{
    siparisNo:r.siparis_no,firma:r.firma_ad,firmaId:'',otelId:r.otel_id,
    tarih:r.tarih,termin:r.termin_tarihi||'',durum:r.durum,tip:r.tip,
    iadeNedeni:r.iade_nedeni||'',donusSekli:r.iade_nedeni||'',orijinalFaturaNo:r.orijinal_fatura_no||'',
    not:r.not_alani||'',kaynak:r.kaynak||'satinalma',olusturanAd:r.olusturan_ad||'',
    olusturmaTarih:r.olusturma_tarihi?new Date(r.olusturma_tarihi).getTime():Date.now(),
    fiyatlandirildi:!!r.fiyatlandirildi,fiyatlandiranAd:r.fiyatlandiran_ad||'',
    fiyatlandirmaTarihi:r.fiyatlandirma_tarihi?new Date(r.fiyatlandirma_tarihi).getTime():null,
    gonderildiMuhasebe:!!r.gonderildi_muhasebe,gonderilmeTarihi:r.gonderilme_tarihi?new Date(r.gonderilme_tarihi).getTime():null,
    muhasebeFaturaId:r.muhasebe_fatura_id||'',bagliFaturalar:r.bagli_faturalar||[],
    kalemler:(r.siparis_kalemleri||[]).map(k=>({
      ad:k.urun_adi,kod:k.urun_kodu||'',miktar:parseFloat(k.miktar)||0,birim:k.birim,
      gelenMiktar:parseFloat(k.gelen_miktar)||0,kalanMiktar:parseFloat(k.kalan_miktar)||0,
      birimFiyat:k.birim_fiyat?parseFloat(k.birim_fiyat):null
    }))
  };
}

async function loadIadeTakip(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/siparisler?tip=eq.iade&select=*,siparis_kalemleri(*)',{headers:SB_HEADERS});
    if(r.ok){
      const rows=await r.json();
      _iadeHavuzuData={};
      rows.forEach(row=>{_iadeHavuzuData[row.siparis_no]=siparisSbdenCamele(row);});
    }
  }catch(e){}
  renderIadeTakip();
}

function filterIadeTakip(f,el){
  _itFilter=f;
  document.querySelectorAll('#tab-iade .ftabs .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderIadeTakip();
}

function renderIadeTakip(){
  const c=document.getElementById('iade-takip-liste');
  if(!c)return;
  let liste=Object.values(_iadeHavuzuData).filter(s=>s&&!s.rezerve&&s.tip==='iade');
  if(_itFilter!=='tumu')liste=liste.filter(s=>s.durum===_itFilter);
  liste.sort((a,b)=>(b.olusturmaTarih||0)-(a.olusturmaTarih||0));

  if(!liste.length){

    bekleyen:'<span style="background:#fff3cd;color:#856404;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">⏳ Bekliyor</span>',
    kismi:'<span style="background:#f2e8db;color:#8a5c2c;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">🔶 Kısmen</span>',
    tamamlandi:'<span style="background:#d4edda;color:#155724;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">✅ Tamamlandı</span>'

  const kaynakChip={
    depo:'<span style="background:#e4e9f2;color:#33476b;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600">📦 Depo</span>',
    satinalma:'<span style="background:#e8e5f0;color:#4a3f68;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600">🛒 Satın Alma</span>'
  };
  const nedenMap={depozito:'Depozito İadesi',bozuk:'Bozuk/Hasarlı',skt:'SKT',fazla:'Fazla Sipariş',diger:'Diğer'};

  c.innerHTML=liste.map(s=>`
    <div class="card" style="margin-bottom:8px;border-left:4px solid var(--danger);cursor:pointer" onclick="iadeDetayAc('${s.siparisNo}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--primary)">${s.firma||'—'}</div>
          <div style="font-size:11px;color:var(--gray-500);margin-top:2px">
            <span style="font-family:monospace;font-weight:700;color:#4a3f68">${s.siparisNo}</span>
            ${s.tarih?' • '+s.tarih:''} ${s.olusturanAd?' • '+s.olusturanAd:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          ${durumChip[s.durum]||''}
          ${kaynakChip[s.kaynak]||''}
        </div>
      </div>
      <div style="font-size:11px;color:var(--gray-600);margin-bottom:4px">↩️ ${nedenMap[s.donusSekli]||s.donusSekli||'—'}${(s.bagliFaturalar&&s.bagliFaturalar.length)?' • '+s.bagliFaturalar.length+' fatura bağlı':(s.orijinalFaturaNo?' • Orj. No: '+s.orijinalFaturaNo:'')}</div>
      ${(s.kalemler||[]).map(k=>`<div style="font-size:11px;color:var(--gray-600)">• ${k.ad} — ${k.miktar} ${k.birim}${k.birimFiyat?' • '+fmt(k.birimFiyat)+' ₺':''}</div>`).join('')}
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${s.fiyatlandirildi?'<span style="background:#dceee1;color:#2c5850;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600">💰 Fiyatlandırıldı</span>':'<span style="background:#fff3cd;color:#856404;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600">💰 Fiyat Bekliyor</span>'}
        ${s.gonderildiMuhasebe?'<span style="background:#e8e5f0;color:#4a3f68;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600">📤 Muhasebe\'de</span>':''}
        <button class="btn btn-sm btn-primary" style="margin-left:auto;padding:5px 12px;min-height:26px" onclick="event.stopPropagation();iadeDetayAc('${s.siparisNo}')">Detay / Fiyatlandır →</button>
      </div>

}

// ============================================================
// İADE DETAY — Bağlı fatura yönetimi + Satın Alma fiyat belirleme + Muhasebe'ye gönderme
// ============================================================
let _iadeAktifNo=null;
let _iadeBagliFaturalar=[];

function iadeDetayAc(siparisNo){
 try{
  const s=_iadeHavuzuData[siparisNo];
  if(!s){toast('⚠️ Sipariş bulunamadı: '+siparisNo);return;}
  _iadeAktifNo=siparisNo;
  _iadeBagliFaturalar=(s.bagliFaturalar&&s.bagliFaturalar.length)?[...s.bagliFaturalar]:(s.orijinalFaturaNo?[{no:s.orijinalFaturaNo,tarih:''}]:[]);
  const nedenMap={depozito:'Depozito İadesi',bozuk:'Bozuk/Hasarlı Ürün',skt:'SKT Yaklaşan/Geçen',fazla:'Fazla Sipariş',diger:'Diğer'};
  const otelAd=s.otelId==='811'?'Ali Bey Resort Sorgun':'Ali Bey Club Manavgat';

  document.getElementById('iade-modal-content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;font-size:12px">
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">İADE SİPARİŞ NO</div>
        <div style="font-family:monospace;font-weight:800;color:var(--primary)">${s.siparisNo}</div>
      </div>
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">FİRMA</div>
        <div style="font-weight:700">${s.firma}</div>
      </div>
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">OTEL</div>
        <div style="font-weight:700">${otelAd}</div>
      </div>
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">İADE NEDENİ</div>
        <div style="font-weight:700">${nedenMap[s.donusSekli]||s.donusSekli||'—'}</div>
      </div>
    </div>

    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px">📎 Bağlı Fatura Numaraları
      <span style="font-size:11px;color:var(--gray-500);font-weight:400">(depoya bu ürünlerin geldiği orijinal alış faturaları)</span>
    </div>
    <div id="iade-bagli-faturalar"></div>
    <button class="btn btn-sm btn-gray" style="margin-bottom:14px" onclick="iadeBagliFaturaEkle()">+ Fatura Ekle</button>

    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px">📦 Kalemler — Birim Fiyat Girişi</div>
    <div id="iade-fk-urun-listesi">
      ${(s.kalemler||[]).map((k,i)=>{
        const fiyat=k.birimFiyat||0;
        const toplam=fiyat*(parseFloat(k.miktar)||0);
        return`<div style="padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;margin-bottom:8px;${fiyat>0?'border-color:var(--success);background:#f0fdf4':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-size:13px;font-weight:700">${k.ad}</div>
              <div style="font-size:11px;color:var(--gray-400)">${k.miktar} ${k.birim}</div>
            </div>
            ${fiyat>0?`<div style="text-align:right"><div style="font-size:13px;font-weight:800;color:var(--success)">${fmt(toplam)} ₺</div></div>`:''}
          </div>
          <label style="font-size:10px;font-weight:600;color:var(--gray-500)">BİRİM FİYAT (₺, KDV hariç)</label>
          <input type="number" id="iade-fk-fiyat-${i}" value="${fiyat||''}" placeholder="0.00" min="0" step="0.01"
            oninput="iadeFiyatHesapla(${i})"
            style="width:100%;margin-top:4px;padding:10px;border:1.5px solid ${fiyat>0?'var(--success)':'var(--gray-300)'};border-radius:6px;font-size:14px;font-weight:600;outline:none">
          <div id="iade-fk-satir-toplam-${i}" style="margin-top:6px;font-size:11px;color:var(--gray-500)">
            ${fiyat>0?`${fmt(fiyat)} ₺ × ${k.miktar} ${k.birim} = <b>${fmt(toplam)} ₺</b> (KDV hariç)`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div style="background:var(--primary);color:white;border-radius:8px;padding:12px;margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700">TOPLAM (KDV HARİÇ)</div>
          <div style="font-size:11px;opacity:.7;margin-top:2px">KDV Muhasebe tarafından işlenecek</div>
        </div>
        <div id="iade-fk-genel-toplam" style="font-size:18px;font-weight:800">— ₺</div>
      </div>
    </div>
  `;
  renderIadeBagliFaturalar();
  iadeGenelToplamHesapla();

  const gonderildi=!!s.gonderildiMuhasebe;
  const btn=document.getElementById('iade-muhasebe-btn');
  btn.disabled=!['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur']);
  btn.textContent=gonderildi?'🔁 Tekrar Gönder (zaten gönderilmişti)':'📤 Muhasebe\'ye Gönder';

  aModal('mIadeDetay');
 }catch(e){
   console.error('iadeDetayAc hata:',e);
   toast('❌ Detay açılamadı: '+e.message);
 }
}

function renderIadeBagliFaturalar(){
  const c=document.getElementById('iade-bagli-faturalar');
  if(!c)return;
  if(!_iadeBagliFaturalar.length){c.innerHTML=`<div style="font-size:11px;color:var(--gray-400);margin-bottom:8px">Henüz fatura bağlanmadı</div>`;return;}
  c.innerHTML=_iadeBagliFaturalar.map((b,i)=>`
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      <input type="text" value="${(b.no||'').replace(/"/g,'&quot;')}" placeholder="Fatura No" oninput="_iadeBagliFaturalar[${i}].no=this.value"
        style="flex:1.4;padding:8px 10px;border:1.5px solid var(--gray-300);border-radius:6px;font-size:12px;outline:none">
      <input type="date" value="${b.tarih||''}" oninput="_iadeBagliFaturalar[${i}].tarih=this.value"
        style="flex:1;padding:8px 10px;border:1.5px solid var(--gray-300);border-radius:6px;font-size:12px;outline:none">
      <button onclick="_iadeBagliFaturalar.splice(${i},1);renderIadeBagliFaturalar()" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer">✕</button>
    </div>`).join('');
}
function iadeBagliFaturaEkle(){_iadeBagliFaturalar.push({no:'',tarih:''});renderIadeBagliFaturalar();}

function iadeFiyatHesapla(i){
  const s=_iadeHavuzuData[_iadeAktifNo];if(!s)return;
  const k=(s.kalemler||[])[i];if(!k)return;
  const fiyat=parseFloat(document.getElementById('iade-fk-fiyat-'+i)?.value)||0;
  const miktar=parseFloat(k.miktar)||0;
  const toplam=fiyat*miktar;
  const el=document.getElementById('iade-fk-satir-toplam-'+i);
  if(el)el.innerHTML=fiyat>0?`${fmt(fiyat)} ₺ × ${miktar} ${k.birim} = <b>${fmt(toplam)} ₺</b> (KDV hariç)`:'';
  const inp=document.getElementById('iade-fk-fiyat-'+i);
  if(inp)inp.style.borderColor=fiyat>0?'var(--success)':'var(--gray-300)';
  iadeGenelToplamHesapla();
}

function iadeGenelToplamHesapla(){
  const s=_iadeHavuzuData[_iadeAktifNo];if(!s)return;
  const kalemler=s.kalemler||[];
  let genel=0;
  kalemler.forEach((k,i)=>{
    const fiyat=parseFloat(document.getElementById('iade-fk-fiyat-'+i)?.value)||0;
    genel+=fiyat*(parseFloat(k.miktar)||0);
  });
  const el=document.getElementById('iade-fk-genel-toplam');
  if(el)el.textContent=genel>0?fmt(genel)+' ₺':'— ₺';
}

async function iadeMuhasebeGonder(){
  const s=_iadeHavuzuData[_iadeAktifNo];if(!s)return;
  if(s.gonderildiMuhasebe&&!confirm('Bu iade daha önce Muhasebe\'ye gönderilmişti. Tekrar gönderirsen Faturalar listesinde YENİ bir taslak kayıt daha oluşur (eski kayıt silinmez). Devam edilsin mi?'))return;
  const kalemler=s.kalemler||[];
  const fiyatlar=kalemler.map((_,i)=>parseFloat(document.getElementById('iade-fk-fiyat-'+i)?.value)||0);
  if(!fiyatlar.every(p=>p>0)){
    if(!confirm('Bazı kalemlerin birim fiyatı girilmemiş. Yine de Muhasebe\'ye göndermek istiyor musunuz?'))return;
  }
  sLD();
  const kalemlerFiyatli=kalemler.map((k,i)=>({...k,birimFiyat:fiyatlar[i],toplam:fiyatlar[i]*(parseFloat(k.miktar)||0)}));
  const bagliFaturalar=_iadeBagliFaturalar.filter(b=>b.no);
  let araToplam=0;kalemlerFiyatli.forEach(k=>araToplam+=k.toplam);

  s.kalemler=kalemlerFiyatli;
  s.bagliFaturalar=bagliFaturalar;
  s.fiyatlandirildi=true;
  s.fiyatlandiranAd=CU.ad;
  s.fiyatlandirmaTarihi=Date.now();
  s.gonderildiMuhasebe=true;
  s.gonderilmeTarihi=Date.now();

  const faturaSatir={
    no:null,tur:'alis',iade:true,cari_ad:s.firma,
    tarih:new Date().toISOString().split('T')[0],
    siparis_no:s.siparisNo,otel_id:s.otelId||'810',
    ara_toplam:Math.round(araToplam*100)/100,kdv_toplam:0,
    genel_toplam:Math.round(araToplam*100)/100,
    durum:'bekliyor',not_alani:(s.not||'')+' — İade nedeni: '+(s.donusSekli||'')
  };

  try{
    const r=await fetch(SB_URL+'/rest/v1/faturalar',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(faturaSatir)});
    if(!r.ok){
      const hataMetni=await r.text();
      console.error('İade fatura oluşturma hatası:',hataMetni);
      hLD();
      alert('❌ İade faturası oluşturulamadı:\n\n'+hataMetni);
      return;
    }
    const d=await r.json();
    const faturaId=d[0].id;
    const kalemSatirlar=kalemlerFiyatli.map(k=>({
      fatura_id:faturaId,urun_kodu:k.kod||null,urun_adi:k.ad,miktar:parseFloat(k.miktar)||0,
      birim:k.birim,birim_fiyat:k.birimFiyat,iskonto_yuzde:0,kdv_orani:20,toplam:round2(k.toplam)
    }));
    await fetch(SB_URL+'/rest/v1/fatura_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
    s.muhasebeFaturaId=faturaId;

    await fetch(SB_URL+'/rest/v1/siparisler?siparis_no=eq.'+s.siparisNo,{
      method:'PATCH',headers:SB_HEADERS,
      body:JSON.stringify({
        bagli_faturalar:bagliFaturalar,fiyatlandirildi:true,fiyatlandiran_ad:CU.ad,
        fiyatlandirma_tarihi:new Date().toISOString(),gonderildi_muhasebe:true,
        gonderilme_tarihi:new Date().toISOString(),muhasebe_fatura_id:faturaId
      })
    });
    for(const k of kalemlerFiyatli){
      if(k.kod){
        await fetch(SB_URL+`/rest/v1/siparis_kalemleri?siparis_no=eq.${s.siparisNo}&urun_kodu=eq.${encodeURIComponent(k.kod)}`,{
          method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({birim_fiyat:k.birimFiyat})
        });
      }
    }
    _iadeHavuzuData[s.siparisNo]=s;
    hLD();
    kModal('mIadeDetay');
    toast(`📤 Muhasebe'ye gönderildi — Faturalar listesinde ↩️ İade olarak görünecek`);
    renderIadeTakip();
  }catch(e){
    hLD();
    toast('⚠️ Hata: '+e.message);
  }
}

function iadeBelgeYazdir(){
  const s=_iadeHavuzuData[_iadeAktifNo];if(!s)return;
  // Ekrandaki güncel fiyat/fatura girişlerini geçici olarak yansıt (henüz kaydedilmemiş olsa da belgeye yazsın)
  const kalemler=(s.kalemler||[]).map((k,i)=>{

  </style></head><body>
  <h1>İADE FATURASI KESİLECEK BİLGİLER</h1>
  <div class="tarih">${bugun}</div>
  <table>
    <tr><th>FİRMA İSMİ</th><th>İADE SİPARİŞ NUMARASI</th><th>İADE SİPARİŞ TARİHİ</th><th>FATURA NUMARASI</th><th>FATURA TARİHİ</th></tr>
    <tr>
      <td rowspan="${Math.max(1,s.bagliFaturalar?.length||1)}">${s.firma||'—'}</td>
      <td rowspan="${Math.max(1,s.bagliFaturalar?.length||1)}" class="center">${s.siparisNo}</td>
      <td rowspan="${Math.max(1,s.bagliFaturalar?.length||1)}" class="center">${s.tarih||'—'}</td>
      <td>${s.bagliFaturalar?.[0]?.no||'—'}</td>
      <td>${s.bagliFaturalar?.[0]?.tarih||'—'}</td>
    </tr>
    ${(s.bagliFaturalar||[]).slice(1).map(b=>`<tr><td>${b.no||'—'}</td><td>${b.tarih||'—'}</td></tr>`).join('')}
  </table>
  <table><tr><td class="neden">İADE NEDENİ : ${nedenMap[s.donusSekli]||(s.donusSekli||'—').toUpperCase()}</td></tr></table>
  <table>
    <tr><th>SIRA NO</th><th>İADE EDİLEN MALZEME ADI</th><th>MİKTAR (KG/AD)</th><th>BİRİM FİYAT</th><th>TOPLAM</th></tr>
    ${kalemler.map((k,i)=>`<tr>
      <td class="center">${i+1}</td>

      <td class="center">${k.miktar}</td>
      <td class="right">${fmt(k.birimFiyat)} TL</td>
      <td class="right">${fmt(k.toplam)} TL</td>
    </tr>`).join('')}
    <tr class="toplam-row"><td colspan="4" class="right">TOPLAM</td><td class="right">${fmt(genelToplam)} TL</td></tr>
  </table>
  <table>
    <tr class="footer-row"><td colspan="4">${otelAd}</td><td class="center">KDV EKLENECEKTİR</td></tr>
  </table>
  </body></html>`);
  w.document.close();
  w.print();
}
