<style>
/* --radius/--shadow bilerek tema.css'ten farklı (8px/8px, ortak 12px/12px değil) — sayfaya özel override */
:root{--radius:8px;--shadow:0 2px 8px rgba(0,0,0,0.1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;font-size:13px}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:var(--primary);color:white;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:52px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.hbtn:hover{background:rgba(255,255,255,.25)}

/* TOOLBAR — LN Infor stili */
.toolbar{background:white;border-bottom:1px solid var(--gray-300);padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.toolbar-btn{background:var(--gray-100);border:1px solid var(--gray-300);color:var(--gray-700);padding:5px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.toolbar-btn:hover{background:var(--gray-200);border-color:var(--primary);color:var(--primary)}
.toolbar-btn.primary{background:var(--primary);color:white;border-color:var(--primary)}
.toolbar-btn.primary:hover{background:var(--primary-light)}
.toolbar-sep{width:1px;height:24px;background:var(--gray-300);margin:0 4px}

/* FİLTRE SATIRI */
.filtre-bar{background:#f8f9fa;border-bottom:2px solid var(--primary);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.filtre-grup{display:flex;align-items:center;gap:6px}
.filtre-lbl{font-size:11px;font-weight:600;color:var(--gray-600);white-space:nowrap}
.filtre-inp{padding:4px 8px;border:1px solid var(--gray-300);border-radius:4px;font-size:12px;outline:none;background:white}
.filtre-inp:focus{border-color:var(--primary)}
.filtre-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent}
.filtre-chip.aktif{border-color:var(--primary);background:var(--primary);color:white}
.filtre-chip.bilanco{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.filtre-chip.gelir{background:#d4edda;color:#155724;border-color:#86efac}
.filtre-chip.maliyet{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.filtre-chip.nazim{background:#fff3cd;color:#856404;border-color:#fcd34d}
.filtre-chip:hover{opacity:.8}

/* TABLO */
.tablo-wrapper{flex:1;overflow:auto}
.tablo-wrapper::-webkit-scrollbar{width:8px;height:8px}
.tablo-wrapper::-webkit-scrollbar-track{background:#f1f3f5}
.tablo-wrapper::-webkit-scrollbar-thumb{background:#ced4da;border-radius:4px}
table{width:100%;border-collapse:collapse;min-width:900px}
thead{position:sticky;top:0;z-index:10}
thead tr th{background:#2d3748;color:white;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;border-right:1px solid #4a5568;cursor:pointer;user-select:none}
thead tr th:hover{background:#3d4a60}
thead tr th.sort-asc::after{content:' ▲';font-size:9px}
thead tr th.sort-desc::after{content:' ▼';font-size:9px}

/* Filtre input satırı */
.filtre-satir th{background:#f1f3f5;padding:4px 6px;position:sticky;top:33px;z-index:9}
.filtre-satir th input{width:100%;padding:4px 6px;border:1px solid var(--gray-300);border-radius:3px;font-size:11px;outline:none}
.filtre-satir th input:focus{border-color:var(--primary);background:#fff}

/* Satırlar */
tbody tr{border-bottom:1px solid var(--gray-200);cursor:pointer}
tbody tr:hover{background:#e8f0fe!important}
tbody tr.secili{background:#dbeafe!important;outline:2px solid var(--info)}

/* Seviye renkleri */
.lv1 td{background:#1a2744;color:white;font-weight:800;font-size:13px}
.lv1 td:first-child{font-family:monospace;font-size:14px}
.lv2 td{background:#2d4080;color:white;font-weight:700}
.lv2 td:first-child{font-family:monospace}
.lv3 td{background:#eef2ff;font-weight:600}
.lv3 td:first-child{font-family:monospace;color:var(--primary)}
.lv4 td{background:white;font-weight:500}
.lv4 td:first-child{font-family:monospace;color:var(--gray-600)}

td{padding:7px 10px;border-right:1px solid var(--gray-200);font-size:12px}
td:first-child{min-width:90px}

/* Chip */
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.chip-bilanco{background:#dbeafe;color:#1e40af}
.chip-gelir{background:#d4edda;color:#155724}
.chip-maliyet{background:#ede9fe;color:#5b21b6}
.chip-nazim{background:#fff3cd;color:#856404}

/* Durum */
.durum-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.durum-aktif{background:var(--success)}
.durum-pasif{background:var(--gray-400)}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.mo.open{display:flex}
.mbox{background:white;border-radius:var(--radius);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.mbaslik{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px;border-bottom:2px solid var(--gray-200);padding-bottom:10px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--gray-600);margin-bottom:4px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1.5px solid var(--gray-300);border-radius:var(--radius);font-size:13px;outline:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rfields .field{margin-bottom:0}
.btn{padding:8px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--gray-200)}

/* Status bar */
.status-bar{background:#2d3748;color:#a0aec0;padding:3px 12px;font-size:11px;display:flex;gap:16px;flex-shrink:0}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:8px 18px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.8);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <button class="hbtn" onclick="location.href='muhasebe.html'">← Muhasebe</button>
    <h1>📊 Hesap Planı — Tekdüzen Hesap Planı (THP)</h1>
    <button class="hbtn primary" onclick="openYeniHesap()">➕ Yeni Hesap</button>
    <button class="hbtn" onclick="thpYukle()">📥 THP Yükle</button>
    <button class="hbtn" onclick="gurokYukle()" style="background:#fce7f3">🏨 Gürok Özel</button>
    <button class="hbtn" onclick="exportExcel()">📤 Excel</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="toolbar-btn primary" onclick="openYeniHesap()">➕ Yeni Hesap</button>
    <button class="toolbar-btn" onclick="openDuzenle()">✏️ Düzenle</button>
    <button class="toolbar-btn" onclick="hesapSil()">🗑️ Sil</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="altHesapAc()">📂 Alt Hesap Aç</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" onclick="tumunuAc()">⊞ Tümünü Aç</button>
    <button class="toolbar-btn" onclick="tumunuKapat()">⊟ Tümünü Kapat</button>
    <div class="toolbar-sep"></div>
    <div class="filtre-grup">
      <span class="filtre-lbl">Hızlı Ara:</span>
      <input class="filtre-inp" id="hizli-ara" placeholder="Kod veya ad..." oninput="renderTablo()" style="width:180px">
    </div>
    <div class="filtre-grup" style="margin-left:auto">
      <span class="filtre-lbl">Tip:</span>
      <span class="filtre-chip aktif" id="fc-tumu" onclick="filterTip('',this)">Tümü</span>
      <span class="filtre-chip bilanco" id="fc-bilanco" onclick="filterTip('Bilanço',this)">Bilanço</span>
      <span class="filtre-chip gelir" id="fc-gelir" onclick="filterTip('Gelir Tablosu',this)">Gelir T.</span>
      <span class="filtre-chip maliyet" id="fc-maliyet" onclick="filterTip('Maliyet',this)">Maliyet</span>
      <span class="filtre-chip nazim" id="fc-nazim" onclick="filterTip('Nazım',this)">Nazım</span>
      <span class="filtre-chip" id="fc-gurok" style="background:#fce7f3;color:#9d174d;border-color:#f9a8d4" onclick="filterGrup('Gürok Özel',this)">🏨 Gürok Özel</span>
      <span class="filtre-chip" id="fc-as60" style="background:#e0f2fe;color:#075985;border-color:#7dd3fc" onclick="filterAltSeviye('60',this)">60</span>
      <span class="filtre-chip" id="fc-as70" style="background:#fff7ed;color:#9a3412;border-color:#fdba74" onclick="filterAltSeviye('70',this)">70</span>
    </div>
  </div>

  <!-- TABLO -->
  <div class="tablo-wrapper">
    <table id="hesap-tablo">
      <thead>
        <tr>
          <th onclick="sortBy('kod')">Hesap Kodu</th>
          <th onclick="sortBy('ad')">Hesap Adı</th>
          <th onclick="sortBy('tip')">Hesap Tipi</th>
          <th onclick="sortBy('anaGrup')">Ana Grup</th>
          <th onclick="sortBy('yon')">Çalışma Yönü</th>
          <th onclick="sortBy('altSeviye')">Alt Seviye</th>
          <th>Özellik</th>
          <th>Durum</th>
          <th>Açıklama</th>
        </tr>
        <tr class="filtre-satir">
          <th><input type="text" id="f-kod" placeholder="→ a" oninput="renderTablo()"></th>
          <th><input type="text" id="f-ad" placeholder="→ a" oninput="renderTablo()"></th>
          <th><input type="text" id="f-tip" placeholder="= " oninput="renderTablo()"></th>
          <th><input type="text" id="f-grup" placeholder="→ a" oninput="renderTablo()"></th>
          <th><input type="text" id="f-yon" placeholder="→ a" oninput="renderTablo()"></th>
          <th><input type="text" id="f-altseviye" placeholder="= " oninput="renderTablo()"></th>
          <th><input type="text" id="f-ozellik" placeholder="→ a" oninput="renderTablo()"></th>
          <th></th>
          <th><input type="text" id="f-aciklama" placeholder="→ a" oninput="renderTablo()"></th>
        </tr>
      </thead>
      <tbody id="tablo-body"></tbody>
    </table>
  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span id="sb-toplam">Toplam: 0 hesap</span>
    <span id="sb-filtreli"></span>
    <span id="sb-secili"></span>
    <span style="margin-left:auto">⚠️ Resmi kayıt için Mali Müşavir onayı gereklidir</span>
  </div>
</div>

<!-- MODAL: Yeni / Düzenle Hesap -->
<div class="mo" id="mHesap">
  <div class="mbox">
    <div class="mbaslik" id="mHesapBaslik">➕ Yeni Hesap <button class="mclose" onclick="kModal('mHesap')">✕</button></div>
    <input type="hidden" id="h-edit-id">
    <div class="rfields" style="margin-bottom:0">
      <div class="field"><label>Hesap Kodu *</label><input type="text" id="h-kod" placeholder="Örn: 100.01" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="field"><label>Üst Hesap (Otomatik)</label><input type="text" id="h-ust" readonly style="background:#f8f9fa"></div>
    </div>
    <div class="field"><label>Hesap Adı *</label><input type="text" id="h-ad" placeholder="Hesap adı" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="rfields">
      <div class="field"><label>Hesap Tipi *</label>
        <select id="h-tip">
          <option value="Bilanço">Bilanço</option>
          <option value="Gelir Tablosu">Gelir Tablosu</option>
          <option value="Maliyet">Maliyet</option>
          <option value="Nazım">Nazım</option>
        </select>
      </div>
      <div class="field"><label>Ana Grup</label><input type="text" id="h-grup" placeholder="Örn: Aktif, Pasif, Gelir"></div>
    </div>
    <div class="rfields">
      <div class="field"><label>Alt Seviye</label><input type="text" id="h-altseviye" placeholder="60 veya 70" maxlength="3"></div>
      <div class="field"><label>Çalışma Yönü</label>
        <select id="h-yon">
          <option value="Borç">Borç</option>
          <option value="Alacak">Alacak</option>
          <option value="İkisi de">İkisi de</option>
        </select>
      </div>
    </div>
    <div class="rfields">
      <div class="field"><label>Özellik</label>
        <select id="h-ozellik">
          <option value="">—</option>
          <option value="Kasa">💰 Kasa</option>
          <option value="Banka">🏦 Banka</option>
          <option value="Cari">👥 Cari Hesap</option>
          <option value="Stok">📦 Stok</option>
          <option value="KDV">🧾 KDV</option>
          <option value="SGK">🏥 SGK</option>
          <option value="Vergi">📋 Vergi</option>
          <option value="Demirbaş">🔧 Demirbaş</option>
        </select>
      </div>
    </div>
    <div class="rfields">
      <div class="field"><label>Döviz Birimi</label>
        <select id="h-doviz"><option value="TRY">TRY</option><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option></select>
      </div>
      <div class="field"><label>Durum</label>
        <select id="h-durum"><option value="aktif">✅ Aktif</option><option value="pasif">⛔ Pasif</option></select>
      </div>
    </div>
    <div class="field"><label>Açıklama</label><input type="text" id="h-aciklama" placeholder="Opsiyonel açıklama"></div>
    <div class="brow">
      <button class="btn btn-gray" onclick="kModal('mHesap')">İptal</button>
      <button class="btn btn-danger" id="h-sil-btn" onclick="hesapSilModal()" style="display:none">🗑️ Sil</button>
      <button class="btn btn-primary" onclick="hesapKaydet()">💾 Kaydet</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

function sbdenCamele(r){
  // Supabase satırı (snake_case) -> uygulamanın kullandığı camelCase nesne
  return{
    kod:r.kod,ad:r.ad,tip:r.tip,anaGrup:r.ana_grup,yon:r.yon,
    altSeviye:r.alt_seviye,ozellik:r.ozellik,doviz:r.doviz,durum:r.durum,
    aciklama:r.aciklama,olusturmaTarih:r.olusturma_tarihi?new Date(r.olusturma_tarihi).getTime():Date.now(),
    guncellemeTarih:r.guncelleme_tarihi?new Date(r.guncelleme_tarihi).getTime():Date.now()
  };
}

async function loadDB(){
  sLD();
  try{
    const r=await fetch(SB_URL+'/rest/v1/hesap_plani?select=*&order=kod',{headers:SB_HEADERS});
    if(r.ok){
      const rows=await r.json();
      hesaplar={};
      rows.forEach(row=>{hesaplar[row.kod.replace(/\./g,'_')]=sbdenCamele(row);});
    }
  }catch(e){console.warn(e);}
  hLD();
}

async function saveHesap(h){
  // Üst kodu da hesaplayıp Supabase'deki ust_kod sütununu güncel tutuyoruz (bilgi amaçlı;
  // uygulamanın kendi ağaç mantığı hâlâ getUstKod() ile anlık hesaplanır, buna bağımlı değil)
  const ustKod=getUstKod(h.kod);
  const satir={
    kod:h.kod,ust_kod:ustKod,ad:h.ad,tip:h.tip,ana_grup:h.anaGrup||null,
    yon:h.yon||'Borç',alt_seviye:h.altSeviye||null,ozellik:h.ozellik||null,
    doviz:h.doviz||'TRY',durum:h.durum||'aktif',aciklama:h.aciklama||null
  };
  try{
    await fetch(SB_URL+'/rest/v1/hesap_plani?on_conflict=kod',{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(satir)
    });
  }catch(e){console.warn(e);}
}

async function thpYukle(skipConfirm){
  if(!skipConfirm&&!confirm('Standart THP ana başlıkları yüklensin mi? Mevcut hesaplar korunur.'))return;
  sLD();
  let eklenen=0;
  for(const [kod,ad,tip,anaGrup,yon,ozellik,aciklama] of THP_ANA){
    const key=kod.replace(/\./g,'_');
    if(!hesaplar[key]){
      const h={kod,ad,tip,anaGrup,yon,ozellik,aciklama,durum:'aktif',doviz:'TRY',altSeviye:'60',olusturmaTarih:Date.now()};
      hesaplar[key]=h;
      await saveHesap(h);
      eklenen++;
    }
  }
  hLD();
  renderTablo();
  toast(`✅ ${eklenen} hesap eklendi`);
}

async function gurokYukle(skipConfirm){
  if(!skipConfirm&&!confirm(`Gürok'a özel ${GUROK_OZEL.length} ek hesap yüklensin mi? Bunlar LN Infor'da gerçekten kullanılan firma-özel hesap kodlarıdır (1001, 3401 vb.)`))return;
  sLD();
  let eklenen=0;
  for(const [kod,ad,tip,anaGrup,yon,ozellik,aciklama] of GUROK_OZEL){
    const key='G_'+kod.replace(/\./g,'_');
    if(!hesaplar[key]){
      const h={kod,ad,tip,anaGrup,yon,ozellik,aciklama,durum:'aktif',doviz:'TRY',altSeviye:'70',gurokOzel:true,olusturmaTarih:Date.now()};
      hesaplar[key]=h;
      await saveHesap(h);
      eklenen++;
    }
  }
  hLD();
  renderTablo();
  toast(`✅ ${eklenen} Gürok özel hesabı eklendi`);
}

// ============================================================
// SEVIYE HESAPLA
// ============================================================
function getSeviye(kod){
  const ana=kod.split('.')[0];
  if(ana.length===1)return 1;
  if(ana.length===2)return 2;
  if(ana.length===3)return 3;
  if(ana.length===4)return 4;
  return 5;
}

// Üst hesap: kodu kısaltıla kısaltıla, hesap planında GERÇEKTEN VAR OLAN ilk
// atayı bulur (örn. 271 -> 27 yoksa -> 2 bulunur; 1001 -> 100 bulunur; 39391 -> 3939 bulunur).
// Tek haneli (1-9) kodların üst hesabı yoktur — bunlar ağacın kökleridir.
function getUstKod(kod){
  const parcalar=kod.split('.');
  if(parcalar.length>1)return parcalar.slice(0,-1).join('.');
  const ana=parcalar[0];
  for(let i=ana.length-1;i>=1;i--){
    const aday=ana.slice(0,i);
    if(Object.values(hesaplar).some(h=>h&&h.kod===aday))return aday;
  }
  return null;
}

  const ozellikIkon={Kasa:'💰',Banka:'🏦',Cari:'👥',Stok:'📦',KDV:'🧾',SGK:'🏥',Vergi:'📋',Demirbaş:'🔧'};

  function satirHTML(h,seviye){
    const cocuklar=tumListe.filter(c=>getUstKod(c.kod)===h.kod).sort((a,b)=>a.kod.localeCompare(b.kod,'tr',{numeric:true}));
    const cocukVar=cocuklar.length>0;
    const acik=agacAcik.has(h.kod);
    const girintiPx=(seviye-1)*22;
    const chevron=cocukVar?`<span onclick="toggleAgac('${h.kod}',event)" style="cursor:pointer;display:inline-block;width:16px;text-align:center">${acik?'▾':'▸'}</span>`:'<span style="display:inline-block;width:16px"></span>';
    let html=`<tr class="lv${Math.min(seviye,4)} ${seciliKod===h.kod?'secili':''}" onclick="secRow('${h.kod}')">
      <td style="font-family:monospace;font-weight:700">${h.kod}</td>
      <td><span style="display:inline-flex;align-items:center;padding-left:${girintiPx}px">${chevron}${h.ad}</span></td>
      <td>${tipChip[h.tip]||h.tip||'—'}</td>
      <td>${h.anaGrup||'—'}</td>
      <td><span style="color:${h.yon==='Borç'?'var(--danger)':'var(--success)'};font-weight:600">${h.yon||'—'}</span></td>
      <td>${h.altSeviye?'<span class="chip" style="background:'+(h.altSeviye==='70'?'#fff7ed;color:#9a3412':'#e0f2fe;color:#075985')+'">'+h.altSeviye+'</span>':''}</td>
      <td>${h.ozellik?(ozellikIkon[h.ozellik]||'')+' '+h.ozellik:''}</td>
      <td><span class="durum-dot ${h.durum==='pasif'?'durum-pasif':'durum-aktif'}"></span> ${h.durum==='pasif'?'Pasif':'Aktif'}</td>
      <td style="color:var(--gray-600);font-size:11px">${h.aciklama||''}</td>
    </tr>`;
    if(cocukVar&&acik){
      cocuklar.forEach(c=>{html+=satirHTML(c,seviye+1);});
    }
    return html;
  }

  let outputHTML='';

  if(aramaVar){
    // Arama modunda düz liste, eşleşenleri göster
    let eslesenler=tumListe.filter(eslesir);
    if(sortKol){
      eslesenler.sort((a,b)=>{
        const av=(a[sortKol]||'').toString(),bv=(b[sortKol]||'').toString();
        const cmp=av.localeCompare(bv,'tr',{numeric:true});
        return sortAsc?cmp:-cmp;
      });
    }else{
      eslesenler.sort((a,b)=>a.kod.localeCompare(b.kod,'tr',{numeric:true}));
    }
    outputHTML=eslesenler.map(h=>{
      const seviye=getSeviye(h.kod);
      return`<tr class="lv${Math.min(seviye,4)} ${seciliKod===h.kod?'secili':''}" onclick="secRow('${h.kod}')">
        <td style="font-family:monospace;font-weight:700">${h.kod}</td>
        <td>${h.ad}</td>
        <td>${tipChip[h.tip]||h.tip||'—'}</td>
        <td>${h.anaGrup||'—'}</td>
        <td><span style="color:${h.yon==='Borç'?'var(--danger)':'var(--success)'};font-weight:600">${h.yon||'—'}</span></td>
        <td>${h.altSeviye?'<span class="chip" style="background:'+(h.altSeviye==='70'?'#fff7ed;color:#9a3412':'#e0f2fe;color:#075985')+'">'+h.altSeviye+'</span>':''}</td>
        <td>${h.ozellik?(ozellikIkon[h.ozellik]||'')+' '+h.ozellik:''}</td>
        <td><span class="durum-dot ${h.durum==='pasif'?'durum-pasif':'durum-aktif'}"></span> ${h.durum==='pasif'?'Pasif':'Aktif'}</td>
        <td style="color:var(--gray-600);font-size:11px">${h.aciklama||''}</td>
      </tr>`;
    }).join('');
    document.getElementById('sb-filtreli').textContent=`Filtrelenmiş: ${eslesenler.length}`;
  }else{
    // Ağaç modu: sadece kökler (üst hesabı olmayan — yani tek haneli 1-9 ana hesaplar)
    const kokler=tumListe.filter(h=>!getUstKod(h.kod)).sort((a,b)=>a.kod.localeCompare(b.kod,'tr',{numeric:true}));
    outputHTML=kokler.map(h=>satirHTML(h,1)).join('');
    document.getElementById('sb-filtreli').textContent='';
  }

  document.getElementById('tablo-body').innerHTML=outputHTML||'<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--gray-400)">Hesap bulunamadı</td></tr>';
  document.getElementById('sb-toplam').textContent=`Toplam: ${toplamSayi} hesap`;
  document.getElementById('sb-secili').textContent=seciliKod?`Seçili: ${seciliKod}`:'';
}

function secRow(kod){seciliKod=kod;renderTablo();}

function toggleAgac(kod,e){
  e.stopPropagation();
  if(agacAcik.has(kod))agacAcik.delete(kod);
  else agacAcik.add(kod);
  renderTablo();
}

function tumunuAc(){Object.values(hesaplar).filter(Boolean).forEach(h=>agacAcik.add(h.kod));renderTablo();}
function tumunuKapat(){agacAcik=new Set();renderTablo();}

function sortBy(kol){
  if(sortKol===kol)sortAsc=!sortAsc;else{sortKol=kol;sortAsc=true;}
  document.querySelectorAll('thead tr:first-child th').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
  const cols=['kod','ad','tip','anaGrup','yon'];
  const idx=cols.indexOf(kol);
  if(idx>=0){const ths=document.querySelectorAll('thead tr:first-child th');if(ths[idx])ths[idx].classList.add(sortAsc?'sort-asc':'sort-desc');}
  renderTablo();
}

function filterTip(tip,el){
  tipFilter=tip;
  grupFilter='';
  altSeviyeFilter='';
  document.querySelectorAll('.filtre-chip[id^="fc-"]').forEach(c=>c.classList.remove('aktif'));
  el.classList.add('aktif');
  renderTablo();
}

function filterGrup(grup,el){
  grupFilter=grup;
  tipFilter='';
  altSeviyeFilter='';
  document.querySelectorAll('.filtre-chip[id^="fc-"]').forEach(c=>c.classList.remove('aktif'));
  el.classList.add('aktif');
  renderTablo();
}

function filterAltSeviye(seviye,el){
  altSeviyeFilter=seviye;
  tipFilter='';
  grupFilter='';
  document.querySelectorAll('.filtre-chip[id^="fc-"]').forEach(c=>c.classList.remove('aktif'));
  el.classList.add('aktif');
  renderTablo();
}

// ============================================================
// HESAP KAYDET
// ============================================================
function openYeniHesap(ustKod){
  document.getElementById('mHesapBaslik').innerHTML='➕ Yeni Hesap <button class="mclose" onclick="kModal(\'mHesap\')">✕</button>';
  document.getElementById('h-edit-id').value='';
  document.getElementById('h-kod').value=ustKod||'';
  document.getElementById('h-ust').value=ustKod?getUstKod(ustKod)||ustKod:'';
  document.getElementById('h-ad').value='';
  document.getElementById('h-tip').value='Bilanço';
  document.getElementById('h-grup').value='';
  document.getElementById('h-altseviye').value='60';
  document.getElementById('h-yon').value='Borç';
  document.getElementById('h-ozellik').value='';
  document.getElementById('h-doviz').value='TRY';
  document.getElementById('h-durum').value='aktif';
  document.getElementById('h-aciklama').value='';
  document.getElementById('h-sil-btn').style.display='none';
  // Kodu değişince üst hesabı güncelle
  document.getElementById('h-kod').oninput=function(){
    this.value=this.value.toUpperCase();
    document.getElementById('h-ust').value=getUstKod(this.value)||'';
  };
  aModal('mHesap');
}

function openDuzenle(){
  if(!seciliKod){toast('⚠️ Önce bir hesap seçin');return;}
  const h=hesaplar[seciliKod.replace(/\./g,'_')]||Object.values(hesaplar).find(x=>x.kod===seciliKod);
  if(!h)return;
  document.getElementById('mHesapBaslik').innerHTML='✏️ Hesap Düzenle <button class="mclose" onclick="kModal(\'mHesap\')">✕</button>';
  document.getElementById('h-edit-id').value=h.kod;
  document.getElementById('h-kod').value=h.kod;
  document.getElementById('h-ust').value=getUstKod(h.kod)||'';
  document.getElementById('h-ad').value=h.ad;
  document.getElementById('h-tip').value=h.tip;
  document.getElementById('h-grup').value=h.anaGrup||'';
  document.getElementById('h-altseviye').value=h.altSeviye||'60';
  document.getElementById('h-yon').value=h.yon||'Borç';
  document.getElementById('h-ozellik').value=h.ozellik||'';
  document.getElementById('h-doviz').value=h.doviz||'TRY';
  document.getElementById('h-durum').value=h.durum||'aktif';
  document.getElementById('h-aciklama').value=h.aciklama||'';
  document.getElementById('h-sil-btn').style.display='inline-flex';
  aModal('mHesap');
}

function altHesapAc(){
  if(!seciliKod){toast('⚠️ Önce bir hesap seçin');return;}
  const h=Object.values(hesaplar).find(x=>x.kod===seciliKod);
  if(!h)return;
  // Öneri: 100 → 100.01, 100.01 → 100.02
  const cocuklar=Object.values(hesaplar).filter(x=>getUstKod(x.kod)===seciliKod);
  let yeniKod=seciliKod+'.01';
  if(cocuklar.length>0){
    const sonKod=cocuklar[cocuklar.length-1].kod;
    const parcalar=sonKod.split('.');
    const son=parseInt(parcalar[parcalar.length-1])||0;
    parcalar[parcalar.length-1]=String(son+1).padStart(2,'0');
    yeniKod=parcalar.join('.');
  }
  openYeniHesap(yeniKod);
}

async function hesapKaydet(){
  const kod=document.getElementById('h-kod').value.trim().toUpperCase();
  const ad=document.getElementById('h-ad').value.trim().toUpperCase();
  if(!kod||!ad){toast('⚠️ Kod ve ad zorunlu');return;}
  // Hesap kodu formatı: sadece rakam, alt hesaplar nokta ile ayrılır (örn. 100, 100.01, 100.01.002)
  if(!/^[0-9]+(\.[0-9]+)*$/.test(kod)){
    toast('⚠️ Hesap kodu sadece rakam ve nokta içerebilir (örn. 100.01)',3500);
    return;
  }
  const key=kod.replace(/\./g,'_');
  const editId=document.getElementById('h-edit-id').value;
  // Aynı kodun farklı bir key altında (örn. Gürok özel G_ önekiyle) zaten var olup olmadığını kontrol et
  const cakisan=Object.entries(hesaplar).find(([k,h])=>h&&h.kod===kod&&k!==key&&kod!==editId);
  if(cakisan){
    toast(`⚠️ "${kod}" kodu zaten kullanımda: ${cakisan[1].ad}`,3500);
    return;
  }
  const h={
    kod,ad,
    tip:document.getElementById('h-tip').value,
    anaGrup:document.getElementById('h-grup').value,
    altSeviye:document.getElementById('h-altseviye').value||'60',
    yon:document.getElementById('h-yon').value,
    ozellik:document.getElementById('h-ozellik').value,
    doviz:document.getElementById('h-doviz').value,
    durum:document.getElementById('h-durum').value,
    aciklama:document.getElementById('h-aciklama').value,
    olusturmaTarih:hesaplar[key]?.olusturmaTarih||Date.now(),
    guncellemeTarih:Date.now()
  };
  sLD();hesaplar[key]=h;await saveHesap(h);hLD();
  kModal('mHesap');
  seciliKod=kod;
  agacAcik.add(getUstKod(kod)||kod);
  renderTablo();
  toast(`✅ ${kod} — ${ad} kaydedildi`);
}

function hesapSil(){
  if(!seciliKod){toast('⚠️ Önce hesap seçin');return;}
  openDuzenle();
}

async function hesapSilModal(){
  const kod=document.getElementById('h-edit-id').value||document.getElementById('h-kod').value;
  if(!confirm(`"${kod}" silinsin mi?`))return;
  const key=kod.replace(/\./g,'_');
  sLD();delete hesaplar[key];
  try{await fetch(SB_URL+'/rest/v1/hesap_plani?kod=eq.'+encodeURIComponent(kod),{method:'DELETE',headers:SB_HEADERS});}catch(e){console.warn(e);}
  hLD();kModal('mHesap');seciliKod=null;renderTablo();toast('🗑️ Silindi');
}

// ============================================================
// EXCEL EXPORT
// ============================================================
function exportExcel(){
  const liste=Object.values(hesaplar).filter(Boolean).sort((a,b)=>a.kod.localeCompare(b.kod,'tr',{numeric:true}));
  let csv='Hesap Kodu\tHesap Adı\tHesap Tipi\tAna Grup\tÇalışma Yönü\tAlt Seviye\tÖzellik\tDurum\tAçıklama\n';
  liste.forEach(h=>{csv+=`${h.kod}\t${h.ad}\t${h.tip}\t${h.anaGrup||''}\t${h.yon||''}\t${h.altSeviye||''}\t${h.ozellik||''}\t${h.durum||'aktif'}\t${h.aciklama||''}\n`;});
  const blob=new Blob(['\ufeff'+csv],{type:'text/tab-separated-values;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hesap_plani.xls';a.click();
  toast('✅ Excel indirildi');
}
