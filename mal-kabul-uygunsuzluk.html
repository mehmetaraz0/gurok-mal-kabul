<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="ortak.js"></script>
<link rel="stylesheet" href="theme.css">
<script>
let currentUser = requireLogin();
if (currentUser) requireRole(currentUser, ['yonetici','depo','satinalma','kalite']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Uygunsuzluk</title>
<meta name="theme-color" content="#1a2744">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-600)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.mk-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='mal-kabul-v2.html'">←</button>
    <div style="flex:1"><h1>Uygunsuzluk</h1><span style="font-size:11px;opacity:.7" id="hdrOtel"></span></div>
  </div>

  <div class="sc" id="tab-uygun" style="display:block">
    <div class="ftabs">
      <button class="ftab active" onclick="filterUygun('acik',this)">🔴 Açık</button>
      <button class="ftab" onclick="filterUygun('kapatildi',this)">✅ Kapatıldı</button>
    </div>
    <div id="uygun-icerik"></div>
  </div>
</div>

<!-- MODAL: Uygunsuzluk — Düzeltici Faaliyet -->
<div class="mo" id="mUygunDetay">
  <div class="mbox">
    <div class="mtitle">⚠️ Düzeltici Faaliyet <button class="mclose" onclick="kModal('mUygunDetay')">✕</button></div>
    <div id="mUygunDetayIc"></div>
    <div class="brow" id="mUygunDetayActions" style="margin-top:14px"></div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/kModal/aModal -> ortak.js

const OTEL_ISIMLERI={'810':'Ali Bey Club Manavgat','811':'Ali Bey Resort Sorgun'};
const OTEL_KISA={'810':'Club','811':'Resort'};
let uygunFilter='acik';
let uygunCache={};

async function auditLogYaz(action,entityType,entityId,detail){
  const log={action,entity_type:entityType,entity_id:String(entityId||''),detail:detail||'',kullanici_ad:currentUser?.ad||'Bilinmeyen'};
  try{await fetch(SB_URL+'/rest/v1/audit_log',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(log)});}catch(e){}
}

async function renderUygun(){
  sLD();
  let rows=[];
  try{
    const r=await fetch(SB_URL+`/rest/v1/uygunsuzluklar?durum=eq.${uygunFilter}&select=*&order=olusturma_tarihi.desc`,{headers:SB_HEADERS});
    if(r.ok)rows=await r.json();
  }catch(e){}
  hLD();
  uygunCache={};rows.forEach(r=>uygunCache[r.id]=r);
  const c=document.getElementById('uygun-icerik');
  if(!rows.length){c.innerHTML='<div class="es"><div class="ei">⚠️</div><div class="et">Kayıt yok</div></div>';return;}
  const kararEtiket={iade:'İade',sartli:'Şartlı Kullanım',imha:'İmha',duzeltme:'Düzeltme/Tekrar İşleme'};
  c.innerHTML=rows.map(r=>`<div class="mk-kart" style="border-left-color:${r.durum==='acik'?'var(--danger)':'var(--success)'}">
    <div style="font-size:12px">${escapeHtml(r.aciklama)}</div>
    <div style="font-size:10px;color:var(--gray-400);margin-top:4px">👤 ${escapeHtml(r.bildiren_ad)||'—'} • ${new Date(r.olusturma_tarihi).toLocaleDateString('tr-TR')}</div>
    ${r.durum==='acik'
      ?`<button class="btn btn-warning btn-sm btn-block" style="margin-top:8px" onclick="uygunsuzlukIncele('${r.id}')">Düzeltici Faaliyet</button>`
      :`<div style="margin-top:8px;padding:8px;background:var(--gray-100);border-radius:6px;font-size:11px">
          <div><b>Karar:</b> ${kararEtiket[r.karar]||'—'}</div>
          ${r.faaliyet_aciklama?`<div style="margin-top:2px"><b>Faaliyet:</b> ${escapeHtml(r.faaliyet_aciklama)}</div>`:''}
          <div style="color:var(--gray-500);margin-top:2px">${r.faaliyet_yapan||''} ${r.faaliyet_tarih?'• '+r.faaliyet_tarih:''}</div>
        </div>
        <button class="btn btn-primary btn-sm btn-block" style="margin-top:6px" onclick="uygunsuzlukYazdir('${r.id}')">Formu Yazdır</button>`}
  </div>`).join('');
}
function filterUygun(f,el){uygunFilter=f;document.querySelectorAll('#tab-uygun .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderUygun();}

function uygunsuzlukIncele(id){
  const r=uygunCache[id];if(!r)return;
  document.getElementById('mUygunDetayIc').innerHTML=`
    <div style="background:var(--gray-100);border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px">
      <div>${escapeHtml(r.aciklama)}</div>
      <div style="color:var(--gray-500);margin-top:4px">👤 ${escapeHtml(r.bildiren_ad)||'—'} • ${new Date(r.olusturma_tarihi).toLocaleDateString('tr-TR')}</div>
    </div>
    <div class="field">
      <label>Faaliyet Açıklaması</label>
      <textarea id="uf-faaliyet" rows="3" placeholder="Yapılan düzeltici faaliyeti açıklayın..."></textarea>
    </div>
    <div class="field">
      <label>Karar</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:8px;border:1.5px solid var(--gray-300);border-radius:8px;cursor:pointer">
          <input type="radio" name="uf-karar" value="iade" style="width:16px;height:16px;flex-shrink:0;padding:0;border:1px solid var(--gray-400);-webkit-appearance:radio;appearance:radio;accent-color:var(--primary)"> İade
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:8px;border:1.5px solid var(--gray-300);border-radius:8px;cursor:pointer">
          <input type="radio" name="uf-karar" value="sartli" style="width:16px;height:16px;flex-shrink:0;padding:0;border:1px solid var(--gray-400);-webkit-appearance:radio;appearance:radio;accent-color:var(--primary)"> Şartlı Kullanım
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:8px;border:1.5px solid var(--gray-300);border-radius:8px;cursor:pointer">
          <input type="radio" name="uf-karar" value="imha" style="width:16px;height:16px;flex-shrink:0;padding:0;border:1px solid var(--gray-400);-webkit-appearance:radio;appearance:radio;accent-color:var(--primary)"> İmha
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;padding:8px;border:1.5px solid var(--gray-300);border-radius:8px;cursor:pointer">
          <input type="radio" name="uf-karar" value="duzeltme" style="width:16px;height:16px;flex-shrink:0;padding:0;border:1px solid var(--gray-400);-webkit-appearance:radio;appearance:radio;accent-color:var(--primary)"> Düzeltme/Tekrar İşleme
        </label>
      </div>
    </div>
    <div class="rfields">
      <div class="field"><label>Faaliyeti Yapan</label><input type="text" id="uf-faaliyet-yapan" value="${currentUser.ad}"></div>
      <div class="field"><label>Tarih</label><input type="date" id="uf-faaliyet-tarih" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
  `;
  document.getElementById('mUygunDetayActions').innerHTML=`
    <button class="btn btn-gray btn-sm" style="flex:1" onclick="kModal('mUygunDetay')">İptal</button>
    <button class="btn btn-success btn-sm" style="flex:1" onclick="uygunsuzlukKaydet('${id}')">✅ Kaydet ve Kapat</button>
  `;
  aModal('mUygunDetay');
}

async function uygunsuzlukKaydet(id){
  const karar=document.querySelector('input[name="uf-karar"]:checked')?.value;
  const faaliyet=document.getElementById('uf-faaliyet').value.trim();
  const yapan=document.getElementById('uf-faaliyet-yapan').value.trim();
  const tarih=document.getElementById('uf-faaliyet-tarih').value;
  if(!karar){toast('⚠️ Karar seçin (İade/Şartlı Kullanım/İmha/Düzeltme)');return;}
  if(!faaliyet){toast('⚠️ Faaliyet açıklaması girin');return;}
  sLD();
  try{
    await fetch(SB_URL+'/rest/v1/uygunsuzluklar?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({
      durum:'kapatildi',kapanma_tarihi:new Date().toISOString(),
      karar,faaliyet_aciklama:faaliyet,faaliyet_yapan:yapan||null,faaliyet_tarih:tarih||null
    })});
    await auditLogYaz('close','uygunsuzluk',id,`Düzeltici faaliyet kaydedildi ve kapatıldı — karar: ${karar}`);
  }catch(e){console.warn(e);toast('⚠️ Kaydetme hatası');hLD();return;}
  hLD();
  kModal('mUygunDetay');
  toast('✅ Düzeltici faaliyet kaydedildi, uygunsuzluk kapatıldı');
  renderUygun();
  uygunsuzlukYazdir(id); // kaydettikten sonra çıktı ekranı otomatik açılsın
}

// mal-kabul-v2.html'deki gibi tam malKabuller cache'inden okumak yerine,
// yazdırma anında sadece ilgili tek mal kabulün hafif bilgisini çeker
// (Faz 1 taşıma önkoşulu — bkz. plan doc'taki 3. doğrulanmış bağımlılık).
async function mkHafifBilgiGetir(mkId){
  if(!mkId)return null;
  try{
    const r=await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+mkId+'&select=firma_ad,otel_id,mal_kabul_urunleri(urun_kodu,miktar,birim)',{headers:SB_HEADERS});
    if(r.ok){
      const d=await r.json();
      if(d[0])return{
        firma:d[0].firma_ad,otelId:d[0].otel_id,
        urunler:(d[0].mal_kabul_urunleri||[]).map(u=>({kod:u.urun_kodu||'',miktar:u.miktar,birim:u.birim}))
      };
    }
  }catch(e){console.warn(e);}
  return null;
}

// ============================================================
// UYGUNSUZLUK FORMU — YAZDIRILABİLİR ÇIKTI (v1'deki tam form ile birebir)
// ============================================================
async function uygunsuzlukYazdir(id){
  let r=uygunCache[id];
  if(!r){
    try{
      const res=await fetch(SB_URL+'/rest/v1/uygunsuzluklar?id=eq.'+id+'&select=*',{headers:SB_HEADERS});
      if(res.ok){const d=await res.json();r=d[0];}
    }catch(e){}
  }
  if(!r){toast('⚠️ Kayıt bulunamadı');return;}

  const mk=await mkHafifBilgiGetir(r.mk_id);
  const urunSatir=mk?mk.urunler.find(u=>u.kod===r.urun_kodu):null;
  const kararEtiket={iade:'İade',sartli:'Şartlı Kullanım',imha:'İmha',duzeltme:'Düzeltme/Tekrar İşleme'};
  const fmtTarih=t=>t?new Date(t).toLocaleDateString('tr-TR'):'';
  const daire=(secili)=>`<span class="daire">${secili?'●':''}</span>`;

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Uygun Olmayan Ürün/Hizmet Formu</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#000;padding:16px;max-width:900px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;border-bottom:2px solid #000;padding-bottom:10px}
    .hdr .logo{font-weight:800;font-size:20px;color:#003a70;letter-spacing:.5px}
    .hdr .logo .sub{display:block;font-size:9px;font-weight:400;color:#555;letter-spacing:2px}
    .hdr h1{font-size:17px;font-weight:800;margin:0}
    table.frm{width:100%;border-collapse:collapse;border:1.5px solid #000}
    table.frm td{border:1px solid #000;padding:5px 8px;vertical-align:top}
    .lbl{font-weight:700;font-size:11px}
    .vert{writing-mode:vertical-rl;transform:rotate(180deg);text-align:center;font-weight:700;font-size:11px;width:24px;white-space:nowrap}
    .tall{height:70px}
    .taller{height:110px}
    .daire{display:inline-block;width:13px;height:13px;border:1.3px solid #000;border-radius:50%;text-align:center;line-height:11px;font-size:9px;margin-right:5px;vertical-align:middle}
    .center-title{text-align:center;font-weight:700;font-size:13px;padding:6px}
    .footer{display:flex;justify-content:space-between;font-size:10px;margin-top:6px;padding:0 4px}
    @media print{ .no-print{display:none} body{padding:6px} }
  </style></head><body>

  <div class="hdr">
    <div class="logo">gürok<span class="sub">TURİZM GRUBU</span></div>
    <h1>UYGUN OLMAYAN ÜRÜN/HİZMET FORMU</h1>
  </div>

  <table class="frm">
    <tr>
      <td colspan="3"><span class="lbl">Tesis Adı:</span> ${OTEL_ISIMLERI[mk?.otelId||r.otel_id]||''}</td>
      <td colspan="2"><span class="lbl">Form No:</span> UF-${String(r.id).padStart(5,'0')}<br><span class="lbl">Tarih:</span> ${fmtTarih(r.olusturma_tarihi)}</td>
    </tr>
    <tr>
      <td class="lbl">Formu Açan</td>
      <td colspan="2"><span class="lbl">Adı-Soyadı:</span> ${escapeHtml(r.bildiren_ad)}</td>
      <td colspan="2"><span class="lbl">Departmanı:</span></td>
    </tr>

    <tr>
      <td rowspan="3" class="vert">Hizmet<br>Uygunsuzlukları</td>
      <td colspan="4" class="taller"><span class="lbl">Uygunsuzluğun Açıklaması:</span></td>
    </tr>
    <tr>
      <td colspan="2"><span class="lbl">Oluştuğu Mekan:</span></td>
      <td colspan="2"><span class="lbl">İlgili Departman:</span></td>
    </tr>
    <tr><td colspan="4" style="height:4px;border-top:none;border-bottom:none"></td></tr>

    <tr>
      <td rowspan="2" class="vert">Malzeme/Ürün<br>Uygunsuzluklar</td>
      <td colspan="4">
        <span class="lbl">Firma Adı/Üretim:</span> ${escapeHtml(mk?.firma)}<br>
        <span class="lbl">Yapılan Bölüm adı:</span> ${OTEL_ISIMLERI[mk?.otelId||r.otel_id]||''}<br>
        <span class="lbl">Malzeme/Ürün Miktarı:</span> ${urunSatir?urunSatir.miktar+' '+urunSatir.birim:''}
      </td>
    </tr>
    <tr>
      <td colspan="4" class="taller"><span class="lbl">Uygunsuzluğun Açıklaması</span><br>${escapeHtml(r.aciklama||'').replace(/\n/g,'<br>')}</td>
    </tr>

    <tr>
      <td rowspan="2" class="vert">Kalite<br>Yönetim<br>Onayı</td>
      <td colspan="2" class="tall" style="width:45%">
        <span class="lbl">İnceleme:</span><br><br>
        ${daire(false)} Uygunsuzluk Kabul Edildi<br><br>
        ${daire(false)} Uygunsuzluk Red Edildi
      </td>
      <td colspan="2" class="tall"><span class="lbl">Uygunsuzluğu Gidermek İçin Tavsiyeler:</span></td>
    </tr>
    <tr>
      <td colspan="4"><span class="lbl">Ret Etme Sebebi:</span></td>
    </tr>
  </table>

  <div class="center-title">Uygunsuzluğun Çözümü</div>

  <table class="frm">
    <tr>
      <td rowspan="2" class="vert">Düzeltici<br>Faaliyet</td>
      <td colspan="4" class="taller">${escapeHtml(r.faaliyet_aciklama||'').replace(/\n/g,'<br>')}</td>
    </tr>
    <tr>
      <td colspan="4">
        <span class="lbl">Malzeme/Ürün Uygunsuzlukları Karar Faaliyeti</span><br>
        ${daire(r.karar==='iade')} İade<br>
        ${daire(r.karar==='sartli')} Şartlı Kullanım<br>
        ${daire(r.karar==='imha')} İmha<br>
        ${daire(r.karar==='duzeltme')} Düzeltme/Tekrar İşleme
      </td>
    </tr>
    <tr>
      <td></td>
      <td colspan="2"><span class="lbl">Faaliyeti Yapan:</span> ${r.faaliyet_yapan||''}</td>
      <td><span class="lbl">İmza</span></td>
      <td><span class="lbl">Tarih:</span> ${fmtTarih(r.faaliyet_tarih)}</td>
    </tr>

    <tr>
      <td rowspan="2" class="vert">Düzeltici Faaliyet Onayı</td>
      <td style="width:20%"><span class="lbl">Kalite Onayı</span><br><br>İmza<br><br>Tarih</td>
      <td colspan="3" class="tall"><span class="lbl">Yorumlar</span></td>
    </tr>
    <tr>
      <td><span class="lbl">GM Onayı</span><br><br>İmza<br><br>Tarih</td>
      <td colspan="3" class="tall"><span class="lbl">Yorumlar</span></td>
    </tr>
  </table>

  <div class="footer">
    <span>Doküman No: F.03</span>
    <span>Yayın Tarihi: 19.12.2025</span>
    <span>Rev. Tarihi/No:-/00</span>
  </div>

  <div class="no-print" style="margin-top:20px;text-align:center">
    <button onclick="window.print()" style="padding:10px 20px;font-size:14px;cursor:pointer">🖨️ Yazdır</button>
  </div>
  </body></html>`);
  w.document.close();
