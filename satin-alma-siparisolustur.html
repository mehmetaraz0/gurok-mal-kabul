<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="ortak.js"></script>
<script src="gurok_veritabani.js"></script>
<link rel="stylesheet" href="theme.css">
<script>
let CU = requireLogin();
if (CU) requireRole(CU, ['yonetici','satinalma','depo','cost_control']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Sipariş Oluştur</title>
<meta name="theme-color" content="#1a2744">
<style>
:root{--accent:#c9a24b}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.usatir{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.udd{display:none;position:absolute;top:100%;left:0;right:0;background:white;border:1.5px solid var(--primary);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='satin-alma.html'">←</button>
    <div style="flex:1"><h1>Sipariş Oluştur</h1><span class="sub" id="hsub"></span></div>
  </div>

  <div class="sc" id="tab-yeniSiparis">
    <!-- Adım 1: Kalem Girişi -->
    <div id="spAdim1">
      <div class="card">
        <div class="card-title">🛒 Sipariş Sepeti
          <span id="sp-kalem-sayi" style="font-size:11px;color:var(--gray-500);font-weight:400;margin-left:4px"></span>
          <button class="btn btn-sm" style="margin-left:auto;background:var(--accent);color:var(--primary);padding:4px 10px;min-height:28px" onclick="addSPSatir()">+ Ekle</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 70px 65px 90px 24px;gap:4px;padding:0 2px;margin-bottom:4px">
          <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase">Ürün</div>
          <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase">Miktar</div>
          <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase">Birim</div>
          <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase">Firma</div>
          <div></div>
        </div>
        <div id="sp-satirlar" style="max-height:55vh;overflow-y:auto"></div>
        <div class="rfields" style="margin-top:10px">
          <div class="field"><label>Sipariş Tarihi</label><input type="date" id="sp-tarih"></div>
          <div class="field"><label>Termin Tarihi</label><input type="date" id="sp-termin"></div>
        </div>
        <div class="field" style="margin-top:8px"><label>Otel *</label>
          <select id="sp-otel">
            <option value="810">🏨 810 — Ali Bey Club Manavgat (C siparişi)</option>
            <option value="811">🏨 811 — Ali Bey Resort Sorgun (R siparişi)</option>
          </select>
        </div>
      </div>
      <div class="brow" style="margin-bottom:16px">
        <button class="btn btn-gray" onclick="spSifirla()">🗑️ Temizle</button>
        <button class="btn btn-primary" id="sp-grupla-btn" onclick="spGrupla()" disabled>📦 Firma Bazlı Grupla →</button>
      </div>
    </div>
    <!-- Adım 2: Firma Grupları -->
    <div id="spAdim2" style="display:none">
      <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <button class="btn btn-sm btn-gray" onclick="spGeriDon()">← Geri</button>
          <div class="card-title" style="margin:0">📦 Firma Siparişleri</div>
        </div>
      </div>
      <div id="sp-gruplar"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal/loadXlsxLib -> ortak.js
// FIRMA_DB/URUN_DB -> gurok_veritabani.js
// Not: spSifirla() burada YOK — kaynak dosyada da var olmayan DOM id'lerine
// (sp-firma-inp/sp-firma-id/sp-not) referans veren, zaten çalışmayan bir
// fonksiyondu (Faz 2 planında bilinçli olarak taşınmadı, davranış aynı kalır).

let DB={firmalar:typeof FIRMA_DB!=='undefined'?FIRMA_DB:[],urunler:typeof URUN_DB!=='undefined'?URUN_DB:[],siparisler:{}};
let YETKI_HARITASI = {};

// ============================================================
// SİPARİŞ SEPETİ
// ============================================================
let SP_SATIRLAR = [];

function spKeyDown(e,i){
  if(e.key==='Enter'){
    e.preventDefault();
    if(i===SP_SATIRLAR.length-1) addSPSatir();
    else{const next=document.getElementById('spa'+(i+1));if(next)next.focus();}
  }
}

// Dropdown dışarı tıklanınca kapat
document.addEventListener('pointerdown',e=>{
  SP_SATIRLAR.forEach((_,i)=>{
    ['spdd'+i,'spfdd'+i].forEach(id=>{
      const dd=document.getElementById(id);
      if(dd&&!dd.contains(e.target))dd.style.display='none';
    });
  });
});

function spGeriDon(){document.getElementById('spAdim1').style.display='block';document.getElementById('spAdim2').style.display='none';}

// ============================================================
// SİPARİŞ NO ÜRET — Club: C00091111, Resort: R00091111 formatı, kendi havuzumuzdan.
// Her önekin kendi sayacı vardır; en yüksek mevcut no bulunup +1 verilir.
// ============================================================
async function yeniSiparisNoUret(prefix){
  const p = prefix === 'R' ? 'R' : 'C';
  try{
    const r=await fetch(SB_URL+`/rest/v1/siparisler?siparis_no=like.${p}*&select=siparis_no&order=siparis_no.desc&limit=1`,{headers:SB_HEADERS});
    let maxNo=91110;
    if(r.ok){
      const d=await r.json();
      if(d&&d.length){
        const m=d[0].siparis_no.match(new RegExp('^'+p+'(\\d+)$'));
        if(m)maxNo=parseInt(m[1]);
      }
    }
    return p+String(maxNo+1).padStart(8,'0');
  }catch(e){
    return p+String(91111+Math.floor(Math.random()*1000)).padStart(8,'0');
  }
}

async function spGrupla(){
  const dolu=SP_SATIRLAR.filter(u=>u.ad&&u.miktar);
  if(!dolu.length){toast('⚠️ Kalem ekleyin');return;}

  // Firma bazlı grupla
  const gruplar={};
  dolu.forEach(u=>{
    const key=u.firmaAd||'_bos';
    if(!gruplar[key])gruplar[key]={firmaAd:u.firmaAd||'',firmaId:u.firmaId||'',kalemler:[]};
    gruplar[key].kalemler.push(u);
  });

  const tarih=document.getElementById('sp-tarih').value;
  const termin=document.getElementById('sp-termin').value;
  const otelId=document.getElementById('sp-otel')?.value||'810';
  const sipPrefix=otelId==='811'?'R':'C';
  const grupListesi=Object.values(gruplar).sort((a,b)=>a.firmaAd.localeCompare(b.firmaAd));

  sLD();
  // Her firma grubuna ayrı sipariş no ata — hemen bir yer tutucu satır yazıyoruz ki
  // aynı döngüde bir sonraki grup farklı numara alsın (çakışma önleme)
  for(const g of grupListesi){
    g.siparisNo = await yeniSiparisNoUret(sipPrefix);
    try{
      await fetch(SB_URL+'/rest/v1/siparisler',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        siparis_no:g.siparisNo,firma_ad:g.firmaAd||'',otel_id:otelId,tarih:tarih||new Date().toISOString().split('T')[0],durum:'bekleyen'
      })});
    }catch(e){console.warn(e);}
  }
  hLD();

  document.getElementById('sp-gruplar').innerHTML=grupListesi.map((g,gi)=>`
    <div class="card" style="margin-bottom:10px;border-left:4px solid var(--primary)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--primary)">${g.firmaAd||'⚠️ Firma Atanmamış'}</div>
          <div style="font-size:11px;color:var(--gray-500)">${g.kalemler.length} kalem</div>
          <div style="margin-top:4px"><span class="chip" style="background:#ede9fe;color:#5b21b6;font-family:monospace;font-weight:700">📋 ${g.siparisNo}</span></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-gray" onclick="spPDF(${gi})">🖨️ PDF</button>
          <button class="btn btn-sm btn-success" onclick="spMail(${gi})">✉️ Mail</button>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="background:var(--gray-100)">
          <th style="text-align:left;padding:5px 6px">#</th>
          <th style="text-align:left;padding:5px 6px">Ürün</th>
          <th style="text-align:right;padding:5px 6px">Miktar</th>
          <th style="text-align:left;padding:5px 6px">Birim</th>
        </tr>
        ${g.kalemler.map((k,ki)=>`<tr style="border-bottom:1px solid var(--gray-100)">
          <td style="padding:5px 6px;color:var(--gray-400)">${ki+1}</td>
          <td style="padding:5px 6px;font-weight:600">${k.ad}</td>
          <td style="padding:5px 6px;text-align:right;font-weight:700">${k.miktar}</td>
          <td style="padding:5px 6px;color:var(--gray-500)">${k.birim}</td>
        </tr>`).join('')}
      </table>
    </div>`).join('');

  // Grupları state'e kaydet
  window._spGruplar=grupListesi;
  window._spTarih=tarih;
  window._spTermin=termin;

  // Siparişleri kalıcı olarak havuza yaz (mal kabul ve fatura eşleştirme için)
  for(const g of grupListesi){
    const kalemler=g.kalemler.map(k=>({ad:k.ad,kod:k.kod||'',miktar:parseFloat(k.miktar)||0,birim:k.birim,
      gelenMiktar:0,kalanMiktar:parseFloat(k.miktar)||0,tahminiFiyat:k.tahminiFiyat?parseFloat(k.tahminiFiyat):null}));
    try{
      await fetch(SB_URL+'/rest/v1/siparisler?siparis_no=eq.'+g.siparisNo,{
        method:'PATCH',headers:SB_HEADERS,
        body:JSON.stringify({firma_ad:g.firmaAd,termin_tarihi:termin||null,olusturan_ad:CU.ad})
      });
      const kalemSatirlar=kalemler.map(k=>({
        siparis_no:g.siparisNo,urun_kodu:k.kod||null,urun_adi:k.ad,birim:k.birim,
        miktar:k.miktar,gelen_miktar:0,kalan_miktar:k.miktar,tahmini_fiyat:k.tahminiFiyat
      }));
      await fetch(SB_URL+'/rest/v1/siparis_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
      DB.siparisler[g.siparisNo]={siparisNo:g.siparisNo,firma:g.firmaAd,firmaId:g.firmaId,tarih,termin,otelId,kalemler,durum:'bekleyen',olusturanAd:CU.ad,olusturmaTarih:Date.now()};
    }catch(e){console.warn(e);}
  }

  document.getElementById('spAdim1').style.display='none';
  document.getElementById('spAdim2').style.display='block';
  toast(`✅ ${grupListesi.length} sipariş oluşturuldu`);
}

function spPDF(gi){
  const g=window._spGruplar[gi];
  const tarih=window._spTarih||new Date().toISOString().split('T')[0];
  const termin=window._spTermin||'';
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Sipariş Formu</title>
  <style>
    @page{size:A4;margin:15mm}
    body{font-family:Arial,sans-serif;font-size:11px}
    h2{text-align:center;font-size:15px;margin:0 0 4px}
    .sub{text-align:center;font-size:11px;color:#555;margin-bottom:16px}
    .info{border:1px solid #ccc;padding:10px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .info label{font-size:10px;font-weight:bold;color:#555;display:block}
    .info span{font-size:12px;font-weight:bold}
    table{width:100%;border-collapse:collapse;margin-bottom:20px}
    th{background:#1a2744;color:white;padding:7px;text-align:left;font-size:11px}
    td{padding:7px;border-bottom:1px solid #eee;font-size:11px}
    tr:nth-child(even) td{background:#f9f9f9}
    .footer{text-align:center;font-size:9px;color:#aaa;margin-top:20px;border-top:1px solid #eee;padding-top:8px}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  </style></head><body>
  <h2>Gürok Turizm Grubu</h2>
  <div class="sub">Sipariş Formu</div>
  <div class="info">
    <div><label>Sipariş No</label><span>${g.siparisNo||'—'}</span></div>
    <div><label>Tedarikçi Firma</label><span>${g.firmaAd}</span></div>
    <div><label>Sipariş Tarihi</label><span>${tarih}</span></div>
    <div><label>Hazırlayan</label><span>${CU.ad}</span></div>
    ${termin?`<div><label>Termin Tarihi</label><span>${termin}</span></div>`:''}
  </div>
  <table>
    <thead><tr><th>#</th><th>Ürün Adı</th><th>LN Kodu</th><th>Miktar</th><th>Birim</th><th>Teklif Fiyatı</th></tr></thead>
    <tbody>${g.kalemler.map((k,i)=>`<tr>
      <td>${i+1}</td><td><b>${k.ad}</b></td>
      <td style="font-family:monospace;font-size:10px">${k.kod||'—'}</td>
      <td style="text-align:center;font-weight:bold">${k.miktar}</td>
      <td>${k.birim}</td>
      <td style="color:#aaa">...............</td>
    </tr>`).join('')}</tbody>
  </table>
  <div style="margin-top:30px;border-top:1px solid #ccc;padding-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:40px">
    <div><div style="font-size:11px;font-weight:bold;margin-bottom:30px">Satın Alma Sorumlusu</div><div style="border-bottom:1px solid #000;margin-bottom:6px"></div><div style="font-size:10px">${CU.ad}</div></div>
    <div><div style="font-size:11px;font-weight:bold;margin-bottom:30px">Tedarikçi Yetkilisi</div><div style="border-bottom:1px solid #000;margin-bottom:6px"></div><div style="font-size:10px">İmza / Tarih</div></div>
  </div>
  <div class="footer">Gürok Turizm Grubu — Satın Alma Sistemi • ${new Date().toLocaleString('tr-TR')}</div>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`;
  const w=window.open('','_blank','width=800,height=1100');
  if(w){w.document.write(html);w.document.close();}
  else toast('⚠️ Popup engellendi');
}

function spMail(gi){
  const g=window._spGruplar[gi];
  const tarih=window._spTarih||'';
  const termin=window._spTermin||'';
  const firma=DB.firmalar.find(f=>f.id==g.firmaId||f.ad===g.firmaAd);
  const mail=firma?.mail||'';
  const kalemler=g.kalemler.map((k,i)=>`${i+1}. ${k.ad} — ${k.miktar} ${k.birim}`).join('\n');
  const body=`Sayın ${g.firmaAd},\n\nSipariş No: ${g.siparisNo||'—'}\n\nAşağıdaki ürünler için fiyat teklifinizi bekliyoruz:\n\n${kalemler}\n\nSipariş Tarihi: ${tarih}${termin?'\nTermin Tarihi: '+termin:''}\n\nSaygılarımızla,\n${CU.ad}\nGürok Turizm Grubu`;
  const subject=encodeURIComponent(`Sipariş ${g.siparisNo||''} — ${g.firmaAd} — ${tarih}`);
  window.open(`mailto:${mail}?subject=${subject}&body=${encodeURIComponent(body)}`);
}

function addSPSatir(data){
  SP_SATIRLAR.push({ad:'',kod:'',miktar:'',birim:'KG',firmaId:'',firmaAd:'',tahminiFiyat:'',...(data||{})});
  renderSPSatirlar();
  setTimeout(()=>{const inp=document.getElementById('spa'+(SP_SATIRLAR.length-1));if(inp)inp.focus();},50);
}

function autoFirma(kod){
  if(!DB.firmalar||!DB.firmalar.length) return null;
  const firma = DB.firmalar.find(f => f.urunler && f.urunler.includes(kod));
  return firma || null;
}

function renderSPSatirlar(){
  const c=document.getElementById('sp-satirlar');if(!c)return;
  if(!SP_SATIRLAR.length){c.innerHTML='<div style="text-align:center;color:var(--gray-400);padding:16px;font-size:13px">Kalem eklemek için + Ekle butonuna basın</div>';return;}
  c.innerHTML=SP_SATIRLAR.map((u,i)=>`
    <div class="usatir">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="background:var(--primary);color:white;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</div>
        <div style="font-size:13px;font-weight:600;flex:1">${u.ad||'Kalem '+(i+1)}</div>
        <button onclick="SP_SATIRLAR.splice(${i},1);renderSPSatirlar()" style="background:none;border:none;color:var(--gray-400);font-size:16px;cursor:pointer">✕</button>
      </div>
      <div style="position:relative;margin-bottom:8px">
        <input type="text" id="spa${i}" value="${u.ad}" placeholder="Ürün adı veya LN kodu..."
          autocomplete="off" oninput="filterSPUrun(${i},this.value)"
          style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none">
        <div id="spdd${i}" class="udd"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">MİKTAR</label>
          <input type="number" value="${u.miktar}" placeholder="0" oninput="SP_SATIRLAR[${i}].miktar=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none"></div>
        <div><label style="font-size:11px;font-weight:600;color:var(--gray-600)">BİRİM</label>
          <select id="spb${i}" onchange="SP_SATIRLAR[${i}].birim=this.value"
            style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;-webkit-appearance:none;outline:none">
            ${['KG','AD','KOL','LT','PKT','TRB','TNK','BOT'].map(b=>`<option${u.birim===b?' selected':''}>${b}</option>`).join('')}
          </select></div>
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:11px;font-weight:600;color:var(--gray-600)">TAHMİNİ/ANLAŞILAN FİYAT (₺, opsiyonel)</label>
        <input type="number" value="${u.tahminiFiyat||''}" placeholder="Bilmiyorsan boş bırak" min="0" step="0.01" oninput="SP_SATIRLAR[${i}].tahminiFiyat=this.value"
          style="width:100%;padding:9px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none">
        <div style="font-size:10px;color:var(--gray-500);margin-top:2px">Girilirse, mal kabulde koli bu fiyatla başlar — fatura gelince gerçek fiyatla otomatik güncellenir</div>
      </div>
      <div style="position:relative">
        <label style="font-size:11px;font-weight:600;color:var(--gray-600)">FİRMA</label>
        <input type="text" id="spf${i}" value="${(u.firmaAd||'').replace(/"/g,'&quot;')}" placeholder="Firma ara veya değiştir..."
          autocomplete="off" oninput="filterSPFirma(${i},this.value)"
          style="width:100%;padding:9px 12px;border:1.5px solid ${u.firmaAd?'var(--success)':'var(--gray-300)'};border-radius:8px;font-size:13px;outline:none;color:${u.firmaAd?'var(--success)':'inherit'};font-weight:${u.firmaAd?'600':'400'}">
        <div id="spfdd${i}" class="udd"></div>
      </div>
    </div>`).join('');
}

function filterSPFirma(i,val){
  SP_SATIRLAR[i].firmaAd=val;
  SP_SATIRLAR[i].firmaId='';
  const dd=document.getElementById('spfdd'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const res=(DB.firmalar||[]).filter(f=>f.ad.toLowerCase().includes(val.toLowerCase())).slice(0,12);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(f=>`<div class="uddi" data-i="${i}" data-id="${f.id}" data-ad="${f.ad.replace(/"/g,'&quot;')}">${f.ad}</div>`).join('');
  dd.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=parseInt(this.dataset.i);
      SP_SATIRLAR[idx].firmaId=this.dataset.id;
      SP_SATIRLAR[idx].firmaAd=this.dataset.ad;
      const finp=document.getElementById('spf'+idx);
      if(finp){finp.value=this.dataset.ad;finp.style.borderColor='var(--success)';finp.style.color='var(--success)';finp.style.fontWeight='600';}
      dd.style.display='none';
    });
  });
  dd.style.display='block';
}

function filterSPUrun(i,val){
  SP_SATIRLAR[i].ad=val;
  const dd=document.getElementById('spdd'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const urunDB=DB.urunler||(window.URUN_DB||[]);
  const res=urunDB.filter(u=>u.ad?.toLowerCase().includes(val.toLowerCase())||u.kod?.toLowerCase().includes(val.toLowerCase())).slice(0,15);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(u=>`<div class="uddi" data-i="${i}" data-kod="${u.kod}" data-ad="${(u.ad||'').replace(/"/g,'&quot;')}" data-birim="${u.birim||'KG'}">
    ${u.ad} <span style="font-size:10px;color:var(--gray-400)">${u.kod}</span>
  </div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const idx=parseInt(this.dataset.i);
      const firma=autoFirma(this.dataset.kod);
      SP_SATIRLAR[idx]={...SP_SATIRLAR[idx],ad:this.dataset.ad,kod:this.dataset.kod,birim:this.dataset.birim,
        firmaId:firma?.id||SP_SATIRLAR[idx].firmaId||'',firmaAd:firma?.ad||SP_SATIRLAR[idx].firmaAd||''};
      dd.style.display='none';
      const inp=document.getElementById('spa'+idx);if(inp)inp.value=this.dataset.ad;
      const sel=document.getElementById('spb'+idx);if(sel)sel.value=this.dataset.birim||'KG';
      const finp=document.getElementById('spf'+idx);
      if(finp&&firma){finp.value=firma.ad;finp.style.borderColor='var(--success)';finp.style.color='var(--success)';finp.style.fontWeight='600';}
    });
  });
  dd.style.display='block';
}
document.addEventListener('pointerdown',e=>{
  SP_SATIRLAR.forEach((_,i)=>{
    const dd=document.getElementById('spdd'+i);const inp=document.getElementById('spa'+i);
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp)dd.style.display='none';
    const fdd=document.getElementById('spfdd'+i);const finp=document.getElementById('spf'+i);
    if(fdd&&finp&&!fdd.contains(e.target)&&e.target!==finp)fdd.style.display='none';
  });
});

document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ====== INIT ======
(async function(){
  if(!CU) return;
  document.getElementById('hsub').textContent=CU.ad;
  YETKI_HARITASI = await kullaniciYetkileriGetir();
  document.getElementById('sp-grupla-btn').disabled = !['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur']);

  document.getElementById('sp-tarih').value=new Date().toISOString().split('T')[0];
  document.getElementById('sp-termin').value='';

  // Bridge A alıcı tarafı — İç Talepler'den "Siparişe Dönüştür" ile geldiyse
  // kalemler burada bekliyor olur (bkz. satin-alma-talepler.html: talepSipariseDonustur).
  const devir=sessionStorage.getItem('sp_devir_satirlar');
  if(devir){
    sessionStorage.removeItem('sp_devir_satirlar');
    try{
      SP_SATIRLAR=JSON.parse(devir);
    }catch(e){SP_SATIRLAR=[];}
  }
  if(SP_SATIRLAR.length===0)addSPSatir();
  renderSPSatirlar();
})();
</script>
