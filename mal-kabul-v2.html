function izlemeSwitchTab(tab){
  document.getElementById('izleme-analiz-panel').style.display=tab==='analiz'?'block':'none';
  document.getElementById('izleme-raporlar-panel').style.display=tab==='raporlar'?'block':'none';
  document.getElementById('izleme-esleme-panel').style.display=tab==='esleme'?'block':'none';
  document.getElementById('izl-tab-analiz').classList.toggle('active',tab==='analiz');
  document.getElementById('izl-tab-raporlar').classList.toggle('active',tab==='raporlar');
  document.getElementById('izl-tab-esleme').classList.toggle('active',tab==='esleme');
  if(tab==='analiz')renderIzlemeAnaliz();
  else if(tab==='raporlar')renderIzlemeRaporlar();
  else renderEslemeRaporu();
}

function renderIzlemeAnaliz(){
  const startVal=document.getElementById('izl-filter-start').value;
  const endVal=document.getElementById('izl-filter-end').value;
  const search=(document.getElementById('izl-filter-search').value||'').toLowerCase().trim();
  const start=startVal?new Date(startVal).getTime():0;
  const end=endVal?new Date(endVal+'T23:59:59').getTime():Date.now()+86400000;
  const c=document.getElementById('izleme-analiz-icerik');

  let liste=Object.values(malKabuller).filter(f=>{
    const t=new Date(f.tarih).getTime();
    if(t<start||t>end)return false;
    if(search){
      const firmaMatch=(f.firma||'').toLowerCase().includes(search);
      const urunMatch=f.urunler.some(u=>(u.ad||'').toLowerCase().includes(search));
      if(!firmaMatch&&!urunMatch)return false;
    }
    return true;
  });
  liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);

  const toplamUrun=liste.reduce((t,f)=>t+f.urunler.length,0);
  const uygunsuzFormSayisi=liste.filter(f=>(uygunsuzluklarAcik[f.id]||[]).length>0).length;
  const uygunsuzOran=liste.length?((uygunsuzFormSayisi/liste.length)*100).toFixed(1):0;

  const firmaStats={};
  liste.forEach(f=>{
    if(!firmaStats[f.firma])firmaStats[f.firma]={total:0,uygunsuz:0,urunSayisi:0};
    firmaStats[f.firma].total++;
    firmaStats[f.firma].urunSayisi+=f.urunler.length;
    if((uygunsuzluklarAcik[f.id]||[]).length>0)firmaStats[f.firma].uygunsuz++;
  });
  const topFirmalar=Object.entries(firmaStats).sort((a,b)=>b[1].uygunsuz-a[1].uygunsuz).slice(0,15);

  const durumChip={bekleyen:'<span class="chip chip-yellow">⏳</span>',onaylandi:'<span class="chip chip-green">✅</span>',iptal:'<span class="chip chip-red">❌</span>'};

  c.innerHTML=`
    <div class="stats-grid">
      <div class="stat-kart"><div class="stat-num">${liste.length}</div><div class="stat-lbl">Toplam Form</div></div>
      <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${liste.filter(f=>f.durum==='onaylandi').length}</div><div class="stat-lbl">Onaylanan</div></div>
      <div class="stat-kart"><div class="stat-num">${toplamUrun}</div><div class="stat-lbl">Toplam Ürün</div></div>
      <div class="stat-kart"><div class="stat-num" style="color:${uygunsuzOran>=15?'var(--danger)':'var(--warning)'}">${uygunsuzOran}%</div><div class="stat-lbl">Uygunsuzluk Oranı</div></div>
    </div>

    <div class="card">
      <div class="card-title">🏢 Firma Analizi</div>
      ${!topFirmalar.length?'<div class="es"><div class="et">Veri yok</div></div>':topFirmalar.map(([firma,s])=>{
        const oran=s.total>0?Math.round((s.uygunsuz/s.total)*100):0;
        const kritik=oran>=15;
        return`<div style="padding:8px 0;border-bottom:1px solid var(--gray-100)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div>
              <div style="font-size:13px;font-weight:600">${escapeHtml(firma)}</div>
              <div style="font-size:11px;color:var(--gray-500)">${s.total} teslimat • ${s.urunSayisi} ürün • ${s.uygunsuz} uygunsuz</div>
            </div>
            <span class="chip ${kritik?'chip-red':s.uygunsuz>0?'chip-yellow':'chip-green'}">${kritik?'🔴':s.uygunsuz>0?'🟡':'✅'} %${oran}</span>
          </div>
          <div style="background:var(--gray-200);border-radius:6px;height:6px;overflow:hidden">
            <div style="background:${kritik?'var(--danger)':'var(--warning)'};height:100%;width:${Math.min(oran,100)}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-title">📋 Formlar (${liste.length})</div>
      ${!liste.length?'<div class="es"><div class="et">Kayıt yok</div></div>':liste.slice(0,50).map(f=>{
        const uygunsuzlar=uygunsuzluklarAcik[f.id]||[];
        return`<div class="mk-kart" style="cursor:pointer" onclick="openDetay('${f.id}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:13px;font-weight:600">${escapeHtml(f.firma)}</div>
              <div style="font-size:11px;color:var(--gray-500)">${f.tarih} • ${escapeHtml(f.personel)} • ${f.urunler.length} ürün</div>
              ${uygunsuzlar.length?`<div style="font-size:11px;color:var(--danger);margin-top:2px">⚠️ ${uygunsuzlar.length} uygunsuzluk bildirimi</div>`:''}
            </div>
            ${durumChip[f.durum]||''}
          </div>
        </div>`;
      }).join('')}
      ${liste.length>50?`<div style="text-align:center;font-size:12px;color:var(--gray-500);padding:8px">+${liste.length-50} daha — tarihi daraltın</div>`:''}
    </div>`;
}

async function renderIzlemeRaporlar(){
  const c=document.getElementById('izleme-raporlar-icerik');
  const startVal=document.getElementById('izl-rapor-start').value;
  const endVal=document.getElementById('izl-rapor-end').value;
  c.innerHTML='<div class="es"><div class="et">Yükleniyor...</div></div>';

  let rows=[];
  try{
    const r=await fetch(SB_URL+'/rest/v1/uygunsuzluklar?select=*&order=olusturma_tarihi.desc',{headers:SB_HEADERS});
    if(r.ok)rows=await r.json();
  }catch(e){console.warn(e);}

  const start=startVal?new Date(startVal).getTime():0;
  const end=endVal?new Date(endVal+'T23:59:59').getTime():Date.now();
  const filtered=rows.filter(u=>{
    if(!u.olusturma_tarihi)return true;

  if(!filtered.length){c.innerHTML='<div class="es"><div class="ei">✅</div><div class="et">Bu dönemde uygunsuzluk formu yok</div></div>';return;}

  const kararEtiket={iade:'İade',sartli:'Şartlı Kullanım',imha:'İmha',duzeltme:'Düzeltme/Tekrar İşleme'};
  c.innerHTML=`
    <div style="font-size:13px;font-weight:600;margin:6px 0">${filtered.length} form bulundu</div>
    ${filtered.map(u=>`<div class="mk-kart" style="border-left-color:${u.durum==='acik'?'var(--danger)':'var(--success)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">

          <div style="font-size:11px;color:var(--gray-400);margin-top:2px">${new Date(u.olusturma_tarihi).toLocaleDateString('tr-TR')} • ${escapeHtml(u.bildiren_ad)||'—'}</div>

        <span class="chip ${u.durum==='acik'?'chip-red':'chip-green'}">${u.durum==='acik'?'⏳ Açık':'✅ Kapatıldı'}</span>
      </div>
      ${u.karar?`<div style="margin-top:6px"><span class="chip chip-purple">Karar: ${kararEtiket[u.karar]||u.karar}</span></div>`:''}

}

function renderEslemeRaporu(){
  const satirlar=Object.values(malKabuller).filter(f=>f.durum!=='iptal').map(f=>{
    const siparis=!!(f.lnSiparisNo&&f.lnSiparisNo.trim());
    const irsaliye=!!(f.irsaliyeNo&&f.irsaliyeNo.trim());
    const fatura=!!(f.faturaNo&&f.faturaNo.trim());
    let durum;
    if(siparis&&irsaliye&&fatura)durum='tam';
    else if(irsaliye&&!fatura)durum='fatura_bek';
    else durum='eksik';
    return{...f,_siparis:siparis,_irsaliye:irsaliye,_fatura:fatura,_durum:durum};
  });

  const tam=satirlar.filter(s=>s._durum==='tam').length;
  const faturaBek=satirlar.filter(s=>s._durum==='fatura_bek').length;
  const eksik=satirlar.filter(s=>s._durum==='eksik').length;
  document.getElementById('esleme-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${tam}</div><div class="stat-lbl">✅ Tam Eşleşti</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--warning)">${faturaBek}</div><div class="stat-lbl">⏳ Fatura Bekliyor</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--danger)">${eksik}</div><div class="stat-lbl">❌ Eksik</div></div>`;

  let liste=eslemeFilter==='tumu'?satirlar:satirlar.filter(s=>s._durum===eslemeFilter);
  liste=liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);

  const c=document.getElementById('esleme-icerik');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">🔗</div><div class="et">Kayıt yok</div></div>';return;}
  c.innerHTML=liste.map(f=>{
    const kenar=f._durum==='tam'?'var(--success)':f._durum==='fatura_bek'?'var(--warning)':'var(--danger)';
    return`<div class="mk-kart" style="border-left-color:${kenar};cursor:pointer" onclick="openDetay('${f.id}')">
      <div style="font-size:13px;font-weight:700">${f.mkNo}</div>
      <div style="font-size:11px;color:var(--gray-500)">🏢 ${f.firma} • ${f.tarih}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px">
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._siparis?'#d4edda':'var(--gray-100)'}">
          <div style="font-size:10px;font-weight:700;color:${f._siparis?'#155724':'var(--gray-500)'}">${f._siparis?'✅':'—'} SİPARİŞ</div>
          <div style="font-size:9px;color:var(--gray-500);margin-top:1px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.lnSiparisNo||'yok'}</div>
        </div>
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._irsaliye?'#d4edda':'#fde8e8'}">
          <div style="font-size:10px;font-weight:700;color:${f._irsaliye?'#155724':'#9b1c1c'}">${f._irsaliye?'✅':'❌'} İRSALİYE</div>
          <div style="font-size:9px;color:var(--gray-500);margin-top:1px">${f.irsaliyeNo||'yok'}</div>
        </div>
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._fatura?'#d4edda':'#fff3cd'}">
          <div style="font-size:10px;font-weight:700;color:${f._fatura?'#155724':'#856404'}">${f._fatura?'✅':'⏳'} FATURA</div>

function lnExportYap(){
  const bas=document.getElementById('exp-bas').value;
  const bit=document.getElementById('exp-bit').value;
  const otelFiltre=document.getElementById('exp-otel').value;
  let liste=Object.values(malKabuller).filter(f=>f.durum==='onaylandi'&&f.tarih>=bas&&f.tarih<=bit);
  if(otelFiltre)liste=liste.filter(f=>f.otelId===otelFiltre);
  if(!liste.length){toast('⚠️ Bu kriterlere uygun onaylı kayıt yok');return;}

  let satirlar=[['Kabul No','Tarih','Firma','İrsaliye','Fatura','Otel','Depo','Ürün Kodu','Ürün Adı','Miktar','Birim']];
  liste.forEach(f=>{
    const depoAd=f.otelId==='811'?'RESORT ISLETME DEPO':'CLUB ISLETME DEPO';
    f.urunler.forEach(u=>{
      satirlar.push([f.mkNo,f.tarih,f.firma,f.irsaliyeNo,f.faturaNo,OTEL_KISA[f.otelId],depoAd,u.kod,u.ad,u.miktar,u.birim]);
    });
  });
  const csv=satirlar.map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=`LN_Export_${bas}_${bit}.csv`;
  link.click();
  toast('✅ Export indirildi');
}

async function mkFormuIndir(){
  const bas=document.getElementById('exp-bas').value;
  const bit=document.getElementById('exp-bit').value;
  const otelFiltre=document.getElementById('exp-otel').value;
  let liste=Object.values(malKabuller).filter(f=>f.durum==='onaylandi'&&f.tarih>=bas&&f.tarih<=bit);
  if(otelFiltre)liste=liste.filter(f=>f.otelId===otelFiltre);
  if(!liste.length){toast('⚠️ Bu kriterlere uygun onaylı kayıt yok');return;}

  toast('⏳ Form hazırlanıyor...');
  const mkIds=liste.map(f=>f.id);

  // SKT ve uygunsuzluk verilerini bu kayıtlar için çek (form içinde SKT/MKK sütunlarını doldurmak için)
  let sktMap={}, uygunsuzMap={};
  try{
    const idListesi=mkIds.map(id=>`"${id}"`).join(',');
    const [sktR,ugR]=await Promise.all([
      fetch(SB_URL+`/rest/v1/skt_kayitlari?mk_id=in.(${idListesi})&select=mk_id,urun_kodu,skt_tarihi`,{headers:SB_HEADERS}),
      fetch(SB_URL+`/rest/v1/uygunsuzluklar?mk_id=in.(${idListesi})&select=mk_id,urun_kodu,aciklama`,{headers:SB_HEADERS}),
    ]);
    if(sktR.ok)(await sktR.json()).forEach(r=>{sktMap[r.mk_id+'|'+(r.urun_kodu||'')]=r.skt_tarihi;});
    if(ugR.ok)(await ugR.json()).forEach(r=>{uygunsuzMap[r.mk_id+'|'+(r.urun_kodu||'')]=r.aciklama;});
  }catch(e){console.warn(e);}

  await loadXlsxLib();
  buildMkFormuXlsx(liste,sktMap,uygunsuzMap,bas,bit);
}

function buildMkFormuXlsx(liste,sktMap,uygunsuzMap,bas,bit){
  const wb=XLSX.utils.book_new();
  const personelAdi=currentUser?currentUser.ad:'';

  const thin={style:'thin',color:{rgb:'000000'}};
  const thick={style:'thick',color:{rgb:'000000'}};
  const bAll={top:thin,bottom:thin,left:thin,right:thin};
  const bThick={top:thick,bottom:thick,left:thick,right:thick};
  const hdrStyle={font:{bold:true,sz:13,name:'Arial'},alignment:{horizontal:'center',vertical:'center'},border:bThick};
  const colHdrStyle={font:{bold:true,sz:9,name:'Arial'},fill:{fgColor:{rgb:'DDEBF7'},patternType:'solid'},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bAll};
  const noteStyle={font:{sz:8,name:'Arial',bold:true},border:{top:thin,bottom:thin}};
  const centerCols=[4,5,8,9,10,11,12,14];

  function setRangeStyle(ws,r1,c1,r2,c2,style){
    for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
      const addr=XLSX.utils.encode_cell({r,c});
      if(!ws[addr])ws[addr]={t:'z',v:''};
      ws[addr].s=style;
    }
  }

  function buildSheet(satirDilimi,sayfaNo,toplamSayfa){
    const R=Array.from({length:35},()=>Array(16).fill(null));
    R[0][0]=toplamSayfa>1?`MAL KABUL FORMU  (${sayfaNo}/${toplamSayfa})`:'MAL KABUL FORMU';
    R[1][0]='Tarih';R[1][1]='Firma Adı';R[1][2]='Fatura no';R[1][3]='Seri no/';
    R[1][4]='Araç';R[1][6]='Malzeme Adı';R[1][7]='SKT';
    R[1][8]='Yarı\nÖmrünü\nGeçmiş mi?';R[1][9]='Ölçülen Değer';
    R[1][12]='MKK';R[1][13]='Açıklama';R[1][14]='İmzalar';
    R[2][2]='İrsaliye no';R[2][3]='Parti no';R[2][4]='Hijyen';R[2][5]='Sıcaklık';
    R[2][9]='Ürün\nSıcaklığı';R[2][10]='Kg.';R[2][11]='Adet';

    for(let i=0;i<13;i++){
      const s=satirDilimi[i]||{};
      R[3+i][0]=s.tarih||null;R[3+i][1]=s.firma||null;R[3+i][2]=s.fatura||null;
      R[3+i][3]=s.seri||null;R[3+i][4]=s.hijyen||null;R[3+i][5]=s.aracSicaklik||null;
      R[3+i][6]=s.malzeme||null;R[3+i][7]=s.skt||null;R[3+i][8]=s.yariOmur||null;
      R[3+i][9]=s.urunSicaklik||null;R[3+i][10]=s.kg||null;R[3+i][11]=s.adet||null;
      R[3+i][12]=s.mkk||null;R[3+i][13]=s.aciklama||null;
      if(s.malzeme){R[3+i][14]=personelAdi+' ✅';R[3+i][15]=null;}
    }

    R[17][0]='Not: Denetim sırasında UYGUN görülen durumlar için ilgili kolona + yazılacaktır.';
    R[18][0]='Denetim sırasında UYGUN OLMADIĞI görülen durumlar için - yazılacaktır. Açıklama kısmında ise uygunsuzluğun tanımı yapılacak.';
    R[19][0]='Mal Kabul Kriterleri : Gıda malzemesinin uygunluğu için Hammadde Özellikleri Tablosu nitelikleri aranır.';
    R[22][0]='1. Derece riskli ürünler: Tüm et ve et ürünleri, şarküteri ürünleri, balık ve deniz ürünleri, kümes hayvanları ürünleri, pasta kreması, yumurta';
    R[23][0]='2. Derece riskli ürünler: Dondurulmuş meyve sebze, konserve, katı ve sıvı yağlar';
    R[24][0]='3. Derece riskli ürünler: Turşular, kuruyemiş vb., kuru gıda, baharat, bal, corn flakes, marmelat, reçel, pekmez, zeytin, tahın, bakliyat';
    R[25][0]='4. Derece riskli ürünler: Sebze, meyve';
    R[26][0]='Alerjen gıdalar: Gluten içeren tahıllar, Kabuklular, Yumurta, Balık, Yerfıstığı, Soya fasulyesi, süt ürünleri, Sert kabuklu meyveler, Kereviz, Hardal, Susam tohumu, Kükürt dioksit, sülfitler, Acı bakla, Yumuşakçalar';
    R[34][0]='Doküman No:F.22';R[34][7]='Yayın Tarihi:15.02.2026';R[34][14]='Rev.Tarihi/No:-/00';

    const ws=XLSX.utils.aoa_to_sheet(R);
    ws['!merges']=[
      {s:{r:0,c:0},e:{r:0,c:15}},
      {s:{r:1,c:0},e:{r:2,c:0}},{s:{r:1,c:1},e:{r:2,c:1}},{s:{r:1,c:4},e:{r:1,c:5}},
      {s:{r:1,c:6},e:{r:2,c:6}},{s:{r:1,c:7},e:{r:2,c:7}},{s:{r:1,c:8},e:{r:2,c:8}},
      {s:{r:1,c:9},e:{r:1,c:11}},{s:{r:1,c:12},e:{r:2,c:12}},
      {s:{r:1,c:13},e:{r:2,c:13}},{s:{r:1,c:14},e:{r:2,c:15}},
      {s:{r:17,c:0},e:{r:17,c:15}},{s:{r:18,c:0},e:{r:18,c:15}},
      {s:{r:19,c:0},e:{r:19,c:15}},{s:{r:22,c:0},e:{r:22,c:12}},
      {s:{r:23,c:0},e:{r:23,c:12}},{s:{r:24,c:0},e:{r:24,c:12}},
      {s:{r:25,c:0},e:{r:25,c:12}},{s:{r:26,c:0},e:{r:26,c:12}},
      {s:{r:34,c:0},e:{r:34,c:2}},{s:{r:34,c:7},e:{r:34,c:8}},
      {s:{r:34,c:14},e:{r:34,c:15}},
    ];
    ws['!cols']=[
      {wch:11.875},{wch:22.5},{wch:13.125},{wch:17.5},{wch:7.5},{wch:8.125},
      {wch:20},{wch:16.875},{wch:11.875},{wch:9.375},{wch:8.125},{wch:8.125},
      {wch:9},{wch:23.75},{wch:11.25},{wch:10.625}
    ];
    const rh={1:28.5,2:16.5,3:7.5,4:21,5:31.5};
    for(let i=6;i<=18;i++)rh[i]=33;
    [20,21,22,23,25,26,27,28,29].forEach(r=>rh[r]=13.5);
    [31,32,33,34,35,36].forEach(r=>rh[r]=23.25);rh[37]=16.5;
    ws['!rows']=Array.from({length:35},(_,i)=>rh[i+1]?{hpt:rh[i+1]}:{});
    ws['!pageSetup']={orientation:'landscape',paperSize:9};

    setRangeStyle(ws,0,0,0,15,hdrStyle);
    setRangeStyle(ws,1,0,2,15,colHdrStyle);
    const bMed={top:{style:'medium',color:{rgb:'000000'}},bottom:{style:'medium',color:{rgb:'000000'}},left:{style:'medium',color:{rgb:'000000'}},right:{style:'medium',color:{rgb:'000000'}}};
    const dataStyleMed={font:{sz:10,name:'Arial'},alignment:{vertical:'center',wrapText:true},border:bMed};
    const dataCenterStyleMed={font:{sz:10,name:'Arial'},alignment:{horizontal:'center',vertical:'center'},border:bMed};
    for(let r=3;r<=15;r++){
      for(let c=0;c<=15;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        if(!ws[addr])ws[addr]={t:'s',v:''};
        ws[addr].s=centerCols.includes(c)?dataCenterStyleMed:dataStyleMed;
      }
    }
    setRangeStyle(ws,17,0,26,15,noteStyle);
    return ws;
  }

  // Ürün satırlarını düzleştir
  const urunSatirlari=[];
  liste.forEach(f=>{
    const tarih=f.tarih?new Date(f.tarih).toLocaleDateString('tr-TR'):'';
    f.urunler.forEach(u=>{
      const sktTarihi=sktMap[f.id+'|'+(u.kod||'')]||'';
      let yariOmur='';
      if(sktTarihi){
        const sktDt=new Date(sktTarihi),kabulDt=new Date(f.tarih),now=new Date();
        const toplam=(sktDt-kabulDt)/86400000;
        const kalan=(sktDt-now)/86400000;
        yariOmur=(toplam>0&&kalan<toplam/2)?'EVET':'HAYIR';
      }
      const uygunsuzAciklama=uygunsuzMap[f.id+'|'+(u.kod||'')];
      let aciklama=u.marka||'';
      if(uygunsuzAciklama)aciklama+=(aciklama?' — ':'')+uygunsuzAciklama;
      urunSatirlari.push({
        tarih,firma:f.firma||'',
        fatura:(f.faturaNo||'')+(f.irsaliyeNo?'\n'+f.irsaliyeNo:''),
        seri:u.seriNo||'',
        hijyen:f.aracHijyen==='uygun'?'+':'-',
        aracSicaklik:f.aracSicaklik||'',
        malzeme:u.ad||'',skt:sktTarihi||'',yariOmur,
        urunSicaklik:u.sicaklik||'',
        kg:u.birim==='KG'?u.miktar:'',adet:u.birim!=='KG'?u.miktar:'',
        mkk:uygunsuzAciklama?'-':'+',aciklama,
      });
    });
  });

  const toplamSayfa=Math.max(1,Math.ceil(urunSatirlari.length/13));
  for(let p=0;p<toplamSayfa;p++){
    const dilim=urunSatirlari.slice(p*13,(p+1)*13);
    const ws=buildSheet(dilim,p+1,toplamSayfa);
    const sayfaAdi=toplamSayfa>1?`Sayfa ${p+1}`:'Mal Kabul Formu';
    XLSX.utils.book_append_sheet(wb,ws,sayfaAdi);
  }

  XLSX.writeFile(wb,`gurok_malkabul_${bas}_${bit}.xlsx`);
  toast(`✅ Resmi form indirildi — ${toplamSayfa} sayfa`);
}

function gTab(tab,el){
  document.querySelectorAll('.sc').forEach(s=>s.style.display='none');
  document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  el.classList.add('active');
  if(tab==='liste')mkSwitchView('form');
  if(tab==='kalite')renderKaliteOnay();
  if(tab==='uygun')renderUygun();
  if(tab==='esleme')izlemeSwitchTab('analiz');
}
