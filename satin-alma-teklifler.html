<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Teklifler</title>
<meta name="theme-color" content="#1a2744">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-warn{background:#fff3cd;color:#856404}.chip-ok{background:#d4edda;color:#155724}.chip-err{background:#fde8e8;color:#9b1c1c}.chip-info{background:#dfeae7;color:#2c5850}.chip-gray{background:var(--gray-200);color:var(--gray-700)}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.skart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='satin-alma.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div style="flex:1"><h1>Teklifler</h1><span class="sub" id="hsub"></span></div>
  </div>

  <div class="sc" id="tab-teklifler">
    <div class="ftabs" id="teklif-ftabs">
      <button class="ftab active" onclick="filterTeklif('tumu',this)">Tümü</button>
      <button class="ftab" onclick="filterTeklif('acik',this)">Açık</button>
      <button class="ftab" onclick="filterTeklif('kapandi',this)">Kapandı</button>
    </div>
    <div id="teklifler-liste"></div>
  </div>
</div>

<!-- MODAL: Teklif (RFQ) Detay -->
<div class="mo" id="mTeklifDetay">
  <div class="mbox">
    <div class="mtitle">Teklif Talebi <button class="mclose" onclick="kModal('mTeklifDetay')">✕</button></div>
    <div id="mTeklifDetayIc"></div>
  </div>
</div>

<!-- MODAL: Tedarikçi Teklif Fiyat Girişi -->
<div class="mo" id="mTedarikciTeklif">
  <div class="mbox">
    <div class="mtitle">Teklif Fiyatı Gir <button class="mclose" onclick="kModal('mTedarikciTeklif')">✕</button></div>
    <div id="mTedarikciTeklifIc"></div>
  </div>
</div>

<!-- MODAL: Teklif Karşılaştırma -->
<div class="mo" id="mTeklifKarsilastirma">
  <div class="mbox" style="max-width:700px">
    <div class="mtitle">Teklif Karşılaştırma <button class="mclose" onclick="kModal('mTeklifKarsilastirma')">✕</button></div>
    <div id="mTeklifKarsilastirmaIc"></div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal/loadXlsxLib -> ortak.js
// FIRMA_DB/URUN_DB -> gurok_veritabani.js
// excelSablonIndir/excelDosyaOku/excelSatirlariSiniflandir/excelOnizlemeGoster/
// excelTopluYaz/excelImportGecmisiYaz -> ortak-excel.js

let DB={firmalar:typeof FIRMA_DB!=='undefined'?FIRMA_DB:[],teklifler:{}};
let YETKI_HARITASI = {};
let teklifFilter='tumu';

function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function loadTeklifler(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/teklif_talepleri?select=*,teklif_talep_kalemleri(*),tedarikci_teklifler(*,tedarikci_teklif_kalemleri(*))&order=olusturma_tarihi.desc',{headers:SB_HEADERS});
    if(r.ok){
      DB.teklifler={};
      (await r.json()).forEach(rw=>{
        DB.teklifler[rw.id]={
          id:rw.id,talepId:rw.talep_id,otelId:rw.otel_id,olusturanAd:rw.olusturan_ad||'',
          olusturmaTarih:rw.olusturma_tarihi?new Date(rw.olusturma_tarihi).getTime():Date.now(),
          durum:rw.durum||'acik',not:rw.not_alani||'',
          kalemler:(rw.teklif_talep_kalemleri||[]).map(k=>({id:k.id,kod:k.urun_kodu||'',ad:k.urun_adi,miktar:k.miktar,birim:k.birim})),
          tedarikciler:(rw.tedarikci_teklifler||[]).map(tf=>({
            id:tf.id,firmaAd:tf.firma_ad,firmaKodu:tf.firma_kodu||'',durum:tf.durum||'bekleniyor',
            teklifTarihi:tf.teklif_tarihi,
            fiyatlar:(tf.tedarikci_teklif_kalemleri||[]).map(k=>({id:k.id,kalemId:k.teklif_talep_kalem_id,birimFiyat:k.birim_fiyat}))
          }))
        };
      });
    }
  }catch(e){console.warn(e);}
  renderTeklifler();
}

function filterTeklif(f,el){
  teklifFilter=f;
  document.querySelectorAll('#teklif-ftabs .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTeklifler();
}

function renderTeklifler(){
  const c=document.getElementById('teklifler-liste');if(!c)return;
  let liste=Object.values(DB.teklifler||{}).filter(Boolean);
  if(teklifFilter!=='tumu')liste=liste.filter(tk=>tk.durum===teklifFilter);
  liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 5h13l1.5 7v6a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-6z"/></svg></div><div class="et">Teklif talebi bulunamadı</div></div>';return;}
  const chipMap={acik:'<span class="chip chip-warn">Açık</span>',kapandi:'<span class="chip chip-ok">Kapandı</span>'};
  c.innerHTML=liste.map(tk=>`
    <div class="skart" onclick="openTeklifDetay('${tk.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <div style="font-size:13px;font-weight:700">${tk.kalemler.length} ürün</div>
          <div style="font-size:11px;color:var(--gray-500)">${new Date(tk.olusturmaTarih).toLocaleDateString('tr-TR')} • ${escapeHtml(tk.olusturanAd)}</div>
        </div>
        ${chipMap[tk.durum]||''}
      </div>
      <div style="font-size:12px;color:var(--gray-600)">${tk.tedarikciler.length} tedarikçi eklendi — ${tk.tedarikciler.filter(f=>f.durum==='geldi').length} teklif geldi</div>
    </div>`).join('');
}

// RFQ kalemlerindeki her ürün için TÜM eşleşen firmaları toplar (autoFirma sadece
// ilkini alıyor — burada karşılaştırma için birden fazla öneri gerekiyor).
function teklifTedarikciOnerileriGetir(kalemler){
  const eslesenler=new Map(); // firmaAd -> firma
  (kalemler||[]).forEach(k=>{
    if(!k.kod)return;
    (DB.firmalar||[]).forEach(f=>{
      if(f.urunler&&f.urunler.includes(k.kod))eslesenler.set(f.ad,f);
    });
  });
  return [...eslesenler.values()];
}

async function teklifTedarikciEkle(teklifTalepId,firmaAd,firmaKodu){
  if(!['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])){toast('⚠️ Bu işlem için yetkiniz yok');return;}
  if(!firmaAd)return;
  const tk=DB.teklifler[teklifTalepId];
  if(tk&&tk.tedarikciler.some(f=>f.firmaAd===firmaAd)){toast('⚠️ Bu tedarikçi zaten eklenmiş');return;}
  try{
    const r=await fetch(SB_URL+'/rest/v1/tedarikci_teklifler',{method:'POST',headers:SB_HEADERS,
      body:JSON.stringify({teklif_talep_id:teklifTalepId,firma_ad:firmaAd,firma_kodu:firmaKodu||null})});
    if(!r.ok){toast('❌ Tedarikçi eklenemedi');return;}
    await loadTeklifler();openTeklifDetay(teklifTalepId);
  }catch(e){console.warn(e);toast('❌ Tedarikçi eklenemedi');}
}

function openTeklifDetay(id){
  const tk=DB.teklifler[id];if(!tk)return;
  const chipMap={acik:'<span class="chip chip-warn">Açık</span>',kapandi:'<span class="chip chip-ok">Kapandı</span>'};
  const oneriler=tk.durum==='acik'?teklifTedarikciOnerileriGetir(tk.kalemler).filter(f=>!tk.tedarikciler.some(t=>t.firmaAd===f.ad)):[];
  document.getElementById('mTeklifDetayIc').innerHTML=`
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div><div style="font-size:13px;color:var(--gray-500)">${new Date(tk.olusturmaTarih).toLocaleDateString('tr-TR')} • ${escapeHtml(tk.olusturanAd)}</div></div>
      ${chipMap[tk.durum]||''}
    </div>
    <div style="background:var(--gray-100);border-radius:8px;padding:10px;margin-bottom:12px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="border-bottom:1px solid var(--gray-300)"><th style="text-align:left;padding:4px 6px">Ürün</th><th style="text-align:right;padding:4px 6px">Miktar</th></tr>
        ${tk.kalemler.map(k=>`<tr style="border-bottom:1px solid var(--gray-200)"><td style="padding:5px 6px;font-weight:600">${escapeHtml(k.ad)}</td><td style="padding:5px 6px;text-align:right">${k.miktar} ${escapeHtml(k.birim||'')}</td></tr>`).join('')}
      </table>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin-bottom:6px">Tedarikçiler</div>
    <div style="margin-bottom:12px">
      ${tk.tedarikciler.length?tk.tedarikciler.map(f=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--gray-100)">
          <div><div style="font-size:13px;font-weight:600">${escapeHtml(f.firmaAd)}</div><div style="font-size:11px;color:var(--gray-500)">${f.durum==='geldi'?'✅ Teklif geldi':'⏳ Bekleniyor'}</div></div>
          ${tk.durum==='acik'?`<button class="btn btn-sm btn-gray" onclick="tedarikciTeklifGirModalAc('${f.id}')">Fiyat Gir</button>`:''}
        </div>`).join(''):'<div style="font-size:12px;color:var(--gray-500)">Henüz tedarikçi eklenmedi.</div>'}
    </div>
    ${tk.durum==='acik'&&tk.tedarikciler.length?`
    <div class="brow" style="margin-bottom:12px">
      <button class="btn btn-sm btn-gray" onclick="teklifleriExcelAktar('${id}')">Excel'e Aktar</button>
      <button class="btn btn-sm btn-gray" onclick="document.getElementById('teklif-excel-input').click()" ${['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])?'':'disabled'}>Excel'den Yükle</button>
      <input type="file" id="teklif-excel-input" accept=".xlsx,.xls" style="display:none" onchange="teklifExcelYukle(event,'${id}')">
    </div>`:''}
    ${tk.durum==='acik'?`
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--gray-600);text-transform:uppercase;margin-bottom:6px">Tedarikçi Ekle</div>
      ${oneriler.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${oneriler.map(f=>`<button class="btn btn-sm btn-gray" onclick="teklifTedarikciEkle('${id}','${escapeHtml(f.ad).replace(/'/g,"\\'")}','${f.kod||''}')" ${['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])?'':'disabled'}>${escapeHtml(f.ad)}</button>`).join('')}</div>`:''}
      <div style="position:relative">
        <input type="text" id="teklif-firma-ara-${id}" placeholder="Firma ara..." oninput="filterTeklifFirma('${id}',this.value)" style="width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;outline:none">
        <div id="teklif-firma-dd-${id}" style="position:absolute;top:100%;left:0;right:0;background:white;border:1px solid var(--gray-300);border-radius:8px;max-height:200px;overflow-y:auto;z-index:10;display:none"></div>
      </div>
    </div>
    <div class="brow" style="margin-bottom:8px">
      <button class="btn btn-info btn-block btn-sm" onclick="renderTeklifKarsilastirma('${id}')">Karşılaştır</button>
    </div>`:`
    <div class="brow" style="margin-bottom:8px">
      <button class="btn btn-info btn-block btn-sm" onclick="renderTeklifKarsilastirma('${id}')">Karşılaştırmayı Gör</button>
    </div>`}
    <button class="btn btn-gray btn-block" onclick="kModal('mTeklifDetay')">Kapat</button>`;
  aModal('mTeklifDetay');
}

function filterTeklifFirma(teklifTalepId,val){
  const dd=document.getElementById('teklif-firma-dd-'+teklifTalepId);if(!dd)return;
  if(!val||val.length<2){dd.style.display='none';return;}
  const tk=DB.teklifler[teklifTalepId];
  const eklenmis=new Set((tk?.tedarikciler||[]).map(f=>f.firmaAd));
  const eslesenler=(DB.firmalar||[]).filter(f=>f.ad.toLowerCase().includes(val.toLowerCase())&&!eklenmis.has(f.ad)).slice(0,20);
  if(!eslesenler.length){dd.style.display='none';return;}
  dd.innerHTML=eslesenler.map(f=>`<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--gray-100)" onclick="teklifTedarikciEkle('${teklifTalepId}','${escapeHtml(f.ad).replace(/'/g,"\\'")}','${f.kod||''}');document.getElementById('teklif-firma-dd-${teklifTalepId}').style.display='none'">${escapeHtml(f.ad)}</div>`).join('');
  dd.style.display='block';
}

// tedarikciTeklifId sadece kendi id'siyle geliyor (hangi RFQ'ya ait olduğu belli değil) —
// DB.teklifler'i tarayıp hem RFQ (tk) hem tedarikçi (f) nesnesini birlikte bulur.
function teklifBulByTedarikciId(tedarikciTeklifId){
  for(const tk of Object.values(DB.teklifler||{})){
    const f=(tk.tedarikciler||[]).find(x=>String(x.id)===String(tedarikciTeklifId));
    if(f)return{tk,f};
  }
  return null;
}

// ============================================================
// TEDARİKÇİ TEKLİF FİYAT GİRİŞ MODALI
// ============================================================
function tedarikciTeklifGirModalAc(tedarikciTeklifId){
  const bulunan=teklifBulByTedarikciId(tedarikciTeklifId);if(!bulunan)return;
  const{tk,f}=bulunan;
  const fiyatMap={};
  (f.fiyatlar||[]).forEach(fy=>{fiyatMap[fy.kalemId]=fy.birimFiyat;});
  document.getElementById('mTedarikciTeklifIc').innerHTML=`
    <div style="margin-bottom:10px"><div style="font-size:14px;font-weight:700">${escapeHtml(f.firmaAd)}</div></div>
    <div id="tt-urun-listesi">
      ${tk.kalemler.map((k,i)=>{
        const fiyat=fiyatMap[k.id];
        return`<div class="field" style="margin-bottom:10px">
          <label>${escapeHtml(k.ad)} — ${k.miktar} ${escapeHtml(k.birim||'')}</label>
          <input type="number" id="tt-fiyat-${i}" data-kalem-id="${k.id}" min="0" step="0.01" placeholder="Birim fiyat (₺)" value="${fiyat!=null?fiyat:''}" oninput="ttFiyatToplamGuncelle('${tk.id}')">
        </div>`;
      }).join('')}
    </div>
    <div id="tt-genel-toplam" style="font-size:14px;font-weight:800;margin-bottom:12px">— ₺</div>
    <div class="brow">
      <button class="btn btn-gray" onclick="kModal('mTedarikciTeklif')">İptal</button>
      <button class="btn btn-success" onclick="tedarikciTeklifKaydet('${tedarikciTeklifId}')" ${['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])?'':'disabled'}>Kaydet</button>
    </div>`;
  ttFiyatToplamGuncelle(tk.id);
  aModal('mTedarikciTeklif');
}

function ttFiyatToplamGuncelle(teklifTalepId){
  const tk=DB.teklifler[teklifTalepId];if(!tk)return;
  let toplam=0;
  tk.kalemler.forEach((k,i)=>{
    const el=document.getElementById('tt-fiyat-'+i);
    const fiyat=parseFloat(el?.value)||0;
    toplam+=fiyat*(parseFloat(k.miktar)||0);
  });
  const el=document.getElementById('tt-genel-toplam');
  if(el)el.textContent=(toplam>0?fmt(toplam)+' ₺ (KDV hariç)':'— ₺');
}

async function tedarikciTeklifKaydet(tedarikciTeklifId){
  if(!['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])){toast('⚠️ Bu işlem için yetkiniz yok');return;}
  const bulunan=teklifBulByTedarikciId(tedarikciTeklifId);if(!bulunan)return;
  const{tk,f}=bulunan;
  sLD();
  try{
    const fiyatMap={};
    (f.fiyatlar||[]).forEach(fy=>{fiyatMap[fy.kalemId]={id:fy.id,birimFiyat:fy.birimFiyat};});
    for(let i=0;i<tk.kalemler.length;i++){
      const k=tk.kalemler[i];
      const inp=document.getElementById('tt-fiyat-'+i);
      const deger=inp?.value;
      if(deger===''||deger==null)continue;
      const fiyat=parseFloat(deger);
      if(isNaN(fiyat))continue;
      const mevcut=fiyatMap[k.id];
      if(mevcut){
        await fetch(SB_URL+'/rest/v1/tedarikci_teklif_kalemleri?id=eq.'+mevcut.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({birim_fiyat:fiyat})});
      }else{
        await fetch(SB_URL+'/rest/v1/tedarikci_teklif_kalemleri',{method:'POST',headers:SB_HEADERS,
          body:JSON.stringify({tedarikci_teklif_id:tedarikciTeklifId,teklif_talep_kalem_id:k.id,birim_fiyat:fiyat})});
      }
    }
    await fetch(SB_URL+'/rest/v1/tedarikci_teklifler?id=eq.'+tedarikciTeklifId,{method:'PATCH',headers:SB_HEADERS,
      body:JSON.stringify({durum:'geldi',teklif_tarihi:new Date().toISOString()})});
    hLD();kModal('mTedarikciTeklif');toast('✅ Teklif kaydedildi');
    await loadTeklifler();openTeklifDetay(tk.id);
  }catch(e){console.warn(e);hLD();toast('❌ Kaydetme başarısız');}
}

// ====== TEKLİFLER — EXCEL AL/VER (ortak-excel.js) ======
// Not: dosyada 'Teklif Talep ID' sütunu YOK — bu RFQ'ya özel, kalemExcel
// deseniyle aynı (talepId/teklifTalepId çağrı zincirinde closure'da taşınır).
const teklifExcelSpec=[
  {alan:'firmaAd', baslik:'Firma', tip:'text', zorunlu:true, genislik:22},
  {alan:'urunKodu', baslik:'Ürün Kodu', tip:'text', zorunlu:true, genislik:14},
  {alan:'urunAdi', baslik:'Ürün Adı', tip:'text', genislik:26},
  {alan:'miktar', baslik:'Miktar', tip:'text', genislik:10},
  {alan:'birim', baslik:'Birim', tip:'text', genislik:10},
  {alan:'birimFiyat', baslik:'Birim Fiyat', tip:'number', zorunlu:true, pozitifOlmali:true, genislik:12}
];

async function teklifleriExcelAktar(teklifTalepId){
  const tk=DB.teklifler[teklifTalepId];if(!tk)return;
  if(!tk.tedarikciler.length){toast('⚠️ Önce en az bir tedarikçi ekleyin');return;}
  const fiyatMapFor=f=>{const m={};(f.fiyatlar||[]).forEach(fy=>{m[fy.kalemId]=fy.birimFiyat;});return m;};
  const veriler=[];
  tk.tedarikciler.forEach(f=>{
    const fiyatMap=fiyatMapFor(f);
    tk.kalemler.forEach(k=>{
      veriler.push({firmaAd:f.firmaAd, urunKodu:k.kod||'', urunAdi:k.ad||'', miktar:k.miktar, birim:k.birim||'', birimFiyat:fiyatMap[k.id]!=null?fiyatMap[k.id]:''});
    });
  });
  if(!veriler.length){toast('⚠️ Aktarılacak kalem yok');return;}
  await excelSablonIndir(teklifExcelSpec, veriler, 'teklif-'+teklifTalepId.slice(0,8)+'-'+new Date().toISOString().split('T')[0]+'.xlsx');
}

async function teklifExcelYukle(event,teklifTalepId){
  if(!['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])){toast('⚠️ Bu işlem için yetkiniz yok');return;}
  const file=event.target.files[0];if(!file)return;event.target.value='';
  const tk=DB.teklifler[teklifTalepId];if(!tk)return;
  sLD();
  try{
    const ham=await excelDosyaOku(file);
    // Boş "Birim Fiyat" satırları = henüz teklif verilmemiş, sınıflandırmaya girmeden atla
    // (eski davranışla aynı — kalemExcel'den farklı olarak burada 'zorunlu' hatası değil, sessiz atlama).
    const fiyatSutunu=teklifExcelSpec.findIndex(s=>s.alan==='birimFiyat');
    const satirlar=[ham[0], ...ham.slice(1).filter(row=>row&&String(row[fiyatSutunu]??'').trim()!=='')];

    const mevcutKayitlar=[];
    tk.tedarikciler.forEach(f=>{
      (f.fiyatlar||[]).forEach(fy=>{
        const k=tk.kalemler.find(x=>x.id===fy.kalemId);
        if(k)mevcutKayitlar.push({firmaAd:f.firmaAd,urunKodu:k.kod,urunAdi:k.ad,miktar:k.miktar,birim:k.birim,birimFiyat:fy.birimFiyat});
      });
    });
    const fkSet=new Set(tk.kalemler.map(k=>k.kod).filter(Boolean));
    hLD();
    const siniflandirma=excelSatirlariSiniflandir(teklifExcelSpec, satirlar, mevcutKayitlar, {dogalAnahtarKombinasyonu:['firmaAd','urunKodu'],fkAlan:'urunKodu',fkSet});
    excelOnizlemeGoster(siniflandirma,{
      spec:teklifExcelSpec,
      dosyaAdiOnek:'teklif-'+teklifTalepId.slice(0,8),
      onUygula:(mod,satirlarYaz)=>teklifExcelUygula(teklifTalepId,mod,satirlarYaz)
    });
  }catch(err){ hLD(); toast('❌ Dosya okunamadı: '+err.message); }
}

async function teklifExcelUygula(teklifTalepId,mod,yazilacaklar){
  // Canlı durumu tazele — önbellekteki DB.teklifler bayat olabilir, RFQ az önce kapanmış olabilir.
  let canliDurum='acik';
  try{
    const dr=await fetch(SB_URL+'/rest/v1/teklif_talepleri?id=eq.'+teklifTalepId+'&select=durum',{headers:SB_HEADERS});
    if(dr.ok){const d=await dr.json();if(d[0])canliDurum=d[0].durum;else canliDurum='yok';}
  }catch(e){canliDurum='yok';}
  if(canliDurum!=='acik'){toast('⚠️ Teklif talebi artık açık değil, aktarım iptal edildi');return;}
  if(!yazilacaklar.length){toast('ℹ️ Yazılacak satır yok');return;}

  const tk=DB.teklifler[teklifTalepId];
  const kalemKoduMap={}; // urun_kodu -> teklif_talep_kalem_id
  tk.kalemler.forEach(k=>{if(k.kod)kalemKoduMap[k.kod]=k.id;});

  sLD();
  const etkilenenFirmalar=new Set();
  const atlananlar=[];
  const satirlar=[];
  for(const s of yazilacaklar){
    const firmaAd=s.alanlar.firmaAd;
    let tedarikciTeklifId=tk.tedarikciler.find(f=>f.firmaAd===firmaAd)?.id;
    if(!tedarikciTeklifId){
      try{
        const cr=await fetch(SB_URL+'/rest/v1/tedarikci_teklifler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},
          body:JSON.stringify({teklif_talep_id:teklifTalepId,firma_ad:firmaAd})});
        if(!cr.ok){atlananlar.push({firmaAd,sebep:'tedarikçi oluşturulamadı'});continue;}
        const yeni=(await cr.json())[0];
        tedarikciTeklifId=yeni.id;
        tk.tedarikciler.push({id:tedarikciTeklifId,firmaAd,durum:'bekleniyor',fiyatlar:[]});
      }catch(e){atlananlar.push({firmaAd,sebep:'tedarikçi oluşturulamadı'});continue;}
    }
    const kalemId=kalemKoduMap[s.alanlar.urunKodu];
    if(!kalemId){atlananlar.push({firmaAd,urunKodu:s.alanlar.urunKodu,sebep:'RFQ kalemi bulunamadı'});continue;}
    satirlar.push({tedarikci_teklif_id:tedarikciTeklifId,teklif_talep_kalem_id:kalemId,birim_fiyat:s.alanlar.birimFiyat});
    etkilenenFirmalar.add(tedarikciTeklifId);
  }

  const sonuc=await excelTopluYaz('tedarikci_teklif_kalemleri', satirlar, {onConflict:'tedarikci_teklif_id,teklif_talep_kalem_id'});
  for(const tedarikciTeklifId of etkilenenFirmalar){
    try{
      await fetch(SB_URL+'/rest/v1/tedarikci_teklifler?id=eq.'+tedarikciTeklifId,{method:'PATCH',headers:SB_HEADERS,
        body:JSON.stringify({durum:'geldi',teklif_tarihi:new Date().toISOString()})});
    }catch(e){console.warn(e);}
  }
  await excelImportGecmisiYaz({ tabloAdi:'tedarikci_teklif_kalemleri', ilgiliId:teklifTalepId, dosyaAdi:'teklif.xlsx',
    kullaniciAd:CU.ad, mod, toplamSatir:yazilacaklar.length,
    yeniSayisi:yazilacaklar.filter(s=>s.sinif==='yeni').length,
    guncellemeSayisi:yazilacaklar.filter(s=>s.sinif==='guncelleme').length,
    hataSayisi:0, atlananSayisi:atlananlar.length
  }, yazilacaklar);
  await loadTeklifler();
  hLD();
  let mesaj=sonuc.hataliGrup?'⚠️ Bazı satırlar yazılamadı':`✅ ${sonuc.toplamYazilan} fiyat işlendi.`;
  if(atlananlar.length){
    mesaj+=` ⚠️ ${atlananlar.length} satır atlandı.`;
    console.warn('Teklif Excel içe aktarma — atlanan satırlar:',atlananlar);
  }
  toast(mesaj,4000);
}

// ============================================================
// TEKLİF KARŞILAŞTIRMA + SİPARİŞE DÖNÜŞTÜRME
// ============================================================
function renderTeklifKarsilastirma(teklifTalepId){
  const tk=DB.teklifler[teklifTalepId];if(!tk)return;
  if(!tk.tedarikciler.length){toast('⚠️ Karşılaştırmak için önce tedarikçi ekleyin');return;}

  const fiyatGetir=(f,kalemId)=>{const fy=(f.fiyatlar||[]).find(x=>x.kalemId===kalemId);return fy?fy.birimFiyat:null;};

  const satirlarHtml=tk.kalemler.map(k=>{
    const fiyatlar=tk.tedarikciler.map(f=>({f,fiyat:fiyatGetir(f,k.id)})).filter(x=>x.fiyat!=null);
    const minFiyat=fiyatlar.length?Math.min(...fiyatlar.map(x=>x.fiyat)):null;
    const hucreler=tk.tedarikciler.map(f=>{
      const fiyat=fiyatGetir(f,k.id);
      if(fiyat==null)return`<td style="padding:6px;text-align:center;color:var(--gray-400)">—</td>`;
      const enDusuk=fiyat===minFiyat;
      return`<td style="padding:6px;text-align:center;${enDusuk?'background:#f0fdf4':''}">
        <label style="display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer">
          <input type="radio" name="secim-${k.id}" value="${f.id}|${fiyat}" ${enDusuk?'checked':''}>
          <span style="font-weight:${enDusuk?800:600};color:${enDusuk?'var(--success)':'inherit'}">${fmt(fiyat)}</span>
        </label>
      </td>`;
    }).join('');
    return`<tr style="border-bottom:1px solid var(--gray-200)">
      <td style="padding:6px;font-weight:600;font-size:12px">${escapeHtml(k.ad)}<div style="font-size:10px;color:var(--gray-500)">${k.miktar} ${escapeHtml(k.birim||'')}</div></td>
      ${hucreler}
    </tr>`;
  }).join('');

  const basliklar=tk.tedarikciler.map(f=>`<th style="padding:6px;text-align:center;font-size:11px">${escapeHtml(f.firmaAd)}</th>`).join('');

  document.getElementById('mTeklifKarsilastirmaIc').innerHTML=`
    <div style="overflow-x:auto;margin-bottom:14px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <tr style="background:var(--gray-100)"><th style="padding:6px;text-align:left;font-size:11px">Ürün</th>${basliklar}</tr>
        ${satirlarHtml}
      </table>
    </div>
    ${tk.durum==='acik'?`<button class="btn btn-success btn-block" onclick="teklifSecilenleriSiparisDonustur('${teklifTalepId}')" ${['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])?'':'disabled'}>Seçilenleri Siparişe Dönüştür</button>`:''}
    <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="kModal('mTeklifKarsilastirma')">Kapat</button>`;
  aModal('mTeklifKarsilastirma');
}

// Sipariş No üret — Club: C00091111, Resort: R00091111 formatı, kendi havuzumuzdan.
// (satin-alma-siparisolustur.html ve satin-alma-iade.html'de de birer kopyası var.)
async function yeniSiparisNoUret(prefix){
  const p = prefix === 'R' ? 'R' : 'C';
  try{
    const r=await fetch(SB_URL+`/rest/v1/siparisler?siparis_no=like.${p}*&select=siparis_no&order=siparis_no.desc&limit=1`,{headers:SB_HEADERS});
    let maxNo=91110;
    if(r.ok){
      const d=await r.json();
      if(d&&d.length){
        const m=d[0].siparis_no.match(new RegExp('^'+p+'(\\d+)$'));
        if(m)maxNo=parseInt(m[1]);
      }
    }
    return p+String(maxNo+1).padStart(8,'0');
  }catch(e){
    return p+String(91111+Math.floor(Math.random()*1000)).padStart(8,'0');
  }
}

async function teklifSecilenleriSiparisDonustur(teklifTalepId){
  if(!['kayit','tam'].includes(YETKI_HARITASI['siparis_olustur'])){toast('⚠️ Bu işlem için yetkiniz yok');return;}
  const tk=DB.teklifler[teklifTalepId];if(!tk)return;
  const secimler=[]; // {kalem, tedarikciTeklifId, fiyat}
  tk.kalemler.forEach(k=>{
    const secili=document.querySelector(`input[name="secim-${k.id}"]:checked`);
    if(!secili)return;
    const[tedarikciTeklifId,fiyatStr]=secili.value.split('|');
    secimler.push({kalem:k,tedarikciTeklifId,fiyat:parseFloat(fiyatStr)});
  });
  if(!secimler.length){toast('⚠️ En az bir ürün için teklif seçilmeli (fiyatı olmayan ürünler seçilemez)');return;}

  // firma_ad'a göre grupla
  const gruplar={};
  secimler.forEach(s=>{
    const f=tk.tedarikciler.find(x=>x.id===s.tedarikciTeklifId);
    const firmaAd=f?f.firmaAd:'';
    if(!gruplar[firmaAd])gruplar[firmaAd]={firmaAd,kalemler:[]};
    gruplar[firmaAd].kalemler.push(s);
  });

  sLD();
  const otelId=tk.otelId||'810';
  const sipPrefix=otelId==='811'?'R':'C';
  const grupListesi=Object.values(gruplar);
  try{
    for(const g of grupListesi){
      const siparisNo=await yeniSiparisNoUret(sipPrefix);
      await fetch(SB_URL+'/rest/v1/siparisler',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        siparis_no:siparisNo,firma_ad:g.firmaAd,otel_id:otelId,tarih:new Date().toISOString().split('T')[0],
        durum:'bekleyen',olusturan_ad:CU.ad
      })});
      const kalemSatirlar=g.kalemler.map(s=>({
        siparis_no:siparisNo,urun_kodu:s.kalem.kod||null,urun_adi:s.kalem.ad,birim:s.kalem.birim,
        miktar:s.kalem.miktar,gelen_miktar:0,kalan_miktar:s.kalem.miktar,tahmini_fiyat:s.fiyat
      }));
      await fetch(SB_URL+'/rest/v1/siparis_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
    }
    await fetch(SB_URL+'/rest/v1/teklif_talepleri?id=eq.'+teklifTalepId,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({durum:'kapandi'})});
    hLD();kModal('mTeklifKarsilastirma');kModal('mTeklifDetay');
    toast(`✅ ${grupListesi.length} sipariş oluşturuldu, teklif talebi kapandı`);
    await loadTeklifler();renderTeklifler();
  }catch(e){console.warn(e);hLD();toast('❌ Siparişe dönüştürme başarısız');}
}
