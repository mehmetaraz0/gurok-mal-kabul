<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="nav-drawer.js"></script>
<script src="otel-config.js"></script>
<script src="ortak.js"></script>
<link rel="stylesheet" href="theme.css">
<script>
let currentUser = requireLogin();
if (currentUser) requireRole(currentUser, ['yonetici','depo','satinalma','kalite']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — İzleme</title>
<meta name="theme-color" content="#1a2744">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-blue{background:#e4e9f2;color:#33476b}.chip-green{background:#d4edda;color:#155724}.chip-red{background:#fde8e8;color:#9b1c1c}.chip-yellow{background:#fff3cd;color:#856404}.chip-gray{background:var(--gray-200);color:var(--gray-600)}.chip-orange{background:#f2e8db;color:#8a5c2c}.chip-purple{background:#e8e5f0;color:#4a3f68}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-kart{background:white;border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-num{font-size:17px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--gray-500);margin-top:2px}
.mk-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='mal-kabul-v2.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
    <div style="flex:1"><h1>İzleme</h1><span style="font-size:11px;opacity:.7" id="hdrOtel"></span></div>
  </div>

  <div class="sc" id="tab-esleme" style="display:block">
    <div class="ftabs">
      <button class="ftab active" id="izl-tab-analiz" onclick="izlemeSwitchTab('analiz')">Analiz</button>
      <button class="ftab" id="izl-tab-raporlar" onclick="izlemeSwitchTab('raporlar')">Raporlar</button>
      <button class="ftab" id="izl-tab-esleme" onclick="izlemeSwitchTab('esleme')">Eşleşme</button>
    </div>

    <!-- ANALİZ -->
    <div id="izleme-analiz-panel">
      <div class="card">
        <div class="card-title">Filtreler</div>
        <div class="rfields">
          <div class="field"><label>Başlangıç</label><input type="date" id="izl-filter-start" onchange="renderIzlemeAnaliz()"></div>
          <div class="field"><label>Bitiş</label><input type="date" id="izl-filter-end" onchange="renderIzlemeAnaliz()"></div>
        </div>
        <div class="field"><label>Firma / Ürün Ara</label><input type="text" id="izl-filter-search" placeholder="Firma veya ürün adı..." oninput="renderIzlemeAnaliz()"></div>
      </div>
      <div id="izleme-analiz-icerik"></div>
    </div>

    <!-- RAPORLAR (Uygunsuzluk geçmişi) -->
    <div id="izleme-raporlar-panel" style="display:none">
      <div class="card">
        <div class="card-title">Uygunsuzluk Formları Geçmişi</div>
        <div class="rfields">
          <div class="field"><label>Başlangıç</label><input type="date" id="izl-rapor-start"></div>
          <div class="field"><label>Bitiş</label><input type="date" id="izl-rapor-end"></div>
        </div>
        <button class="btn btn-primary btn-sm btn-block" onclick="renderIzlemeRaporlar()">Filtrele</button>
      </div>
      <div id="izleme-raporlar-icerik"></div>
    </div>

    <!-- EŞLEŞME RAPORU -->
    <div id="izleme-esleme-panel" style="display:none">
      <div class="stats-grid" id="esleme-stats"></div>
      <div class="ftabs">
        <button class="ftab active" onclick="filterEsleme('tumu',this)">Tümü</button>
        <button class="ftab" onclick="filterEsleme('tam',this)">Tam Eşleşti</button>
        <button class="ftab" onclick="filterEsleme('fatura_bek',this)">Fatura Bekliyor</button>
        <button class="ftab" onclick="filterEsleme('eksik',this)">Eksik</button>
      </div>
      <div id="esleme-icerik"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml -> ortak.js


let malKabuller={}, uygunsuzluklarAcik={};
let eslemeFilter='tumu';

function mkSbdenCamele(r){
  return{
    id:r.id,mkNo:r.mk_no,tarih:r.form_tarihi,firma:r.firma_ad,firmaId:r.firma_id,
    faturaNo:r.fatura_no||'',irsaliyeNo:r.irsaliye_no||'',lnSiparisNo:r.ln_siparis_no||'',
    otelId:r.otel_id,depoKodu:r.depo_kodu||'',aracHijyen:r.arac_hijyen||'',aracSicaklik:r.arac_sicaklik||'',
    notlar:r.notlar||'',personel:r.personel_ad||'',durum:r.durum,
    olusturmaTarih:r.tarih?new Date(r.tarih).getTime():Date.now(),
    urunler:(r.mal_kabul_urunleri||[]).map(u=>({id:u.id,kod:u.urun_kodu||'',ad:u.urun_adi,birim:u.birim,miktar:parseFloat(u.miktar)||0,birimFiyat:u.birim_fiyat?parseFloat(u.birim_fiyat):null,seriNo:u.seri_no||'',marka:u.marka||'',sicaklik:u.sicaklik||''}))
  };
}

async function loadDB(){
  sLD();
  try{
    const [mR,ugR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/mal_kabuller?select=*,mal_kabul_urunleri(*)&order=tarih.desc',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/uygunsuzluklar?durum=eq.acik&select=mk_id,urun_kodu,aciklama',{headers:SB_HEADERS}),
    ]);
    malKabuller={};uygunsuzluklarAcik={};
    if(mR.ok)(await mR.json()).forEach(r=>{malKabuller[r.id]=mkSbdenCamele(r);});
    if(ugR.ok)(await ugR.json()).forEach(r=>{
      if(!uygunsuzluklarAcik[r.mk_id])uygunsuzluklarAcik[r.mk_id]=[];
      uygunsuzluklarAcik[r.mk_id].push(r);
    });
  }catch(e){console.warn(e);}
  hLD();
}

// ============================================================
// İZLEME — Analiz / Raporlar / Eşleşme
// ============================================================
function izlemeSwitchTab(tab){
  document.getElementById('izleme-analiz-panel').style.display=tab==='analiz'?'block':'none';
  document.getElementById('izleme-raporlar-panel').style.display=tab==='raporlar'?'block':'none';
  document.getElementById('izleme-esleme-panel').style.display=tab==='esleme'?'block':'none';
  document.getElementById('izl-tab-analiz').classList.toggle('active',tab==='analiz');
  document.getElementById('izl-tab-raporlar').classList.toggle('active',tab==='raporlar');
  document.getElementById('izl-tab-esleme').classList.toggle('active',tab==='esleme');
  if(tab==='analiz')renderIzlemeAnaliz();
  else if(tab==='raporlar')renderIzlemeRaporlar();
  else renderEslemeRaporu();
}

function renderIzlemeAnaliz(){
  const startVal=document.getElementById('izl-filter-start').value;
  const endVal=document.getElementById('izl-filter-end').value;
  const search=(document.getElementById('izl-filter-search').value||'').toLowerCase().trim();
  const start=startVal?new Date(startVal).getTime():0;
  const end=endVal?new Date(endVal+'T23:59:59').getTime():Date.now()+86400000;
  const c=document.getElementById('izleme-analiz-icerik');

  let liste=Object.values(malKabuller).filter(f=>{
    const t=new Date(f.tarih).getTime();
    if(t<start||t>end)return false;
    if(search){
      const firmaMatch=(f.firma||'').toLowerCase().includes(search);
      const urunMatch=f.urunler.some(u=>(u.ad||'').toLowerCase().includes(search));
      if(!firmaMatch&&!urunMatch)return false;
    }
    return true;
  });
  liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);

  const toplamUrun=liste.reduce((t,f)=>t+f.urunler.length,0);
  const uygunsuzFormSayisi=liste.filter(f=>(uygunsuzluklarAcik[f.id]||[]).length>0).length;
  const uygunsuzOran=liste.length?((uygunsuzFormSayisi/liste.length)*100).toFixed(1):0;

  const firmaStats={};
  liste.forEach(f=>{
    if(!firmaStats[f.firma])firmaStats[f.firma]={total:0,uygunsuz:0,urunSayisi:0};
    firmaStats[f.firma].total++;
    firmaStats[f.firma].urunSayisi+=f.urunler.length;
    if((uygunsuzluklarAcik[f.id]||[]).length>0)firmaStats[f.firma].uygunsuz++;
  });
  const topFirmalar=Object.entries(firmaStats).sort((a,b)=>b[1].uygunsuz-a[1].uygunsuz).slice(0,15);

  const durumChip={bekleyen:'<span class="chip chip-yellow">Bekliyor</span>',onaylandi:'<span class="chip chip-green">Onaylı</span>',iptal:'<span class="chip chip-red">İptal</span>'};

  c.innerHTML=`
    <div class="stats-grid">
      <div class="stat-kart"><div class="stat-num">${liste.length}</div><div class="stat-lbl">Toplam Form</div></div>
      <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${liste.filter(f=>f.durum==='onaylandi').length}</div><div class="stat-lbl">Onaylanan</div></div>
      <div class="stat-kart"><div class="stat-num">${toplamUrun}</div><div class="stat-lbl">Toplam Ürün</div></div>
      <div class="stat-kart"><div class="stat-num" style="color:${uygunsuzOran>=15?'var(--danger)':'var(--warning)'}">${uygunsuzOran}%</div><div class="stat-lbl">Uygunsuzluk Oranı</div></div>
    </div>

    <div class="card">
      <div class="card-title">Firma Analizi</div>
      ${!topFirmalar.length?'<div class="es"><div class="et">Veri yok</div></div>':topFirmalar.map(([firma,s])=>{
        const oran=s.total>0?Math.round((s.uygunsuz/s.total)*100):0;
        const kritik=oran>=15;
        return`<div style="padding:8px 0;border-bottom:1px solid var(--gray-100)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div>
              <div style="font-size:13px;font-weight:600">${escapeHtml(firma)}</div>
              <div style="font-size:11px;color:var(--gray-500)">${s.total} teslimat • ${s.urunSayisi} ürün • ${s.uygunsuz} uygunsuz</div>
            </div>
            <span class="chip ${kritik?'chip-red':s.uygunsuz>0?'chip-yellow':'chip-green'}">%${oran}</span>
          </div>
          <div style="background:var(--gray-200);border-radius:6px;height:6px;overflow:hidden">
            <div style="background:${kritik?'var(--danger)':'var(--warning)'};height:100%;width:${Math.min(oran,100)}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-title">Formlar (${liste.length})</div>
      ${!liste.length?'<div class="es"><div class="et">Kayıt yok</div></div>':liste.slice(0,50).map(f=>{
        const uygunsuzlar=uygunsuzluklarAcik[f.id]||[];
        return`<div class="mk-kart" style="cursor:pointer" onclick="location.href='mal-kabul-liste.html?detay=${f.id}'">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:13px;font-weight:600">${escapeHtml(f.firma)}</div>
              <div style="font-size:11px;color:var(--gray-500)">${f.tarih} • ${escapeHtml(f.personel)} • ${f.urunler.length} ürün</div>
              ${uygunsuzlar.length?`<div style="font-size:11px;color:var(--danger);margin-top:2px">⚠️ ${uygunsuzlar.length} uygunsuzluk bildirimi</div>`:''}
            </div>
            ${durumChip[f.durum]||''}
          </div>
        </div>`;
      }).join('')}
      ${liste.length>50?`<div style="text-align:center;font-size:12px;color:var(--gray-500);padding:8px">+${liste.length-50} daha — tarihi daraltın</div>`:''}
    </div>`;
}

async function renderIzlemeRaporlar(){
  const c=document.getElementById('izleme-raporlar-icerik');
  const startVal=document.getElementById('izl-rapor-start').value;
  const endVal=document.getElementById('izl-rapor-end').value;
  c.innerHTML='<div class="es"><div class="et">Yükleniyor...</div></div>';

  let rows=[];
  try{
    const r=await fetch(SB_URL+'/rest/v1/uygunsuzluklar?select=*&order=olusturma_tarihi.desc',{headers:SB_HEADERS});
    if(r.ok)rows=await r.json();
  }catch(e){console.warn(e);}

  const start=startVal?new Date(startVal).getTime():0;
  const end=endVal?new Date(endVal+'T23:59:59').getTime():Date.now();
  const filtered=rows.filter(u=>{
    if(!u.olusturma_tarihi)return true;
    const t=new Date(u.olusturma_tarihi).getTime();
    return t>=start&&t<=end;
  });

  if(!filtered.length){c.innerHTML='<div class="es"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 5h13l1.5 7v6a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-6z"/></svg></div><div class="et">Bu dönemde uygunsuzluk formu yok</div></div>';return;}

  const kararEtiket={iade:'İade',sartli:'Şartlı Kullanım',imha:'İmha',duzeltme:'Düzeltme/Tekrar İşleme'};
  c.innerHTML=`
    <div style="font-size:13px;font-weight:600;margin:6px 0">${filtered.length} form bulundu</div>
    ${filtered.map(u=>`<div class="mk-kart" style="border-left-color:${u.durum==='acik'?'var(--danger)':'var(--success)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:12px;color:var(--gray-600)">${escapeHtml(u.aciklama)}</div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:2px">${new Date(u.olusturma_tarihi).toLocaleDateString('tr-TR')} • ${escapeHtml(u.bildiren_ad)||'—'}</div>
        </div>
        <span class="chip ${u.durum==='acik'?'chip-red':'chip-green'}">${u.durum==='acik'?'Açık':'Kapatıldı'}</span>
      </div>
      ${u.karar?`<div style="margin-top:6px"><span class="chip chip-purple">Karar: ${kararEtiket[u.karar]||u.karar}</span></div>`:''}
    </div>`).join('')}`;
}

// ============================================================
// EŞLEŞME RAPORU — Sipariş + İrsaliye + Fatura (3'lü eşleşme)
// ============================================================
function filterEsleme(f,el){eslemeFilter=f;document.querySelectorAll('#izleme-esleme-panel .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderEslemeRaporu();}

function renderEslemeRaporu(){
  const satirlar=Object.values(malKabuller).filter(f=>f.durum!=='iptal').map(f=>{
    const siparis=!!(f.lnSiparisNo&&f.lnSiparisNo.trim());
    const irsaliye=!!(f.irsaliyeNo&&f.irsaliyeNo.trim());
    const fatura=!!(f.faturaNo&&f.faturaNo.trim());
    let durum;
    if(siparis&&irsaliye&&fatura)durum='tam';
    else if(irsaliye&&!fatura)durum='fatura_bek';
    else durum='eksik';
    return{...f,_siparis:siparis,_irsaliye:irsaliye,_fatura:fatura,_durum:durum};
  });

  const tam=satirlar.filter(s=>s._durum==='tam').length;
  const faturaBek=satirlar.filter(s=>s._durum==='fatura_bek').length;
  const eksik=satirlar.filter(s=>s._durum==='eksik').length;
  document.getElementById('esleme-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${tam}</div><div class="stat-lbl">✅ Tam Eşleşti</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--warning)">${faturaBek}</div><div class="stat-lbl">⏳ Fatura Bekliyor</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--danger)">${eksik}</div><div class="stat-lbl">❌ Eksik</div></div>`;

  let liste=eslemeFilter==='tumu'?satirlar:satirlar.filter(s=>s._durum===eslemeFilter);
  liste=liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);

  const c=document.getElementById('esleme-icerik');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:44px;height:44px"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 5h13l1.5 7v6a1 1 0 0 1-1 1h-14a1 1 0 0 1-1-1v-6z"/></svg></div><div class="et">Kayıt yok</div></div>';return;}
  c.innerHTML=liste.map(f=>{
    const kenar=f._durum==='tam'?'var(--success)':f._durum==='fatura_bek'?'var(--warning)':'var(--danger)';
    return`<div class="mk-kart" style="border-left-color:${kenar};cursor:pointer" onclick="location.href='mal-kabul-liste.html?detay=${f.id}'">
      <div style="font-size:13px;font-weight:700">${f.mkNo}</div>
      <div style="font-size:11px;color:var(--gray-500)">🏢 ${f.firma} • ${f.tarih}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px">
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._siparis?'#d4edda':'var(--gray-100)'}">
          <div style="font-size:10px;font-weight:700;color:${f._siparis?'#155724':'var(--gray-500)'}">${f._siparis?'✅':'—'} SİPARİŞ</div>
          <div style="font-size:9px;color:var(--gray-500);margin-top:1px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.lnSiparisNo||'yok'}</div>
        </div>
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._irsaliye?'#d4edda':'#fde8e8'}">
          <div style="font-size:10px;font-weight:700;color:${f._irsaliye?'#155724':'#9b1c1c'}">${f._irsaliye?'✅':'❌'} İRSALİYE</div>
          <div style="font-size:9px;color:var(--gray-500);margin-top:1px">${f.irsaliyeNo||'yok'}</div>
        </div>
        <div style="padding:6px 4px;border-radius:6px;text-align:center;background:${f._fatura?'#d4edda':'#fff3cd'}">
          <div style="font-size:10px;font-weight:700;color:${f._fatura?'#155724':'#856404'}">${f._fatura?'✅':'⏳'} FATURA</div>
          <div style="font-size:9px;color:var(--gray-500);margin-top:1px">${f.faturaNo||'bekliyor'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}
