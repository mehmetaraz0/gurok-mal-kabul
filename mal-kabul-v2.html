<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="ortak.js"></script>
<link rel="stylesheet" href="theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Mal Kabul</title>
<meta name="theme-color" content="#1a2744">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.tab-bar{background:white;display:flex;border-bottom:2px solid var(--gray-200);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tabbtn{padding:12px 14px;border:none;background:none;font-size:12px;font-weight:600;color:var(--gray-500);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;flex-shrink:0;display:flex;align-items:center;gap:4px}
.tabbtn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tabbtn .badge{background:var(--danger);color:white;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rfields .field{margin-bottom:0}
.chkbox-input{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);cursor:pointer;background:#eafaf1;border-color:var(--success);font-size:14px;font-weight:600}
.chkbox-input input{width:18px;height:18px;accent-color:var(--success);pointer-events:none;flex-shrink:0}
.chkbox-input.uygunsuz{background:#fde8e8;border-color:var(--danger)}
.chkbox-input.uygunsuz input{accent-color:var(--danger)}
.uyg-seg-wrap{display:flex;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);overflow:hidden}
.uyg-seg{flex:1;text-align:center;padding:9px 4px;font-size:12px;font-weight:700;cursor:pointer;background:white;color:var(--gray-500)}
.uyg-seg.active.ok{background:var(--success);color:white}
.uyg-seg.active.bad{background:var(--danger);color:white}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-600)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-blue{background:#dbeafe;color:#1e40af}.chip-green{background:#d4edda;color:#155724}.chip-red{background:#fde8e8;color:#9b1c1c}.chip-yellow{background:#fff3cd;color:#856404}.chip-gray{background:var(--gray-200);color:var(--gray-600)}.chip-orange{background:#fed7aa;color:#92400e}.chip-purple{background:#ede9fe;color:#5b21b6}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
@media print{
  body *{visibility:hidden}
  #mKabulOzet,#mKabulOzet *{visibility:visible}
  #mKabulOzet{position:absolute;top:0;left:0;width:100%;background:white}
  #mKabulOzet .mclose,#mKabulOzetActions{display:none!important}
}
.stat-kart{background:white;border-radius:var(--radius-sm);padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-num{font-size:17px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--gray-500);margin-top:2px}
.mk-kart{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300);cursor:pointer}
.mk-kart.bekleyen{border-left-color:var(--warning)}
.mk-kart.onaylandi{border-left-color:var(--success)}
.mk-kart.iptal{border-left-color:var(--danger);opacity:.6}
.udd{display:none;position:fixed;background:white;border:1.5px solid var(--primary);border-radius:8px;max-height:220px;overflow-y:auto;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.uddi{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f1f3f5;font-size:13px}
.uddi:active{background:var(--gray-100)}
.kalem-satir{display:grid;grid-template-columns:1fr 70px 60px 24px;gap:6px;margin-bottom:6px;align-items:center}
.kalem-satir input,.kalem-satir select{padding:8px;border:1.5px solid var(--gray-300);border-radius:6px;font-size:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app" style="display:none">
  <div class="header">
    <button class="hbtn" onclick="location.href='index.html'">←</button>
    <div style="flex:1"><h1 id="hdrUser">Mal Kabul</h1><span style="font-size:11px;opacity:.7" id="hdrOtel"></span></div>
  </div>
  <div class="tab-bar">
    <button class="tabbtn active" onclick="gTab('liste',this)">📥 Mal Kabul</button>
    <button class="tabbtn" onclick="gTab('kalite',this)">✅ Kalite Onayı <span class="badge" id="bkalite" style="display:none"></span></button>
    <button class="tabbtn" onclick="location.href='mal-kabul-skt.html'">📅 SKT Takip</button>
    <button class="tabbtn" onclick="gTab('uygun',this)">⚠️ Uygunsuzluk</button>
    <button class="tabbtn" onclick="location.href='mal-kabul-siparistakip.html'">📦 Sipariş Takip</button>
    <button class="tabbtn" onclick="gTab('esleme',this)">📊 İzleme</button>
    <button class="tabbtn" onclick="gTab('export',this)">📊 LN Export</button>
  </div>

  <!-- MAL KABUL: Form (varsayılan) + Geçmiş Kayıtlar (toggle) -->
  <div class="sc" id="tab-liste" style="display:block">
    <div class="ftabs">
      <button class="ftab active" id="mk-view-form-btn" onclick="mkSwitchView('form')">➕ Yeni Kabul</button>
      <button class="ftab" id="mk-view-liste-btn" onclick="mkSwitchView('liste')">📜 Geçmiş Kayıtlar</button>
    </div>

    <!-- Yeni Kabul Formu -->
    <div id="mk-view-form">
      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span>📋 Teslimat Bilgileri</span>
          <span class="chip chip-purple" id="f-mkno-badge">Kabul: —</span>
        </div>
        <div class="field">
          <label>Tedarikçi Firma *</label>
          <div style="display:flex;gap:6px">
            <div style="position:relative;flex:1">
              <input type="text" id="f-firma-inp" placeholder="2+ harf yazın..." autocomplete="off" oninput="filterFirmaDD(this.value)">
              <div id="f-firma-dd" class="udd"></div>
            </div>
            <button class="btn btn-primary btn-sm" style="flex-shrink:0" onclick="openFirmaSecEkrani()">📋 Seç</button>
          </div>
        </div>
        <div class="rfields">
          <div class="field"><label>Tarih *</label><input type="date" id="f-tarih"></div>
          <div class="field"><label>Fatura No <span style="font-weight:400;text-transform:none;color:var(--gray-400);font-size:9px">(opsiyonel — irsaliye ile gelirse gir)</span></label><input type="text" id="f-fatura" placeholder="Fatura numarası"></div>
        </div>
        <div class="rfields">
          <div class="field"><label>İrsaliye No *</label><input type="text" id="f-irsaliye" placeholder="Zorunlu"></div>
          <div class="field">
            <label>Sipariş No</label>
            <div style="display:flex;gap:6px">
              <div style="position:relative;flex:1">
                <input type="text" id="f-siparis-inp" placeholder="C000... / R000..." autocomplete="off" oninput="filterSiparisDD(this.value)">
                <div id="f-siparis-dd" class="udd"></div>
              </div>
              <button class="btn btn-primary btn-sm" style="flex-shrink:0;padding:11px 10px" onclick="openSiparisSecEkrani()">📋 Seç</button>
            </div>
            <input type="hidden" id="f-siparis-no">
          </div>
        </div>
        <div class="rfields">
          <div class="field"><label>Araç Hijyeni</label>
            <div class="chkbox-input" id="f-arac-hijyen-box" onclick="toggleAracHijyen()">
              <input type="checkbox" id="f-arac-hijyen" checked>
              <span id="f-arac-hijyen-label">Uygun</span>
            </div>
          </div>
          <div class="field"><label>Araç Sıcaklığı (°C) *</label><input type="number" id="f-arac-sicaklik" placeholder="Örn: 4" step="0.1"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span>🧺 Ürünler</span>
          <button class="btn btn-warning btn-sm" onclick="kalemEkle()">➕ Ürün Ekle</button>
        </div>
        <div id="f-kalemler"></div>
      </div>

      <div class="card">
        <div class="field" style="margin-bottom:0"><label>Notlar</label><textarea id="f-notlar" rows="2" placeholder="Teslimatla ilgili notlar..."></textarea></div>
      </div>

      <button class="btn btn-success btn-block" style="margin-bottom:16px;min-height:52px;font-size:15px" onclick="formKaydet()">✓ Onaya Gönder</button>
    </div>

    <!-- Geçmiş Kayıtlar -->
    <div id="mk-view-liste" style="display:none">
      <div class="stats-grid" id="liste-stats"></div>
      <div class="ftabs">
        <button class="ftab active" onclick="filterListe('tumu',this)">Tümü</button>
        <button class="ftab" onclick="filterListe('bekleyen',this)">⏳ Bekleyen</button>
        <button class="ftab" onclick="filterListe('onaylandi',this)">✅ Onaylı</button>
        <button class="ftab" onclick="filterListe('iptal',this)">❌ İptal</button>
      </div>
      <div id="liste-icerik"></div>
    </div>
  </div>

  <!-- KALİTE ONAYI -->
  <div class="sc" id="tab-kalite">
    <div class="card"><div class="card-title">✅ Onay Bekleyenler</div><p style="font-size:12px;color:var(--gray-500)">Kalite personeli formu inceleyip onaylar ya da reddeder.</p></div>
    <div id="kalite-icerik"></div>
  </div>

  <!-- SKT TAKİP -->

  <!-- UYGUNSUZLUK -->
  <div class="sc" id="tab-uygun">
    <div class="ftabs">
      <button class="ftab active" onclick="filterUygun('acik',this)">🔴 Açık</button>
      <button class="ftab" onclick="filterUygun('kapatildi',this)">✅ Kapatıldı</button>
    </div>
    <div id="uygun-icerik"></div>
  </div>

  <!-- SİPARİŞ TAKİP -->

  <!-- İZLEME (Analiz / Raporlar / Eşleşme) -->
  <div class="sc" id="tab-esleme">
    <div class="ftabs">
      <button class="ftab active" id="izl-tab-analiz" onclick="izlemeSwitchTab('analiz')">📊 Analiz</button>
      <button class="ftab" id="izl-tab-raporlar" onclick="izlemeSwitchTab('raporlar')">📋 Raporlar</button>
      <button class="ftab" id="izl-tab-esleme" onclick="izlemeSwitchTab('esleme')">🔗 Eşleşme</button>
    </div>

    <!-- ANALİZ -->
    <div id="izleme-analiz-panel">
      <div class="card">
        <div class="card-title">📅 Filtreler</div>
        <div class="rfields">
          <div class="field"><label>Başlangıç</label><input type="date" id="izl-filter-start" onchange="renderIzlemeAnaliz()"></div>
          <div class="field"><label>Bitiş</label><input type="date" id="izl-filter-end" onchange="renderIzlemeAnaliz()"></div>
        </div>
        <div class="field"><label>Firma / Ürün Ara</label><input type="text" id="izl-filter-search" placeholder="Firma veya ürün adı..." oninput="renderIzlemeAnaliz()"></div>
      </div>
      <div id="izleme-analiz-icerik"></div>
    </div>

    <!-- RAPORLAR (Uygunsuzluk geçmişi) -->
    <div id="izleme-raporlar-panel" style="display:none">
      <div class="card">
        <div class="card-title">📋 Uygunsuzluk Formları Geçmişi</div>
        <div class="rfields">
          <div class="field"><label>Başlangıç</label><input type="date" id="izl-rapor-start"></div>
          <div class="field"><label>Bitiş</label><input type="date" id="izl-rapor-end"></div>
        </div>
        <button class="btn btn-primary btn-sm btn-block" onclick="renderIzlemeRaporlar()">🔍 Filtrele</button>
      </div>
      <div id="izleme-raporlar-icerik"></div>
    </div>

    <!-- EŞLEŞME RAPORU -->
    <div id="izleme-esleme-panel" style="display:none">
      <div class="stats-grid" id="esleme-stats"></div>
      <div class="ftabs">
        <button class="ftab active" onclick="filterEsleme('tumu',this)">Tümü</button>
        <button class="ftab" onclick="filterEsleme('tam',this)">✅ Tam Eşleşti</button>
        <button class="ftab" onclick="filterEsleme('fatura_bek',this)">⏳ Fatura Bekliyor</button>
        <button class="ftab" onclick="filterEsleme('eksik',this)">❌ Eksik</button>
      </div>
      <div id="esleme-icerik"></div>
    </div>
  </div>

  <!-- LN EXPORT -->
  <div class="sc" id="tab-export">
    <div class="card">
      <div class="card-title">📊 LN Export</div>
      <div class="rfields">
        <div class="field"><label>Başlangıç</label><input type="date" id="exp-bas"></div>
        <div class="field"><label>Bitiş</label><input type="date" id="exp-bit"></div>
      </div>
      <div class="field" style="margin-top:8px"><label>Otel</label>
        <select id="exp-otel"><option value="">Tümü</option><option value="810">🏨 Club</option><option value="811">🏨 Resort</option></select>
      </div>
      <button class="btn btn-primary btn-block" onclick="lnExportYap()">📥 Excel Olarak İndir</button>
      <button class="btn btn-gray btn-block" style="margin-top:8px" onclick="mkFormuIndir()">📋 Resmi Mal Kabul Formu (F.22)</button>
    </div>
  </div>
</div>

<!-- MODAL: Detay -->
<div class="mo" id="mDetay">
  <div class="mbox">
    <div class="mtitle" id="mDetayTitle">Detay <button class="mclose" onclick="kModal('mDetay')">✕</button></div>
    <div id="mDetayIc"></div>
  </div>
</div>

<!-- MODAL: Kabul Özeti (onay sonrası yazdırılabilir özet) -->
<div class="mo" id="mKabulOzet">
  <div class="mbox">
    <div class="mtitle">📋 Kabul Özeti <button class="mclose" onclick="kModal('mKabulOzet')">✕</button></div>
    <div id="mKabulOzetIc"></div>
    <div class="brow" id="mKabulOzetActions" style="margin-top:14px"></div>
  </div>
</div>

<!-- MODAL: Ürün Bazlı Düzelt -->
<!-- MODAL: Koli Bazlı Giriş -->
<div class="mo" id="mKoli">
  <div class="mbox">
    <div class="mtitle">📦 Koli Bazlı Giriş <button class="mclose" onclick="kModal('mKoli')">✕</button></div>
    <div id="mKoliIc"></div>
    <div class="brow" style="margin-top:12px">
      <button class="btn btn-gray btn-sm" style="flex:1" onclick="kModal('mKoli')">İptal</button>
      <button class="btn btn-success btn-sm" style="flex:1" onclick="koliKaydet()">✅ Tamam</button>
    </div>
  </div>
</div>

<div class="mo" id="mUrunDuzelt">
  <div class="mbox">
    <div class="mtitle">✏️ Ürün Düzelt <button class="mclose" onclick="kModal('mUrunDuzelt')">✕</button></div>
    <div id="mUrunDuzeltIc"></div>
    <div class="brow" id="mUrunDuzeltActions" style="margin-top:14px"></div>
  </div>
</div>

<!-- MODAL: Uygunsuzluk — Düzeltici Faaliyet -->
<div class="mo" id="mUygunDetay">
  <div class="mbox">
    <div class="mtitle">⚠️ Düzeltici Faaliyet <button class="mclose" onclick="kModal('mUygunDetay')">✕</button></div>
    <div id="mUygunDetayIc"></div>
    <div class="brow" id="mUygunDetayActions" style="margin-top:14px"></div>
  </div>
</div>

<!-- MODAL: Sipariş/Firma Seç (eski sistemdeki gibi tam liste, dokunarak seçim) -->
<div class="mo" id="mSecEkrani">
  <div class="mbox" style="max-height:85vh;display:flex;flex-direction:column">
    <div class="mtitle" id="mSecTitle">Seç <button class="mclose" onclick="kModal('mSecEkrani')">✕</button></div>
    <div class="field" style="margin-bottom:10px">
      <input type="text" id="sec-arama" placeholder="Ara..." oninput="secListesiFiltrele(this.value)">
    </div>
    <div id="sec-bsp-bar" style="display:none;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:12px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="checkbox" id="sec-bsp-tumu" onchange="bspTumunuSec(this.checked)"> Tümünü Seç
      </label>
      <span id="sec-bsp-sayi" style="font-weight:700;color:var(--primary)">0 seçili</span>
    </div>
    <div id="sec-liste" style="max-height:60vh;overflow-y:auto;flex:1"></div>
    <button class="btn btn-primary btn-block" id="sec-bsp-uygula" style="display:none;margin-top:10px" onclick="bspUygula()">Seçilenleri Forma Ekle</button>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js

const OTEL_ISIMLERI={'810':'Ali Bey Club Manavgat','811':'Ali Bey Resort Sorgun'};
const OTEL_KISA={'810':'Club','811':'Resort'};
const ROL_INDIRGEME={yonetici:'yonetici',depo:'depo',satinalma:'satinalma',kalite:'kalite',mutfak:'mutfak',bar:'bar',muhasebe_muduru:'yonetici',muhasebe_calisani:'yonetici',cost_control:'yonetici'};

let currentUser=null;
let malKabuller={}, siparisler={}, urunler=[], cariler=[], uygunsuzluklarAcik={};
let listeFilter='tumu', uygunFilter='acik', eslemeFilter='tumu';
let formKalemleri=[];
let formOtelId='810', previewMkNo='';

// ============================================================
// DENETİM İZİ
// ============================================================
async function auditLogYaz(action,entityType,entityId,detail){
  const log={action,entity_type:entityType,entity_id:String(entityId||''),detail:detail||'',kullanici_ad:currentUser?.ad||'Bilinmeyen'};
  try{await fetch(SB_URL+'/rest/v1/audit_log',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(log)});}catch(e){}
}

// ============================================================
// VERİ YÜKLEME
// ============================================================
function mkSbdenCamele(r){
  return{
    id:r.id,mkNo:r.mk_no,tarih:r.form_tarihi,firma:r.firma_ad,firmaId:r.firma_id,
    faturaNo:r.fatura_no||'',irsaliyeNo:r.irsaliye_no||'',lnSiparisNo:r.ln_siparis_no||'',
    otelId:r.otel_id,depoKodu:r.depo_kodu||'',aracHijyen:r.arac_hijyen||'',aracSicaklik:r.arac_sicaklik||'',
    notlar:r.notlar||'',personel:r.personel_ad||'',durum:r.durum,
    olusturmaTarih:r.tarih?new Date(r.tarih).getTime():Date.now(),
    urunler:(r.mal_kabul_urunleri||[]).map(u=>({id:u.id,kod:u.urun_kodu||'',ad:u.urun_adi,birim:u.birim,miktar:parseFloat(u.miktar)||0,birimFiyat:u.birim_fiyat?parseFloat(u.birim_fiyat):null,seriNo:u.seri_no||'',marka:u.marka||'',sicaklik:u.sicaklik||''}))
  };
}
function siparisSbdenCamele(r){
  return{
    siparisNo:r.siparis_no,firma:r.firma_ad,otelId:r.otel_id,tarih:r.tarih,durum:r.durum,tip:r.tip,
    kalemler:(r.siparis_kalemleri||[]).map(k=>({ad:k.urun_adi,kod:k.urun_kodu||'',miktar:parseFloat(k.miktar)||0,birim:k.birim,gelenMiktar:parseFloat(k.gelen_miktar)||0,kalanMiktar:parseFloat(k.kalan_miktar)||0}))
  };
}

async function loadDB(){
  sLD();
  try{
    const [mR,sR,uR,cR,ugR]=await Promise.all([
      fetch(SB_URL+'/rest/v1/mal_kabuller?select=*,mal_kabul_urunleri(*)&order=tarih.desc',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/siparisler?durum=neq.iptal&select=*,siparis_kalemleri(*)',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/urunler?select=kod,ad,birim,sicaklik_kriter',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/cariler?select=id,kod,ad,tip&tip=in.(tedarikci,her_ikisi)&silindi=eq.false',{headers:SB_HEADERS}),
      fetch(SB_URL+'/rest/v1/uygunsuzluklar?durum=eq.acik&select=mk_id,urun_kodu,aciklama',{headers:SB_HEADERS}),
    ]);
    malKabuller={};siparisler={};uygunsuzluklarAcik={};
    if(mR.ok)(await mR.json()).forEach(r=>{malKabuller[r.id]=mkSbdenCamele(r);});
    if(sR.ok)(await sR.json()).forEach(r=>{siparisler[r.siparis_no]=siparisSbdenCamele(r);});
    if(uR.ok)urunler=await uR.json();
    if(cR.ok)cariler=await cR.json();
    if(ugR.ok)(await ugR.json()).forEach(r=>{
      if(!uygunsuzluklarAcik[r.mk_id])uygunsuzluklarAcik[r.mk_id]=[];
      uygunsuzluklarAcik[r.mk_id].push(r);
    });
  }catch(e){console.warn(e);}
  hLD();
}

async function initApp(){
  await loadDB();
  mkSwitchView('form');
  renderKaliteOnay(); // bkalite rozetini güncellemek için arka planda
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('exp-bas').value=today;
  document.getElementById('exp-bit').value=today;

  // Satın Alma'dan "📋 Mal Kabule Aktar" ile geldiyse (satin-alma.html: lnEksikleriAktar)
  // sipariş numarasını sessionStorage'dan al ve formu otomatik doldur.
  const aktarSiparisNo=sessionStorage.getItem('gurok_malkabul_siparisNo');
  if(aktarSiparisNo){
    sessionStorage.removeItem('gurok_malkabul_siparisNo');
    const s=siparisler[aktarSiparisNo];
    if(s){
      document.getElementById('f-siparis-inp').value=s.siparisNo;
      document.getElementById('f-siparis-no').value=s.siparisNo;
      document.getElementById('f-firma-inp').value=s.firma;
      formKalemleri=s.kalemler.map(k=>({kod:k.kod,ad:k.ad,birim:k.birim,miktar:k.kalanMiktar||k.miktar,sktTarihi:'',sicaklik:'',sicaklikKriter:'',seriNo:'',marka:'',uygunsuz:false,uygunsuzNot:''}));
      renderKalemler();
      toast('📦 Satın Alma\'dan aktarılan sipariş forma yüklendi');
    } else {
      toast('⚠️ Aktarılan sipariş ('+aktarSiparisNo+') bulunamadı, elle arayın');
    }
  }

  // Portal'dan #izleme gibi bir hash ile gelindiyse doğrudan o sekmeye geç
  // (v1'de "İzleme" adı kullanılıyordu, v2'de aynı içerik "esleme" sekme id'si altında)
  const hashEslesme={izleme:'esleme'};
  const hash=(location.hash||'').replace('#','');
  const hedefTab=hashEslesme[hash]||(document.getElementById('tab-'+hash)?hash:null);
  if(hedefTab){
    const btn=[...document.querySelectorAll('.tabbtn')].find(b=>b.getAttribute('onclick')?.includes(`gTab('${hedefTab}'`));
    if(btn)gTab(hedefTab,btn);
  }
}

// KOLİ BAZLI GİRİŞ — her koliye ayrı KG, toplam otomatik Miktar'a yazılır.
// Kaydedilince her koli için ayrı QR etiketi üretilir (koli_etiketleri tablosu).

let _koliAktifKalem=null;
function koliModalAc(i){
  _koliAktifKalem=i;
  const k=formKalemleri[i];
  if(!k.koliler)k.koliler=[];
  if(!k.koliler.length)k.koliler=[''];
  renderKoliModal();
  aModal('mKoli');
}
function renderKoliModal(){
  const k=formKalemleri[_koliAktifKalem];
  const toplam=k.koliler.reduce((t,x)=>t+(parseFloat(x)||0),0);
  document.getElementById('mKoliIc').innerHTML=`
    <div style="font-size:13px;font-weight:700;margin-bottom:2px">${k.ad||'Ürün'}</div>
    <div style="font-size:11px;color:var(--gray-400);margin-bottom:10px">Her koliye ayrı QR etiketi basılacak.</div>

    <!-- SABİT MİKTAR MODU — fabrika paketi gibi hepsi aynı miktardaysa tek satırda tümünü doldurur -->
    <div style="background:#ede9fe;border-radius:8px;padding:10px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#5b21b6;margin-bottom:6px">⚡ Sabit Miktar Modu — hepsi aynı miktardaysa</div>
      <div style="display:flex;gap:6px">
        <input type="number" id="koli-sabit-kg" placeholder="${k.birim||'Miktar'} (örn. 12.5)" min="0" step="0.01" style="flex:1;padding:9px;border:1.5px solid #c4b5fd;border-radius:8px;font-size:13px;outline:none">
        <input type="number" id="koli-sabit-adet" placeholder="Koli sayısı (örn. 120)" min="1" step="1" style="flex:1;padding:9px;border:1.5px solid #c4b5fd;border-radius:8px;font-size:13px;outline:none">
        <button class="btn btn-sm" style="background:#5b21b6;color:white" onclick="koliSabitUygula()">Uygula</button>
      </div>
      <div style="font-size:10px;color:#7c3aed;margin-top:4px">Örn: toplam 1500 ${k.birim||'birim'} alım, koli başına 12.5 ${k.birim||'birim'} → 12.5 ve 120 gir, tüm etiketler tek seferde oluşur</div>
    </div>

    <div style="font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:6px">— veya farklı miktarlarda tek tek gir —</div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <input type="number" id="koli-adet" placeholder="Koli sayısı" min="1" step="1" style="flex:1;padding:9px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none">
      <button class="btn btn-sm btn-gray" onclick="koliSayisiOlustur()">Satır Oluştur</button>
    </div>
    <div id="koli-satirlar">
      ${k.koliler.map((m,j)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="width:52px;font-size:11px;font-weight:700;color:var(--gray-500)">Koli ${j+1}</div>
          <input type="number" value="${m}" placeholder="0.00" min="0" step="0.01" oninput="formKalemleri[${_koliAktifKalem}].koliler[${j}]=this.value;koliToplamGuncelle()"
            style="flex:1;padding:9px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:14px;font-weight:600;outline:none">
          <span style="font-size:11px;color:var(--gray-400);width:28px">${k.birim}</span>
          <button onclick="formKalemleri[${_koliAktifKalem}].koliler.splice(${j},1);renderKoliModal()" style="background:none;border:none;color:var(--danger);font-size:15px;cursor:pointer">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn btn-sm btn-gray" style="width:100%;margin-top:4px" onclick="formKalemleri[${_koliAktifKalem}].koliler.push('');renderKoliModal()">➕ Koli Ekle</button>
    <div style="background:var(--primary);color:white;border-radius:8px;padding:10px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;font-weight:700">TOPLAM (Miktar alanına yazılır)</span>
      <span id="koli-toplam" style="font-size:16px;font-weight:800">${toplam.toFixed(2)} ${k.birim}</span>
    </div>`;
}
function koliSabitUygula(){
  const kg=parseFloat(document.getElementById('koli-sabit-kg').value);
  const adet=parseInt(document.getElementById('koli-sabit-adet').value);
  const k=formKalemleri[_koliAktifKalem];
  if(!kg||kg<=0){toast(`⚠️ ${k.birim||'Miktar'} girin`);return;}
  if(!adet||adet<1||adet>500){toast('⚠️ 1-500 arası koli sayısı girin');return;}
  k.koliler=Array.from({length:adet},()=>String(kg));
  renderKoliModal();
  toast(`⚡ ${adet} koli × ${kg} ${k.birim} = ${(kg*adet).toFixed(2)} ${k.birim} dolduruldu`);
}
function koliSayisiOlustur(){
  const adet=parseInt(document.getElementById('koli-adet').value)||0;
  if(adet<1||adet>200){toast('⚠️ 1-200 arası koli sayısı girin');return;}
  const k=formKalemleri[_koliAktifKalem];
  const mevcut=k.koliler.filter(x=>x!=='');
  k.koliler=Array.from({length:adet},(_,j)=>mevcut[j]||'');
  renderKoliModal();
}
function koliToplamGuncelle(){
  const k=formKalemleri[_koliAktifKalem];
  const toplam=k.koliler.reduce((t,x)=>t+(parseFloat(x)||0),0);
  const el=document.getElementById('koli-toplam');
  if(el)el.textContent=toplam.toFixed(2)+' '+k.birim;
}
function koliKaydet(){
  const k=formKalemleri[_koliAktifKalem];
  k.koliler=k.koliler.filter(x=>parseFloat(x)>0);
  const toplam=k.koliler.reduce((t,x)=>t+(parseFloat(x)||0),0);
  if(k.koliler.length){
    k.miktar=String(Math.round(toplam*100)/100);
  }
  kModal('mKoli');
  renderKalemler();
  if(k.koliler.length)toast(`📦 ${k.koliler.length} koli, toplam ${toplam.toFixed(2)} ${k.birim}`);
}
function kalemUygunlukSet(i,uygun){
  formKalemleri[i].uygunsuz=!uygun;
  renderKalemler();
}

    <div style="border:1px solid var(--gray-200);border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
        <div class="field" style="flex:1;margin-bottom:8px">
          <label>Ürün Adı *</label>
          <div style="position:relative">
            <input type="text" id="k-ad-${i}" value="${(k.ad||'').replace(/"/g,'&quot;')}" placeholder="Ürün ara..." oninput="filterUrunDD(${i},this.value)">
            <div id="k-dd-${i}" class="udd"></div>
          </div>
        </div>
        <button onclick="kalemSil(${i})" style="background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0 2px;margin-top:20px">✕</button>
      </div>
      <div class="rfields">
        <div class="field"><label>Miktar *</label><input type="number" id="k-miktar-${i}" value="${k.miktar}" placeholder="Miktar" min="0" step="0.01" onchange="formKalemleri[${i}].miktar=this.value"></div>
        <div class="field"><label>Birim</label><input type="text" id="k-birim-${i}" value="${k.birim}" onchange="formKalemleri[${i}].birim=this.value"></div>
      </div>
      <div class="field" style="margin-bottom:8px">
        <button class="btn btn-sm" style="width:100%;background:${(k.koliler&&k.koliler.length)?'#d4edda':'var(--gray-100)'};color:${(k.koliler&&k.koliler.length)?'#155724':'var(--primary)'};border:1.5px dashed ${(k.koliler&&k.koliler.length)?'var(--success)':'var(--gray-300)'}" onclick="koliModalAc(${i})">
          📦 ${(k.koliler&&k.koliler.length)?`${k.koliler.length} koli girildi (${k.koliler.reduce((t,x)=>t+(parseFloat(x)||0),0).toFixed(2)} ${k.birim}) — düzenle`:'Koli Bazlı Giriş (her koliye ayrı etiket)'}
        </button>
      </div>
      <div class="rfields">
        <div class="field"><label>SKT</label><input type="date" value="${k.sktTarihi||''}" onchange="formKalemleri[${i}].sktTarihi=this.value"></div>
        <div class="field"><label>Sıcaklık (°C)${kriter?` <span style="font-weight:400;text-transform:none;color:var(--gray-400)">(Kriter: ${kriter})</span>`:''}</label><input type="number" step="0.1" value="${k.sicaklik||''}" placeholder="Ölçülen" onchange="formKalemleri[${i}].sicaklik=this.value"></div>

        <div class="field"><label>Marka</label><input type="text" value="${(k.marka||'').replace(/"/g,'&quot;')}" placeholder="Opsiyonel" onchange="formKalemleri[${i}].marka=this.value"></div>

          <div class="uyg-seg bad${k.uygunsuz?' active':''}" onclick="kalemUygunlukSet(${i},false)">❌ Uygunsuz</div>
        </div>

      ${k.uygunsuz?`<div class="field" style="margin-top:8px;margin-bottom:0">
        <label>Uygunsuzluk Açıklaması</label>
        <input type="text" value="${(k.uygunsuzNot||'').replace(/"/g,'&quot;')}" placeholder="Örn: Ambalajı ezik, SKT'ye yakın vb." onchange="formKalemleri[${i}].uygunsuzNot=this.value">

function filterUrunDD(i,val){
  formKalemleri[i].ad=val;
  const dd=document.getElementById('k-dd-'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const res=urunler.filter(u=>u.ad.toLowerCase().includes(val.toLowerCase())).slice(0,12);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(u=>`<div class="uddi" data-kod="${u.kod}" data-ad="${u.ad.replace(/"/g,'&quot;')}" data-birim="${u.birim||'KG'}" data-kriter="${u.sicaklik_kriter||''}">${u.ad} <span style="color:var(--gray-400);font-size:10px">${u.birim||'KG'}</span></div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      formKalemleri[i]={...formKalemleri[i],kod:this.dataset.kod,ad:this.dataset.ad,birim:this.dataset.birim,sicaklikKriter:this.dataset.kriter};
      dd.style.display='none';
      renderKalemler();
    });
  });
  const inp=document.getElementById('k-ad-'+i);
  const rect=inp.getBoundingClientRect();
  dd.style.left=rect.left+'px';dd.style.top=rect.bottom+'px';dd.style.width=Math.max(rect.width,250)+'px';
  dd.style.display='block';
}

function filterFirmaDD(val){
  const dd=document.getElementById('f-firma-dd');
  if(!val||val.length<2){dd.style.display='none';return;}
  const res=cariler.filter(c=>c.ad.toLowerCase().includes(val.toLowerCase())).slice(0,15);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(c=>`<div class="uddi" data-id="${c.id}" data-ad="${c.ad.replace(/"/g,'&quot;')}">${c.ad}</div>`).join('');
  dd.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      document.getElementById('f-firma-inp').value=this.dataset.ad;
      document.getElementById('f-firma-inp').dataset.id=this.dataset.id;
      dd.style.display='none';
    });
  });
  const inp=document.getElementById('f-firma-inp');
  const rect=inp.getBoundingClientRect();
  dd.style.left=rect.left+'px';dd.style.top=rect.bottom+'px';dd.style.width=rect.width+'px';
  dd.style.display='block';
}

function filterSiparisDD(val){
  const dd=document.getElementById('f-siparis-dd');
  const otelId=formOtelId;
  if(!val||val.length<2){dd.style.display='none';return;}
  const res=Object.values(siparisler).filter(s=>s.otelId===otelId&&s.siparisNo.toLowerCase().includes(val.toLowerCase())&&(s.durum==='bekleyen'||s.durum==='kismi')).slice(0,10);
  if(!res.length){dd.style.display='none';return;}
  dd.innerHTML=res.map(s=>`<div class="uddi" data-no="${s.siparisNo}">${s.siparisNo} — ${s.firma}</div>`).join('');
  dd.querySelectorAll('[data-no]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){
      e.preventDefault();
      const s=siparisler[this.dataset.no];
      document.getElementById('f-siparis-inp').value=s.siparisNo;
      document.getElementById('f-siparis-no').value=s.siparisNo;
      document.getElementById('f-firma-inp').value=s.firma;
      dd.style.display='none';
      // Kalemleri otomatik doldur
      formKalemleri=s.kalemler.map(k=>({kod:k.kod,ad:k.ad,birim:k.birim,miktar:k.kalanMiktar||k.miktar,sktTarihi:'',sicaklik:'',sicaklikKriter:'',seriNo:'',marka:'',uygunsuz:false,uygunsuzNot:''}));
      renderKalemler();
      toast('📦 Sipariş kalemleri forma aktarıldı');
    });
  });
  const inp=document.getElementById('f-siparis-inp');
  const rect=inp.getBoundingClientRect();
  dd.style.left=rect.left+'px';dd.style.top=rect.bottom+'px';dd.style.width=Math.max(rect.width,250)+'px';
  dd.style.display='block';
}
function siparisAramaTemizle(){
  document.getElementById('f-siparis-inp').value='';
  document.getElementById('f-siparis-no').value='';
}
document.addEventListener('pointerdown',e=>{
  document.querySelectorAll('.udd').forEach(dd=>{
    if(!dd.contains(e.target))dd.style.display='none';
  });
});

// SEÇ EKRANI — eski sistemdeki gibi tam liste, yazmadan dokunarak seçim
// ============================================================
let secModu=null; // 'siparis' | 'firma'
let secTumVeri=[];
let bspSatirlar=[]; // sipariş modunda: tüm açık siparişlerin tekil kalem satırları

function openSiparisSecEkrani(){
  secModu='siparis';
  const otelId=formOtelId;
  const acikSiparisler=Object.values(siparisler).filter(s=>s.otelId===otelId&&(s.durum==='bekleyen'||s.durum==='kismi'));
  bspSatirlar=[];
  acikSiparisler.forEach(sip=>{
    sip.kalemler.filter(k=>(k.kalanMiktar||k.miktar)>0.01).forEach(k=>{
      bspSatirlar.push({
        siparisNo:sip.siparisNo,firma:sip.firma,tarih:sip.tarih||'',durum:sip.durum,
        kalemAd:k.ad,kalemKod:k.kod||'',
        miktar:k.kalanMiktar>0?k.kalanMiktar:k.miktar,birim:k.birim||'KG',
        checked:false
      });
    });
  });
  document.getElementById('mSecTitle').innerHTML='📦 Bekleyen Sipariş Kalemleri <button class="mclose" onclick="kModal(\'mSecEkrani\')">✕</button>';
  document.getElementById('sec-arama').value='';
  document.getElementById('sec-arama').placeholder='Ürün, sipariş no veya firma ara...';
  document.getElementById('sec-bsp-tumu').checked=false;
  document.getElementById('sec-bsp-bar').style.display='flex';
  document.getElementById('sec-bsp-uygula').style.display='block';
  renderBSP();
  aModal('mSecEkrani');
}

function openFirmaSecEkrani(){
  secModu='firma';
  secTumVeri=[...cariler].sort((a,b)=>a.ad.localeCompare(b.ad,'tr'));
  document.getElementById('mSecTitle').innerHTML='🏢 Tedarikçi Seç <button class="mclose" onclick="kModal(\'mSecEkrani\')">✕</button>';
  document.getElementById('sec-arama').value='';
  document.getElementById('sec-arama').placeholder='Firma adı ara...';
  document.getElementById('sec-bsp-bar').style.display='none';
  document.getElementById('sec-bsp-uygula').style.display='none';
  renderSecListesi(secTumVeri);
  aModal('mSecEkrani');
}

function secListesiFiltrele(val){
  if(secModu==='siparis'){renderBSP();return;}
  const v=val.toLowerCase();
  if(!v){renderSecListesi(secTumVeri);return;}
  renderSecListesi(secTumVeri.filter(c=>c.ad.toLowerCase().includes(v)));
}

function renderSecListesi(liste){
  const c=document.getElementById('sec-liste');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">🔍</div><div class="et">Kayıt bulunamadı</div></div>';return;}
  c.innerHTML=liste.map(cr=>`<div class="mk-kart" onclick="firmaSecildi('${cr.id}','${cr.ad.replace(/'/g,"\\'")}')">
    <div style="font-size:14px;font-weight:700">${cr.ad}</div>
    ${cr.kod?`<div style="font-size:11px;color:var(--gray-500)">${cr.kod}</div>`:''}
  </div>`).join('');
}

// ============================================================
// BSP — Bekleyen Sipariş Kalemleri (çoklu sipariş / çoklu kalem seçimi)
// ============================================================
function renderBSP(){
  const ara=(document.getElementById('sec-arama').value||'').toLowerCase();
  let liste=bspSatirlar;
  if(ara)liste=liste.filter(s=>s.kalemAd.toLowerCase().includes(ara)||s.siparisNo.toLowerCase().includes(ara)||s.firma.toLowerCase().includes(ara));

  document.getElementById('sec-bsp-sayi').textContent=bspSatirlar.filter(s=>s.checked).length+' seçili';

  const c=document.getElementById('sec-liste');
  if(!bspSatirlar.length){c.innerHTML='<div class="es"><div class="ei">📦</div><div class="et">Bekleyen sipariş kalemi yok</div></div>';return;}
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">🔍</div><div class="et">Kayıt bulunamadı</div></div>';return;}

  const gruplar={};
  liste.forEach(s=>{
    if(!gruplar[s.siparisNo])gruplar[s.siparisNo]={firma:s.firma,tarih:s.tarih,durum:s.durum,kalemler:[]};
    gruplar[s.siparisNo].kalemler.push(s);
  });

  c.innerHTML=Object.entries(gruplar).map(([sipNo,g])=>`
    <div style="margin-bottom:10px">
      <div style="background:var(--gray-100);padding:7px 10px;border-radius:6px;font-size:12px;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-family:monospace;color:#5b21b6">${sipNo}</span>
        <span style="font-weight:400;color:var(--gray-500)">${g.firma}</span>
        ${g.durum==='kismi'?'<span class="chip chip-yellow">🔶 Kısmi</span>':''}
        ${g.tarih?`<span style="font-weight:400;color:var(--gray-400);margin-left:auto">${g.tarih}</span>`:''}
      </div>
      ${g.kalemler.map(s=>{
        const idx=bspSatirlar.indexOf(s);
        return`<div style="display:flex;align-items:center;gap:10px;padding:7px 8px;border-bottom:1px solid var(--gray-100);cursor:pointer;${s.checked?'background:#f0fdf4':''}" onclick="bspToggle(${idx})">
          <input type="checkbox" ${s.checked?'checked':''} onclick="event.stopPropagation();bspToggle(${idx})" style="width:18px;height:18px;flex-shrink:0;accent-color:var(--primary)">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${s.kalemAd}</div>
            <div style="font-size:11px;color:var(--gray-400);font-family:monospace">${s.kalemKod}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:14px;font-weight:800;color:var(--primary)">${s.miktar}</div>
            <div style="font-size:10px;color:var(--gray-500)">${s.birim}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function bspToggle(idx){
  bspSatirlar[idx].checked=!bspSatirlar[idx].checked;
  renderBSP();
}

function bspTumunuSec(checked){
  const ara=(document.getElementById('sec-arama').value||'').toLowerCase();
  bspSatirlar.forEach(s=>{
    const gorunur=!ara||s.kalemAd.toLowerCase().includes(ara)||s.siparisNo.toLowerCase().includes(ara)||s.firma.toLowerCase().includes(ara);
    if(gorunur)s.checked=checked;
  });
  renderBSP();
}

function bspUygula(){
  const secilen=bspSatirlar.filter(s=>s.checked);
  if(!secilen.length){toast('⚠️ En az bir kalem seçin');return;}

  const siparisNolar=[...new Set(secilen.map(s=>s.siparisNo))];

  const firmaInp=document.getElementById('f-firma-inp');
  if(firmaInp&&!firmaInp.value.trim()&&secilen[0].firma){
    firmaInp.value=secilen[0].firma;
  }

  document.getElementById('f-siparis-no').value=siparisNolar.join(', ');
  document.getElementById('f-siparis-inp').value=siparisNolar.join(', ');

  // Boş satırları temizle, seçilenleri ekle — aynı ürün kodu birden fazla siparişten
  // seçildiyse satırı ATLAMAK yerine miktarları BİRLEŞTİR (toplam gelen miktar doğru olsun)
  formKalemleri=formKalemleri.filter(k=>k.ad&&k.ad.trim());
  const mevcutKodlar=new Set(formKalemleri.map(k=>k.kod).filter(Boolean));
  let eklenen=0,birlestirilen=0;
  secilen.forEach(s=>{
    if(s.kalemKod&&mevcutKodlar.has(s.kalemKod)){
      const mevcutSatir=formKalemleri.find(k=>k.kod===s.kalemKod);
      if(mevcutSatir){
        mevcutSatir.miktar=String((parseFloat(mevcutSatir.miktar)||0)+(parseFloat(s.miktar)||0));
        birlestirilen++;
      }
    }else{
      formKalemleri.push({kod:s.kalemKod,ad:s.kalemAd,birim:(s.birim||'KG').toUpperCase(),miktar:String(s.miktar),sktTarihi:'',sicaklik:'',sicaklikKriter:'',seriNo:'',marka:'',uygunsuz:false,uygunsuzNot:''});
      if(s.kalemKod)mevcutKodlar.add(s.kalemKod);
      eklenen++;
    }
  });
  if(!formKalemleri.length)formKalemleri=[{kod:'',ad:'',birim:'KG',miktar:'',sktTarihi:'',sicaklik:'',sicaklikKriter:'',seriNo:'',marka:'',uygunsuz:false,uygunsuzNot:''}];
  renderKalemler();
  kModal('mSecEkrani');
  toast(`✅ ${eklenen} kalem forma eklendi${birlestirilen>0?`, ${birlestirilen} kalemin miktarı birleştirildi`:''} (${siparisNolar.length} sipariş)`);
}

function firmaSecildi(id,ad){
  document.getElementById('f-firma-inp').value=ad;
  document.getElementById('f-firma-inp').dataset.id=id;
  kModal('mSecEkrani');
}

function yeniMkNoUret(){
  const yil=new Date().getFullYear();
  const sayi=Object.values(malKabuller).filter(f=>f.mkNo&&f.mkNo.includes('-'+yil+'-')).length+1;
  return `MK-${yil}-${String(sayi).padStart(5,'0')}`;
}

function toggleAracHijyen(){
  const cb=document.getElementById('f-arac-hijyen');
  cb.checked=!cb.checked;
  updateAracHijyenUI();
}
function updateAracHijyenUI(){
  const cb=document.getElementById('f-arac-hijyen');
  const box=document.getElementById('f-arac-hijyen-box');
  const label=document.getElementById('f-arac-hijyen-label');
  if(cb.checked){label.textContent='Uygun';box.style.borderColor='var(--success)';box.style.background='#eafaf1';}
  else{label.textContent='Uygunsuz';box.style.borderColor='var(--danger)';box.style.background='#fde8e8';}
}

function openYeniForm(){
  formOtelId=currentUser.otelId||'810';
  previewMkNo=yeniMkNoUret();
  document.getElementById('f-mkno-badge').textContent='Kabul: '+previewMkNo;
  document.getElementById('f-tarih').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-siparis-inp').value='';
  document.getElementById('f-siparis-no').value='';
  document.getElementById('f-firma-inp').value='';
  document.getElementById('f-irsaliye').value='';
  document.getElementById('f-fatura').value='';
  document.getElementById('f-arac-hijyen').checked=true;
  updateAracHijyenUI();
  document.getElementById('f-arac-sicaklik').value='';
  document.getElementById('f-notlar').value='';
  formKalemleri=[{kod:'',ad:'',birim:'KG',miktar:'',sktTarihi:'',sicaklik:'',sicaklikKriter:'',seriNo:'',marka:'',uygunsuz:false,uygunsuzNot:''}];
  renderKalemler();
}

// Mal Kabul sekmesi içindeki iki alt görünüm: yeni kabul formu / geçmiş kayıtlar
function mkSwitchView(view){
  document.getElementById('mk-view-form').style.display=view==='form'?'block':'none';
  document.getElementById('mk-view-liste').style.display=view==='liste'?'block':'none';
  document.getElementById('mk-view-form-btn').classList.toggle('active',view==='form');
  document.getElementById('mk-view-liste-btn').classList.toggle('active',view==='liste');
  if(view==='form')openYeniForm();
  else renderListe();
}

async function formKaydet(){
  const firmaAd=document.getElementById('f-firma-inp').value.trim();
  const irsaliye=document.getElementById('f-irsaliye').value.trim();
  const aracSicaklik=document.getElementById('f-arac-sicaklik').value;
  const dolu=formKalemleri.filter(k=>k.ad&&k.miktar&&parseFloat(k.miktar)>0);
  if(!firmaAd){toast('⚠️ Tedarikçi seçin');return;}
  if(!irsaliye){toast('⚠️ İrsaliye no zorunlu');return;}
  if(aracSicaklik===''){toast('⚠️ Araç sıcaklığı zorunlu');return;}
  if(!dolu.length){toast('⚠️ En az bir ürün girin');return;}

  // Teslimat toleransı — sipariş edilen miktarın %20'sinden fazlası KABUL EDİLEMEZ (hard limit).
  // Kontrol, o siparişten bugüne kadar zaten gelmiş miktarı da hesaba katar (kısmi teslimatlarda
  // toplam gelen miktar sipariş edilenin %120'sini geçemez).
  const kontrolSiparisNo=document.getElementById('f-siparis-no').value||'';
  if(kontrolSiparisNo){
    const kontrolSiparisNolar=kontrolSiparisNo.split(',').map(s=>s.trim()).filter(Boolean);
    // Önbellekteki (siparisler) gelen/kalan miktar bayat olabilir — %20 tolerans kontrolünden
    // hemen önce ilgili siparişlerin kalemlerini canlı tazele, aksi halde eşzamanlı iki
    // teslimat girişi aynı bayat taban üzerinden ikisi de kontrolü geçebilir.
    try{
      const filtre=kontrolSiparisNolar.map(s=>`"${s}"`).join(',');
      const rTaze=await fetch(SB_URL+`/rest/v1/siparis_kalemleri?siparis_no=in.(${filtre})&select=siparis_no,urun_kodu,gelen_miktar,kalan_miktar`,{headers:SB_HEADERS});
      if(rTaze.ok){
        const rows=await rTaze.json();
        rows.forEach(row=>{
          const sip=siparisler[row.siparis_no];
          if(!sip)return;
          const sk=sip.kalemler.find(x=>x.kod===row.urun_kodu);
          if(sk){sk.gelenMiktar=parseFloat(row.gelen_miktar)||0;sk.kalanMiktar=parseFloat(row.kalan_miktar)||0;}
        });
      }
    }catch(e){console.warn('Canlı sipariş tazeleme başarısız, önbellekteki veriyle devam:',e);}
    for(const k of dolu){
      if(!k.kod)continue;
      for(const sipNo of kontrolSiparisNolar){
        const sip=siparisler[sipNo];
        if(!sip)continue;
        const sk=sip.kalemler.find(x=>x.kod===k.kod);
        if(sk){
          const maxToplamIzinli=sk.miktar*1.2;
          const zatenGelen=sk.gelenMiktar||0;
          const buSeferMaxIzinli=maxToplamIzinli-zatenGelen;
          if(parseFloat(k.miktar)>buSeferMaxIzinli+0.001){
            toast(`⚠️ ${k.ad}: Sipariş edilenin (${sk.miktar} ${sk.birim}) %20 üzerini kabul edemezsin. Bu seferlik en fazla ${buSeferMaxIzinli.toFixed(2)} ${k.birim} girebilirsin.`);
            return;
          }
          break;
        }
      }
    }
  }

  const otelId=formOtelId;
  const siparisNo=document.getElementById('f-siparis-no').value||null;
  const depoKodu=otelId==='811'?'300':'100';
  const mkNo=previewMkNo||yeniMkNoUret();

  sLD();
  try{
    const r=await fetch(SB_URL+'/rest/v1/mal_kabuller',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify({
      mk_no:mkNo,form_tarihi:document.getElementById('f-tarih').value,firma_ad:firmaAd,
      fatura_no:document.getElementById('f-fatura').value||null,irsaliye_no:irsaliye,
      ln_siparis_no:siparisNo,otel_id:otelId,depo_kodu:depoKodu,
      arac_hijyen:document.getElementById('f-arac-hijyen').checked?'uygun':'uygunsuz',arac_sicaklik:aracSicaklik,
      notlar:document.getElementById('f-notlar').value||null,personel_ad:currentUser.ad,durum:'bekleyen'
    })});
    if(!r.ok){
      const hataMetni=await r.text();
      console.error('mal_kabuller INSERT hatası:',hataMetni);
      hLD();
      alert('❌ Kaydetme hatası:\n\n'+hataMetni);
      return;
    }
    const d=await r.json();
    const mkId=d[0].id;

    const kalemSatirlar=dolu.map(k=>({mk_id:mkId,urun_kodu:k.kod||null,urun_adi:k.ad,birim:k.birim,miktar:parseFloat(k.miktar),seri_no:k.seriNo||null,marka:k.marka||null,sicaklik:k.sicaklik||null}));
    const rUrun=await fetch(SB_URL+'/rest/v1/mal_kabul_urunleri',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(kalemSatirlar)});
    if(!rUrun.ok){
      const hataMetni=await rUrun.text();
      console.error('mal_kabul_urunleri INSERT hatası:',hataMetni);
      hLD();
      alert('❌ Ürünler kaydedilirken hata:\n\n'+hataMetni+'\n\n(Not: Ana kayıt '+mkNo+' zaten oluşturuldu, ürünler eksik kalmış olabilir)');
      return;
    }
    // Koli etiketleri — her koliye ayrı kayıt (QR = koli id)
    try{
      const urunRows=await rUrun.json();

      // Bağlı sipariş(ler)den tahmini fiyatları çek (varsa) — koli hemen bu fiyatla başlasın,
      // Fiyat Kontrolü'nde gerçek fatura fiyatı gelince zaten üzerine yazılıyor.
      let tahminiFiyatMap={};
      if(siparisNo){
        const siparisNolar=siparisNo.split(',').map(s=>s.trim()).filter(Boolean);
        if(siparisNolar.length){
          try{
            const filtre=siparisNolar.map(s=>`"${s}"`).join(',');
            const rTahmini=await fetch(SB_URL+`/rest/v1/siparis_kalemleri?siparis_no=in.(${filtre})&select=urun_kodu,tahmini_fiyat&tahmini_fiyat=not.is.null`,{headers:SB_HEADERS});
            if(rTahmini.ok){
              (await rTahmini.json()).forEach(row=>{
                if(row.urun_kodu&&row.tahmini_fiyat!=null)tahminiFiyatMap[row.urun_kodu]=parseFloat(row.tahmini_fiyat);
              });
            }
          }catch(e){console.warn('Tahmini fiyat çekilemedi:',e);}
        }
      }

      const koliSatirlar=[];
      dolu.forEach((k,di)=>{
        if(k.koliler&&k.koliler.length){
          const urunRow=urunRows[di]; // POST sırası korunur
          const tahmini=k.kod?tahminiFiyatMap[k.kod]:null;
          k.koliler.forEach((kg,j)=>{
            koliSatirlar.push({
              mk_id:mkId,mk_urun_id:urunRow?.id||null,
              urun_kodu:k.kod||null,urun_adi:k.ad,birim:k.birim,
              miktar:parseFloat(kg)||0,koli_no:j+1,
              seri_no:k.seriNo||null,marka:k.marka||null,skt_tarihi:k.sktTarihi||null,
              otel_id:otelId,depo_kodu:depoKodu,durum:'depoda',
              birim_fiyat:tahmini??null,fiyat_kaynagi:tahmini!=null?'tahmini':null
            });
          });
        }
      });
      if(koliSatirlar.length){
        await fetch(SB_URL+'/rest/v1/koli_etiketleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(koliSatirlar)});
      }
    }catch(e){console.warn('Koli etiketi yazılamadı:',e);}

    // SKT girilen kalemler için kayıt oluştur
    for(const k of dolu){
      if(k.sktTarihi){
        await fetch(SB_URL+'/rest/v1/skt_kayitlari',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
          urun_kodu:k.kod||null,mk_id:mkId,otel_id:otelId,depo_kodu:depoKodu,miktar:parseFloat(k.miktar),
          skt_tarihi:k.sktTarihi,durum:'aktif'
        })});
      }
      if(k.uygunsuz){
        await fetch(SB_URL+'/rest/v1/uygunsuzluklar',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
          mk_id:mkId,urun_kodu:k.kod||null,otel_id:otelId,
          aciklama:`${k.ad} — mal kabulde uygunsuz/hasarlı olarak işaretlendi${k.uygunsuzNot?': '+k.uygunsuzNot:''}`,
          durum:'acik',bildiren_ad:currentUser.ad
        })});
      }
    }

    // NOT: Sipariş kalan/gelen miktarı artık burada DEĞİL, Kalite Onayı verildiğinde güncelleniyor
    // (bkz. kaliteOnayla) — henüz onaylanmamış bir kayıt yüzünden sipariş miktarının
    // yanlış düşmesini önlemek için.

    await auditLogYaz('create','mal_kabul',mkId,`Mal kabul oluşturuldu: ${mkNo} — ${firmaAd} [${OTEL_KISA[otelId]}]`);
    toast(`✅ ${mkNo} kaydedildi — Kalite onayına gönderildi`);
    await loadDB();
    listeFilter='bekleyen';
    mkSwitchView('liste');
    document.querySelectorAll('#mk-view-liste .ftab').forEach(t=>{
      t.classList.toggle('active', t.textContent.includes('Bekleyen'));
    });
    renderListe();
    renderKaliteOnay();
    hLD();
    return;
  }catch(e){
    console.error(e);
    alert('❌ Kaydetme hatası:\n\n'+(e.message||e));
  }
  hLD();
  await loadDB();
  renderListe();
  renderKaliteOnay();
}

// LİSTE
// ============================================================
function renderListe(){
  let liste=Object.values(malKabuller);
  if(listeFilter!=='tumu')liste=liste.filter(f=>f.durum===listeFilter);
  liste.sort((a,b)=>b.olusturmaTarih-a.olusturmaTarih);

  const bekleyen=Object.values(malKabuller).filter(f=>f.durum==='bekleyen').length;
  const onayli=Object.values(malKabuller).filter(f=>f.durum==='onaylandi').length;
  document.getElementById('liste-stats').innerHTML=`
    <div class="stat-kart"><div class="stat-num">${Object.keys(malKabuller).length}</div><div class="stat-lbl">Toplam</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--warning)">${bekleyen}</div><div class="stat-lbl">Bekleyen</div></div>
    <div class="stat-kart"><div class="stat-num" style="color:var(--success)">${onayli}</div><div class="stat-lbl">Onaylı</div></div>`;
  document.getElementById('bkalite').textContent=bekleyen;
  document.getElementById('bkalite').style.display=bekleyen>0?'inline-block':'none';

  const c=document.getElementById('liste-icerik');
  if(!liste.length){c.innerHTML='<div class="es"><div class="ei">📥</div><div class="et">Kayıt yok</div></div>';return;}
  c.innerHTML=liste.map(f=>durumKart(f)).join('');
}
function durumKart(f){
  const durumChip={bekleyen:'<span class="chip chip-yellow">⏳ Bekliyor</span>',onaylandi:'<span class="chip chip-green">✅ Onaylı</span>',iptal:'<span class="chip chip-red">❌ İptal</span>',arsivlendi:'<span class="chip chip-gray">📦 Arşiv</span>'};
  return`<div class="mk-kart ${f.durum}" onclick="openDetay('${f.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div style="font-size:13px;font-weight:700">${f.mkNo}</div><div style="font-size:11px;color:var(--gray-500)">${escapeHtml(f.firma)} • ${f.tarih}</div></div>
      <div style="text-align:right">${durumChip[f.durum]||''}</div>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
      <span class="chip ${f.otelId==='811'?'chip-blue':'chip-orange'}">🏨 ${OTEL_KISA[f.otelId]}</span>
      ${f.lnSiparisNo?`<span class="chip chip-purple">📋 ${f.lnSiparisNo}</span>`:''}
      <span class="chip chip-gray">${f.urunler.length} ürün</span>
      ${(!f.faturaNo&&f.durum!=='iptal')?'<span class="chip chip-yellow">⏳ Fatura Bekliyor</span>':''}
    </div>
  </div>`;
}
function filterListe(f,el){listeFilter=f;document.querySelectorAll('#mk-view-liste .ftab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderListe();}

function openDetay(id){
  const f=malKabuller[id];if(!f)return;
  document.getElementById('mDetayTitle').textContent=f.mkNo;

async function duzeltmeModuAc(id){
  const f=malKabuller[id];if(!f)return;
  if(!confirm(`"${f.mkNo}" numaralı onaylı kaydı düzeltme moduna almak istediğinize emin misiniz?\nDüzeltme sonrası yeniden Kalite Onayı'na düşecek; sipariş üzerine işlenen miktar VE bu kayıtla stoğa eklenen miktar geri alınacak (yeniden onaylanınca güncel miktarla tekrar işlenecek).`))return;
  const duzeltmeNotu=`✏️ Düzeltme: ${currentUser.ad} — ${new Date().toLocaleDateString('tr-TR')}`;
  const yeniNotlar=f.notlar?`${f.notlar}\n${duzeltmeNotu}`:duzeltmeNotu;
  sLD();
  try{
    // Sipariş üzerine daha önce onayla işlenmiş miktarı geri al (tekrar onaylanınca yeniden eklenecek)
    await siparisMiktarUygula(f,-1);
    // Bu kaydın onayında stoğa eklenmiş miktarı da geri al — aksi halde yeniden onaylandığında
    // stokaIsle() aynı miktarı bir daha ekler ve fiziksel karşılığı olmayan stok birikir.
    // (f.stok_islendi bayrağına güvenmiyoruz — kolon her ortamda garanti değil; düzeltmeModuAc
    // yalnızca durum==='onaylandi' kayıtlar için açılıyor, ve o duruma sadece stokaIsle() üzerinden
    // geçiliyor, yani buraya düşen her kayıt zaten stoğa işlenmiştir.)
    const geriAlindi=await stoktanGeriAl(f);
    if(!geriAlindi){hLD();return;} // stoktanGeriAl zaten alert gösterdi — durum PATCH'lenmeden dur, aksi halde stok iki kez düşer/eklenir
    await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({durum:'bekleyen',notlar:yeniNotlar,stok_islendi:false})});
    await auditLogYaz('duzelt','mal_kabul',id,`Onaylı kayıt düzeltme moduna alındı: ${f.mkNo}`);
  }catch(e){console.warn(e);toast('⚠️ İşlem başarısız');hLD();return;}
  hLD();
  kModal('mDetay');
  await loadDB();
  renderListe();
  renderKaliteOnay();
  toast(`✏️ ${f.mkNo} düzeltme için açıldı — Kalite Onayı sekmesinde görünecek`);
}

// stokaIsle()'ın tersi — düzeltme moduna alınan bir kaydın daha önce stoğa eklediği
// miktarı geri düşer. Aynı composite depo kodu deseniyle çalışır.
async function stoktanGeriAl(f){
  const otelId=f.otelId||'810';
  const bareDepoKodu=otelId==='811'?'300':'100';
  const depoKompozit=otelId+'_'+bareDepoKodu;
  const hatalar=[];
  for(const u of (f.urunler||[])){
    if(!u.kod||!u.miktar)continue;
    const miktar=parseFloat(u.miktar)||0;
    if(miktar<=0)continue;
    try{
      // Atomik stok düşümü (rpc/stok_ekle, negatif delta)
      const rStok=await fetch(SB_URL+'/rest/v1/rpc/stok_ekle',{
        method:'POST',headers:SB_HEADERS,
        body:JSON.stringify({p_urun_kodu:u.kod,p_depo_kodu:depoKompozit,p_otel_id:otelId,p_delta:-miktar})
      });
      if(!rStok.ok){
        const hataMetni=await rStok.text();
        console.error('stoktanGeriAl — stok_ekle RPC hatası:',hataMetni);
        hatalar.push(`${u.ad||u.kod}: ${hataMetni}`);
        continue; // stok geri alınmadıysa hareket kaydı da atma, tutarsız olur
      }
      const rHar=await fetch(SB_URL+'/rest/v1/stok_hareketleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        urun_kodu:u.kod,depo_kodu:depoKompozit,otel_id:otelId,tip:'duzeltme-iptal',miktar,
        belge_no:f.mkNo,aciklama:`Düzeltme için onay iptali: ${f.mkNo} — ${f.firma}`
      })});
      if(!rHar.ok){
        const hataMetni=await rHar.text();
        console.error('stoktanGeriAl — stok_hareketleri POST hatası:',hataMetni);
        hatalar.push(`${u.ad||u.kod} (hareket kaydı): ${hataMetni}`);
      }
    }catch(e){console.error('stoktanGeriAl hatası:',e);hatalar.push(`${u.ad||u.kod}: ${e.message||e}`);}
  }
  if(hatalar.length){
    alert('⚠️ Stok geri alınırken bazı ürünlerde hata oluştu:\n\n'+hatalar.join('\n\n')+'\n\nDüzeltme moduna GEÇİLMEDİ — Supabase\'de stoğu elle kontrol edip tekrar dene.');
  }
  return hatalar.length===0;
}

// ============================================================
// SİPARİŞ MİKTARI UYGULA — onay verilince ekle (yon=1), düzeltmeye alınca geri al (yon=-1)
// ============================================================
async function siparisMiktarUygula(f,yon){
  if(!f.lnSiparisNo)return;
  const siparisNolar=f.lnSiparisNo.split(',').map(s=>s.trim()).filter(Boolean);
  for(const siparisNo of siparisNolar){
    const sip=siparisler[siparisNo];
    if(!sip)continue;
    for(const u of f.urunler){
      const sk=sip.kalemler.find(x=>x.kod===u.kod||x.ad===u.ad);
      if(sk){
        const yeniGelen=Math.max(0,(sk.gelenMiktar||0)+yon*u.miktar);
        const yeniKalan=Math.max(0,(sk.miktar||0)-yeniGelen);
        await fetch(SB_URL+`/rest/v1/siparis_kalemleri?siparis_no=eq.${siparisNo}&urun_kodu=eq.${encodeURIComponent(u.kod||'')}`,{
          method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({gelen_miktar:yeniGelen,kalan_miktar:yeniKalan})
        });
        sk.gelenMiktar=yeniGelen;sk.kalanMiktar=yeniKalan;
      }
    }
    const tumuTamam=sip.kalemler.every(sk=>(sk.kalanMiktar||0)<=0.01);
    const herhangiGeldi=sip.kalemler.some(sk=>(sk.gelenMiktar||0)>0.01);
    const yeniDurum=tumuTamam?'tamamlandi':(herhangiGeldi?'kismi':'bekleyen');
    await fetch(SB_URL+'/rest/v1/siparisler?siparis_no=eq.'+siparisNo,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({durum:yeniDurum})});
  }
}

async function kaliteOnayla(id){
  const f=malKabuller[id];if(!f)return;
  const uygunsuzlar=uygunsuzluklarAcik[id]||[];
  const mesaj=uygunsuzlar.length
    ? `⚠️ ${f.mkNo} kaydında ${uygunsuzlar.length} AÇIK UYGUNSUZLUK bildirimi var!\n\nYine de onaylamak istediğinize emin misiniz?`
    : `${f.mkNo} onaylansın mı?`;
  if(!confirm(mesaj))return;
  sLD();
  try{
    // 1) Onayı KESİNLEŞTİR — bu, stok_islendi kolonu olmasa bile mutlaka başarılı olmalı
    const rOnay=await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({durum:'onaylandi'})});
    if(!rOnay.ok){
      const hataMetni=await rOnay.text();
      hLD();
      alert('❌ Onay kaydedilemedi:\n\n'+hataMetni);
      return;
    }
    // 2) Stoğu işle — composite depo koduyla (810_100 / 811_300)
    const stokBasarili=await stokaIsle(f);
    // 3) stok_islendi bayrağını ayrı, kendi başına dene — kolon yoksa (SQL migration çalıştırılmadıysa)
    //    burada hata alsa bile onay/stok yazımı zaten tamamlanmış olur, geri sarmaz.
    if(stokBasarili){
      try{await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({stok_islendi:true})});}
      catch(e){console.warn('stok_islendi bayrağı yazılamadı (stok-islendi-fix.sql çalıştırıldı mı?):',e);}
    }
    // Sipariş kalan/gelen miktarı SADECE burada, onay anında güncellenir
    await siparisMiktarUygula(f,1);
  }catch(e){console.warn(e);hLD();alert('❌ Onay sırasında hata: '+e.message);return;}
  await auditLogYaz('approve','mal_kabul',id,`Kalite onayı verildi: ${f.mkNo}`);
  hLD();
  await loadDB();renderListe();renderKaliteOnay();
  toast('✅ Onaylandı — stok işlendi');
  kabulOzetAc(id,{onaylayan:currentUser.ad,onayTarih:Date.now()});
}

// ============================================================
// STOĞA İŞLEME — mal kabul onaylanınca, composite depo koduyla
// (otelId + '_' + bareDepoKodu), stok-takip.html/depo-siparis.html ile
// AYNI formatta. Buradan başka hiçbir yerin stoğa yazmasına gerek yok.
// ============================================================
async function stokaIsle(f){
  const otelId=f.otelId||'810';
  const bareDepoKodu=otelId==='811'?'300':'100';
  const depoKompozit=otelId+'_'+bareDepoKodu;
  const hatalar=[];
  for(const u of (f.urunler||[])){
    if(!u.kod||!u.miktar)continue;
    const miktar=parseFloat(u.miktar)||0;
    if(miktar<=0)continue;
    // Atomik stok girişi (rpc/stok_ekle) — yarış durumu yok, GET+hesapla+POST kalktı
    const rStok=await fetch(SB_URL+'/rest/v1/rpc/stok_ekle',{
      method:'POST',headers:SB_HEADERS,
      body:JSON.stringify({p_urun_kodu:u.kod,p_depo_kodu:depoKompozit,p_otel_id:otelId,p_delta:miktar})
    });
    if(!rStok.ok){
      const hataMetni=await rStok.text();
      console.error('stok_ekle RPC hatası:',hataMetni);
      hatalar.push(`${u.ad}: ${hataMetni}`);
      continue; // bu ürün için hareket kaydı da atma, stok yazılmadıysa tutarsız olur
    }
    const rHar=await fetch(SB_URL+'/rest/v1/stok_hareketleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
      urun_kodu:u.kod,depo_kodu:depoKompozit,otel_id:otelId,tip:'giris',miktar,
      belge_no:f.mkNo,aciklama:`Mal kabul: ${f.mkNo} — ${f.firma}`
    })});
    if(!rHar.ok){
      const hataMetni=await rHar.text();
      console.error('stok_hareketleri POST hatası:',hataMetni);
      hatalar.push(`${u.ad} (hareket kaydı): ${hataMetni}`);
    }
  }
  if(hatalar.length){
    alert('⚠️ Bazı ürünler stoğa işlenirken hata aldı:\n\n'+hatalar.join('\n\n')+'\n\nOnay yine de tamamlandı ama bu ürünlerin stoğunu Supabase\'de elle kontrol et.');
  }
  return hatalar.length===0;
}
async function kaliteReddet(id){
  const f=malKabuller[id];if(!f)return;
  const neden=prompt(`${f.mkNo} neden reddediliyor?`);
  if(neden===null)return;
  sLD();
  try{
    await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({durum:'iptal'})});

    const mevcutUygunsuzlar=uygunsuzluklarAcik[id]||[];
    if(mevcutUygunsuzlar.length){
      // Bu kayıtta zaten (üründen kaynaklanan) açık uygunsuzluk bildirimi var —
      // tekrar genel bir kayıt açmak yerine, ret sebebini mevcut kayda not olarak ekle.
      const r=await fetch(SB_URL+'/rest/v1/uygunsuzluklar?mk_id=eq.'+id+'&durum=eq.acik&select=id,aciklama',{headers:SB_HEADERS});
      if(r.ok){
        const kayitlar=await r.json();
        for(const k of kayitlar){
          await fetch(SB_URL+'/rest/v1/uygunsuzluklar?id=eq.'+k.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({
            aciklama:`${k.aciklama}\n— Mal kabul reddedildi: ${neden}`
          })});
        }
      }
    }else{
      // Bu kayıtta üründen kaynaklanan bir uygunsuzluk yoktu (örn. yanlış ürün geldi, miktar tutmadı vb.)
      // — reddetme sebebinin kendisi tek uygunsuzluk kaydı olur.
      await fetch(SB_URL+'/rest/v1/uygunsuzluklar',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        mk_id:id,otel_id:f.otelId,aciklama:`Mal kabul reddedildi: ${neden}`,durum:'acik',bildiren_ad:currentUser.ad
      })});
    }
  }catch(e){}
  await auditLogYaz('reject','mal_kabul',id,`Reddedildi: ${f.mkNo} — ${neden}`);
  hLD();
  await loadDB();renderListe();renderKaliteOnay();renderUygun();
  toast('❌ Reddedildi');
}

async function urunDuzeltKaydet(mkId,urunId){
  const ad=document.getElementById('dz-ad').value.trim();
  const birim=document.getElementById('dz-birim').value;
  const miktar=parseFloat(document.getElementById('dz-miktar').value);
  const seriNo=document.getElementById('dz-serino').value.trim();
  const marka=document.getElementById('dz-marka').value.trim();
  if(!ad){toast('⚠️ Ürün adı boş olamaz');return;}
  if(!miktar||miktar<=0){toast('⚠️ Geçerli bir miktar girin');return;}
  sLD();
  try{
    await fetch(SB_URL+'/rest/v1/mal_kabul_urunleri?id=eq.'+urunId,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({urun_adi:ad,birim,miktar,seri_no:seriNo||null,marka:marka||null})});
    await auditLogYaz('update','mal_kabul_urunu',urunId,`Ürün düzeltildi: ${ad} — ${miktar} ${birim} (${currentUser.ad})`);
  }catch(e){console.warn(e);toast('⚠️ Kaydetme hatası');hLD();return;}
  hLD();
  kModal('mUrunDuzelt');
  toast(`✅ ${ad} güncellendi`);
  await loadDB();
  renderListe();renderKaliteOnay();
}

// KOLİ ETİKET YAZDIRMA — her koliye QR'lı etiket (3 sütun ızgara, A4)
// QR içeriği: "KOLI:<uuid>" — Stok Takip'te okutulunca ürün/kg/seri/SKT otomatik dolar.
// ============================================================
async function koliEtiketYazdir(mkId){
  sLD();
  let koliler=[];
  try{
    const r=await fetch(SB_URL+'/rest/v1/koli_etiketleri?mk_id=eq.'+mkId+'&order=urun_adi,koli_no',{headers:SB_HEADERS});
    if(r.ok)koliler=await r.json();
  }catch(e){}
  hLD();
  if(!koliler.length){toast('⚠️ Bu kayıtta koli etiketi yok — kabul sırasında "Koli Bazlı Giriş" kullanılmamış');return;}
  const f=malKabuller[mkId];
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Koli Etiketleri — ${f?.mkNo||''}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
  <style>
    body{font-family:Arial,sans-serif;margin:0;padding:8mm}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4mm}
    .etiket{border:1.5px dashed #999;border-radius:3mm;padding:3mm;display:flex;gap:3mm;align-items:center;page-break-inside:avoid;height:34mm;box-sizing:border-box}
    .qr{width:26mm;height:26mm;flex-shrink:0}
    .qr img,.qr canvas{width:26mm!important;height:26mm!important}
    .bilgi{flex:1;min-width:0}
    .urun{font-size:9pt;font-weight:800;line-height:1.15;overflow:hidden}
    .kg{font-size:13pt;font-weight:900;margin:1mm 0}
    .detay{font-size:6.5pt;color:#333;line-height:1.3}
    .mkno{font-size:6pt;color:#888;font-family:monospace}
    @media print{.noprint{display:none}}
  </style></head><body>
  <div class="noprint" style="margin-bottom:10px">
    <button onclick="window.print()" style="padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer">🖨️ Yazdır (${koliler.length} etiket)</button>
  </div>
  <div class="grid">
    ${koliler.map((k,i)=>`
      <div class="etiket">
        <div class="qr" id="qr${i}"></div>
        <div class="bilgi">
          <div class="urun">${k.urun_adi}</div>
          <div class="kg">${parseFloat(k.miktar).toFixed(2)} ${k.birim}</div>
          <div class="detay">

            Giriş: ${k.olusturma_tarihi?new Date(k.olusturma_tarihi).toLocaleDateString('tr-TR'):'—'}${k.skt_tarihi?' • SKT: '+new Date(k.skt_tarihi).toLocaleDateString('tr-TR'):''}
          </div>
          <div class="mkno">${f?.mkNo||''} • ${f?.firma||''}</div>
        </div>
      </div>`).join('')}
  </div>
  <script>
    const veriler=${JSON.stringify(koliler.map(k=>k.id))};
    veriler.forEach((id,i)=>{new QRCode(document.getElementById('qr'+i),{text:'KOLI:'+id,width:100,height:100,correctLevel:QRCode.CorrectLevel.M});});
  <\/script>
  </body></html>`);
  w.document.close();
}

let uygunCache={};
async function renderUygun(){
  sLD();
  let rows=[];
  try{
    const r=await fetch(SB_URL+`/rest/v1/uygunsuzluklar?durum=eq.${uygunFilter}&select=*&order=olusturma_tarihi.desc`,{headers:SB_HEADERS});
    if(r.ok)rows=await r.json();
  }catch(e){}
  hLD();
  uygunCache={};rows.forEach(r=>uygunCache[r.id]=r);
  const c=document.getElementById('uygun-icerik');
  if(!rows.length){c.innerHTML='<div class="es"><div class="ei">⚠️</div><div class="et">Kayıt yok</div></div>';return;}
  const kararEtiket={iade:'İade',sartli:'Şartlı Kullanım',imha:'İmha',duzeltme:'Düzeltme/Tekrar İşleme'};
  c.innerHTML=rows.map(r=>`<div class="mk-kart" style="border-left-color:${r.durum==='acik'?'var(--danger)':'var(--success)'}">
    <div style="font-size:12px">${escapeHtml(r.aciklama)}</div>
    <div style="font-size:10px;color:var(--gray-400);margin-top:4px">👤 ${escapeHtml(r.bildiren_ad)||'—'} • ${new Date(r.olusturma_tarihi).toLocaleDateString('tr-TR')}</div>
    ${r.durum==='acik'
      ?`<button class="btn btn-warning btn-sm btn-block" style="margin-top:8px" onclick="uygunsuzlukIncele('${r.id}')">🔍 Düzeltici Faaliyet</button>`
      :`<div style="margin-top:8px;padding:8px;background:var(--gray-100);border-radius:6px;font-size:11px">
          <div><b>Karar:</b> ${kararEtiket[r.karar]||'—'}</div>
          ${r.faaliyet_aciklama?`<div style="margin-top:2px"><b>Faaliyet:</b> ${escapeHtml(r.faaliyet_aciklama)}</div>`:''}
          <div style="color:var(--gray-500);margin-top:2px">${r.faaliyet_yapan||''} ${r.faaliyet_tarih?'• '+r.faaliyet_tarih:''}</div>

        <button class="btn btn-primary btn-sm btn-block" style="margin-top:6px" onclick="uygunsuzlukYazdir('${r.id}')">🖨️ Formu Yazdır</button>`}
  </div>`).join('');
}

async function uygunsuzlukKaydet(id){
  const karar=document.querySelector('input[name="uf-karar"]:checked')?.value;
  const faaliyet=document.getElementById('uf-faaliyet').value.trim();
  const yapan=document.getElementById('uf-faaliyet-yapan').value.trim();
  const tarih=document.getElementById('uf-faaliyet-tarih').value;
  if(!karar){toast('⚠️ Karar seçin (İade/Şartlı Kullanım/İmha/Düzeltme)');return;}
  if(!faaliyet){toast('⚠️ Faaliyet açıklaması girin');return;}
  sLD();
  try{
    await fetch(SB_URL+'/rest/v1/uygunsuzluklar?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({
      durum:'kapatildi',kapanma_tarihi:new Date().toISOString(),
      karar,faaliyet_aciklama:faaliyet,faaliyet_yapan:yapan||null,faaliyet_tarih:tarih||null
    })});
    await auditLogYaz('close','uygunsuzluk',id,`Düzeltici faaliyet kaydedildi ve kapatıldı — karar: ${karar}`);
  }catch(e){console.warn(e);toast('⚠️ Kaydetme hatası');hLD();return;}
  hLD();
  kModal('mUygunDetay');
  toast('✅ Düzeltici faaliyet kaydedildi, uygunsuzluk kapatıldı');
  await loadDB();
  renderUygun();
  uygunsuzlukYazdir(id); // kaydettikten sonra çıktı ekranı otomatik açılsın
}
