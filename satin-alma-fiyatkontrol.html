<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script src="ortak.js"></script>
<link rel="stylesheet" href="theme.css">
<script>
let CU = requireLogin();
if (CU) requireRole(CU, ['yonetici','satinalma','depo']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Fiyat Kontrolü</title>
<meta name="theme-color" content="#1a2744">
<style>
:root{--accent:#c9a24b}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.sc::-webkit-scrollbar{display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-danger{background:var(--danger);color:white}.btn-warning{background:var(--warning);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-info{background:var(--info);color:white}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.brow{display:flex;gap:8px}.brow .btn{flex:1}
.chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.chip-warn{background:#fff3cd;color:#856404}.chip-ok{background:#d4edda;color:#155724}.chip-err{background:#fde8e8;color:#9b1c1c}.chip-info{background:#d1ecf1;color:#0c5460}.chip-gray{background:var(--gray-200);color:var(--gray-700)}
.ftabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ftab{padding:6px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:white;color:var(--gray-600);flex-shrink:0}
.ftab.active{background:var(--primary);border-color:var(--primary);color:white}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end}
.mo.open{display:flex}
.mbox{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mtitle{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mclose{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-500)}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <button class="hbtn" onclick="location.href='satin-alma.html'">←</button>
    <div style="flex:1"><h1>Fiyat Kontrolü</h1><span class="sub" id="hsub"></span></div>
  </div>

  <div class="sc" id="tab-fiyatKontrol">
    <div class="card">
      <div class="card-title">💰 Fiyat Kontrolü
        <button class="btn btn-sm btn-primary" style="margin-left:auto" onclick="loadFiyatKontrol()">🔄 Yenile</button>
      </div>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:10px">
        Deponun fatura eşleştirdiği kabul kayıtları — fiyatları kontrol edip Muhasebe'ye gönderin
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px" id="fk-stats"></div>
    </div>
    <div class="ftabs">
      <button class="ftab active" id="fk-tab-bekleyen" onclick="filterFiyatKontrol('bekleyen',this)">⏳ Kontrol Bekliyor</button>
      <button class="ftab" id="fk-tab-kontrol" onclick="filterFiyatKontrol('kontrol',this)">✅ Kontrol Edildi</button>
      <button class="ftab" id="fk-tab-muhasebe" onclick="filterFiyatKontrol('muhasebe',this)">📤 Muhasebe'ye Gönderildi</button>
      <button class="ftab" id="fk-tab-tumu" onclick="filterFiyatKontrol('tumu',this)">Tümü</button>
    </div>
    <div id="fiyat-kontrol-liste"></div>
  </div>
</div>

<!-- MODAL: Fiyat Kontrolü Detay -->
<div class="mo" id="mFiyatKontrol">
  <div class="mbox" style="max-height:95vh">
    <div class="mtitle">💰 Fiyat Kontrolü <button class="mclose" onclick="kModal('mFiyatKontrol')">✕</button></div>
    <div id="fk-modal-content"></div>
    <div style="margin-top:14px;display:flex;gap:8px">
      <button class="btn btn-gray" onclick="kModal('mFiyatKontrol')">Kapat</button>
      <button class="btn btn-success" style="flex:1" id="fk-muhasebe-btn" onclick="muhasebeGonder()" disabled>📤 Muhasebe'ye Gönder</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// SB_URL/SB_KEY/SB_HEADERS -> supabase-config.js
// sLD/hLD/toast/escapeHtml/round2/kModal/aModal -> ortak.js
function fmt(n){return(parseFloat(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}

// ============================================================
// FİYAT KONTROLÜ — Deponun fatura eşleştirdiği kayıtları al
// ============================================================
let _fkFilter='bekleyen';
let _fkFormlar=[];
let _fkAktifId=null;
let YETKI_HARITASI = {};

async function loadFiyatKontrol(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/mal_kabuller?durum=eq.onaylandi&fatura_no=not.is.null&select=*,mal_kabul_urunleri(*)',{headers:SB_HEADERS});
    if(r.ok){
      const rows=await r.json();
      _fkFormlar=rows.map(fkSbdenCamele);
    }
  }catch(e){console.warn(e);}
  renderFiyatKontrol();
}

function fkSbdenCamele(r){
  const urunler=(r.mal_kabul_urunleri||[]).map(u=>({
    id:u.id,kod:u.urun_kodu||'',ad:u.urun_adi,miktar:u.miktar,birim:u.birim,
    birimFiyat:u.birim_fiyat?parseFloat(u.birim_fiyat):0
  }));
  return{
    id:r.id,durum:r.durum,faturaNo:r.fatura_no,mkNo:r.mk_no,firma:r.firma_ad,
    formTarih:r.form_tarihi,irsaliyeNo:r.irsaliye_no,lnSiparisNo:r.ln_siparis_no,
    otelId:r.otel_id||null,
    urunler,
    fiyatlar:urunler.map(u=>u.birimFiyat||0),
    fiyatKontrolDurum:r.fiyat_kontrol_durum||null,
    fiyatKontrolNotu:r.fiyat_kontrol_notu||'',
    fiyatKontrolTarih:r.fiyat_kontrol_tarihi?new Date(r.fiyat_kontrol_tarihi).getTime():null,
    muhasebeFaturaId:r.muhasebe_fatura_id||null,
    tarih:r.form_tarihi?new Date(r.form_tarihi).getTime():0
  };
}

function filterFiyatKontrol(f,el){
  _fkFilter=f;
  document.querySelectorAll('#tab-fiyatKontrol .ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderFiyatKontrol();
}

function renderFiyatKontrol(){
  // Sadece onaylı ve fatura no girilmiş formlar
  const onaylilar=_fkFormlar.filter(f=>f&&f.durum==='onaylandi'&&f.faturaNo);

  // fiyatKontrolDurum: undefined=bekleyen, 'kontrol'=edildi, 'muhasebe'=gönderildi
  const bekleyen=onaylilar.filter(f=>!f.fiyatKontrolDurum);
  const kontrol=onaylilar.filter(f=>f.fiyatKontrolDurum==='kontrol');
  const muhasebe=onaylilar.filter(f=>f.fiyatKontrolDurum==='muhasebe');

  // Stats
  document.getElementById('fk-stats').innerHTML=`
    <div style="background:white;border-radius:8px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <div style="font-size:18px;font-weight:800;color:var(--warning)">${bekleyen.length}</div>
      <div style="font-size:10px;color:var(--gray-500)">KONTROL BEKLİYOR</div>
    </div>
    <div style="background:white;border-radius:8px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <div style="font-size:18px;font-weight:800;color:var(--info)">${kontrol.length}</div>
      <div style="font-size:10px;color:var(--gray-500)">KONTROL EDİLDİ</div>
    </div>
    <div style="background:white;border-radius:8px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <div style="font-size:18px;font-weight:800;color:var(--success)">${muhasebe.length}</div>
      <div style="font-size:10px;color:var(--gray-500)">MUHASEBE'DE</div>
    </div>`;

  let liste=onaylilar;
  if(_fkFilter==='bekleyen')liste=bekleyen;
  else if(_fkFilter==='kontrol')liste=kontrol;
  else if(_fkFilter==='muhasebe')liste=muhasebe;
  liste=liste.sort((a,b)=>(b.tarih||0)-(a.tarih||0));

  const c=document.getElementById('fiyat-kontrol-liste');
  if(!liste.length){
    c.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--gray-400)">
      <div style="font-size:40px;margin-bottom:12px">💰</div>
      <div style="font-size:13px">${_fkFilter==='bekleyen'?'Fiyat kontrolü bekleyen kayıt yok':'Kayıt bulunamadı'}</div>
      <div style="font-size:11px;margin-top:6px;color:var(--gray-300)">Depo fatura numarası girdikten sonra burada görünür</div>
    </div>`;
    return;
  }

  c.innerHTML=liste.map(f=>{
    const durumRenk={bekleyen:'var(--warning)',kontrol:'var(--info)',muhasebe:'var(--success)'}[f.fiyatKontrolDurum||'bekleyen'];
    const durumYazi={bekleyen:'⏳ Kontrol Bekliyor',kontrol:'✅ Kontrol Edildi',muhasebe:'📤 Muhasebe\'de'}[f.fiyatKontrolDurum||'bekleyen'];
    const kalemSayisi=(f.urunler||[]).length;
    const fiyatGirildi=(f.fiyatlar||[]).filter(p=>p>0).length;

    return`<div class="card" style="margin-bottom:8px;cursor:pointer;border-left:4px solid ${durumRenk}" onclick="fkDetayAc('${f.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <span style="font-family:monospace;font-weight:800;color:var(--primary);font-size:12px">${f.mkNo||'—'}</span>
            <span style="font-size:11px;font-weight:600;color:${durumRenk}">${durumYazi}</span>
          </div>
          <div style="font-size:13px;font-weight:700">🏢 ${f.firma||'—'}</div>
          <div style="font-size:11px;color:var(--gray-500);margin-top:2px">
            ${f.formTarih||'—'}
            ${f.irsaliyeNo?' • İrs: <b>'+f.irsaliyeNo+'</b>':''}
            ${f.faturaNo?' • Fat: <b>'+f.faturaNo+'</b>':''}
          </div>
          ${f.lnSiparisNo?`<div style="font-size:11px;color:#5b21b6;font-family:monospace;margin-top:2px">${f.lnSiparisNo.split(',')[0]}${f.lnSiparisNo.includes(',')?'...':''}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:16px;font-weight:800;color:var(--primary)">${kalemSayisi}</div>
          <div style="font-size:10px;color:var(--gray-500)">KALEM</div>
          ${fiyatGirildi>0?`<div style="font-size:10px;color:var(--success);margin-top:2px">${fiyatGirildi}/${kalemSayisi} fiyat</div>`:''}
        </div>
      </div>
      <!-- Progress bar fiyat girişi -->
      <div style="height:4px;background:var(--gray-200);border-radius:2px;overflow:hidden">
        <div style="height:100%;background:${durumRenk};width:${kalemSayisi>0?Math.round(fiyatGirildi/kalemSayisi*100):0}%;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// FİYAT KONTROL DETAY MODAL
// ============================================================
function fkDetayAc(formId){
  const f=_fkFormlar.find(x=>String(x.id)===String(formId));
  if(!f)return;
  _fkAktifId=String(formId);

  const fiyatlar=f.fiyatlar||new Array((f.urunler||[]).length).fill(0);

  document.getElementById('fk-modal-content').innerHTML=`
    <!-- Başlık bilgileri -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;font-size:12px">
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">KABUL NO</div>
        <div style="font-family:monospace;font-weight:800;color:var(--primary)">${f.mkNo||'—'}</div>
      </div>
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">TEDARİKÇİ</div>
        <div style="font-weight:700">${f.firma}</div>
      </div>
      <div style="padding:7px 10px;background:${f.faturaNo?'#d4edda':'#fff3cd'};border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">FATURA NO</div>
        <div style="font-weight:700">${f.faturaNo||'—'}</div>
      </div>
      <div style="padding:7px 10px;background:var(--gray-100);border-radius:6px">
        <div style="color:var(--gray-500);font-size:10px">İRSALİYE</div>
        <div style="font-weight:700">${f.irsaliyeNo||'—'}</div>
      </div>
    </div>

    <!-- Ürün Fiyat Giriş Tablosu -->
    <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px">
      📦 Ürünler — Birim Fiyat Girişi
    </div>
    <div id="fk-urun-listesi">
      ${(f.urunler||[]).map((u,i)=>{
        const fiyat=fiyatlar[i]||0;
        const toplam=fiyat*(parseFloat(u.miktar)||0);
        return`<div style="padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;margin-bottom:8px;${fiyat>0?'border-color:var(--success);background:#f0fdf4':''}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div>
              <div style="font-size:13px;font-weight:700">${u.ad}</div>
              <div style="font-size:11px;color:var(--gray-400)">${u.miktar} ${u.birim}${u.skt?' • SKT: '+u.skt:''}</div>
            </div>
            ${fiyat>0?`<div style="text-align:right">
              <div style="font-size:13px;font-weight:800;color:var(--success)">${fmt(toplam)} ₺</div>
              <div style="font-size:10px;color:var(--gray-400)">KDV hariç</div>
            </div>`:''}
          </div>
          <div>
            <label style="font-size:10px;font-weight:600;color:var(--gray-500)">BİRİM FİYAT (₺, KDV hariç)</label>
            <input type="number" id="fk-fiyat-${i}" value="${fiyat||''}" placeholder="0.00" min="0" step="0.01"
              oninput="fkFiyatHesapla(${i})"
              style="width:100%;margin-top:4px;padding:10px;border:1.5px solid ${fiyat>0?'var(--success)':'var(--gray-300)'};border-radius:6px;font-size:14px;font-weight:600;outline:none">
          </div>
          <div id="fk-satir-toplam-${i}" style="margin-top:6px;font-size:11px;color:var(--gray-500)">
            ${fiyat>0?`${fmt(fiyat)} ₺ × ${u.miktar} ${u.birim} = <b>${fmt(toplam)} ₺</b> (KDV hariç)`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Genel Toplam -->
    <div style="background:var(--primary);color:white;border-radius:8px;padding:12px;margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700">TOPLAM (KDV HARİÇ)</div>
          <div style="font-size:11px;opacity:.7;margin-top:2px">KDV muhasebe tarafından işlenecek</div>
        </div>
        <div id="fk-genel-toplam" style="font-size:18px;font-weight:800">— ₺</div>
      </div>
      <div style="margin-top:10px">
        <label style="font-size:11px;opacity:.8">Kontrol Notu (opsiyonel)</label>
        <input type="text" id="fk-not" value="${escapeHtml(f.fiyatKontrolNotu||'')}" placeholder="Fiyat farkı, indirim notu vb."
          style="width:100%;margin-top:4px;padding:8px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:white;font-size:13px;outline:none">
      </div>
    </div>
  `;

  // Mevcut toplam hesapla
  fkGenelToplamHesapla(f);

  // Buton durumu
  const muhasebeGonderildi=f.fiyatKontrolDurum==='muhasebe';
  document.getElementById('fk-muhasebe-btn').disabled=muhasebeGonderildi || !['kayit','tam'].includes(YETKI_HARITASI['fiyat_kontrol']);
  document.getElementById('fk-muhasebe-btn').textContent=muhasebeGonderildi?'✅ Muhasebe\'ye Gönderildi':'📤 Muhasebe\'ye Gönder';

  aModal('mFiyatKontrol');
}

function fkFiyatHesapla(i){
  const f=_fkFormlar.find(x=>String(x.id)===_fkAktifId);
  if(!f)return;
  const u=(f.urunler||[])[i];if(!u)return;
  const fiyat=parseFloat(document.getElementById('fk-fiyat-'+i)?.value)||0;
  const miktar=parseFloat(u.miktar)||0;
  const toplam=fiyat*miktar;
  const satirToplamEl=document.getElementById('fk-satir-toplam-'+i);
  if(satirToplamEl){
    satirToplamEl.innerHTML=fiyat>0?`${fmt(fiyat)} ₺ × ${miktar} ${u.birim} = <b>${fmt(toplam)} ₺</b> (KDV hariç)`:'';
  }
  const inp=document.getElementById('fk-fiyat-'+i);
  if(inp)inp.style.borderColor=fiyat>0?'var(--success)':'var(--gray-300)';
  fkGenelToplamHesapla(f);
}

function fkGenelToplamHesapla(f){
  const urunler=f.urunler||[];
  let genel=0;
  urunler.forEach((u,i)=>{
    const fiyat=parseFloat(document.getElementById('fk-fiyat-'+i)?.value)||0;
    const miktar=parseFloat(u.miktar)||0;
    genel+=fiyat*miktar;
  });
  const el=document.getElementById('fk-genel-toplam');
  if(el)el.textContent=genel>0?fmt(genel)+' ₺':'— ₺';
}

let _muhasebeGonderiliyor=false;
async function muhasebeGonder(){
  if(_muhasebeGonderiliyor){toast('⏳ Zaten gönderiliyor, bekleyin...');return;}
  const f=_fkFormlar.find(x=>String(x.id)===_fkAktifId);
  if(!f)return;
  const urunler=f.urunler||[];

  // Fiyatları topla — KDV muhasebe tarafından işlenecek
  const fiyatlar=urunler.map((_,i)=>parseFloat(document.getElementById('fk-fiyat-'+i)?.value)||0);
  const herFiyatGirildi=fiyatlar.every(p=>p>0);

  if(!herFiyatGirildi){
    if(!confirm('Bazı ürünlerin fiyatı girilmemiş. Yine de Muhasebe\'ye göndermek istiyor musunuz?'))return;
  }

  // Ara toplam (KDV hariç) — KDV muhasebe işler
  let araToplam=0;
  urunler.forEach((u,i)=>{
    araToplam+=fiyatlar[i]*(parseFloat(u.miktar)||0);
  });

  const faturaSatir={
    no:f.faturaNo,tur:'alis',cari_ad:f.firma,
    tarih:new Date().toISOString().split('T')[0],
    siparis_no:f.lnSiparisNo?f.lnSiparisNo.trim():null,
    otel_id:f.otelId||'810',
    ara_toplam:Math.round(araToplam*100)/100,kdv_toplam:0,
    genel_toplam:Math.round(araToplam*100)/100,
    durum:'bekliyor',not_alani:document.getElementById('fk-not')?.value||null
  };

  // Mal kabul formunu güncelle
  f.fiyatlar=fiyatlar;
  f.fiyatKontrolDurum='muhasebe';
  f.fiyatKontrolTarih=Date.now();
  f.fiyatKontrolNotu=document.getElementById('fk-not')?.value||'';

  toast('📤 Muhasebe\'ye gönderiliyor...');
  _muhasebeGonderiliyor=true;
  try{
    const r=await fetch(SB_URL+'/rest/v1/faturalar',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(faturaSatir)});
    if(!r.ok){
      const hataMetni=await r.text();
      console.error('Fatura oluşturma hatası:',hataMetni);
      toast('❌ Fatura oluşturulamadı');
      alert('❌ Fatura oluşturulamadı:\n\n'+hataMetni);
      return;
    }
    const d=await r.json();
    const faturaId=d[0].id;
    const kalemSatirlar=urunler.map((u,i)=>({
      fatura_id:faturaId,urun_kodu:u.kod||null,urun_adi:u.ad,miktar:parseFloat(u.miktar)||0,
      birim:u.birim,birim_fiyat:fiyatlar[i],iskonto_yuzde:0,kdv_orani:0,
      toplam:round2(fiyatlar[i]*(parseFloat(u.miktar)||0))
    }));
    await fetch(SB_URL+'/rest/v1/fatura_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(kalemSatirlar)});
    f.muhasebeFaturaId=faturaId;

    // Her mal kabul kaleminin birim fiyatını Supabase'e yaz
    for(let i=0;i<urunler.length;i++){
      const u=urunler[i];
      if(u.id){
        await fetch(SB_URL+'/rest/v1/mal_kabul_urunleri?id=eq.'+u.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({birim_fiyat:fiyatlar[i]})});
        // Bu kaleme ait koliler varsa (Koli Bazlı Giriş kullanılmışsa) onların da gerçek fiyatını yaz —
        // Günlük Tüketim'deki reçete maliyeti buradan FIFO (en eski/depodaki koli fiyatı) çekiyor.
        if(fiyatlar[i]>0){
          await fetch(SB_URL+'/rest/v1/koli_etiketleri?mk_urun_id=eq.'+u.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({birim_fiyat:fiyatlar[i],fiyat_kaynagi:'fatura'})});
        }
      }
    }

    // Mal kabul kaydını güncelle (fiyat kontrolü durumu + muhasebe fatura bağlantısı)
    await fetch(SB_URL+'/rest/v1/mal_kabuller?id=eq.'+f.id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({
      fiyat_kontrol_durum:'muhasebe',
      fiyat_kontrol_notu:f.fiyatKontrolNotu||null,
      fiyat_kontrol_tarihi:new Date().toISOString(),
      muhasebe_fatura_id:faturaId
    })});

    // GR/IR TAHAKKUK FİŞİ — mal depoda, fatura henüz muhasebede işlenmedi.
    // Borç: 770 (gider, geçici) / Alacak: 320.90 (Faturası Beklenen Alımlar — GR/IR ara hesabı)
    // Muhasebe faturayı işlediğinde 320.90 borçlanarak bu tahakkuk otomatik kapanır.
    await grIrTahakkukFisiKes(f,araToplam);

    kModal('mFiyatKontrol');
    toast(`✅ ${f.faturaNo} — Muhasebe'ye gönderildi (${fmt(araToplam)} ₺ KDV hariç)`);
    renderFiyatKontrol();
  }catch(e){
    toast('⚠️ Hata: '+e.message);
  }
}

// ============================================================
// GR/IR TAHAKKUK — "mal alındı, fatura beklemede" ara kaydı
// SAP'taki GR/IR clearing mantığının Türk THP'ye uyarlanmış hali.
// ============================================================
async function grIrTahakkukFisiKes(f,araToplam){
  try{
    // 320.90 hesabı hesap planında yoksa oluştur
    await fetch(SB_URL+'/rest/v1/hesap_plani?on_conflict=kod',{
      method:'POST',headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({kod:'320.90',ad:'Faturası Beklenen Alımlar (GR/IR)',tip:'Bilanço',ust_kod:'320'})
    });
    // Fiş numarası üret (yevmiye modülüyle aynı YEV-YYYY-NNNNN kalıbı)
    const yil=new Date().getFullYear();
    let sira=1;
    const nR=await fetch(SB_URL+`/rest/v1/yevmiye_fisler?no=like.YEV-${yil}-*&select=no&order=no.desc&limit=1`,{headers:SB_HEADERS});
    if(nR.ok){const rows=await nR.json();if(rows[0]){const m=rows[0].no.match(/(\d+)$/);if(m)sira=parseInt(m[1])+1;}}
    const fisNo=`YEV-${yil}-${String(sira).padStart(5,'0')}`;
    const tutar=round2(araToplam);
    const fisR=await fetch(SB_URL+'/rest/v1/yevmiye_fisler',{
      method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({
        no:fisNo,tarih:new Date().toISOString().split('T')[0],tip:'tahakkuk',
        belge_no:f.mkNo,otel_id:f.otelId||'810',
        aciklama:`Mal kabul tahakkuku (GR/IR): ${f.mkNo} — ${f.firma} (fatura bekleniyor)`,
        toplam_borc:tutar,toplam_alacak:tutar,onaylandi:true,otomatik:true
      })
    });
    if(!fisR.ok){console.warn('Tahakkuk fişi oluşturulamadı:',await fisR.text());return;}
    const fis=(await fisR.json())[0];
    await fetch(SB_URL+'/rest/v1/yevmiye_kalemleri',{
      method:'POST',headers:SB_HEADERS,
      body:JSON.stringify([
        {fis_id:fis.id,hesap_kodu:'770',aciklama:`Mal kabul: ${f.mkNo} — ${f.firma}`,borc:tutar,alacak:0},
        {fis_id:fis.id,hesap_kodu:'320.90',aciklama:`Fatura bekleniyor: ${f.mkNo} — ${f.faturaNo||'—'}`,borc:0,alacak:tutar}
      ])
    });
  }catch(e){console.warn('GR/IR tahakkuk hatası:',e);}
}

document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));
