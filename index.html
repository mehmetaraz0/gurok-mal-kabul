<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok Turizm — Depo Yönetim Sistemi</title>
<meta name="theme-color" content="#15213a">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
:root {
  --primary: #15213a;
  --primary-light: #2d4080;
  --accent: #c9a24b;
  --success: #27ae60;
  --warning: #c8862c;
  --danger: #b5442a;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e4e7ec;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #8992a3;
  --gray-600: #5b6472;
  --gray-700: #495057;
  --white: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--primary); }

/* ===== LOGIN ===== */
#screen-login {
  min-height: 100vh;
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#screen-login.hidden { display: none; }

.login-box {
  background: white;
  border-radius: 12px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.25);
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo .logo-icon {
  width: 56px; height: 56px;
  background: var(--primary);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  font: 700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color: #fff; letter-spacing: .3px;
}
.login-logo h1 { font-size: 20px; font-weight: 800; color: var(--primary); letter-spacing: -.01em; }
.login-logo p { font-size: 12.5px; color: var(--gray-500); margin-top: 4px; }

.pin-label { text-align: center; font-size: 13px; color: var(--gray-600); margin-bottom: 6px; }
.pin-user-show { text-align: center; font-weight: 700; color: var(--primary); font-size: 15px; min-height: 22px; margin-bottom: 10px; }
.pin-display { display: flex; justify-content: center; gap: 12px; margin-bottom: 8px; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--gray-400); transition: all 0.15s; }
.pin-dot.filled { background: var(--primary); border-color: var(--primary); transform: scale(1.1); }
.pin-error { text-align: center; font-size: 12px; color: var(--danger); min-height: 18px; margin-bottom: 8px; }
.pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 4px; }
.pin-btn {
  height: 56px; border: none; border-radius: 8px;
  font-size: 20px; font-weight: 600; cursor: pointer;
  background: var(--gray-100); color: var(--primary);
  transition: all 0.1s;
}
.pin-btn:active { background: var(--gray-300); transform: scale(0.95); }
.pin-btn.empty { background: transparent; cursor: default; }
.pin-btn.del { font-size: 16px; }
.btn-ms{width:100%;margin-top:14px;padding:12px;border:1.5px solid var(--primary);border-radius:8px;background:white;color:var(--primary);font-size:14px;font-weight:600;cursor:pointer}
.btn-ms:active{background:var(--gray-100)}

/* ===== PORTAL SHELL ===== */
#screen-portal { display: none; min-height: 100vh; }
#screen-portal.active { display: flex; }

/* Sidebar (desktop, >=900px) */
.sidebar {
  width: 236px; flex: none; background: var(--primary);
  display: flex; flex-direction: column; padding: 0 0 20px;
}
@media (max-width: 899px) { .sidebar { display: none; } }

.sidebar-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 24px 22px 20px; border-bottom: 1px solid rgba(255,255,255,.08);
}
.brand-mark {
  width: 32px; height: 32px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,.3);
  display: flex; align-items: center; justify-content: center;
  font: 700 14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: #fff; flex: none;
}
.brand-mark.small { width: 26px; height: 26px; font-size: 12px; border-radius: 6px; }
.brand-name { font-size: 13.5px; font-weight: 700; color: #fff; letter-spacing: .4px; }
.brand-sub { font-size: 10px; font-weight: 500; color: rgba(255,255,255,.45); margin-top: 2px; letter-spacing: .3px; text-transform: uppercase; }

.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.sidebar-item {
  display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,.72);
  text-decoration: none; cursor: pointer; border-left: 2px solid transparent;
}
.sidebar-item svg { width: 15px; height: 15px; flex: none; opacity: .85; }
.sidebar-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.sidebar-item.active { background: rgba(255,255,255,.08); color: #fff; border-left-color: var(--accent); }
.sidebar-item.disabled { opacity: .45; cursor: default; pointer-events: none; }
.sidebar-footer { padding: 14px 22px 0; font-size: 10.5px; color: rgba(255,255,255,.35); }

/* Main column */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--gray-100); }

.topbar {
  height: 60px; flex: none; background: #fff; border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; justify-content: space-between; padding: 0 26px;
}
@media (max-width: 899px) { .topbar { background: var(--primary); border-bottom: none; padding: 0 16px; height: 56px; } }

.topbar-brand { display: none; align-items: center; gap: 9px; }
@media (max-width: 899px) { .topbar-brand { display: flex; } }
.topbar-brand span { font: 700 13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: #fff; letter-spacing: .3px; }

.crumb { font-size: 13px; color: var(--gray-600); }
.crumb b { color: var(--primary); font-weight: 600; }
@media (max-width: 899px) { .crumb { display: none; } }

.topbar-user { display: flex; align-items: center; gap: 10px; }
.user-info { text-align: right; line-height: 1.25; }
.user-name { font-size: 12.5px; font-weight: 600; color: var(--primary); }
@media (max-width: 899px) { .user-name { color: #fff; } }
.user-rol { font-size: 10.5px; color: var(--gray-500); }
@media (max-width: 899px) { .user-rol { color: rgba(255,255,255,.6); } }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--primary);
  border: 1px solid var(--accent); color: #fff; flex: none;
  display: flex; align-items: center; justify-content: center;
  font: 600 11px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.logout-btn {
  background: rgba(21,33,58,.08); border: none; color: var(--primary);
  width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex: none;
}
@media (max-width: 899px) { .logout-btn { background: rgba(255,255,255,.15); color: #fff; } }
.logout-btn:active { background: rgba(21,33,58,.18); }

.main-content { flex: 1; padding: 24px 26px 40px; max-width: 1200px; width: 100%; overflow-y: auto; }
@media (max-width: 899px) { .main-content { padding: 16px 16px 32px; } }

.welcome-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.welcome-row h2 { font-size: 19px; font-weight: 700; color: var(--primary); letter-spacing: -.01em; }
.welcome-row p { font-size: 12.5px; color: var(--gray-500); margin-top: 2px; }
.welcome-date { font-size: 12.5px; font-weight: 500; color: var(--gray-500); white-space: nowrap; }

/* KPI şeridi */
.kpi-strip { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 26px; }
@media (min-width: 560px) { .kpi-strip { grid-template-columns: repeat(4,1fr); } }
@media (max-width: 559px) { .kpi-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; } }
.kpi-card {
  background: #fff; border: 1px solid var(--gray-200); border-top: 2px solid var(--accent);
  border-radius: 6px; padding: 12px 14px;
}
@media (max-width: 559px) { .kpi-card { flex: none; min-width: 128px; } }
.kpi-label { font-size: 10.5px; font-weight: 500; color: var(--gray-500); text-transform: uppercase; letter-spacing: .4px; }
.kpi-num { font-size: 21px; font-weight: 800; color: var(--primary); margin-top: 3px; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
.kpi-num.warn { color: var(--danger); }

/* Modül grid */
.modules-title {
  font-size: 11px; font-weight: 600; color: var(--gray-500);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 14px;
}

.modules-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 24px; }
@media (min-width: 600px) { .modules-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .modules-grid { grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); } }

.module-card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: 18px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  text-decoration: none;
  color: inherit;
  display: flex;
  gap: 13px;
  align-items: flex-start;
  position: relative;
}
.module-card.available:hover { border-color: var(--primary); transform: translateY(-1px); }
.module-card.coming-soon { background: var(--gray-50); border-style: dashed; opacity: 0.65; cursor: default; }

.module-icon {
  width: 38px; height: 38px; flex: none;
  border-radius: 7px; border: 1px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.module-card.coming-soon .module-icon { border-color: var(--gray-500); color: var(--gray-500); }
.module-icon svg { width: 18px; height: 18px; }
.module-name { font-size: 13.5px; font-weight: 700; color: var(--primary); line-height: 1.3; }
.module-desc { font-size: 11.5px; color: var(--gray-500); line-height: 1.4; margin-top: 2px; }
.module-soon-tag {
  font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
  background: var(--gray-200); color: var(--gray-500);
  padding: 2px 7px; border-radius: 4px; margin-top: 6px; display: inline-block;
}

/* Loading */
#loading {
  display: none;
  position: fixed; inset: 0;
  background: rgba(21,33,58,0.85);
  z-index: 9999;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: white;
}
#loading.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--primary); color: white;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 9998; opacity: 0;
  transition: all 0.3s; pointer-events: none;
  white-space: nowrap; max-width: 90vw; text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->

  { id:2, ad:'Depo Sorumlu',    rol:'depo',      departman:'Depo',       pin:'111111' },
  { id:3, ad:'Depo Personel',   rol:'depo',      departman:'Depo',       pin:'222222' },
  { id:4, ad:'Satinalma',       rol:'satinalma', departman:'Satinalma',  pin:'333333' },
  { id:5, ad:'Kalite Kontrol',  rol:'kalite',    departman:'Kalite',     pin:'444444' },
  { id:6, ad:'Ana Mutfak Sefi', rol:'mutfak',    departman:'Ana Mutfak', pin:'555555', depoId:'CMM201', otelId:'810' },
  { id:7, ad:'Bar Sefi',        rol:'bar',       departman:'Bar',        pin:'666666', depoId:'CSM301', otelId:'810' }
];

const ROL_IKON = { yonetici:'👔', depo:'📦', satinalma:'🛒', kalite:'🔍', mutfak:'🍳', bar:'🍹', muhasebe_muduru:'💼', muhasebe_calisani:'💰', cost_control:'📐' };
const ROL_AD   = { yonetici:'Yönetici', depo:'Depo', satinalma:'Satınalma', kalite:'Kalite', mutfak:'Mutfak', bar:'Bar', muhasebe_muduru:'Muhasebe Müdürü', muhasebe_calisani:'Muhasebe', cost_control:'Cost Control' };

let users = [...DEFAULT_USERS];
let currentUser = null;

async function loadUsers() {
  try {
    const r = await fetch(SB_URL + '/rest/v1/kullanicilar?select=*&aktif=eq.true', { headers: SB_HEADERS });
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data) && data.length) {
        users = data.map(u => ({
          ...u,
          rol: u.rol === 'personel' ? 'depo' : u.rol,
          depoId: u.depo_id || u.depoId || null,
          otelId: u.otel_id || u.otelId || null
        }));
      }
    }
  } catch(e) {}
}

function findUserByEmail(email) {
  return users.find(u => u.eposta && u.eposta.toLowerCase() === String(email).toLowerCase()) || null;
}

// ============================================================
// PIN
// ============================================================
let pinValue = '';
// PIN kilitleme fonksiyonları (pinKilitliMi/pinBasarisizKaydet/pinBasariliTemizle)
// artık auth-guard.js'de tanımlı (paylaşılan) — burada tekrar tanımlanmıyor.

function pinInput(d) {
  const kalanSn=pinKilitliMi();
  if(kalanSn>0){document.getElementById('pin-error').textContent=`⏳ Çok fazla hatalı deneme — ${kalanSn} sn bekleyin`;return;}
  if (pinValue.length >= 6) return;
  pinValue += d;
  updateDots();
  // Tahmin
  const tumKullanicilar = users.length > 0 ? users : DEFAULT_USERS;
  const match = tumKullanicilar.filter(u => String(u.pin).startsWith(pinValue));
  const el = document.getElementById('pin-user-show');
  const errEl = document.getElementById('pin-error');
  errEl.textContent = '';
  if (match.length === 1 && pinValue.length >= 3) {
    el.textContent = (ROL_IKON[match[0].rol]||'👤') + ' ' + match[0].ad;
  } else {
    el.textContent = '';
  }
  if (pinValue.length === 6) setTimeout(checkPin, 200);
}

function pinDelete() {
  pinValue = pinValue.slice(0,-1);
  updateDots();
  if (!pinValue) document.getElementById('pin-user-show').textContent = '';
}

function updateDots() {
  for (let i=0;i<6;i++) {
    document.getElementById('pd'+i).classList.toggle('filled', i < pinValue.length);
  }
}

async function supabaseAuthKoprusu(user) {
  const email = user.id + '@gurok.internal';
  const password = user.pin;
  try {
    if (!user.auth_user_id) {
      const r = await fetch(SB_URL + '/auth/v1/signup', {
        method: 'POST', headers: { apikey: SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!r.ok) { console.error('Supabase Auth signup hatası:', await r.text()); return null; }
      const data = await r.json();
      const authUserId = data.user?.id;
      const accessToken = data.access_token;
      if (authUserId) {
        await fetch(SB_URL + '/rest/v1/kullanicilar?id=eq.' + user.id, {
          method: 'PATCH', headers: SB_HEADERS,
          body: JSON.stringify({ auth_user_id: authUserId })
        });
      }
      return accessToken || null;
    } else {
      const r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST', headers: { apikey: SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!r.ok) { console.error('Supabase Auth signin hatası:', await r.text()); return null; }
      const data = await r.json();
      return data.access_token || null;
    }
  } catch (e) { console.error('supabaseAuthKoprusu hatası:', e); return null; }
}

async function checkPin() {
  // Firebase'den yüklenen + DEFAULT_USERS her ikisine bak
  const tumKullanicilar = users.length > 0 ? users : DEFAULT_USERS;
  const user = tumKullanicilar.find(u => String(u.pin) === String(pinValue));
  if (!user) {
    pinBasarisizKaydet();
    const kalanSn=pinKilitliMi();
    const errEl = document.getElementById('pin-error');
    errEl.textContent = kalanSn>0?`🔒 Çok fazla hatalı deneme — ${kalanSn} sn kilitlendi`:'❌ Hatalı PIN';
    setTimeout(() => errEl.textContent = '', kalanSn>0?4000:2000);
    pinValue = '';
    updateDots();
    document.getElementById('pin-user-show').textContent = '';
    return;
  }
  pinBasariliTemizle();
  currentUser = user;
  const accessToken = await supabaseAuthKoprusu(user);
  oturumKaydet(user, accessToken);
  const params = new URLSearchParams(location.search);
  const returnTo = params.get('returnTo');
  if (returnTo && /^[a-z0-9_-]+\.html(\?[^#]*)?(#.*)?$/i.test(returnTo)) {
    location.replace(returnTo);
    return;
  }
  await showPortal();
}

// ============================================================
// PORTAL
// ============================================================
async function showPortal() {
  const u = currentUser;
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-portal').classList.add('active');

  // Topbar / sidebar kullanıcı bilgisi
  document.getElementById('header-user-name').textContent = u.ad;
  document.getElementById('header-user-rol').textContent = ROL_AD[u.rol] || u.rol;
  document.getElementById('header-avatar').textContent = u.ad.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();

  // Hoşgeldin
  document.getElementById('welcome-text').textContent = 'Hoş geldin, ' + u.ad.split(' ')[0];
  document.getElementById('welcome-sub').textContent = (ROL_AD[u.rol]||u.rol) + ' • ' + (u.departman||'');

  // Tarih
  const now = new Date();
  document.getElementById('welcome-date').textContent =
    now.toLocaleDateString('tr-TR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Modülleri render et — gerçek yetki_matrisi'ne göre
  const yetkiHaritasi = await kullaniciYetkileriGetir();
  const izinliSeviyeler = ['goruntule','kayit','tam'];
  const gorunur = MODULLER.filter(m => m.moduller.some(kod => izinliSeviyeler.includes(yetkiHaritasi[kod])));
  renderSidebar(gorunur);
  renderModuleGrid(gorunur);

  loadKpiler();
}

function iconSvg(pathData) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${pathData}</svg>`;
}

function renderSidebar(list) {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = `<a class="sidebar-item active" href="index.html">${iconSvg('<path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/>')}Ana Sayfa</a>` +
    list.map(m => {
      const aktif = m.durum === 'aktif';
      return aktif
        ? `<a class="sidebar-item" href="${m.url}">${iconSvg(m.svg)}${m.ad}</a>`
        : `<span class="sidebar-item disabled">${iconSvg(m.svg)}${m.ad}</span>`;
    }).join('');
}

function renderModuleGrid(list) {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = list.map(m => {
    const aktif = m.durum === 'aktif';
    const tag = aktif ? 'a' : 'div';
    const hrefAttr = aktif ? ` href="${m.url}"` : '';
    return `
      <${tag} class="module-card ${aktif ? 'available' : 'coming-soon'}"${hrefAttr}>
        <div class="module-icon">${iconSvg(m.svg)}</div>
        <div>
          <div class="module-name">${m.ad}</div>
          <div class="module-desc">${m.desc}</div>
          ${!aktif ? '<span class="module-soon-tag">Yakında</span>' : ''}
        </div>
      </${tag}>
    `;
  }).join('');
}

// ============================================================
// KPI ŞERİDİ — açık talep / bekleyen onay / SKT uyarısı / aktif kullanıcı.
// Bir tablo RLS ile engelliyse ilgili kart "—" gösterir (0 değil — "veri
// yok" ile "erişim engellendi" birbirine karışmasın diye).
// ============================================================
async function loadKpiler() {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('kpi-kullanici', users.length);
  try {
    const [tR, mR, sR] = await Promise.all([
      fetch(SB_URL + '/rest/v1/satin_alma_talepleri?durum=eq.bekleyen&select=id', { headers: SB_HEADERS }),
      fetch(SB_URL + '/rest/v1/mal_kabuller?durum=eq.bekleyen&select=id', { headers: SB_HEADERS }),
      fetch(SB_URL + '/rest/v1/skt_kayitlari?durum=eq.aktif&select=skt_tarihi', { headers: SB_HEADERS }),
    ]);
    set('kpi-talep', tR.ok ? (await tR.json()).length : '—');
    set('kpi-onay', mR.ok ? (await mR.json()).length : '—');
    if (sR.ok) {
      const bugun = new Date(); bugun.setHours(0,0,0,0);
      const kritik = (await sR.json()).filter(r => {
        const gun = Math.round((new Date(r.skt_tarihi) - bugun) / 86400000);
        return gun >= 0 && gun < 14;
      }).length;
      set('kpi-skt', kritik);
    } else {
      set('kpi-skt', '—');
    }
  } catch (e) {
    set('kpi-talep', '—'); set('kpi-onay', '—'); set('kpi-skt', '—');
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  currentUser = null;
  pinValue = '';
  updateDots();
  document.getElementById('pin-user-show').textContent = '';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('screen-portal').classList.remove('active');
  document.getElementById('screen-login').classList.remove('hidden');
}

const TOAST_RENK={'✅':'var(--success)','❌':'var(--danger)','⚠️':'var(--warning)','🔷':'var(--primary-light)'};
function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  const m = String(msg).match(/^(✅|❌|⚠️|🔷)\s*(.*)$/s);
  t.textContent = m ? m[2] : msg;
  t.style.borderLeft = m ? ('4px solid '+TOAST_RENK[m[1]]) : '';
  t.style.paddingLeft = m ? '16px' : '20px';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ============================================================
// INIT
// ============================================================
(async function init() {
  document.getElementById('loading').classList.add('show');
  await loadUsers();
  document.getElementById('loading').classList.remove('show');

  // Session kontrolü — paylaşılan auth-guard.js üzerinden
  const user = oturumGetir();
  if (user) {
    currentUser = user;
    await showPortal();
  }
})();
</script>
