<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<script src="auth-guard.js"></script>
<script src="supabase-config.js"></script>
<script>
let CU = requireLogin();
if (CU) requireRole(CU, ['yonetici','depo','satinalma','kalite']);
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Mal Kabul</title>
<meta name="theme-color" content="#15213a">
<style>
:root{--primary:#15213a;--primary-light:#2d4080;--accent:#c9a24b;--success:#27ae60;--warning:#c8862c;--danger:#b5442a;--gray-100:#f1f3f5;--gray-200:#e4e7ec;--gray-300:#dee2e6;--gray-500:#8992a3;--radius:10px;--radius-sm:8px;--shadow:0 1px 2px rgba(21,33,58,.05),0 6px 18px rgba(21,33,58,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hbtn:active{background:rgba(255,255,255,.3)}
.content{padding:16px;max-width:760px;margin:0 auto}
.modul-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.modul-grid{grid-template-columns:repeat(3,1fr)}}
.modul-kart{background:white;border:1px solid var(--gray-200);border-radius:var(--radius);padding:16px;cursor:pointer;box-shadow:var(--shadow);text-align:center;transition:border-color .15s,transform .15s;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:9px}
.modul-kart:hover{border-color:var(--primary);transform:translateY(-1px)}
.modul-kart:active{transform:scale(.97)}
.modul-ikon{width:44px;height:44px;border-radius:8px;border:1px solid var(--primary);color:var(--primary);display:flex;align-items:center;justify-content:center}
.modul-ikon svg{width:20px;height:20px}
.modul-ad{font-size:13px;font-weight:700;color:var(--primary)}
.modul-desc{font-size:11px;color:var(--gray-500)}
.bolum-baslik{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:16px}
</style>
</head>
<body>
<div class="header">
  <button class="hbtn" onclick="location.href='index.html'">🏠</button>
  <h1>Mal Kabul</h1>
</div>
<div class="content">

  <div class="modul-grid">

    </a>

      <div class="modul-ad">SKT Takip</div>
      <div class="modul-desc">Son kullanma tarihi izleme</div>
    </a>
    <a class="modul-kart" href="mal-kabul-uygunsuzluk.html">
      <div class="modul-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20Z"/><path d="M12 9v5"/><path d="M12 17h.01"/></svg></div>
      <div class="modul-ad">Uygunsuzluk</div>
      <div class="modul-desc">Bildirim, karar, form</div>
    </a>
    <a class="modul-kart" href="mal-kabul-siparistakip.html">
      <div class="modul-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="7" width="13" height="13" rx="1.5"/><path d="M8 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><circle cx="17.5" cy="17.5" r="3"/><path d="m20 20 1.5 1.5"/></svg></div>
      <div class="modul-ad">Sipariş Takip</div>
      <div class="modul-desc">Bekleyen, kısmi, tamamlanan</div>
    </a>
    <a class="modul-kart" href="mal-kabul-izleme.html">
      <div class="modul-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg></div>
      <div class="modul-ad">İzleme</div>
      <div class="modul-desc">Analiz, raporlar, eşleşme</div>
    </a>
    <a class="modul-kart" href="mal-kabul-lnexport.html">
      <div class="modul-ikon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 8 5-5 5 5"/><path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg></div>
      <div class="modul-ad">LN Export</div>
      <div class="modul-desc">Infor LN'e aktarılacak form</div>
    </a>
  </div>
</div>

</html>
