<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gürok — Günlük Tüketim</title>
<meta name="theme-color" content="#1a2744">
<style>
:root{--primary:#1a2744;--primary-light:#2d4080;--success:#27ae60;--warning:#f39c12;--danger:#e74c3c;--info:#0284c7;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;--gray-400:#ced4da;--gray-500:#adb5bd;--gray-600:#6c757d;--gray-700:#495057;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,0.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-100)}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--primary);color:white;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:56px;box-shadow:var(--shadow)}
.header h1{font-size:15px;font-weight:700;flex:1}
.header .sub{font-size:11px;opacity:.7;display:block;margin-top:1px}
.hbtn{background:rgba(255,255,255,.15);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.3)}
.bnav{background:white;display:flex;border-top:1px solid var(--gray-200);flex-shrink:0}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;gap:3px;position:relative;min-height:56px}
.nbtn .ni{font-size:20px}.nbtn .nl{font-size:10px;color:var(--gray-500);font-weight:500}
.nbtn.active .nl{color:var(--primary);font-weight:700}
.nbtn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:none}
.card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);margin-bottom:5px;text-transform:uppercase}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;background:white;outline:none;-webkit-appearance:none}
.field input:focus{border-color:var(--primary)}
.btn{padding:11px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn:active{transform:scale(.97)}.btn-primary{background:var(--primary);color:white}.btn-success{background:var(--success);color:white}.btn-gray{background:var(--gray-200);color:var(--gray-700)}.btn-block{width:100%}.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.search-bar{position:relative;margin-bottom:10px}
.search-bar input{width:100%;padding:11px 36px 11px 14px;border:1.5px solid var(--gray-300);border-radius:20px;font-size:14px;outline:none;background:white}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.urow{background:white;border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--gray-300)}
.urow.girisli{border-left-color:var(--warning);background:#fffbf0}
.urow-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.urow-ad{font-size:13px;font-weight:700;color:var(--primary)}
.urow-stok{font-size:11px;color:var(--gray-500);margin-top:2px}
.urow-inputs{display:flex;align-items:center;gap:8px}
.urow-inputs input{flex:1;padding:9px 10px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:14px;text-align:center;font-weight:700}
.urow-inputs input:focus{border-color:var(--warning)}
.urow-birim{font-size:12px;color:var(--gray-600);font-weight:600;min-width:32px}
.es{text-align:center;padding:40px 20px;color:var(--gray-400)}.ei{font-size:48px;margin-bottom:12px}.et{font-size:14px}
.har-item{background:white;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.har-icon{width:32px;height:32px;border-radius:50%;background:#fde8e8;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
#login{position:fixed;inset:0;background:linear-gradient(160deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999}
#login.gizle{display:none}
.lbox{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:340px;margin:20px}
.pdots{display:flex;justify-content:center;gap:10px;margin:12px 0 6px}
.pdot{width:16px;height:16px;border-radius:50%;border:2px solid var(--gray-400);transition:all .15s}
.pdot.f{background:var(--primary);border-color:var(--primary)}
.ppad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pbtn{height:52px;border:none;border-radius:var(--radius-sm);font-size:20px;font-weight:600;cursor:pointer;background:var(--gray-100);color:var(--primary)}
.pbtn:active{background:var(--gray-300);transform:scale(.95)}.pbtn.e{background:transparent;cursor:default}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ld{display:none;position:fixed;inset:0;background:rgba(26,39,68,.85);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:white}
#ld.show{display:flex}
.sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 10px">📉</div>
      <div style="font-size:20px;font-weight:800;color:var(--primary)">Günlük Tüketim</div>
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">Gürok Turizm Grubu</div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--gray-600);margin-bottom:4px">PIN kodunuzu girin</p>
    <div id="pshow" style="text-align:center;font-size:13px;font-weight:700;color:var(--primary);min-height:20px"></div>
    <div class="pdots"><div class="pdot" id="d0"></div><div class="pdot" id="d1"></div><div class="pdot" id="d2"></div><div class="pdot" id="d3"></div><div class="pdot" id="d4"></div><div class="pdot" id="d5"></div></div>
    <div id="perr" style="text-align:center;font-size:12px;color:var(--danger);min-height:18px;margin-bottom:6px"></div>
    <div class="ppad">
      <button class="pbtn" onclick="pi('1')">1</button><button class="pbtn" onclick="pi('2')">2</button><button class="pbtn" onclick="pi('3')">3</button>
      <button class="pbtn" onclick="pi('4')">4</button><button class="pbtn" onclick="pi('5')">5</button><button class="pbtn" onclick="pi('6')">6</button>
      <button class="pbtn" onclick="pi('7')">7</button><button class="pbtn" onclick="pi('8')">8</button><button class="pbtn" onclick="pi('9')">9</button>
      <button class="pbtn e"></button><button class="pbtn" onclick="pi('0')">0</button><button class="pbtn" onclick="pd()" style="font-size:16px">⌫</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <button class="hbtn" onclick="location.href='index.html'">🏠</button>
    <div style="flex:1"><h1 id="hTitle">Günlük Tüketim</h1><span class="sub" id="hsub"></span></div>
    <button class="hbtn" onclick="loadStok()" title="Yenile">🔄</button>
  </div>

  <!-- GİRİŞ (bugünkü tüketim) -->
  <div class="sc" id="tGiris" style="display:block">
    <div class="card" id="depoAtanmamisUyari" style="display:none;border-left:4px solid var(--danger)">
      <div class="card-title" style="color:var(--danger)">⚠️ Depo Atanmamış</div>
      <p id="depoUyariMetin" style="font-size:13px;color:var(--gray-600)">Hesabınıza henüz bir depo/departman kodu atanmamış.</p>
      <div id="yoneticiDepoSecici" style="display:none;margin-top:10px">
        <label style="font-size:11px;font-weight:600;color:var(--gray-600)">Test/izleme için bir nokta seç (kalıcı atama değildir, sadece bu oturum için)</label>
        <select id="yon-nokta-sec" onchange="yoneticiNoktaSec()" style="width:100%;padding:10px;border:1.5px solid var(--gray-300);border-radius:8px;font-size:13px;margin-top:6px">
          <option value="">— Nokta seçin —</option>
        </select>
      </div>
    </div>
    <div id="girisIcerik">
      <div class="search-bar">
        <input type="text" id="urun-ara" placeholder="Ürün ara..." oninput="renderUrunler()">
        <span class="search-icon">🔍</span>
      </div>
      <div id="urun-liste"></div>
      <button class="btn btn-success btn-block" style="margin:12px 0 16px" onclick="tuketimKaydet()">✅ Bugünkü Tüketimi Kaydet</button>
    </div>
  </div>

  <!-- GEÇMİŞ -->
  <div class="sc" id="tGecmis">
    <div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:8px;text-transform:uppercase">Son 30 Gün</div>
    <div id="gecmis-liste"></div>
  </div>

  <!-- REÇETE İLE TÜKET -->
  <div class="sc" id="tTuket">
    <div class="search-bar">
      <input type="text" id="tuket-ara" placeholder="Reçete ara..." oninput="renderTuketListe()">
      <span class="search-icon">🔍</span>
    </div>
    <div id="tuket-liste"></div>
    <div id="tuket-detay"></div>
  </div>

  <!-- REÇETELER (yönetim) -->
  <div class="sc" id="tReceteler">
    <button class="btn btn-primary btn-block" style="margin-bottom:12px" onclick="receteYeniAc()">➕ Yeni Reçete</button>
    <div class="search-bar">
      <input type="text" id="recete-ara" placeholder="Reçete ara..." oninput="renderReceteler()">
      <span class="search-icon">🔍</span>
    </div>
    <div id="recete-liste"></div>
  </div>
  <div class="sc" id="tReceteForm"></div>

  <!-- FOOD COST RAPORU -->
  <div class="sc" id="tFoodCost">
    <div class="card" id="fc-stats"></div>
    <div id="fc-liste"></div>
  </div>

  <div class="bnav" id="bnav">
    <button class="nbtn active" id="nb-giris" onclick="gTab('giris')"><span class="ni">📉</span><span class="nl">Tüketim</span></button>
    <button class="nbtn" id="nb-tuket" onclick="gTab('tuket')"><span class="ni">🍽️</span><span class="nl">Reçete Tüket</span></button>
    <button class="nbtn" id="nb-receteler" onclick="gTab('receteler')"><span class="ni">📖</span><span class="nl">Reçeteler</span></button>
    <button class="nbtn" id="nb-foodcost" onclick="gTab('foodcost')"><span class="ni">📊</span><span class="nl">Food Cost</span></button>
    <button class="nbtn" id="nb-gecmis" onclick="gTab('gecmis')"><span class="ni">📋</span><span class="nl">Geçmiş</span></button>
  </div>
</div>

<div id="toast"></div>
<div id="ld"><div class="sp"></div><div style="font-size:13px">Yükleniyor...</div></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SB_URL='https://xwytofysmgqtqjzkplfi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3eXRvZnlzbWdxdHFqemtwbGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjg5ODMsImV4cCI6MjA5ODgwNDk4M30.E7cRcOAvCmUFXWs45t4HE-igpmqWmSN2J66dOuvCHjA';
const SB_HEADERS={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

function tamDepoId(otelId,depoTipi){return otelId+'_'+depoTipi;}
function otelFromBareKod(kod){
  if(!kod)return '810';
  if(kod==='100'||kod==='200')return '810';
  if(kod==='300'||kod==='400')return '811';
  if(kod.startsWith('R'))return '811';
  return '810';
}

const RIKSON={mutfak:'🍳',bar:'🍹',yonetici:'👔'};
const DEFAULT_USERS=[
  {id:1,ad:'Mehmet Araz',   rol:'yonetici',pin:'123456',depoId:null,otelId:null},
  {id:6,ad:'Ana Mutfak Sefi',rol:'mutfak',pin:'555555',depoId:'CMM201',otelId:'810'},
  {id:7,ad:'Bar Sefi',       rol:'bar',   pin:'666666',depoId:'CSM301',otelId:'810'},
];

// Yönetici rolü, sabit bir depoya atanmamışsa buradan İSTEDİĞİ noktayı seçip test/izleme yapabilir.
// (Gerçek LN depo kodları — mutfak/bar noktaları, her iki otel)
const YONETICI_NOKTA_SECENEKLERI=[
  {otelId:'810',depoId:'CMM201',ad:'🏨 Club — Anamutfak',rol:'mutfak'},
  {otelId:'810',depoId:'CMM202',ad:'🏨 Club — Aqua Mutfak',rol:'mutfak'},
  {otelId:'810',depoId:'CMM204',ad:'🏨 Club — Park Mutfak',rol:'mutfak'},
  {otelId:'810',depoId:'CSM201',ad:'🏨 Club — Alibey Restaurant',rol:'bar'},
  {otelId:'810',depoId:'CSM301',ad:'🏨 Club — Turk Kahvesi',rol:'bar'},
  {otelId:'810',depoId:'CSM305',ad:"🏨 Club — Ali's Pub",rol:'bar'},
  {otelId:'810',depoId:'CSM309',ad:'🏨 Club — Aqua Bar',rol:'bar'},
  {otelId:'810',depoId:'CSM316',ad:'🏨 Club — Lobby Bar',rol:'bar'},
  {otelId:'811',depoId:'RMM201',ad:'🏨 Resort — Anamutfak',rol:'mutfak'},
  {otelId:'811',depoId:'RMM202',ad:'🏨 Resort — Aqua Mutfak',rol:'mutfak'},
  {otelId:'811',depoId:'RSM201',ad:'🏨 Resort — Ala Restaurant',rol:'bar'},
  {otelId:'811',depoId:'RSM301',ad:'🏨 Resort — Peymane Bar',rol:'bar'},
  {otelId:'811',depoId:'RSM306',ad:'🏨 Resort — Lobby Bar',rol:'bar'},
];

let CU=null;
let DB={kullanicilar:[],stok:{},hareketler:[]};
let pv='';
let GT='giris';

// ============================================================
// PIN GİRİŞİ
// ============================================================
function pi(d){
  if(pv.length>=6)return;
  pv+=d;dots();
  const all=[...DB.kullanicilar,...DEFAULT_USERS];
  const m=all.filter(u=>String(u.pin).startsWith(pv));
  document.getElementById('pshow').textContent=m.length===1&&pv.length>=3?(RIKSON[m[0].rol]||'👤')+' '+m[0].ad:'';
  document.getElementById('perr').textContent='';
  if(pv.length===6)setTimeout(checkPin,200);
}
function pd(){pv=pv.slice(0,-1);dots();if(!pv)document.getElementById('pshow').textContent='';}
function dots(){for(let i=0;i<6;i++)document.getElementById('d'+i).classList.toggle('f',i<pv.length);}
function checkPin(){
  const all=[...DB.kullanicilar,...DEFAULT_USERS];
  const user=all.find(u=>String(u.pin)===String(pv));
  if(!user||(user.rol!=='mutfak'&&user.rol!=='bar'&&user.rol!=='yonetici')){
    document.getElementById('perr').textContent=!user?'❌ Hatalı PIN':'❌ Bu modül sadece Mutfak/Bar personeli içindir';
    setTimeout(()=>document.getElementById('perr').textContent='',2500);
    pv='';dots();document.getElementById('pshow').textContent='';return;
  }
  CU=user;
  sessionStorage.setItem('gurok_tuketim_session',JSON.stringify({user,expiry:Date.now()+8*60*60*1000}));
  document.getElementById('login').classList.add('gizle');
  basla();
}
function getSession(){
  const s=sessionStorage.getItem('gurok_tuketim_session');
  if(!s)return null;
  try{
    const{user,expiry}=JSON.parse(s);
    if(Date.now()>=expiry)return null;
    const all=[...DB.kullanicilar,...DEFAULT_USERS];
    const tam=all.find(u=>u.id===user.id||String(u.pin)===String(user.pin))||user;
    return tam;
  }catch(e){return null;}
}

// ============================================================
// SUPABASE
// ============================================================
async function loadKullanicilar(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/kullanicilar?select=*&aktif=eq.true&rol=in.(mutfak,bar,yonetici)',{headers:SB_HEADERS});
    if(!r.ok)return;
    const d=await r.json();
    if(Array.isArray(d))DB.kullanicilar=d.map(u=>({...u,depoId:u.depo_id||null,otelId:u.otel_id||null}));
  }catch(e){console.warn(e);}
}

async function loadStok(){
  if(!CU?.depoId){
    document.getElementById('depoAtanmamisUyari').style.display='block';
    document.getElementById('girisIcerik').style.display='none';
    if(CU.rol==='yonetici'){
      document.getElementById('depoUyariMetin').textContent='Yönetici hesabına sabit bir depo atanmamış — istersen aşağıdan test/izleme için bir nokta seçebilirsin.';
      document.getElementById('yoneticiDepoSecici').style.display='block';
      const sel=document.getElementById('yon-nokta-sec');
      if(!sel.options.length||sel.options.length===1){
        sel.innerHTML='<option value="">— Nokta seçin —</option>'+
          YONETICI_NOKTA_SECENEKLERI.map((n,i)=>`<option value="${i}">${n.ad}</option>`).join('');
      }
    }else{
      document.getElementById('depoUyariMetin').textContent='Hesabınıza henüz bir depo/departman kodu atanmamış. Yöneticinizden Supabase\'deki kullanicilar tablosunda hesabınıza bir depo ataması yapmasını isteyin.';
      document.getElementById('yoneticiDepoSecici').style.display='none';
    }
    return;
  }
  document.getElementById('depoAtanmamisUyari').style.display='none';
  document.getElementById('girisIcerik').style.display='block';
  sLD();
  const otelId=CU.otelId||otelFromBareKod(CU.depoId);
  const depoId=tamDepoId(otelId,CU.depoId);
  try{
    const r=await fetch(SB_URL+'/rest/v1/stok?select=*&depo_kodu=eq.'+encodeURIComponent(depoId)+'&miktar=gt.0&order=urun_kodu',{headers:SB_HEADERS});
    DB.stok={};
    if(r.ok){
      (await r.json()).forEach(row=>{DB.stok[row.urun_kodu]={kod:row.urun_kodu,miktar:parseFloat(row.miktar)||0,giris:''};});
    }
  }catch(e){console.warn(e);}
  hLD();
  renderUrunler();
}

async function loadUrunAdlari(){
  // urunler tablosundan ad/birim bilgisini çek (stok tablosu sadece kod+miktar tutuyor)
  try{
    const r=await fetch(SB_URL+'/rest/v1/urunler?select=kod,ad,birim',{headers:SB_HEADERS});
    if(r.ok){
      const rows=await r.json();
      DB.urunAdlari={};
      rows.forEach(u=>{DB.urunAdlari[u.kod]={ad:u.ad,birim:u.birim};});
    }
  }catch(e){console.warn(e);}
}

async function loadGecmis(){
  if(!CU?.depoId)return;
  const c=document.getElementById('gecmis-liste');
  c.innerHTML='<div class="es"><div class="et">Yükleniyor...</div></div>';
  const otelId=CU.otelId||otelFromBareKod(CU.depoId);
  const depoId=tamDepoId(otelId,CU.depoId);
  const otuzGunOnce=new Date(Date.now()-30*86400000).toISOString();
  try{
    const r=await fetch(SB_URL+`/rest/v1/stok_hareketleri?select=*&depo_kodu=eq.${encodeURIComponent(depoId)}&tip=eq.cikis&aciklama=ilike.*gunluk_tuketim*&tarih=gte.${otuzGunOnce}&order=tarih.desc`,{headers:SB_HEADERS});
    if(!r.ok){c.innerHTML='<div class="es"><div class="ei">📋</div><div class="et">Kayıt yok</div></div>';return;}
    const rows=await r.json();
    if(!rows.length){c.innerHTML='<div class="es"><div class="ei">📋</div><div class="et">Henüz tüketim girilmemiş</div></div>';return;}
    c.innerHTML=rows.map(h=>{
      const urunAd=DB.urunAdlari?.[h.urun_kodu]?.ad||h.urun_kodu;
      return`<div class="har-item">
        <div class="har-icon">📉</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600">${urunAd}</div>
          <div style="font-size:11px;color:var(--gray-500)">${new Date(h.tarih).toLocaleString('tr-TR')}</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--danger)">-${h.miktar} ${DB.urunAdlari?.[h.urun_kodu]?.birim||''}</div>
      </div>`;
    }).join('');

async function tuketimKaydet(){
  const girilenler=Object.values(DB.stok).filter(u=>u.giris&&parseFloat(u.giris)>0);
  if(!girilenler.length){toast('⚠️ En az bir ürün için tüketim miktarı girin');return;}

  const yetersiz=girilenler.filter(u=>parseFloat(u.giris)>u.miktar);
  if(yetersiz.length){
    const u=yetersiz[0];
    const ad=DB.urunAdlari?.[u.kod]?.ad||u.kod;
    toast(`⚠️ ${ad} — girilen miktar (${u.giris}) mevcut stoktan (${u.miktar}) fazla olamaz`);
    return;
  }

  if(!confirm(`${girilenler.length} ürün için tüketim kaydedilecek. Onaylıyor musunuz?`))return;

  sLD();
  const otelId=CU.otelId||otelFromBareKod(CU.depoId);
  const depoId=tamDepoId(otelId,CU.depoId);
  try{
    for(const u of girilenler){
      const miktar=parseFloat(u.giris);
      // Önbellekteki (DB.stok) miktar bayat olabilir — yazmadan hemen önce canlı değeri
      // tazele, aksi halde eşzamanlı iki tüketim girişi birbirinin düşüşünü sessizce siler.
      let mevcut=u.miktar;
      try{
        const rTaze=await fetch(SB_URL+`/rest/v1/stok?depo_kodu=eq.${encodeURIComponent(depoId)}&urun_kodu=eq.${encodeURIComponent(u.kod)}&select=miktar`,{headers:SB_HEADERS});
        if(rTaze.ok){const rows=await rTaze.json();if(rows[0])mevcut=parseFloat(rows[0].miktar)||0;}
      }catch(e){}
      const yeniMiktar=Math.max(0,mevcut-miktar);
      await fetch(SB_URL+'/rest/v1/stok?on_conflict=urun_kodu,depo_kodu',{
        method:'POST',headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({urun_kodu:u.kod,depo_kodu:depoId,otel_id:otelId,miktar:yeniMiktar})
      });
      await fetch(SB_URL+'/rest/v1/stok_hareketleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        urun_kodu:u.kod,depo_kodu:depoId,otel_id:otelId,tip:'cikis',miktar:miktar,
        aciklama:`gunluk_tuketim — ${CU.ad}`
      })});
      u.miktar=yeniMiktar;u.giris='';
    }
  }catch(e){console.warn(e);toast('⚠️ Kaydetme sırasında hata oluştu');hLD();return;}
  hLD();
  toast(`✅ ${girilenler.length} ürün için tüketim kaydedildi`);
  renderUrunler();
}

          olusturanAd:row.olusturan_ad||'',
          kalemler:(row.recete_kalemleri||[]).map(k=>({id:k.id,kod:k.urun_kodu,ad:k.urun_adi,miktar:parseFloat(k.miktar)||0,birim:k.birim}))
        };
      });

async function loadFiyatMap(){
  // Öncelik: FIFO (depoda hâlâ duran en eski kolinin gerçek alım fiyatı) — toplu alımda
  // "yeni fiyattan mal geldi ama elimizdeki eski stok bitmedi" durumunu doğru yansıtır.
  // FIFO verisi yoksa (ürün koli takibiyle girilmemişse) son fatura fiyatına düşer.
  DB.fiyatMap={};
  try{
    const rSon=await fetch(SB_URL+'/rest/v1/urun_guncel_fiyat?select=urun_kodu,birim_fiyat,birim',{headers:SB_HEADERS});
    if(rSon.ok){(await rSon.json()).forEach(row=>{DB.fiyatMap[row.urun_kodu]={fiyat:parseFloat(row.birim_fiyat)||0,birim:row.birim,kaynak:'son_fatura'};});}
  }catch(e){console.warn(e);}
  try{
    const rFifo=await fetch(SB_URL+'/rest/v1/urun_fifo_fiyat?select=urun_kodu,birim_fiyat,birim,fiyat_kaynagi',{headers:SB_HEADERS});
    if(rFifo.ok){(await rFifo.json()).forEach(row=>{DB.fiyatMap[row.urun_kodu]={fiyat:parseFloat(row.birim_fiyat)||0,birim:row.birim,kaynak:row.fiyat_kaynagi==='tahmini'?'fifo_tahmini':'fifo'};});}
  }catch(e){console.warn(e);}
}

function receteMaliyetHesapla(kalemler){
  let toplam=0,eksik=[];
  (kalemler||[]).forEach(k=>{
    const f=DB.fiyatMap?.[k.kod];
    if(!f){eksik.push(k.ad);return;}
    toplam+=(parseFloat(k.miktar)||0)*f.fiyat;
  });
  return{toplam:Math.round(toplam*100)/100,eksik};
}

function rkalemAra(i,val){
  RKALEMLER[i].ad=val;
  const dd=document.getElementById('rk-dd-'+i);
  if(!val||val.length<2){dd.style.display='none';return;}
  const v=val.toLowerCase();
  const kayitlar=Object.entries(DB.urunAdlari||{}).filter(([kod,u])=>u.ad.toLowerCase().includes(v)).slice(0,15);
  if(!kayitlar.length){dd.style.display='none';return;}
  dd.innerHTML=kayitlar.map(([kod,u])=>`<div data-kod="${kod}" data-ad="${u.ad.replace(/"/g,'&quot;')}" data-birim="${u.birim||'KG'}" style="padding:8px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--gray-100)">${u.ad} <span style="color:var(--gray-400);font-size:10px">${kod}</span></div>`).join('');
  dd.querySelectorAll('[data-kod]').forEach(el=>{
    el.addEventListener('pointerdown',function(e){

      RKALEMLER[i]={...RKALEMLER[i],kod:this.dataset.kod,ad:this.dataset.ad,birim:this.dataset.birim};
      dd.style.display='none';
      renderRKalemler();

async function receteKaydet(){
  const ad=document.getElementById('rf-ad').value.trim();
  const satisInp=document.getElementById('rf-satis').value;
  const satis=satisInp?parseFloat(satisInp):null;
  if(!ad){toast('⚠️ Reçete adı girin');return;}
  const dolu=RKALEMLER.filter(k=>k.kod&&k.miktar&&parseFloat(k.miktar)>0);
  if(!dolu.length){toast('⚠️ En az bir malzeme ekleyin');return;}
  sLD();
  const govde={
    ad,kategori:document.getElementById('rf-kategori').value,
    rol:document.getElementById('rf-rol').value,
    satis_fiyati:satis,aciklama:document.getElementById('rf-aciklama').value||null,
    olusturan_ad:CU.ad,guncelleme_tarihi:new Date().toISOString()
  };
  try{
    let receteId=R_EDIT_ID;
    if(receteId){
      const rPatch=await fetch(SB_URL+'/rest/v1/receteler?id=eq.'+receteId,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify(govde)});
      if(!rPatch.ok)throw new Error('Reçete güncellenemedi: '+(await rPatch.text()));
      await fetch(SB_URL+'/rest/v1/recete_kalemleri?recete_id=eq.'+receteId,{method:'DELETE',headers:SB_HEADERS});
    }else{
      const r=await fetch(SB_URL+'/rest/v1/receteler',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify(govde)});
      if(!r.ok)throw new Error('Reçete oluşturulamadı: '+(await r.text()));
      const rows=await r.json();
      receteId=rows[0]?.id;
      if(!receteId)throw new Error('Reçete kaydedildi ama ID dönmedi — sunucu yanıtı: '+JSON.stringify(rows));
    }
    const rKalem=await fetch(SB_URL+'/rest/v1/recete_kalemleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify(
      dolu.map(k=>({recete_id:receteId,urun_kodu:k.kod,urun_adi:k.ad,miktar:parseFloat(k.miktar),birim:k.birim}))
    )});
    if(!rKalem.ok)throw new Error('Malzemeler kaydedilemedi: '+(await rKalem.text()));
    await loadReceteler();
    hLD();
    toast(`✅ ${ad} kaydedildi`);
    receteFormKapat();
    renderReceteler();
  }catch(e){
    hLD();
    console.error('Reçete kaydetme hatası:',e);
    toast('❌ Kaydedilemedi');
    alert('❌ Reçete kaydedilemedi:\n\n'+e.message);
  }
}
async function receteSil(id){
  const r=DB.receteler[id];if(!r)return;
  if(!confirm(`"${r.ad}" silinsin mi?`))return;
  sLD();
  try{
    await fetch(SB_URL+'/rest/v1/receteler?id=eq.'+id,{method:'PATCH',headers:SB_HEADERS,body:JSON.stringify({aktif:false})});
    delete DB.receteler[id];
  }catch(e){}
  hLD();
  receteFormKapat();
  renderReceteler();
  toast('🗑️ Reçete silindi (pasife alındı)');
}

function tuketOnizlemeGuncelle(){
  const r=DB.receteler[_tuketAktifRecete];if(!r)return;

  const el=document.getElementById('tuket-onizleme');

  const satirlar=r.kalemler.map(k=>{
    const gerekli=k.miktar*porsiyon;
    const mevcut=parseFloat(DB.stok?.[k.kod]?.miktar)||0;
    const yeterli=mevcut>=gerekli;
    return{...k,gerekli,mevcut,yeterli};
  });
  const{toplam}=receteMaliyetHesapla(r.kalemler.map(k=>({...k,miktar:k.miktar*porsiyon})));
  const hepsiYeterli=satirlar.every(s=>s.yeterli);
  el.innerHTML=`
    ${satirlar.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--gray-100)">
      <span>${escapeHtml(s.ad)}</span>
      <span style="color:${s.yeterli?'var(--gray-600)':'var(--danger)'};font-weight:${s.yeterli?400:700}">${s.gerekli.toFixed(3)} ${s.birim}${!s.yeterli?' ⚠️ yetersiz ('+s.mevcut.toFixed(2)+' var)':''}</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:13px;font-weight:800;color:var(--primary)">
      <span>Toplam Maliyet</span><span>${toplam.toFixed(2)} ₺</span>
    </div>
    ${!hepsiYeterli?'<div style="color:var(--danger);font-size:11px;margin-top:6px;font-weight:600">⚠️ Bazı malzemeler yetersiz — yine de kaydedersen stok negatife düşmez, 0\'da durur</div>':''}`;
}
async function tuketKaydet(){
  const r=DB.receteler[_tuketAktifRecete];if(!r)return;
  const porsiyon=parseFloat(document.getElementById('tuket-porsiyon').value);
  if(!porsiyon||porsiyon<=0){toast('⚠️ Porsiyon sayısı girin');return;}
  if(!confirm(`${r.ad} — ${porsiyon} porsiyon stoktan düşülecek. Onaylıyor musunuz?`))return;
  sLD();
  const otelId=CU.otelId||otelFromBareKod(CU.depoId);
  const depoId=tamDepoId(otelId,CU.depoId);
  try{
    for(const k of r.kalemler){
      const gerekli=k.miktar*porsiyon;
      // Önbellekteki (DB.stok) miktar bayat olabilir — yazmadan hemen önce canlı değeri tazele.
      let mevcut=parseFloat(DB.stok?.[k.kod]?.miktar)||0;
      try{
        const rTaze=await fetch(SB_URL+`/rest/v1/stok?depo_kodu=eq.${encodeURIComponent(depoId)}&urun_kodu=eq.${encodeURIComponent(k.kod)}&select=miktar`,{headers:SB_HEADERS});
        if(rTaze.ok){const rows=await rTaze.json();if(rows[0])mevcut=parseFloat(rows[0].miktar)||0;}
      }catch(e){}
      const yeniMiktar=Math.max(0,mevcut-gerekli);
      await fetch(SB_URL+'/rest/v1/stok?on_conflict=urun_kodu,depo_kodu',{
        method:'POST',headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({urun_kodu:k.kod,depo_kodu:depoId,otel_id:otelId,miktar:yeniMiktar})
      });
      await fetch(SB_URL+'/rest/v1/stok_hareketleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
        urun_kodu:k.kod,depo_kodu:depoId,otel_id:otelId,tip:'cikis',miktar:gerekli,
        aciklama:`recete_tuketim — ${r.ad} x${porsiyon} — ${CU.ad}`
      })});
      if(DB.stok[k.kod])DB.stok[k.kod].miktar=yeniMiktar;
    }
    const{toplam}=receteMaliyetHesapla(r.kalemler);
    const birimMaliyet=toplam;
    const toplamMaliyet=Math.round(birimMaliyet*porsiyon*100)/100;
    const fc=r.satisFiyati?Math.round(birimMaliyet/r.satisFiyati*1000)/10:null;
    await fetch(SB_URL+'/rest/v1/recete_tuketimleri',{method:'POST',headers:SB_HEADERS,body:JSON.stringify({
      recete_id:r.id,recete_ad:r.ad,porsiyon_sayisi:porsiyon,
      birim_maliyet:birimMaliyet,toplam_maliyet:toplamMaliyet,
      satis_fiyati:r.satisFiyati,food_cost_yuzde:fc,
      depo_kodu:depoId,otel_id:otelId,olusturan_ad:CU.ad
    })});
  }catch(e){hLD();toast('❌ Hata: '+e.message);return;}
  hLD();
  toast(`✅ ${r.ad} — ${porsiyon} porsiyon stoktan düşüldü`);
  document.getElementById('tuket-detay').innerHTML='';
  _tuketAktifRecete=null;
  loadStok();
}

// ============================================================
// FOOD COST RAPORU
// ============================================================
function renderFoodCost(){
  const liste=Object.values(DB.receteler||{}).filter(receteGorebilirMi).map(r=>{
    const{toplam,eksik}=receteMaliyetHesapla(r.kalemler);
    const fc=r.satisFiyati?Math.round(toplam/r.satisFiyati*1000)/10:null;
    return{...r,maliyet:toplam,fc,eksikSayisi:eksik.length};
  }).sort((a,b)=>(b.fc??-1)-(a.fc??-1));

  if(!liste.length){
    document.getElementById('fc-stats').innerHTML='';
    document.getElementById('fc-liste').innerHTML='<div class="es"><div class="ei">📊</div><div class="et">Henüz reçete yok</div></div>';
    return;
  }
  const gecerli=liste.filter(r=>r.fc!==null);
  const ortFc=gecerli.length?Math.round(gecerli.reduce((t,r)=>t+r.fc,0)/gecerli.length*10)/10:0;
  const riskli=liste.filter(r=>r.fc!==null&&r.fc>40).length;
  document.getElementById('fc-stats').innerHTML=`
    <div class="card-title">📊 Food Cost Özeti</div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--primary)">${liste.length}</div><div style="font-size:10px;color:var(--gray-500)">Reçete</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800;color:${ortFc<=30?'var(--success)':ortFc<=40?'var(--warning)':'var(--danger)'}">%${ortFc}</div><div style="font-size:10px;color:var(--gray-500)">Ort. Food Cost</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--danger)">${riskli}</div><div style="font-size:10px;color:var(--gray-500)">Riskli (%40+)</div></div>
    </div>`;
  document.getElementById('fc-liste').innerHTML=liste.map(r=>{
    const renk=r.fc===null?'var(--gray-400)':r.fc<=30?'var(--success)':r.fc<=40?'var(--warning)':'var(--danger)';
    return`<div class="urow" style="border-left-color:${renk}">
      <div class="urow-top">
        <div><div class="urow-ad">${RIKSON[r.rol]||''} ${escapeHtml(r.ad)}</div>
          <div class="urow-stok">Maliyet: ${r.maliyet.toFixed(2)}₺${r.satisFiyati?' • Satış: '+r.satisFiyati.toFixed(2)+'₺':' • Satış fiyatı girilmemiş'}${r.eksikSayisi?` • ⚠️ ${r.eksikSayisi} malzeme fiyatsız`:''}</div>
        </div>
        <div style="font-size:16px;font-weight:800;color:${renk}">${r.fc!==null?'%'+r.fc:'—'}</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// NAVİGASYON
// ============================================================
function yoneticiNoktaSec(){
  const idx=document.getElementById('yon-nokta-sec').value;
  if(idx==='')return;
  const n=YONETICI_NOKTA_SECENEKLERI[parseInt(idx)];
  if(!n)return;
  // Kalıcı değil — sadece bu oturumda (sayfa yenilenene kadar) o noktaymış gibi davranır.
  CU={...CU,depoId:n.depoId,otelId:n.otelId,rolAsil:CU.rol,rol:n.rol};
  document.getElementById('hsub').textContent=`${RIKSON[n.rol]||'👤'} ${CU.ad} • ${n.ad} (geçici görünüm)`;
  toast(`👁️ ${n.ad} olarak görüntüleniyorsun`);
  loadStok();
  loadReceteler();
}
function gTab(tab){
  GT=tab;
  ['giris','tuket','receteler','foodcost','gecmis'].forEach(t=>{
    const map={giris:'tGiris',tuket:'tTuket',receteler:'tReceteler',foodcost:'tFoodCost',gecmis:'tGecmis'};
    document.getElementById(map[t]).style.display=(t===tab)?'block':'none';
    document.getElementById('nb-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('tReceteForm').style.display='none';
  if(tab==='gecmis')loadGecmis();
  if(tab==='tuket'){document.getElementById('tuket-detay').innerHTML='';renderTuketListe();}
  if(tab==='receteler')renderReceteler();
  if(tab==='foodcost')renderFoodCost();
}

function basla(){
  document.getElementById('app').style.display='flex';
  const depoEtiket=CU.depoId?`${CU.depoId}`:'—';
  document.getElementById('hsub').textContent=(RIKSON[CU.rol]||'👤')+' '+CU.ad+' • '+depoEtiket;
  loadStok();
  loadReceteler();
  loadFiyatMap();
  gTab('giris');
}

// ============================================================
// YARDIMCI
// ============================================================
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),3000);}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function sLD(){document.getElementById('ld').classList.add('show');}
function hLD(){document.getElementById('ld').classList.remove('show');}

// ============================================================
// INIT
// ============================================================
(async function(){
  await loadKullanicilar();
  await loadUrunAdlari();
  const sess=getSession();
  if(sess){
    CU=sess;
    document.getElementById('login').classList.add('gizle');
    basla();
  }else{
    document.getElementById('login').classList.remove('gizle');
  }
})();
</script>
